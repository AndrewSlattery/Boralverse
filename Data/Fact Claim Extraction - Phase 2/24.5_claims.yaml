  - category: work
    claim: "In an 1821 letter to her sister, Elsebeth Sneider wrote about the Deviance movement's strange ideas and lonely, nihilist universe."
    entities:
      - name: "Elsebeth Sneider"
        type: person
      - name: "Deviance movement"
        type: period
    dates: ["1821"]

  - category: work
    claim: "In the 1821 letter, Elsebeth Sneider complained that many adherents of the Deviance movement approached her as if she were their most natural ally."
    entities:
      - name: "Elsebeth Sneider"
        type: person
      - name: "Deviance movement"
        type: period

  - category: work
    claim: "The fervency of Elsebeth Sneider's opinion against the Deviance movement was visible in her later works."
    entities:
      - name: "Elsebeth Sneider"
        type: person
      - name: "Deviance movement"
        type: period

  - category: work
