        type: event
    dates: ["turn of 19th century", "Second German War"]

  - category: culture
    claim: "The voidtale craze's optimistic and exploratory character dropped rather rapidly out of fashion at the Second German War."
    entities:
      - name: "voidtale"
        type: concept
      - name: "Second German War"
        type: event

  - category: work
    claim: "Elsebeth Sneider's writings usually featured a heap of different xenic worlds and varied peoples."
    entities:
      - name: "Elsebeth Sneider"
        type: person

  - category: work
    claim: "Elsebeth Sneider's writings featured the long voyages her characters took to explore xenic worlds."
    entities:
      - name: "Elsebeth Sneider"
