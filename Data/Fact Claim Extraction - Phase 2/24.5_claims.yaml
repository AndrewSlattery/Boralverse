      - name: "Elsebeth Sneider"
        type: person
      - name: "Saxony"
        type: polity

  - category: person
    claim: "Elsebeth Sneider campaigned especially with respect to eldest daughters with no brothers."
    entities:
      - name: "Elsebeth Sneider"
        type: person

  - category: person
    claim: "Elsebeth Sneider's more ambitious goals were ultimately unsuccessful within her lifetime."
    entities:
      - name: "Elsebeth Sneider"
        type: person

  - category: organisation
    claim: "The political society founded by Elsebeth Sneider would go on to spearhead suffrage movements in Saxony, Denmark, and across the Latin republics."
