entry: 70.5
title: "Monks and Metropoleis"
claims:
  - category: organisation
    claim: "The Jacobin Fraternity (Borlish: Fraterntað Jagovin), historically also known as the Order of Saint James, is a religious organisation based in the city of Axbane on the south coast of Borland."
    entities:
      - name: Jacobin Fraternity
        type: organisation
      - name: Axbane
        type: place
      - name: Borland
        type: polity

  - category: organisation
    claim: "The Jacobin Fraternity was founded in tenth-century Flanders under the patronage of Amelia of Bruges."
    entities:
      - name: Jacobin Fraternity
        type: organisation
      - name: Amelia of Bruges
        type: person
    dates: "10th c. N"

  - category: event
    claim: "In the eleventh century, the Jacobin Fraternity was implicated in a local popular uprising against Drengot Emperor Geoffry II and were forced to flee to Borland."
    entities:
      - name: Jacobin Fraternity
        type: organisation
      - name: Geoffry II
        type: person
      - name: Borland
        type: polity
    dates: "11th c. N"

  - category: place
    claim: "The Jacobin Fraternity built the Peninsular Monastery in Borland, which still overlooks Axbane."
    entities:
      - name: Jacobin Fraternity
        type: organisation
      - name: Peninsular Monastery
        type: place
      - name: Axbane
        type: place

  - category: organisation
    claim: "Funds from the Jacobin Fraternity contributed to the Jacobin Estates on the outskirts of Damvath, which on completion in the late eighteenth century became the fixed location of Borland's parliament."
    entities:
      - name: Jacobin Fraternity
        type: organisation
      - name: Jacobin Estates
        type: place
      - name: Damvath
        type: place
    dates: "late 18th c. N"

  - category: organisation
    claim: "Today the Jacobin Fraternity is known mostly for the guild they own, Jaibos Breweries, as well as for owning significant lands in Axbane including the site of one of the ancient Roman bathhouses."
    entities:
      - name: Jacobin Fraternity
        type: organisation
      - name: Jaibos Breweries
        type: organisation
      - name: Axbane
        type: place

  - category: polity
    claim: "The Riverine Cities were an alliance-federacy of small independent states along the Danaw River and its tributaries, linked by treaty and trade in the nineteenth and early twentieth centuries."
    entities:
      - name: Riverine Cities
        type: polity
    dates: "19th–early 20th c. N"

  - category: polity
    claim: "The political structure of the Riverine Cities grew out of the ashes of the Kingdom of the Danaw, which collapsed after the Second German War of the 1820s."
    entities:
      - name: Riverine Cities
        type: polity
      - name: Kingdom of the Danaw
        type: polity
      - name: Second German War
        type: event

  - category: polity
    claim: "The Riverine Cities were a hotbed for underground or subversive organisations, including the Deviance movement, and hosted several semi-public tovarick communities."
    entities:
      - name: Riverine Cities
        type: polity
      - name: Deviance movement
        type: culture

  - category: polity
    claim: "Members of the Riverine Cities included Belgrade, Boxa, Gollamo and Pojon."
    entities:
      - name: Riverine Cities
        type: polity
      - name: Belgrade
        type: place
      - name: Boxa
        type: place
      - name: Gollamo
        type: place
      - name: Pojon
        type: place
