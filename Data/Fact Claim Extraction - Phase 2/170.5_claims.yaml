entry: 170.5
title: "Decim(alis)ation"
source_work: "Scavlour (Reflecter), 1 July 1975 (Borland workdaily paper)"
claims:
  - category: economics
    claim: "The gemma (⍚) has been the base unit of Borlish currency since 1925."
    entities:
      - name: gemma
        type: concept
    dates: "since 1925 N"

  - category: event
    claim: "Borland adopted a decimal coinage system upon its incorporation into the Drengot Collusion in 1894; the gemma replaced its predecessor as base currency."
    entities:
      - name: Borland
        type: polity
      - name: Drengot Collusion
        type: organisation
    dates: "1894 N"

  - category: event
    claim: "In 1975, the Borlish Ministry for Wealth announced a 'decimation': the gemma was to be supplemented and eventually replaced by a new coin worth 10 gemma, with new currency entering circulation on David's Day 1977."
    entities:
      - name: Borland
        type: polity
    dates: "1975 N; new currency: 1977 N"

  - category: person
    claim: "Sarzan Dawkinholm, one-time Outland Minister in Markland, coined the term 'decimation' for currency reform as a cod-Latin pun and insult."
    entities:
      - name: Sarzan Dawkinholm
        type: person
      - name: Markland
        type: polity

  - category: terminology
    claim: "Decimation is the term for the process common to all Drengot successor states of periodically replacing the currency base unit with a coin worth ten times its predecessor."
    entities:
      - name: decimation
        type: concept
