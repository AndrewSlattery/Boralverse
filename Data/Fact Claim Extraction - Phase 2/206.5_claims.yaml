entry: 206.5
title: "The Scathe of Saint Sophia"
source_work: "The Fourth Burning of London, and other Screwups (2014, Galarça fi Molhomé)"
claims:
  - category: work
    claim: "'The Fourth Burning of London, and other Screwups: the Eventful History of Things Going Wrong' is a 2014 popular history textbook written by Galarça fi Molhomé in collaboration with the Faculty of Domain History at the University of Huzatre."
    entities:
      - name: The Fourth Burning of London, and other Screwups
        type: work
      - name: Galarça fi Molhomé
        type: person
      - name: University of Huzatre
        type: organisation
    dates:
      - "2014"

  - category: person
    claim: "Galarça fi Molhomé is an author who previously wrote historical lovetales before studying at the University of Huzatre."
    entities:
      - name: Galarça fi Molhomé
        type: person
      - name: University of Huzatre
        type: organisation

  - category: glossary
    claim: "Huzatre is the Boralverse name for approximately Bayonne."
    entities:
      - name: Huzatre
        type: place
        irl: "~Bayonne"

  - category: event
    claim: "Nicolà sAvignon led the renovation and expansion of Saint Sophia's Cathedral in Stamboul in the 14th century, likely in the 1340s N."
    entities:
      - name: Nicolà sAvignon
        type: person
      - name: Saint Sophia's Cathedral
        type: place
      - name: Stamboul
        type: place
    dates:
      - "ca. 1340s N"

  - category: place
    claim: "Saint Sophia's Cathedral in Stamboul had stood mostly unchanged since its construction in the sixth century during the reign of Justinian I."
    entities:
      - name: Saint Sophia's Cathedral
        type: place
      - name: Stamboul
        type: place
      - name: Justinian I
        type: person
    dates:
      - "6th century"

  - category: glossary
    claim: "Saint Sophia's Cathedral is the Boralverse name for the Hagia Sophia."
    entities:
      - name: Saint Sophia's Cathedral
        type: place
        irl: Hagia Sophia

  - category: event
    claim: "The Scathe of Saint Sophia was a building collapse in 1651 N that killed Emperor Theosthenes, much of his family, and dozens of dignitaries."
    entities:
      - name: Scathe of Saint Sophia
        type: event
      - name: Emperor Theosthenes
        type: person
      - name: Saint Sophia's Cathedral
        type: place
    dates:
      - "1651 N"

  - category: event
    claim: "The collapse of Saint Sophia's Cathedral contributed to the final collapse of the Roman Empire less than a decade after 1651 N."
    entities:
      - name: Scathe of Saint Sophia
        type: event
    dates:
      - "ca. 1651–1660 N"

  - category: work
    claim: "'The Last Years of the Last Roman Empire' is an 1890 popular history work by Jordan hixPasqual, which advanced the theory that Nicolà sAvignon was responsible for the Scathe of Saint Sophia through faulty reinforcement techniques."
    entities:
      - name: The Last Years of the Last Roman Empire
        type: work
      - name: Jordan hixPasqual
        type: person
      - name: Nicolà sAvignon
        type: person
    dates:
      - "1890"

  - category: event
    claim: "Challengers to the title of largest cathedral in Christendom were being built in Valencia and Augsburg at the time of sAvignon's redesign of Saint Sophia's Cathedral."
    entities:
      - name: Nicolà sAvignon
        type: person
      - name: Saint Sophia's Cathedral
        type: place
