entry: 132.5
title: "Dime measures"
claims:
  - category: terminology
    claim: "The dime measures are a modern system of units based on factors of ten, codified during the nineteenth century."
    entities:
      - name: dime measures
        type: concept
    dates: "19th c. N"

  - category: language
    claim: "The name 'dime measures' derives from French dîme 'one-tenth,' from Latin decimus."
    entities:
      - name: dime measures
        type: concept

  - category: terminology
    claim: "Standard dime modifiers include: great (10⁴), tithe (10⁻¹), petty (10⁻⁴), and scant (10⁻⁸)."
    entities:
      - name: dime measures
        type: concept

  - category: terminology
    claim: "The three dime bases for length are the inch, the foot (10 inches), and the league (10⁴ feet)."
    entities:
      - name: dime measures
        type: concept

  - category: event
    claim: "In 1946, the foot was redefined so that the normal speed (speed of light) equals precisely ten great leagues per second."
    entities:
      - name: dime measures
        type: concept
    dates: "1946 N"

  - category: glossary
    claim: "Normal speed is the Boralverse term for the speed of light."
    entities:
      - name: normal speed
        irl: speed of light
        type: concept

  - category: glossary
    claim: "Heft is the Boralverse term for mass."
    entities:
      - name: heft
        irl: mass
        type: concept

  - category: terminology
    claim: "The four dime bases for heft are the scruple, the ounce (100 scruples), the tabre (100 ounces), and the ton (100 tabres)."
    entities:
      - name: dime measures
        type: concept

  - category: terminology
    claim: "The tabre takes its approximate value from the Persian mann and its name from the city of Tabris."
    entities:
      - name: tabre
        type: concept
      - name: Tabris
        type: place

  - category: glossary
    claim: "Tabris is the Boralverse name for Tabriz."
    entities:
      - name: Tabris
        irl: Tabriz
        type: place

  - category: glossary
    claim: "Might is the Boralverse term for force (in the physical sense)."
    entities:
      - name: might
        irl: force
        type: concept

  - category: terminology
    claim: "The shove is a dime unit measuring the might required to accelerate a heft of one tabre to a speed of one foot per second."
    entities:
      - name: shove
        type: concept
