entry: 162.5
title: "Mathematical Etymology (cont.)"
source_work: "Veriloquace Glossary o'Mathematics (Rotcham University Primers)"
claims:
  - category: glossary
    claim: "Æther is the Boralverse mathematical term for field (the assignment of a quantity to each point in space)."
    entities:
      - name: æther
        irl: field
        type: concept

  - category: language
    claim: "Æther formerly referred to the supposed propagation medium for phenomena like light, heat, or astraphor; it derives from Latin æthēr 'the heavens' from Greek aithḗr 'heavens, open sky'."
    entities:
      - name: æther
        type: concept

  - category: glossary
    claim: "Hedre is the Boralverse mathematical term for face (of a solid figure) or bivector."
    entities:
      - name: hedre
        irl: face
        type: concept

  - category: language
    claim: "Hedre was coined in the sixteenth century, extracted from compounds like octahedre, from Scholastic Latin -hedrum '-faced' from Greek hédrā 'seat, chair; face'."
    entities:
      - name: hedre
        type: concept
    dates: "16th c. N"

  - category: glossary
    claim: "Matching is the Boralverse mathematical term for bijection (a reversible correspondence between the elements of two collections that is both severing and covering)."
    entities:
      - name: matching
        irl: bijection
        type: concept

  - category: glossary
    claim: "Severing is the Boralverse mathematical term for injective."
    entities:
      - name: severing
        irl: injective
        type: concept

  - category: glossary
    claim: "Covering is the Boralverse mathematical term for surjective."
    entities:
      - name: covering
        irl: surjective
        type: concept

  - category: language
    claim: "Matching was coined in 1831 as a translation of Saxon jochung 'yoking' in Dümmeyer's 1827 work; the verb match derives from Old English mæċċa 'consort'."
    entities:
      - name: matching
        type: concept
    dates: "1831 N"

  - category: glossary
    claim: "Oversamn is the Boralverse mathematical term for superset."
    entities:
      - name: oversamn
        irl: superset
        type: concept

  - category: glossary
    claim: "Samn is the Boralverse mathematical term for set."
    entities:
      - name: samn
        irl: set
        type: concept

  - category: language
    claim: "Oversamn was coined in 1831 as a calque of Saxon övrsammel 'superset' in Dümmeyer's 1827 work; samn derives from Old English samnian 'collect, gather'."
    entities:
      - name: oversamn
        type: concept
    dates: "1831 N"

  - category: glossary
    claim: "Stepth is the Boralverse mathematical term for gradient."
    entities:
      - name: stepth
        irl: gradient
        type: concept

  - category: language
    claim: "Stepth entered mathematics in 1690, from early Merch steapth, from the adjective steap 'steep, sheer' from Old English stēap 'high, lofty'."
    entities:
      - name: stepth
        type: concept
    dates: "1690 N"

  - category: glossary
    claim: "Vater is the Boralverse mathematical term for sine."
    entities:
      - name: vater
        irl: sine
        type: concept

  - category: language
    claim: "Vater derives from Scholastic Latin vatrus, from Arabic watar 'bowstring, chord', itself a calque of Sanskrit jiā 'bowstring; sine'."
    entities:
      - name: vater
        type: concept
    dates: "17th c. N"
