entry: 62.5
title: "The Mysarnos Codex"
claims:
  - category: work
    claim: "The Mysarnos Codex is an illustrated manuscript written entirely in an unfamiliar script which eluded decipherment for centuries."
    entities:
      - name: Mysarnos Codex
        type: work

  - category: work
    claim: "The Mysarnos Codex was composed in the sixteenth century and first stored at the Library of Saint George the Martyr, north of the city of Mysarnos."
    entities:
      - name: Mysarnos Codex
        type: work
      - name: Library of Saint George the Martyr
        type: place
      - name: Mysarnos
        type: place
    dates: "16th c. N"

  - category: place
    claim: "Mysarnos was the capital of Mystra, a mordether vassal of the Roman Empire."
    entities:
      - name: Mysarnos
        type: place
      - name: Mystra
        type: polity

  - category: place
    claim: "Mysarnos is located at the western end of the Athenian Way."
    entities:
      - name: Mysarnos
        type: place

  - category: place
    claim: "During the sixteenth century Revitalist movement, Mysarnos received half of all Greece's imports and had a population of nearly thirty thousand."
    entities:
      - name: Mysarnos
        type: place
    dates: "16th c. N"

  - category: work
    claim: "The author of the Mysarnos Codex has never been conclusively identified, despite extant and complete membership records for the area's monasteries."
    entities:
      - name: Mysarnos Codex
        type: work

  - category: work
    claim: "The Mysarnos Codex is thought to have originally comprised over two hundred vellum illustrated folios, with illustrations including both mundane scenes and fantastical vistas."
    entities:
      - name: Mysarnos Codex
        type: work

  - category: work
    claim: "The text of the Mysarnos Codex consists of approximately 180 different glyphs arranged into words and paragraphs."
    entities:
      - name: Mysarnos Codex
        type: work

  - category: event
    claim: "During the Good Game period of the late nineteenth century, artefacts from old Pylos and then from Crete surfaced bearing the same glyphs as the Mysarnos Codex."
    entities:
      - name: Mysarnos Codex
        type: work
      - name: Pylos
        type: place
      - name: Crete
        type: place
    dates: "late 19th c. N"

  - category: event
    claim: "The revelation that the Mysarnos glyphs were being used to write a form of Greek came in 1939 N, with the unearthing of the lost First Folio at the Library of Sobjan."
    entities:
      - name: Mysarnos Codex
        type: work
      - name: Library of Sobjan
        type: place
    dates: "1939 N"

  - category: work
    claim: "The lost First Folio (found at the Library of Sobjan) began with a fictionalised biography of the author written both in contemporary Greek and in the codex's script, allowing for direct comparison and full decipherment."
    entities:
      - name: Mysarnos Codex
        type: work
      - name: Library of Sobjan
        type: place

  - category: work
    claim: "'The Mysarnos Problem: the Enigma of an Inconvenient Codex' is a popular narrative history written by classicist Theodora Riphæna in 1943 N."
    entities:
      - name: "The Mysarnos Problem: the Enigma of an Inconvenient Codex"
        type: work
      - name: Theodora Riphæna
        type: person
    dates: "1943 N"
