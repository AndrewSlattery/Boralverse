entry: 59.5
title: "19th-century Espionage and the Invention of Software"
claims:
  - category: work
    claim: "'Men of Jet and Diamond' (Welsh: 'Dynnon o Vuhuð a Diamont') is an 1890 N trevold written by Hasinick Welshman Cadogan Torrior."
    entities:
      - name: "Men of Jet and Diamond"
        type: work
      - name: Cadogan Torrior
        type: person
    dates: "1890 N"

  - category: person
    claim: "Cadogan Torrior graduated from the University of Nadacow as a scholar of diplomacy."
    entities:
      - name: Cadogan Torrior
        type: person
      - name: University of Nadacow
        type: organisation
      - name: Nadacow
        type: place

  - category: work
    claim: "'Men of Jet and Diamond' was published by Blackburn Editions."
    entities:
      - name: "Men of Jet and Diamond"
        type: work
      - name: Blackburn Editions
        type: organisation

  - category: work
    claim: "'Men of Jet and Diamond' is a rather late member of the first wave of masquira romance."
    entities:
      - name: "Men of Jet and Diamond"
        type: work

  - category: work
    claim: "'Men of Jet and Diamond' was modestly popular in eastern Mendeva but became much more widely known after being adapted into the wildly-successful 1951 N film 'Jet White' (New Provincial: 'Blanc Sabaje') by a New Provence guild."
    entities:
      - name: "Men of Jet and Diamond"
        type: work
      - name: "Jet White"
        type: work
      - name: New Provence
        type: polity
    dates: "1951 N"

  - category: work
    claim: "'The Parable of the Mute Bookbinder' (Burgund: 'Fable dew Reillour Mut') is a philosophical treatise written in 1743 N by noblewoman Rachel Desselut."
    entities:
      - name: "The Parable of the Mute Bookbinder"
        type: work
      - name: Rachel Desselut
        type: person
    dates: "1743 N"

  - category: work
    claim: "'The Parable of the Mute Bookbinder' was written in response to Vallakis on the problem of the bounded self-duplication of living things."
    entities:
      - name: "The Parable of the Mute Bookbinder"
        type: work
      - name: Rachel Desselut
        type: person

  - category: work
    claim: "'The Parable of the Mute Bookbinder' lays out the separation of Form and of Method, arguing that in order for living matter to duplicate, the Form must contain within itself an explicit Method describing its construction in some readable language."
    entities:
      - name: "The Parable of the Mute Bookbinder"
        type: work
      - name: Rachel Desselut
        type: person

  - category: work
    claim: "In 'The Parable of the Mute Bookbinder', Desselut inferred the existence of a vital language (called the 'Divine Word' in her own writing, now known as heredian acid) present in the cases of the body."
    entities:
      - name: "The Parable of the Mute Bookbinder"
        type: work
      - name: Rachel Desselut
        type: person
      - name: heredian acid
        type: concept

  - category: glossary
    claim: "Heredian acid is the Boralverse term for DNA."
    entities:
      - name: heredian acid
        irl: DNA
        type: concept
