entry: 179.5
title: "Eastern History"
source_work: "Excourse Puzzlers (Royal Tommarth Castinghouse, 2021)"
claims:
  - category: event
    claim: "In 1520, a Southern Emperor issued the Hangthen Edict in response to the planned circumnavigation of the globe by Morrack and British ships."
    entities:
      - name: Hangthen Edict
        type: event
    dates: "1520 N"

  - category: event
    claim: "The late fourteenth century saw the final and permanent sundering of Cathay from China, precipitated by the end of an imperial dynasty."
    entities:
      - name: Cathay
        type: polity
      - name: China
        type: polity
    dates: "late 14th c. N"

  - category: place
    claim: "New Leudong in Chrysia was named by a Cathayan captain for the Leudong peninsula in Cathay."
    entities:
      - name: New Leudong
        type: polity
      - name: Leudong
        type: place
      - name: Cathay
        type: polity

  - category: glossary
    claim: "Leudong is the Boralverse name for the Liaodong Peninsula."
    entities:
      - name: Leudong
        irl: Liaodong Peninsula
        type: place

  - category: event
    claim: "Janthine was discovered while extracting saltpetre from sea wrack in the Contare mills of Zampanagar."
    entities:
      - name: janthine
        type: concept
      - name: Contare
        type: place
      - name: Zampanagar
        type: place

  - category: glossary
    claim: "Contare is the Boralverse name for Can Tho."
    entities:
      - name: Contare
        irl: Can Tho
        type: place

  - category: glossary
    claim: "Zampanagar is the Boralverse name for a region approximately corresponding to Vietnam."
    entities:
      - name: Zampanagar
        irl: Vietnam
        type: polity

  - category: glossary
    claim: "Nackon Day is the Boralverse name for a region approximately corresponding to Thailand."
    entities:
      - name: Nackon Day
        irl: Thailand
        type: polity

  - category: glossary
    claim: "Cammojan Kingdom is the Boralverse name for the Khmer Empire."
    entities:
      - name: Cammojan Kingdom
        irl: Khmer Empire
        type: polity

  - category: work
    claim: "'The Sea Peoples' is a sixteenth-century Chinese epic of exploration considered one of the greatest Chinese works ever written."
    entities:
      - name: "The Sea Peoples"
        type: work
    dates: "16th c. N"
