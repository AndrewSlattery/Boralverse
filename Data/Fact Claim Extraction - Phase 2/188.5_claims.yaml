entry: 188.5
title: "The Second Millennium"
claims:
  - category: person
    claim: "Damian VI 'the Wise' (r. 1199–1208; Latin Damianus Sagāx) was a Pope in Rome during the tail end of the Second Tetrarchy and the first Roman Pope elected from the membership of the Brethin religious order."
    entities:
      - name: Damian VI
        type: person
      - name: Brethin
        type: organisation
    dates: "r. 1199–1208 N"

  - category: terminology
    claim: "A myton is a type of merchant ship."
    entities:
      - name: myton
        type: concept

  - category: event
    claim: "In September 1492, the Vascon myton San Tomé was unable to make port at Bournemouth due to battle there as part of the Wars of Fealty, while on a regular route from Cale to Damvath."
    entities:
      - name: San Tomé
        type: concept
      - name: Wars of Fealty
        type: event
    dates: "September 1492 N"

  - category: glossary
    claim: "Cale is the Boralverse name for Oporto."
    entities:
      - name: Cale
        irl: Oporto
        type: place

  - category: person
    claim: "Gudmund and Rebecca Scradder (fl. 1677) were a married couple of Dane astronomers who voyaged to Seldiva in the 1670s to observe a predicted transit of Mercury as part of a global scientific effort to compute the mean distance from the Earth to the Sun."
    entities:
      - name: Gudmund Scradder
        type: person
      - name: Rebecca Scradder
        type: person
      - name: Seldiva
        type: place
    relationships:
      - type: spouse
        from: "Gudmund Scradder"
        to: "Rebecca Scradder"
    dates: "fl. 1677 N"

  - category: glossary
    claim: "Seldiva is the Boralverse name for Sri Lanka."
    entities:
      - name: Seldiva
        irl: Sri Lanka
        type: place

  - category: person
    claim: "Cadogan Torrior (fl. 1890) was an author from Nadacow in Hasiny; his masquira trevold 'Men of Jet and Diamond' (1890) gained greater popularity through mid-twentieth-century film adaptations including the 1950 New Provincial production 'Blanc Sabaje' ('Jet White')."
    entities:
      - name: Cadogan Torrior
        type: person
      - name: "Men of Jet and Diamond"
        type: work
    dates: "fl. 1890 N"
