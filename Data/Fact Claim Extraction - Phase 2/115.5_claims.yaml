entry: 115.5
title: "Turbulent Times"
claims:
  - category: period
    claim: "The Long Peace period lasted approximately from 1770 to 1815."
    entities:
      - name: Long Peace
        type: period
    dates: "c. 1770–1815 N"

  - category: period
    claim: "The Decadence of Belgrade refers to the Kingdom of the Danaw in its final decades before the Second German War (1815–23) and its subsequent dissolution."
    entities:
      - name: Decadence of Belgrade
        type: period
      - name: Kingdom of the Danaw
        type: polity
    dates: "early 19th c. N"

  - category: polity
    claim: "The Decadence of Belgrade represents the territorial maximum of the Kingdom of the Danaw, having wrested Bulgary from the suzerainty of the Second Roman Empire after the latter's final collapse in the seventeenth century."
    entities:
      - name: Kingdom of the Danaw
        type: polity
      - name: Bulgary
        type: place
      - name: Second Roman Empire
        type: polity
    dates: "17th c. N"

  - category: glossary
    claim: "The Danaw is the Boralverse name for the Danube."
    entities:
      - name: Danaw
        irl: Danube
        type: place

  - category: glossary
    claim: "Bulgary is the Boralverse name for Bulgaria."
    entities:
      - name: Bulgary
        irl: Bulgaria
        type: place

  - category: glossary
    claim: "Bavarn is the Boralverse name for Bavaria."
    entities:
      - name: Bavarn
        irl: Bavaria
        type: place

  - category: glossary
    claim: "The Vetomund is the Boralverse term for the Old World."
    entities:
      - name: Vetomund
        irl: Old World
        type: place

  - category: period
    claim: "The Mendevan Unmooring is the collective name for wars and diplomatic events at the turn of the nineteenth century which led to polities in Mendeva weakening or severing formal ties with the Vetomund."
    entities:
      - name: Mendevan Unmooring
        type: period
    dates: "c. 1800 N"

  - category: event
    claim: "Major events of the Mendevan Unmooring include the War for Ambrosia and the Hasinick Revolution, as well as the quieter Departure of Mashick."
    entities:
      - name: Mendevan Unmooring
        type: period
      - name: War for Ambrosia
        type: event
      - name: Hasinick Revolution
        type: event
      - name: Departure of Mashick
        type: event

  - category: glossary
    claim: "The War for Ambrosia involved the region approximately east and north of the Great Lakes."
    entities:
      - name: War for Ambrosia
        irl: "east and north of the Great Lakes"
        type: event

  - category: glossary
    claim: "The Hasinick Revolution took place in the region approximately equivalent to the lower part of the Mississippi watershed, and was directed against Britain."
    entities:
      - name: Hasinick Revolution
        irl: "lower Mississippi watershed"
        type: event

  - category: period
    claim: "The Romantic Revival was an artistic and political movement arising towards the end of the eighteenth century, characterised by optimistic portrayals of heroism and belief in a 'brighter past' in the seventeenth century that could be recaptured."
    entities:
      - name: Romantic Revival
        type: period
    dates: "late 18th c. N"

  - category: period
    claim: "It is due to the Romantic Revival's depictions that a loose congeries of seventeenth-century wars became known as the Romantic Wars."
    entities:
      - name: Romantic Revival
        type: period
      - name: Romantic Wars
        type: event
