entry: 95.5
title: "mancel"
claims:
  - category: terminology
    claim: "Mancel is the Borlish word for 'sleeve,' 'channel or strait,' and (with definite article) the Kentish Channel between Albion and Gaul; also 'subsidiary, branch, franchise'."
    entities:
      - name: mancel
        type: concept

  - category: language
    claim: "Mancel derives from Old Borlish mancel 'sleeve,' from Vulgar Latin manicella 'little sleeve,' diminutive of Latin manica."
    entities:
      - name: mancel
        type: concept

  - category: religion
    claim: "The Papacy in Rome is the spiritual seat of much of Christendom."
    entities:
      - name: Roman Papacy
        type: organisation

  - category: religion
    claim: "The Roman Papacy remained the ultimate authority over all Christendom until the German Secession of the early thirteenth century, after which the Augsburg See provided a lasting competing seat."
    entities:
      - name: Roman Papacy
        type: organisation
      - name: German Secession
        type: event
      - name: Augsburg See
        type: organisation
    dates: "13th c. N"

  - category: event
    claim: "The Great Fracture of the mid-sixteenth century severely diminished the temporal powers of the Papacy."
    entities:
      - name: Great Fracture
        type: event
      - name: Roman Papacy
        type: organisation
    dates: "mid-16th c. N"

  - category: religion
    claim: "After the Great Fracture, the Triunvirato had political dominion over the city of Rome, while the Pope nominally remained an absolute ruler over several Italian and German provinces."
    entities:
      - name: Triunvirato
        type: organisation
      - name: Roman Papacy
        type: organisation

  - category: person
    claim: "Pope Mercury II (fl. 590) took a particular interest in Borland as a stronghold of Christianity in the north."
    entities:
      - name: Mercury II
        type: person
      - name: Borland
        type: place
    dates: "fl. 590 N"

  - category: person
    claim: "Pope Agatho (1001–1026) canonised David, patron saint of Wales."
    entities:
      - name: Agatho
        type: person
      - name: David
        type: person
    dates: "1001–1026 N"

  - category: person
    claim: "Pope Nuntius (fl. ca. 1100) instituted a reform of the Julian calendar and moved the New Year to the 1st of March."
    entities:
      - name: Nuntius
        type: person
    dates: "fl. c. 1100 N"

  - category: person
    claim: "Pope Damian V (1110–1121) was born Humbert of Ravenna in 1047."
    entities:
      - name: Damian V
        type: person
    dates: "1110–1121 N; b. 1047 N"

  - category: person
    claim: "Pope Damian VI (1199–1208), called 'the Wise', was the first member of the Brethin to hold the role of Pope."
    entities:
      - name: Damian VI
        type: person
      - name: Brethin
        type: organisation
    dates: "1199–1208 N"

  - category: person
    claim: "Pope Just (1208–) called for a renewed Crusade for Jerusalem in 1210, known to history as the Failed Crusade."
    entities:
      - name: Pope Just
        type: person
    dates: "1208 N; 1210 N"

  - category: person
    claim: "Pope Hermeneus II (fl. ca. 1250) was more totalist than his predecessors in reaction to the German Secession and was the instigator of the Baptism of the North."
    entities:
      - name: Hermeneus II
        type: person
      - name: Baptism of the North
        type: event
    dates: "fl. c. 1250 N"
