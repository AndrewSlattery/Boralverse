entry: 209.5
title: "Maria Joquinnera"
claims:
  - category: person
    claim: "Maria Joquinnera (b. ca. 1512, d. 1565?) was a woman of Nappe (Lenape) origin, born in the region of the lower Guittoc River, also known as Princess Maria, the Princess of Mendeva, and Dona Quixote."
    entities:
      - name: Maria Joquinnera
        type: person
    dates:
      - "b. ca. 1512"
      - "d. 1565?"

  - category: glossary
    claim: "Nappe is the Boralverse name for the Lenape people."
    entities:
      - name: Nappe
        type: polity
        irl: Lenape

  - category: person
    claim: "Maria Joquinnera travelled to the Vetomund in the late 1530s and was presented at several Vetomundine courts as a usurped and displaced princess of a Mendevan people."
    entities:
      - name: Maria Joquinnera
        type: person
    dates:
      - "late 1530s"

  - category: person
    claim: "Maria Joquinnera was by contemporary accounts a formidable polyglot and political intellect."
    entities:
      - name: Maria Joquinnera
        type: person

  - category: language
    claim: "The name Kixuhque (recorded earliest ca. 1538–41 as Quixote in the account-book of merchant Bartholomeu fi Acher) has been tentatively linked to the Nappe word kixuh meaning sun or moon."
    entities:
      - name: Maria Joquinnera
        type: person
    dates:
      - "ca. 1538–41"

  - category: language
    claim: "The name Joquinnera is a demonym derivative of Nappejoquin, the Provincial traders' name for the peoples of the lower Guittoc and Esquanna rivers, itself borrowed from the Nappe word hoking meaning land or territory."
    entities:
      - name: Maria Joquinnera
        type: person

  - category: work
    claim: "The account-book of Bartholomeu fi Acher (ca. 1538–41) is the earliest source recording Maria Joquinnera."
    entities:
      - name: Accounts of the Merchantmen of Provence
        type: work
      - name: Bartholomeu fi Acher
        type: person
    dates:
      - "ca. 1538–41"

  - category: event
    claim: "Maria Joquinnera crossed from Mendeva to the Vetomund between 1539 and 1540, arriving in Marsella."
    entities:
      - name: Maria Joquinnera
        type: person
      - name: Marsella
        type: place
    dates:
      - "1539–1540"

  - category: glossary
    claim: "Marsella is the Boralverse name for Marseilles."
    entities:
      - name: Marsella
        type: place
        irl: Marseilles

  - category: language
    claim: "Maria Joquinnera had already learnt to speak Doccian when she arrived in Marsella, and subsequently acquired Vask, Burgund, and possibly Borlish."
    entities:
      - name: Maria Joquinnera
        type: person
      - name: Doccian
        type: language

  - category: glossary
    claim: "Doccian is the Boralverse name for approximately Occitan."
    entities:
      - name: Doccian
        type: language
        irl: "~Occitan"

  - category: event
    claim: "Maria Joquinnera sojourned at the courts of Burgund, Barcelon, and Lombardy."
    entities:
      - name: Maria Joquinnera
        type: person
      - name: Burgund
        type: polity
      - name: Barcelon
        type: polity
      - name: Lombardy
        type: polity

  - category: person
    claim: "Barthem Joquinnel was Maria Joquinnera's son, born within months of her arrival in the Vetomund; he became a minor diplomat, spoke Nappe into adulthood, and visited the Novomund once."
    entities:
      - name: Barthem Joquinnel
        type: person
      - name: Maria Joquinnera
        type: person

  - category: work
    claim: "The Onomatoir de la Lenga Nappena (Dictionary of the Nappe Tongue), compiled ca. 1547–51, was patronised by Maria Joquinnera, who also served as its primary informant; the most complete surviving manuscript contains approximately 1400 words, set phrases, diplomatic formulae, grammatical notes, and a short text."
    entities:
      - name: Onomatoir de la Lenga Nappena
        type: work
      - name: Maria Joquinnera
        type: person
    dates:
      - "ca. 1547–51"

  - category: event
    claim: "The Second Great Dying devastated Provence only a couple of decades before Maria Joquinnera's arrival, around the 1510s–1520s N."
    entities:
      - name: Second Great Dying
        type: event
    dates:
      - "ca. 1510s–1520s N"

  - category: glossary
    claim: "Saquima is the Boralverse term for approximately noble (a person of high lineage)."
    entities:
      - name: saquima
        type: culture
        irl: "~noble"

  - category: work
    claim: "'Princess or Prisoner? The Curiosity of Kixuhque' is a work by A. Thendar about Maria Joquinnera."
    entities:
      - name: "Princess or Prisoner? The Curiosity of Kixuhque"
        type: work
      - name: A. Thendar
        type: person
