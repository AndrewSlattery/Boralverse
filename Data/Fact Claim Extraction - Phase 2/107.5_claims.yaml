entry: 107.5
title: "Grimmers"
claims:
  - category: technology
    claim: "A grimmer (formerly and formally an augrimmer) is a device that can be given methods to carry out sequences of arithmetic or logical operations."
    entities:
      - name: grimmer
        type: technology

  - category: technology
    claim: "Grimmers are the substrate of the pistol mesh, which links together billions of such devices."
    entities:
      - name: grimmer
        type: technology
      - name: pistol mesh
        type: technology

  - category: culture
    claim: "Rachel Desselut's 'Parable of the Mute Bookbinder' (1743) predicted the form-method separation essential to modern grimmer operation, by arguing that living matter's 'Form' must contain a readable 'Method' describing its construction."
    entities:
      - name: Rachel Desselut
        type: person
      - name: "Parable of the Mute Bookbinder"
        type: work
    dates: "1743 N"

  - category: language
    claim: "The word grimmer is a clipping of augrimmer, from augrim 'computation, calculation,' which derived from French augrisme from Medieval Latin algorismus, reflecting the name of Persian mathematician al-Khwarismi."
    entities:
      - name: grimmer
        type: technology

  - category: work
    claim: "'The Grimmer Hall: Developments in Early Methodics' (1999) is a scholastic quire written by New Leudong historian and methodist Cai Sonquo during his tenure at the University of Mehannin."
    entities:
      - name: "The Grimmer Hall: Developments in Early Methodics"
        type: work
      - name: Cai Sonquo
        type: person
      - name: University of Mehannin
        type: organisation
    dates: "1999 N"

  - category: person
    claim: "Cai Sonquo (fl. 1999) is a New Leudong historian and methodist who held a position at the University of Mehannin."
    entities:
      - name: Cai Sonquo
        type: person
      - name: New Leudong
        type: polity
    dates: "fl. 1999 N"
