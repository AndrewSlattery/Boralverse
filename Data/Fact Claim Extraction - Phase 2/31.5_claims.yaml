entry: "31.5"
title: "The Deviance Movement"
claims:
  - category: terminology
    claim: "The Deviance movement is also known as Anti-Paradise theology."
    entities:
      - name: "Deviance movement"
        type: concept
      - name: "Anti-Paradise theology"
        type: concept

  - category: culture
    claim: "The Deviance movement is a religious, artistic, and political ideology characterised by non-conformity and exploration of the avant-garde."
    entities:
      - name: "Deviance movement"
        type: concept

  - category: event
    claim: "The Deviance movement arose in the late eighteenth century during the Long Peace."
    entities:
      - name: "Deviance movement"
        type: event
      - name: "Long Peace"
        type: period
    dates: ["late 18th century N"]

  - category: event
    claim: "Much of the development of Anti-Paradise theology took place within the Promethean clubs of Albion and Danaw."
    entities:
      - name: "Anti-Paradise theology"
        type: concept
      - name: "Albion"
        type: place
      - name: "Danaw"
        type: polity

  - category: work
    claim: "An important early work to the Deviance movement was the anonymously-published 'And We Will Love the Fire' ('Et Nous Amerons les Fux'), which began circulating in 1799."
    entities:
      - name: "And We Will Love the Fire"
        type: work
    dates: ["1799 N"]

  - category: work
    claim: "'And We Will Love the Fire' was met with immediate moral outrage upon its circulation."
    entities:
      - name: "And We Will Love the Fire"
        type: work

  - category: work
    claim: "Almost a dozen plausible candidates for authorship of 'And We Will Love the Fire' have been proposed, with no consensus reached."
    entities:
      - name: "And We Will Love the Fire"
        type: work

  - category: event
    claim: "The early Deviance movement coincided with the height of the voidtale craze launched by Elsebeth Sneider's 1795 trevold 'Through a Black Mirror'."
    entities:
      - name: "Deviance movement"
        type: event
      - name: "Through a Black Mirror"
        type: work
      - name: "Elsebeth Sneider"
        type: person
    dates: ["1795 N"]

  - category: event
    claim: "Many ideas from voidtale works were incorporated into Anti-Paradise theology, and Sneider's works in particular were embraced by the movement."
    entities:
      - name: "voidtale"
        type: concept
      - name: "Anti-Paradise theology"
        type: concept
      - name: "Elsebeth Sneider"
        type: person

  - category: person
    claim: "Elsebeth Sneider herself despised Anti-Paradism."
    entities:
      - name: "Elsebeth Sneider"
        type: person
      - name: "Anti-Paradise theology"
        type: concept

  - category: event
    claim: "The early Deviance movement was blamed for the resurgence of the Modest Arrangement in Spain and Gaul."
    entities:
      - name: "Deviance movement"
        type: event
      - name: "Modest Arrangement"
        type: event

  - category: event
    claim: "In 1850, a tide of secularisation began with the passing of the Laic Declarations in Belgrade."
    entities:
      - name: "Laic Declarations"
        type: event
      - name: "Belgrade"
        type: place
    dates: ["1850 N"]

  - category: event
    claim: "The Laic Declarations of 1850 are largely credited to the strong influence of Anti-Paradise theology in the Riverine Cities after the collapse of Danaw."
    entities:
      - name: "Laic Declarations"
        type: event
      - name: "Anti-Paradise theology"
        type: concept
      - name: "Riverine Cities"
        type: place
      - name: "Danaw"
        type: polity

  - category: event
    claim: "In the later nineteenth century, the Deviance movement was connected to the spread of masquira romance, possibly via shared connections to tovarick communities."
    entities:
      - name: "Deviance movement"
        type: event
      - name: "masquira romance"
        type: concept

  - category: culture
    claim: "Many composers of the early nineteenth century were affiliated with the Deviance movement, emphasising emotion and manipulation of the audience."
    entities:
      - name: "Deviance movement"
        type: event
    dates: ["early 19th century N"]

  - category: culture
    claim: "The Deviance movement was interested in folk traditions and stories, particularly those figures cast as demons or evil spirits by the Church."
    entities:
      - name: "Deviance movement"
        type: event

  - category: work
    claim: "The younger Cráyenschot's opera 'Ad Pentaculum' portrayed the European tale of the Wild Hunt."
    entities:
      - name: "Ad Pentaculum"
        type: work
      - name: "Ton Cráyenschot"
        type: person
      - name: "Wild Hunt"
        type: concept

  - category: person
    claim: "Dr Mickel Cráyenschot (fl. c19) was a physician in French Willemy and an early public tovarick."
    entities:
      - name: "Mickel Cráyenschot"
        type: person
      - name: "Willemy"
        type: polity
    dates: ["fl. c19 N"]

  - category: person
    claim: "Lord Simon, sixth Baron Monçating (b. 1770) was an infamous libertine of the Damvath melee."
    entities:
      - name: "Simon, Baron Monçating"
        type: person
      - name: "Damvath"
        type: place
    dates: ["b. 1770 N"]

  - category: person
    claim: "Poshack Nerwaman (fl. c19) was a famed lady explorer originally of Mashick, sister to composer Mollam Bushta."
    entities:
      - name: "Poshack Nerwaman"
        type: person
      - name: "Mashick"
        type: polity
      - name: "Mollam Bushta"
        type: person
    dates: ["fl. c19 N"]
    relationships:
      - subject: "Poshack Nerwaman"
        predicate: "was sister of"
        object: "Mollam Bushta"

  - category: person
    claim: "Ton Cráyenschot (fl. c19) was a composer remembered for the opera 'Ad Pentaculum', marked entirely in five."
    entities:
      - name: "Ton Cráyenschot"
        type: person
      - name: "Ad Pentaculum"
        type: work
    dates: ["fl. c19 N"]
