entry: 92.5
title: "Marsella"
claims:
  - category: place
    claim: "Marsella is a city on the Middlesea and the capital of Provence."
    entities:
      - name: Marsella
        type: place
      - name: Provence
        type: polity

  - category: glossary
    claim: "Middlesea is the Boralverse term for the Mediterranean."
    entities:
      - name: Middlesea
        irl: Mediterranean
        type: place

  - category: event
    claim: "A raid by Norman mercenaries sacked Marsella in 946 N, nominally on behalf of the Malchassian Romans."
    entities:
      - name: Marsella
        type: place
      - name: Malchassian Romans
        type: polity
    dates: "946 N"

  - category: culture
    claim: "Records of the 946 N raid on Marsella contain the first unambiguous mention of identical triplets in European history."
    entities:
      - name: Marsella
        type: place
    dates: "946 N"

  - category: place
    claim: "During the Second Tetrarchy period, Marsella was a major population centre in Burgundy within the First Drengot Empire."
    entities:
      - name: Marsella
        type: place
      - name: Burgundy
        type: polity
      - name: First Drengot Empire
        type: polity

  - category: event
    claim: "During the Vascon Ascendancy, the region of Provence including Marsella was conquered by Vascony."
    entities:
      - name: Marsella
        type: place
      - name: Provence
        type: polity
      - name: Vascony
        type: polity

  - category: event
    claim: "Burgundy's reconquest of Provence in 1494 caused so much instability that the region rose up in revolt, sparking the 1497–99 War of Provincial Independence."
    entities:
      - name: Burgundy
        type: polity
      - name: Provence
        type: polity
    dates: "1494 N; 1497–1499 N"

  - category: person
    claim: "Newly-independent Provence was led by Daniel Menton, Lord Amigòt, who established Marsella as its capital."
    entities:
      - name: Daniel Menton
        type: person
      - name: Marsella
        type: place
      - name: Provence
        type: polity

  - category: culture
    claim: "By the turn of the seventeenth century, multiple weekly newspapers were operating from Marsella."
    entities:
      - name: Marsella
        type: place
    dates: "c. 1600 N"

  - category: event
    claim: "During the Millstone War, Marsella suffered heavy air-bombing as part of the world's first wartime use of aircraft."
    entities:
      - name: Marsella
        type: place
      - name: Millstone War
        type: event

  - category: culture
    claim: "Marsella is famed for its midsummer celebrations which also commemorate the anniversary of its independence from Burgundy."
    entities:
      - name: Marsella
        type: place
