entry: 94.5
title: "ouç"
claims:
  - category: terminology
    claim: "Ouç is a Borlish word meaning 'silence, peace, quiet, tranquility' and also 'rest, repose, leisure, free time'."
    entities:
      - name: ouç
        type: concept

  - category: language
    claim: "Ouç derives from Old Borlish ouç 'leisure, ease, idleness,' reflecting Latin ōtium 'time free from activity'."
    entities:
      - name: ouç
        type: concept

  - category: language
    claim: "The shift of ouç to meanings directly involving the lack of noise had occurred by the sixteenth century."
    entities:
      - name: ouç
        type: concept
    dates: "16th c. N"

  - category: organisation
    claim: "Cordin Editions is a publishing house founded in the mid-twentieth century and based in the city of Cordin on Borland."
    entities:
      - name: Cordin Editions
        type: organisation
      - name: Cordin
        type: place
      - name: Borland
        type: place
    dates: "mid-20th c. N"

  - category: organisation
    claim: "Cordin Editions is affiliated with the University of Cordin."
    entities:
      - name: Cordin Editions
        type: organisation
      - name: University of Cordin
        type: organisation

  - category: organisation
    claim: "Cordin Editions is recognised for producing educational books for national schools, and published syllabi covering schooling throughout childhood taken up as a standard by most schools in Borland."
    entities:
      - name: Cordin Editions
        type: organisation
      - name: Borland
        type: place

  - category: work
    claim: "'The Boral Province in the Century after Hadrian' (Borlish: 'Y Provinç Boral par y siecr posc Hadrian', 1952) was written by late classical historian Robiaut Scarvon and published by Cordin Editions."
    entities:
      - name: "The Boral Province in the Century after Hadrian"
        type: work
      - name: Robiaut Scarvon
        type: person
      - name: Cordin Editions
        type: organisation
    dates: "1952 N"

  - category: work
    claim: "'The Story of Borland' (Borlish: 'Y Stoir d'Istr Boral', first edition 1982, second edition 1993) is a school history textbook published by Cordin Editions."
    entities:
      - name: "The Story of Borland"
        type: work
      - name: Cordin Editions
        type: organisation
    dates: "1982 N; 1993 N"

  - category: work
    claim: "'Shepherds of Hambrick: the Small History of Dane Borland' (Borlish: 'Acr a Sauð Vellig', 2008) was written by Sconet Ydreç about Borland in the tenth century and published by Cordin Editions."
    entities:
      - name: "Shepherds of Hambrick: the Small History of Dane Borland"
        type: work
      - name: Sconet Ydreç
        type: person
      - name: Cordin Editions
        type: organisation
    dates: "2008 N"

  - category: work
    claim: "'From Tablets to Touchscreens: The Story of Education' (Borlish: 'Des Delt vars Dois: Y Stoir d'Education', 2016) was written by Theign Roufler in the style of an academic textbook intended for a large lay audience."
    entities:
      - name: "From Tablets to Touchscreens: The Story of Education"
        type: work
      - name: Theign Roufler
        type: person
    dates: "2016 N"

  - category: place
    claim: "Southbar is a region of Borland in the southwest of the island, with its largest population centre being the city of Axbane."
    entities:
      - name: Southbar
        type: place
      - name: Borland
        type: place
      - name: Axbane
        type: place

  - category: polity
    claim: "The petty kingdom of Southbar was founded by Anglian immigrants in the fifth century."
    entities:
      - name: Southbar
        type: polity
    dates: "5th c. N"

  - category: event
    claim: "After the Battle of Fendal in 810, Southbar was forced to swear fealty as a subordinate kingdom to the First Kingdom of Borland."
    entities:
      - name: Southbar
        type: polity
      - name: Battle of Fendal
        type: event
    dates: "810 N"

  - category: event
    claim: "Southbar harboured the exiled King Jothey and his wife Brenna of Barrow after the fall of the First Kingdom of Borland."
    entities:
      - name: Southbar
        type: polity
      - name: Jothey of Borland
        type: person
      - name: Brenna of Barrow
        type: person

  - category: event
    claim: "By the end of the tenth century, Southbar had been incorporated into Dane Borland."
    entities:
      - name: Southbar
        type: polity
    dates: "late 10th c. N"

  - category: place
    claim: "In the twelfth century Southbar had become a county with its de facto seat at Axbane; by 1190 Count Steven resided year-round in the coastal town."
    entities:
      - name: Southbar
        type: place
      - name: Axbane
        type: place
      - name: Steven
        type: person
    dates: "12th c. N; 1190 N"
