entry: "40.5"
title: "Albion"
claims:
  - category: place
    claim: "Albion is the largest of the Northwestern Isles, situated directly north of Gaul."
    entities:
      - name: "Albion"
        type: place
      - name: "Northwestern Isles"
        type: place
      - name: "Gaul"
        type: place

  - category: place
    claim: "To the west and east of Albion lie Ireland and Borland respectively."
    entities:
      - name: "Albion"
        type: place
      - name: "Ireland"
        type: place
      - name: "Borland"
        type: place

  - category: event
    claim: "Germanic migration from the continent into Albion took place through the fifth and sixth centuries, leading to the establishment of Markland, Kent, Wessex, Anglia, Northumber and several smaller kingdoms."
    entities:
      - name: "Markland"
        type: polity
      - name: "Kent"
        type: polity
      - name: "Wessex"
        type: polity
      - name: "Anglia"
        type: polity
      - name: "Northumber"
        type: polity
    dates: ["5th century N", "6th century N"]

  - category: event
    claim: "The westward encroachment of Saxons drove an emigration of Kelts from Devon to Kernow."
    entities:
      - name: "Devon"
        type: place
      - name: "Kernow"
        type: place

  - category: event
    claim: "For the period between the Battle of Gaulford (656) and Vigo the Magnificent's reconquest, the entire Devon peninsula was under the sole authority of Wessex."
    entities:
      - name: "Battle of Gaulford"
        type: event
      - name: "Wessex"
        type: polity
      - name: "Vigo the Magnificent"
        type: person
      - name: "Devon"
        type: place
    dates: ["656 N"]

  - category: religion
    claim: "The Brethin religious order, founded in the eighth century, originally existed to chronicle the Christianisation of Albion and Ireland."
    entities:
      - name: "Brethin"
        type: organisation
      - name: "Albion"
        type: place
      - name: "Ireland"
        type: place
    dates: ["8th century N"]

  - category: event
    claim: "Viking raids in Albion began with the destruction of Halgrive in 824."
    entities:
      - name: "Halgrive"
        type: place
      - name: "Albion"
        type: place
    dates: ["824 N"]

  - category: event
    claim: "Northumber fell completely to Dane rule."
    entities:
      - name: "Northumber"
        type: polity

  - category: event
    claim: "Markland withstood the Danes, though much of its eastern territory was settled by them."
    entities:
      - name: "Markland"
        type: polity

  - category: event
    claim: "The Guithle kingdom of Scotland was established in the ninth century with the help of Harald the Blue of Sodrick, displacing or merging with the existing Pict culture and language."
    entities:
      - name: "Scotland"
        type: polity
      - name: "Harald the Blue"
        type: person
      - name: "Sodrick"
        type: polity
    dates: ["9th century N"]

  - category: event
    claim: "Sodrick lost much of its territory to the kingdom of Dunclothe in the tenth century."
    entities:
      - name: "Sodrick"
        type: polity
      - name: "Dunclothe"
        type: polity
    dates: ["10th century N"]

  - category: polity
    claim: "By the turn of the second millennium, the south of Albion was dominated by an expanded Kent below Markland and a unified Kingdom of Wales."
    entities:
      - name: "Albion"
        type: place
      - name: "Kent"
        type: polity
      - name: "Markland"
        type: polity
      - name: "Wales"
        type: polity

  - category: event
    claim: "Much of southern Albion was conquered in the eleventh century by Normandy, with the aid of Devon in the form of the Kernovan Conjuring."
    entities:
      - name: "Albion"
        type: place
      - name: "Normandy"
        type: polity
      - name: "Devon"
        type: place
      - name: "Kernovan Conjuring"
        type: event
    dates: ["11th century N"]

  - category: polity
    claim: "The First Drengot Empire consolidated Albion excluding Wales as far north as Edinbrough."
    entities:
      - name: "First Drengot Empire"
        type: polity
      - name: "Wales"
        type: polity
      - name: "Edinbrough"
        type: place

  - category: event
    claim: "Wales began to expand in the thirteenth century, conquering Devon after a long campaign."
    entities:
      - name: "Wales"
        type: polity
      - name: "Devon"
        type: place
    dates: ["13th century N"]

  - category: event
    claim: "The Mallor Wars were reignited and the city of Car Vantel/Rexam was sacked in 1301."
    entities:
      - name: "Mallor Wars"
        type: event
      - name: "Rexam"
        type: place
    dates: ["1301 N"]

  - category: event
    claim: "The Wars of Fealty lasted forty-six years."
    entities:
      - name: "Wars of Fealty"
        type: event

  - category: event
    claim: "The polities of Albion were still recovering from the Wars of Fealty in 1519 and were extremely vulnerable to the Second Great Dying."
    entities:
      - name: "Albion"
        type: place
      - name: "Wars of Fealty"
        type: event
      - name: "Second Great Dying"
        type: event
    dates: ["1519 N"]

  - category: event
    claim: "After the Democratic Wars, the city of London found itself newly independent for one final, lasting time."
    entities:
      - name: "London"
        type: place
      - name: "Democratic Wars"
        type: event

  - category: event
    claim: "During the Long Peace, the Deviance movement took root across Albion via the mesh of Promethean clubs."
    entities:
      - name: "Deviance movement"
        type: event
      - name: "Albion"
        type: place
      - name: "Long Peace"
        type: period

  - category: work
    claim: "'An Abridged History of Northern Albion' by Aidan Donblane was published by Cloddale Primers in 1940, with commentary added by his daughter Anhart in 1980."
    entities:
      - name: "An Abridged History of Northern Albion"
        type: work
      - name: "Aidan Donblane"
        type: person
      - name: "Cloddale Primers"
        type: organisation
      - name: "Anhart Donblane"
        type: person
    dates: ["1940 N", "1980 N"]

  - category: work
    claim: "'Daughters of the Sea: The Northwestern Isles' by Challow Huddresfell was published by Safford University Primers."
    entities:
      - name: "Daughters of the Sea: The Northwestern Isles"
        type: work
      - name: "Challow Huddresfell"
        type: person
      - name: "Safford University Primers"
        type: organisation

  - category: work
    claim: "'The Alphabetical Albion' by Lucas Osborne et al. was published by Winchester Scholastic Primers in 1920."
    entities:
      - name: "The Alphabetical Albion"
        type: work
      - name: "Lucas Osborne"
        type: person
      - name: "Winchester Scholastic Primers"
        type: organisation
    dates: ["1920 N"]

  - category: work
    claim: "'Post-Drengotian Albion: the Long Thirteenth Century' by Professor Nuraddin Venzer was published by the New Lincoln School in 1973."
    entities:
      - name: "Post-Drengotian Albion: the Long Thirteenth Century"
        type: work
      - name: "Nuraddin Venzer"
        type: person
      - name: "New Lincoln School"
        type: organisation
    dates: ["1973 N"]

  - category: work
    claim: "'Albic Medicine in the Workshop Decades' by Dr Harold Westcamp was published by the Conster Health Edifice in 1992."
    entities:
      - name: "Albic Medicine in the Workshop Decades"
        type: work
      - name: "Harold Westcamp"
        type: person
      - name: "Conster Health Edifice"
        type: organisation
    dates: ["1992 N"]
