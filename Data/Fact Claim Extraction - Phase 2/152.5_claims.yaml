entry: 152.5
title: "False Friends"
source_work: "Concise Onomatory o'Merch (fifth edition, Utcheter Lexical Association, 1961)"
claims:
  - category: language
    claim: "The Merch word carjack means the ending of a romance; it derives from Borlish soldiers' slang car-Jacq meaning 'dear John', originating during the Millstone Wars."
    entities:
      - name: carjack
        type: concept
      - name: Millstone Wars
        type: event

  - category: language
    claim: "The Merch word danny means a nuisance or annoying person, descending from Old English danneġ meaning 'stinging nettle' and Old Borlish danney or nanney."
    entities:
      - name: danny
        type: concept

  - category: language
    claim: "The Merch word eager means acid or sour, descending from Middle French aigre and colloquial Latin ācrus meaning 'sour, bitter'."
    entities:
      - name: eager
        type: concept

  - category: terminology
    claim: "In Merch, marksman refers to the noble ruler of a march (borderland region), ranking above earls; within Albion the synonymous term edgelord is predominantly used instead."
    entities:
      - name: marksman
        type: concept
      - name: edgelord
        type: concept

  - category: language
    claim: "The Merch word marksman derives from Old English mearc 'boundary' and mann 'person', coined in the thirteenth century to translate Old French marchis in reference to the Marksman of Jerusalem."
    entities:
      - name: marksman
        type: concept
    dates: "13th c. N"
