entry: 186.5
title: "False Friends (cont. 2)"
source_work: "Concise Onomatory o'Merch (fifth edition, Utcheter Lexical Association, 1961)"
claims:
  - category: glossary
    claim: "Awry is the Boralverse name for Hungary."
    entities:
      - name: Awry
        irl: Hungary
        type: polity

  - category: place
    claim: "Awry is a polity of Europe inhabited principally by the Majoric people, located east of Crain and Crovatia and west of Halich and Vallack."
    entities:
      - name: Awry
        type: polity
      - name: Crain
        type: place
      - name: Crovatia
        type: place
      - name: Halich
        type: place
      - name: Vallack
        type: place

  - category: glossary
    claim: "Halich is the Boralverse name for the Galicia/Halych region."
    entities:
      - name: Halich
        irl: Galicia
        type: place

  - category: glossary
    claim: "Vallack is the Boralverse name for Wallachia."
    entities:
      - name: Vallack
        irl: Wallachia
        type: place

  - category: language
    claim: "The name Awry derives from Medieval Latin Avaria meaning 'the Avar Empire', which was later repurposed geographically for the subsequent Majoric principality after their conquest of the region in the ninth century."
    entities:
      - name: Awry
        type: polity
    dates: "9th c. N (Majoric conquest)"

  - category: language
    claim: "The Merch word boss means gun (a handheld firearm); it derives from Willem Dutch bosz, armbosz meaning 'boss', from early Dutch armbaust meaning 'crossbow', from Old French arbaleste and Latin arcuballista."
    entities:
      - name: boss
        type: concept
    dates: "16th c. N"

  - category: language
    claim: "The Merch word sicker means certain or free of any doubt; it is a direct descendant of Old English sicor meaning 'safe, certain'."
    entities:
      - name: sicker
        type: concept
