entry: 86.5
title: "Bavarn"
claims:
  - category: polity
    claim: "Bavarn (Bóarn) is a centrally-located German polity of Europe, bordering Bohemia, Burgundy, Furlaine, Saxony, and Willemy."
    entities:
      - name: Bavarn
        type: polity

  - category: polity
    claim: "During the Second Tetrarchy, the Kingdom of Bavarn was one of the two main players in the German Empire, which was for some time jointly ruled by the Houghbrocken dynasty of Saxony and the Andex dynasty of Bavarn."
    entities:
      - name: Bavarn
        type: polity
      - name: German Empire
        type: polity
      - name: Saxony
        type: polity
      - name: Houghbrocken
        type: organisation
      - name: Andex
        type: organisation
    dates: "11th–12th c. N"

  - category: event
    claim: "Thirteenth-century Bavarn was the epicentre of the Pauline Denunciations and the German Secession, leading to the establishment of the Augsburg See."
    entities:
      - name: Bavarn
        type: polity
      - name: German Secession
        type: event
      - name: Augsburg See
        type: organisation
    dates: "13th c. N"

  - category: economics
    claim: "In the fifteenth century, Bavarn became a technological centre with workshops developing entirely new glassmaking techniques."
    entities:
      - name: Bavarn
        type: polity
    dates: "15th c. N"

  - category: event
    claim: "Following the Blue Trans-Willem War of the late seventeenth century, Bavarn gained significant territory from the Kingdom of Burgundy, which subsequently dissolved."
    entities:
      - name: Bavarn
        type: polity
      - name: Burgundy
        type: polity
      - name: Blue Trans-Willem War
        type: event
    dates: "late 17th c. N"

  - category: event
    claim: "King Frederick of Bavarn created the Duchy of Far Suebia, ruled from Burgundy's former capital Geneva, after the Blue Trans-Willem War."
    entities:
      - name: Frederick
        type: person
      - name: Duchy of Far Suebia
        type: polity
      - name: Geneva
        type: place
      - name: Bavarn
        type: polity

  - category: event
    claim: "The Second German War embroiled Bavarn, allied with Borland and the Northern Concert; a particularly significant event was the disastrously mismanaged Battle of Hulm in 1821 N."
    entities:
      - name: Bavarn
        type: polity
      - name: Second German War
        type: event
      - name: Battle of Hulm
        type: event
      - name: Borland
        type: polity
    dates: "1821 N"

  - category: person
    claim: "Conrad II (fl. 1120 N) was a Bavarn monarch who ruled from Regensburg."
    entities:
      - name: Conrad II
        type: person
      - name: Bavarn
        type: polity
      - name: Regensburg
        type: place
    dates: "fl. 1120 N"

  - category: person
    claim: "Adalmar (fl. c. 12th c. N) was a Bavarn monarch who was succeeded by Empress Katharina of Germany, the last ruler of a united Germany for over five hundred years."
    entities:
      - name: Adalmar
        type: person
      - name: Katharina of Germany
        type: person
      - name: German Empire
        type: polity
    dates: "fl. c. 12th c. N"

  - category: person
    claim: "Frederick (fl. c. 17th c. N) was the Bavarn king who created the Duchy of Far Suebia."
    entities:
      - name: Frederick
        type: person
      - name: Duchy of Far Suebia
        type: polity
    dates: "fl. c. 17th c. N"

  - category: person
    claim: "Elias Villingen was the second Duke of Far Suebia."
    entities:
      - name: Elias Villingen
        type: person
      - name: Duchy of Far Suebia
        type: polity

  - category: person
    claim: "Wilhelm Bruez (fl. 1225 N) was the mayor of Augsburg during the period of the German Secession."
    entities:
      - name: Wilhelm Bruez
        type: person
      - name: Augsburg
        type: place
    dates: "fl. 1225 N"

  - category: person
    claim: "Paul von Burchardt (fl. 1225 N) was the writer of the Pauline Denunciations and the instigator of the German Secession."
    entities:
      - name: Paul von Burchardt
        type: person
      - name: German Secession
        type: event
    dates: "fl. 1225 N"

  - category: person
    claim: "Marian Siegert (later Miller) (1725–1756 N) was the illegitimate daughter of Elias Villingen, second Duke of Far Suebia."
    entities:
      - name: Marian Siegert
        type: person
      - name: Elias Villingen
        type: person
    dates: "1725–1756 N"
    relationships:
      - type: parent
        from: "Elias Villingen"
        to: "Marian Siegert"
