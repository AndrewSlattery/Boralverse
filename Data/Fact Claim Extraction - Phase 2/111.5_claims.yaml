entry: 111.5
title: "Battle of Rexam (1483)"
claims:
  - category: event
    claim: "The Battle of Rexam (1483) was a major combat between Markland and the Kingdom of Britain during the Wars of Fealty."
    entities:
      - name: Battle of Rexam
        type: event
      - name: Markland
        type: polity
      - name: Britain
        type: polity
    dates: "1483 N"

  - category: place
    claim: "Rexam (formerly spelt Wrexham in Merch) was a contested town on the border of Wales and Markland almost from the moment the latter was founded."
    entities:
      - name: Rexam
        type: place
      - name: Wales
        type: polity
      - name: Markland
        type: polity

  - category: event
    claim: "In 1301, King Andrew II of Markland sacked Rexam, reigniting the Mallor Wars."
    entities:
      - name: Rexam
        type: place
      - name: Andrew II
        type: person
      - name: Markland
        type: polity
    dates: "1301 N"

  - category: polity
    claim: "The Kingdom of Britain was formed of Wales and its outlying tallaths, along with Kernow and Sodrick."
    entities:
      - name: Britain
        type: polity
      - name: Wales
        type: polity
      - name: Kernow
        type: place
      - name: Sodrick
        type: place

  - category: glossary
    claim: "Kernow is the Boralverse name for Brittany."
    entities:
      - name: Kernow
        irl: Brittany
        type: place

  - category: event
    claim: "Britain achieved a decisive victory at the Battle of Rexam (1483), where the last Duke of Chester was killed."
    entities:
      - name: Britain
        type: polity
      - name: Battle of Rexam
        type: event
    dates: "1483 N"

  - category: event
    claim: "After the Battle of Rexam, Britain took lasting control of the area around Rexam and managed to withdraw from the continued conflicts of the Wars of Fealty."
    entities:
      - name: Britain
        type: polity
      - name: Rexam
        type: place
      - name: Wars of Fealty
        type: event

  - category: glossary
    claim: "Markland is approximately the Boralverse equivalent of Mercia."
    entities:
      - name: Markland
        irl: Mercia
        type: polity

  - category: work
    claim: "'Children of the Battle of Rexam' (1931, Cambric title: 'Pa Ðywdon y Plant Car Vanteł') is a fictionalised account of the three orphaned children of the Duke of Chester, written by schoolteacher Jon Paldreth."
    entities:
      - name: "Children of the Battle of Rexam"
        type: work
      - name: Jon Paldreth
        type: person
    dates: "1931 N"
