entry: 191.5
title: "Blue Trans-Willem War"
claims:
  - category: event
    claim: "The Blue Trans-Willem War (Willem: Blaw Trans-Willemsk Órlog; Borlish: Var Tras-Willem Blau) was the penultimate in a series of wars between French and Dutch polities over control of Willemy, ending in the late seventeenth century."
    entities:
      - name: Blue Trans-Willem War
        type: event
      - name: Willemy
        type: polity
    dates: "late 17th c. N"

  - category: person
    claim: "Andrysk de Santer was a nineteenth-century writer who devised the chromatic periodisation system for the Trans-Willem Wars, with the Blue war as the penultimate conflict."
    entities:
      - name: Andrysk de Santer
        type: person
    dates: "19th c. N"

  - category: event
    claim: "Following the Blue Trans-Willem War, the Kingdom of Burgundy was formally dissolved, with its territory partitioned between Provence and the kingdoms of France and Bavarn."
    entities:
      - name: Blue Trans-Willem War
        type: event
      - name: Burgundy
        type: polity
      - name: Provence
        type: polity
      - name: Bavarn
        type: polity

  - category: event
    claim: "After the Blue Trans-Willem War, the duchy of Far Suebia was created as a vassal of Bavarn, given by King Frederick to the margrave Thorsten Villingen; the former Burgund capital of Geneva became a subordinate city in this new realm."
    entities:
      - name: Bavarn
        type: polity
      - name: Thorsten Villingen
        type: person
      - name: Geneva
        type: place

  - category: event
    claim: "After the Blue Trans-Willem War, the duchy of Avosche and its seat at Axton was returned to French control as part of French Guillenne."
    entities:
      - name: Avosche
        type: place
      - name: Axton
        type: place
