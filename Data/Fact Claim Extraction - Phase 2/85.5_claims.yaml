entry: 85.5
title: "Laic Declarations"
claims:
  - category: event
    claim: "The Laic Declarations were a series of diplomatic documents produced by an international committee of delegations from several dozen polities in Belgrade in 1850 N."
    entities:
      - name: Laic Declarations
        type: event
      - name: Belgrade
        type: place
    dates: "1850 N"

  - category: law
    claim: "The Laic Declarations outlined procedures for uncoupling established religions from administrative state functions."
    entities:
      - name: Laic Declarations
        type: event

  - category: law
    claim: "The Laic Declarations outlined the legal status of people with minority faiths."
    entities:
      - name: Laic Declarations
        type: event

  - category: place
    claim: "At the time of the Laic Declarations, Belgrade was one of the Riverine Cities, having risen from the ashes of the Kingdom of the Danaw which collapsed after the Second German War of the 1820s."
    entities:
      - name: Belgrade
        type: place
      - name: Riverine Cities
        type: polity
      - name: Kingdom of the Danaw
        type: polity
      - name: Second German War
        type: event

  - category: place
    claim: "Belgrade had a renowned Promethean club associated with the Deviance movement and a semi-public tovarick community."
    entities:
      - name: Belgrade
        type: place
      - name: Deviance movement
        type: culture

  - category: event
    claim: "Notable non-signatories of the Laic Declarations included New Provence and Persia."
    entities:
      - name: Laic Declarations
        type: event
      - name: New Provence
        type: polity
      - name: Persia
        type: polity

  - category: culture
    claim: "The Laic Declarations laid the groundwork for the Household Renovation of the late nineteenth century."
    entities:
      - name: Laic Declarations
        type: event
      - name: Household Renovation
        type: culture

  - category: event
    claim: "The hundred-and-twentieth anniversary of the Laic Declarations (1970 N) was celebrated with the Long Future project, including synchronised publication of dozens of popular works chronicling the Declarations' origins, course and aftermath."
    entities:
      - name: Laic Declarations
        type: event
      - name: Long Future
        type: event
    dates: "1970 N"

  - category: work
    claim: "'Conjugation, Operation e Diabolica in Musica: The Early Deviance Movement' is a 1970 N work by Borlish popular historian Catrin Veçount."
    entities:
      - name: "Conjugation, Operation e Diabolica in Musica: The Early Deviance Movement"
        type: work
      - name: Catrin Veçount
        type: person
    dates: "1970 N"

  - category: work
    claim: "'The Deviance Incorporation of Folk Tales' is a 1970 N sociological work by Dr Tanasio Capretti."
    entities:
      - name: "The Deviance Incorporation of Folk Tales"
        type: work
      - name: Tanasio Capretti
        type: person
    dates: "1970 N"
