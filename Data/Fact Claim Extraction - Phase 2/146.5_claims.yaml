entry: 146.5
title: "6th Lexember - lançbal"
claims:
  - category: language
    claim: "The Borlish word lançbal, meaning lineball and loosely other team sports or hot potato, was coined in the eighteenth century from lançar meaning 'throw' and bal meaning 'ball'."
    entities:
      - name: lançbal
        type: concept
    dates: "18th c. N"

  - category: language
    claim: "The Borlish word caugtrbal means kickball or football."
    entities:
      - name: caugtrbal
        type: concept

  - category: glossary
    claim: "Sobot is the Boralverse term for radio."
    entities:
      - name: sobot
        irl: radio
        type: concept

  - category: glossary
    claim: "Adolescences is the Boralverse term for coming-of-age novels as a genre."
    entities:
      - name: adolescences
