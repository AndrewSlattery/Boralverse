entry: "32.5"
title: "Monarchs of Borland"
claims:
  - category: person
    claim: "Victor Rossetus 'the Red-haired' (fl. c6) was the first Prase of the Boral Diocese."
    entities:
      - name: "Victor Rossetus"
        type: person
      - name: "Boral Diocese"
        type: polity
    dates: ["fl. c6 N"]

  - category: person
    claim: "Victor Rossetus was the first unitary ruler of an independent polity comprising a significant fraction of the island of Borland."
    entities:
      - name: "Victor Rossetus"
        type: person
      - name: "Borland"
        type: place

  - category: polity
    claim: "Under Victor Rossetus, the urbanised east of Borland was unified, while the west and south were settled by Angles to form Angland and Southbar respectively."
    entities:
      - name: "Victor Rossetus"
        type: person
      - name: "Angland"
        type: polity
      - name: "Southbar"
        type: polity

  - category: event
    claim: "Under Victor Rossetus, 'Roman Borland' first began to successfully repel new settlers."
    entities:
      - name: "Victor Rossetus"
        type: person
      - name: "Borland"
        type: polity

  - category: person
    claim: "Jothey, King of Borland (fl. 898), was the last ruler of the First Kingdom of Borland before it fell to the Danes in 898."
    entities:
      - name: "Jothey of Borland"
        type: person
      - name: "First Kingdom of Borland"
        type: polity
    dates: ["fl. 898 N"]

  - category: person
    claim: "The Borlish name of King Jothey of Borland is 'Joðeg'."
    entities:
      - name: "Jothey of Borland"
        type: person

  - category: event
    claim: "The First Kingdom of Borland was conquered when Jothey was only a young man, shortly after his marriage to Brenna of Barrow."
    entities:
      - name: "Jothey of Borland"
        type: person
      - name: "Brenna of Barrow"
        type: person
      - name: "First Kingdom of Borland"
        type: polity
    dates: ["898 N"]

  - category: person
    claim: "Brenna of Barrow was a cousin of King Roderick of Dunclothe."
    entities:
      - name: "Brenna of Barrow"
        type: person
      - name: "Roderick of Dunclothe"
        type: person
    relationships:
      - subject: "Brenna of Barrow"
        predicate: "was cousin of"
        object: "Roderick of Dunclothe"

  - category: event
    claim: "Jothey continued as monarch-in-exile for several more decades after the fall of the First Kingdom."
    entities:
      - name: "Jothey of Borland"
        type: person

  - category: event
    claim: "Jothey and Brenna fled to Sothbar, where they had several children, remaining at court there for over twenty years."
    entities:
      - name: "Jothey of Borland"
        type: person
      - name: "Brenna of Barrow"
        type: person
      - name: "Sothbar"
        type: polity

  - category: event
    claim: "Skirmishes between Sothbar and Dane Borland ended with Sothbar's capitulation, unifying the island for the first time since the Roman Empire."
    entities:
      - name: "Sothbar"
        type: polity
      - name: "Borland"
        type: polity

  - category: event
    claim: "Fearful of imprisonment or execution, Jothey fled with his wife and children to Kent."
    entities:
      - name: "Jothey of Borland"
        type: person
      - name: "Brenna of Barrow"
        type: person
      - name: "Kent"
        type: polity
