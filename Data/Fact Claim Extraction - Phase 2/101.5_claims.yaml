entry: 101.5
title: "New Urban Mesh"
claims:
  - category: organisation
    claim: "The New Urban Mesh was an alliance of autonomous cities in Northwest Europe in the nineteenth century."
    entities:
      - name: New Urban Mesh
        type: organisation
    dates: "19th c. N"

  - category: organisation
    claim: "Members of the New Urban Mesh included London, Conster, Axbane, Pentrose, Amstel, Anvers and Gant."
    entities:
      - name: New Urban Mesh
        type: organisation
      - name: London
        type: place
      - name: Axbane
        type: place
      - name: Pentrose
        type: place
      - name: Amstel
        type: place

  - category: organisation
    claim: "The New Urban Mesh emerged contemporaneously with similar political structures such as the Riverine Cities along the Danaw."
    entities:
      - name: New Urban Mesh
        type: organisation
      - name: Riverine Cities
        type: organisation

  - category: organisation
    claim: "Several of the New Urban Mesh's cities were simultaneously part of pre-existing polities; for example, Axbane and Pentrose were never legally independent from Borland."
    entities:
      - name: New Urban Mesh
        type: organisation
      - name: Axbane
        type: place
      - name: Pentrose
        type: place
      - name: Borland
        type: polity

  - category: event
    claim: "In the late nineteenth century (ca. 1890), London led the New Urban Mesh to unite politically with the Drengot Collusion."
    entities:
      - name: New Urban Mesh
        type: organisation
      - name: London
        type: place
      - name: Drengot Collusion
        type: organisation
    dates: "c. 1890 N"

  - category: work
    claim: "'Mr Desarden, Prince Consort' (1968) is a film based on the 1887 scandal around James Desarden, London's ambassador to Nackon Day."
    entities:
      - name: "Mr Desarden, Prince Consort"
        type: work
      - name: James Desarden
        type: person
      - name: London
        type: place
      - name: Nackon Day
        type: polity
    dates: "1968 N; 1887 N"
