entry: 88.5
title: "Convoy Australier"
claims:
  - category: organisation
    claim: "The Convoy Australier is officially known as the Order of Saint Hemma of Still Water."
    entities:
      - name: Convoy Australier
        type: organisation

  - category: organisation
    claim: "The Convoy Australier is a Christian organisation aligned with Rome."
    entities:
      - name: Convoy Australier
        type: organisation

  - category: organisation
    claim: "The Convoy Australier emerged during the Second Tetrarchy period."
    entities:
      - name: Convoy Australier
        type: organisation
      - name: Second Tetrarchy
        type: period

  - category: organisation
    claim: "The Convoy Australier began in the eleventh century in the Duchy of Crain, a member of the German Empire subordinate to Bavarn."
    entities:
      - name: Convoy Australier
        type: organisation
      - name: Duchy of Crain
        type: polity
      - name: German Empire
        type: polity
      - name: Bavarn
        type: polity
    dates: "11th c. N"

  - category: organisation
    claim: "In its early years, the Convoy Australier functioned in essence as a band of mercenaries."
    entities:
      - name: Convoy Australier
        type: organisation

  - category: event
    claim: "The Convoy Australier was heavily involved in the first crusades, including campaigns at the Principality of Mystra and Jerusalem."
    entities:
      - name: Convoy Australier
        type: organisation
      - name: Mystra
        type: polity

  - category: event
    claim: "The Convoy Australier was appointed to administrate the new states of Antioch and Port Simon after their conquests in the twelfth century."
    entities:
      - name: Convoy Australier
        type: organisation
      - name: Antioch
        type: place
      - name: Port Simon
        type: place
    dates: "12th c. N"

  - category: event
    claim: "Pope Just revoked the Convoy Australier's rulership of Antioch and Port Simon in 1208 as the culmination of an inter-faction struggle."
    entities:
      - name: Convoy Australier
        type: organisation
      - name: Pope Just
        type: person
      - name: Antioch
        type: place
      - name: Port Simon
        type: place
    dates: "1208 N"

  - category: event
    claim: "After losing Antioch and Port Simon, the Convoy Australier was assigned to the courts of Svonimir of Crovatia and Taxon of Hungary."
    entities:
      - name: Convoy Australier
        type: organisation
      - name: Svonimir of Crovatia
        type: person
      - name: Taxon of Hungary
        type: person
      - name: Crovatia
        type: polity
      - name: Hungary
        type: polity

  - category: event
    claim: "The Convoy Australier led the Baptism of the North."
    entities:
      - name: Convoy Australier
        type: organisation
      - name: Baptism of the North
        type: event

  - category: event
    claim: "The German Secession increased the urgency of the Baptism of the North, as Rome feared that Augsburg might spread its heresy to the North before Rome could reach it."
    entities:
      - name: German Secession
        type: event
      - name: Baptism of the North
        type: event
      - name: Augsburg
        type: place

  - category: organisation
    claim: "The Convoy Australier grew substantially in numbers and wealth during the thirteenth century."
    entities:
      - name: Convoy Australier
        type: organisation
    dates: "13th c. N"

  - category: organisation
    claim: "Chapters of the Convoy Australier were founded as far afield as Borland and Lithow."
    entities:
      - name: Convoy Australier
        type: organisation
      - name: Borland
        type: place
      - name: Lithow
        type: place

  - category: glossary
    claim: "Lithow is the Boralverse term for Lithuania."
    entities:
      - name: Lithow
        irl: Lithuania
        type: place
