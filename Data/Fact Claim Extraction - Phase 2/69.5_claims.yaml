entry: 69.5
title: "Avosche"
claims:
  - category: place
    claim: "Avosche is a political subregion of Willemy centred on the city of Axton (Grand-Aix in Paris French; Aughen in Willem Dutch), with a strong regional identity."
    entities:
      - name: Avosche
        type: place
      - name: Axton
        type: place
      - name: Willemy
        type: polity

  - category: place
    claim: "Avosche has at various points been a county, a duchy, and a march, and has seen both continual territorial instability and major urban development into the modern period."
    entities:
      - name: Avosche
        type: place

  - category: place
    claim: "Avosche is named for its first ruling house, which in turn takes its title from its founder Cuonrat Aihuosc (Latin: Corradus Aevoscus)."
    entities:
      - name: Avosche
        type: place
      - name: Cuonrat Aihuosc
        type: person

  - category: language
    claim: "The English surname Davush (Merch: /daːʃ/; Kentish: /ˈdaː.vɪʃ/) derives from an illegitimate branch of House Avosche."
    entities:
      - name: Davush
        type: person

  - category: polity
    claim: "The County of Avosche emerged shortly after the split of the Kingdom of the Franks and the concomitant creation of Willemy."
    entities:
      - name: Avosche
        type: polity
      - name: Willemy
        type: polity

  - category: polity
    claim: "The founding house of Avosche was soon superseded by marriage by the neighbouring House Nassow, which originated in Francony."
    entities:
      - name: Avosche
        type: polity
      - name: House Nassow
        type: organisation
      - name: Francony
        type: polity

  - category: event
    claim: "The county of Avosche was elevated to a duchy in the early sixteenth century, with Roger d'Avosche becoming the first duke."
    entities:
      - name: Avosche
        type: polity
      - name: Roger d'Avosche
        type: person
    dates: "early 16th c. N"

  - category: person
    claim: "Adaillé Nassow succeeded Roger d'Avosche as duchess and ruled for many decades until her death in 1608 N."
    entities:
      - name: Adaillé Nassow
        type: person
      - name: Avosche
        type: polity
    dates: "d. 1608 N"
    relationships:
      - type: parent
        from: "Roger d'Avosche"
        to: "Adaillé Nassow"

  - category: person
    claim: "During her reign, Adaillé Nassow accrued significant influence over her liege David of France."
    entities:
      - name: Adaillé Nassow
        type: person
      - name: David of France
        type: person

  - category: event
    claim: "Adaillé Nassow's influence was punctured by the scandal of her grandson and heir apparent Déricque fleeing to New Provence in 1589 N."
    entities:
      - name: Adaillé Nassow
        type: person
      - name: Déricque
        type: person
      - name: New Provence
        type: polity
    dates: "1589 N"
    relationships:
      - type: grandchild
        from: "Déricque"
        to: "Adaillé Nassow"

  - category: event
    claim: "The seventeenth century was particularly eventful for Avosche, with the region changing hands as a result of wars and peacetime treaties on five separate occasions."
    entities:
      - name: Avosche
        type: place
    dates: "17th c. N"

  - category: work
    claim: "'Lát os Danse: De Hartoin 'n Avosche' ('Let us Dance: The Duchess d'Avosche') is a biography of Adaillé Nassow, published in 1919 N."
    entities:
      - name: "Lát os Danse: De Hartoin 'n Avosche"
        type: work
      - name: Adaillé Nassow
        type: person
    dates: "1919 N"
