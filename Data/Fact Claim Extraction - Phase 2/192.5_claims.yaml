entry: 192.5
title: "Borlish Adjectives"
claims:
  - category: language
    claim: "Borlish adjectives have two forms: a base form and a comparative form; the regular comparative suffix is -essem, which replaces or follows the final segment of the adjective and attracts penultimate stress."
    entities:
      - name: Borlish
        type: concept

  - category: language
    claim: "Several Borlish adjectives have suppletive comparative forms: bon ('good') → ottem ('better'); mal ('bad') → pessem ('worse'); gran ('big') → maissem ('bigger')."
    entities:
      - name: Borlish
        type: concept

  - category: language
    claim: "Most Borlish adjectives ending in syllabic -r form the comparative with the suffix -errem, which replaces the final syllabic consonant and is stressed penultimately."
    entities:
      - name: Borlish
        type: concept
