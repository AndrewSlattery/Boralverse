entry: "4.5"
title: "Early Borlish Heresy"
source_work: "Sunrise in Exile: the Iconomachy in the Northern Dioceses"
claims:
  - category: work
    claim: "'Sunrise in Exile: the Iconomachy in the Northern Dioceses' was published in 1898."
    entities:
      - name: "Sunrise in Exile: the Iconomachy in the Northern Dioceses"
        type: work
    dates: ["1898"]

  - category: work
    claim: "The Borlish title of 'Sunrise in Exile' is 'Aubon n'Exigl: l'Iconomachy ny Dioces Norðer'."
    entities:
      - name: "Sunrise in Exile: the Iconomachy in the Northern Dioceses"
        type: work

  - category: person
    claim: "'Sunrise in Exile' was written by former monk Mance Laurent Boneðic."
    entities:
      - name: "Mance Laurent Boneðic"
        type: person
      - name: "Sunrise in Exile: the Iconomachy in the Northern Dioceses"
        type: work
    relationships:
      - subject: "Mance Laurent Boneðic"
        predicate: "wrote"
        object: "Sunrise in Exile: the Iconomachy in the Northern Dioceses"

  - category: work
    claim: "'Sunrise in Exile' is notable for containing discussions of previously-unstudied primary sources retrieved from the Gulfhaven hoard."
    entities:
      - name: "Sunrise in Exile: the Iconomachy in the Northern Dioceses"
        type: work
      - name: "Gulfhaven hoard"
        type: other

  - category: terminology
    claim: "The Iconomachy refers to the theological struggle over the veneration of images that embattled Christendom from Aghkill to Yerevan in the early medieval period."
    entities:
      - name: "Iconomachy"
        type: event

  - category: religion
    claim: "The Boralverse has both a Roman Papacy and an Antiochine Papacy."
    entities:
      - name: "Roman Papacy"
        type: organisation
      - name: "Antiochine Papacy"
        type: organisation

  - category: person
    claim: "Psellos of Crete was assigned to Gulfhaven in 691 N, concomitant with a mission of evangelising to the Saxons."
    entities:
      - name: "Psellos of Crete"
        type: person
      - name: "Gulfhaven"
        type: place
    dates: ["691 N"]
    relationships:
      - subject: "Psellos of Crete"
        predicate: "was assigned to"
        object: "Gulfhaven"

  - category: person
    claim: "It has been argued that Psellos of Crete's post at Gulfhaven was manufactured to remove his influence from the Roman and Antiochine papacies."
    entities:
      - name: "Psellos of Crete"
        type: person
      - name: "Gulfhaven"
        type: place
      - name: "Roman Papacy"
        type: organisation
      - name: "Antiochine Papacy"
        type: organisation

  - category: person
    claim: "Psellos of Crete was educated in Constantinople and spent the first decades of his ministry in a central position within the Church."
    entities:
      - name: "Psellos of Crete"
        type: person
      - name: "Constantinople"
        type: place

  - category: religion
    claim: "Psellos of Crete authored one of the foundational texts of the Marmeronist heresy."
    entities:
      - name: "Psellos of Crete"
        type: person
      - name: "Marmeronist heresy"
        type: religion
    relationships:
      - subject: "Psellos of Crete"
        predicate: "authored a foundational text of"
        object: "Marmeronist heresy"

  - category: religion
    claim: "The Marmeronist heresy spread rapidly and in a delocalised manner, alarming the patriarchs of Christendom."
    entities:
      - name: "Marmeronist heresy"
        type: religion

  - category: religion
    claim: "Ireland had divergent monastic practices in its insular sanctuaries during the early medieval period, comparable in their novelty to northern developments."
    entities:
      - name: "Ireland"
        type: place

  - category: place
    claim: "The Gulfhaven hoard contained previously-unstudied primary sources relevant to early Church history."
    entities:
      - name: "Gulfhaven hoard"
        type: other
      - name: "Gulfhaven"
        type: place
