entry: 84.5
title: "Lower Mendeva"
claims:
  - category: place
    claim: "Lower Mendeva (Borlish: Mendeva Bassem) is a geographical region comprising the southern section of the continent of Mendeva, located west of the Mendevan Gulf."
    entities:
      - name: Lower Mendeva
        type: place
      - name: Mendeva
        type: place

  - category: place
    claim: "The term Lower Mendeva sometimes also includes the islands of the Arcabil, which are located within the Mendevan Gulf."
    entities:
      - name: Lower Mendeva
        type: place
      - name: Arcabil
        type: place

  - category: event
    claim: "Contact between Lower Mendeva and the Vetomund began in the late fifteenth century with merchant ships from the Morrack New World Company, established by Malik Munir al-Hamdawi in 1463 N."
    entities:
      - name: Lower Mendeva
        type: place
      - name: Morrack
        type: polity
      - name: New World Company
        type: organisation
      - name: Munir al-Hamdawi
        type: person
    dates: "late 15th c. N"

  - category: event
    claim: "Morrack traders from the New World Company encountered the peoples of the Arcabil, the Mashick Empire in Lower Mendeva, and further south the Tavancine Empire in Cappatia."
    entities:
      - name: Arcabil
        type: place
      - name: Mashick Empire
        type: polity
      - name: Tavancy
        type: polity
      - name: Cappatia
        type: place

  - category: polity
    claim: "The region of Lower Mendeva is predominated by the polity of Mashick, which stretches from coast to coast and borders Mivock in the west and Taisha in the east."
    entities:
      - name: Mashick Empire
        type: polity
      - name: Lower Mendeva
        type: place
      - name: Mivock
        type: polity
      - name: Taisha
        type: polity

  - category: technology
    claim: "Many barrick innovations of the late Workshop period came out of Lower Mendeva, likely due to practical concerns around the rapid spread of wired post in the region."
    entities:
      - name: Lower Mendeva
        type: place
      - name: Workshop period
        type: period

  - category: economics
    claim: "By the late twentieth century, Lower Mendeva had become a major exporter of foods such as mause and amback."
    entities:
      - name: Lower Mendeva
        type: place
    dates: "late 20th c. N"

  - category: economics
    claim: "Many trade goods originated in Lower Mendeva, including billrod dye, shockle, shadome and tashban."
    entities:
      - name: Lower Mendeva
        type: place
