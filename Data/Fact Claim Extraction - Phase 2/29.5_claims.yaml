entry: "29.5"
title: "Morrack"
claims:
  - category: polity
    claim: "Morrack is a polity primarily in northwestern Africa."
    entities:
      - name: "Morrack"
        type: polity
      - name: "Africa"
        type: place

  - category: economics
    claim: "Morrack was a local trading power in the late medieval period, with a mercantile domain bringing it into irregular conflict with the overlapping trade meshes of Britain and Borland to the north."
    entities:
      - name: "Morrack"
        type: polity
      - name: "Britain"
        type: polity
      - name: "Borland"
        type: polity

  - category: event
    claim: "In 1457, Morrack subjugated the southern part of Portingale, which had previously enjoyed a level of autonomy under Vascon stewardship."
    entities:
      - name: "Morrack"
        type: polity
      - name: "Portingale"
        type: polity
      - name: "Vascony"
        type: polity
    dates: ["1457 N"]
    relationships:
      - subject: "Morrack"
        predicate: "subjugated"
        object: "southern part of Portingale"

  - category: polity
    claim: "At the time of the 1457 conquest, Morrack also controlled Andalus."
    entities:
      - name: "Morrack"
        type: polity
      - name: "Andalus"
        type: polity
    dates: ["1457 N"]

  - category: organisation
    claim: "The New World Company was established by Malik Munir al-Hamdawi in 1463."
    entities:
      - name: "New World Company"
        type: organisation
      - name: "Munir al-Hamdawi"
        type: person
    dates: ["1463 N"]

  - category: event
    claim: "Ships of the New World Company were sent westward shortly after news of the Novomundine Landfall reached court."
    entities:
      - name: "New World Company"
        type: organisation
      - name: "Novomundine Landfall"
        type: event

  - category: event
    claim: "The New World Company's fleet made contact with the peoples of the Arcabil, as well as the Mashick and Tavancine empires."
    entities:
      - name: "New World Company"
        type: organisation
      - name: "Arcabil"
        type: place
      - name: "Mashick"
        type: polity
      - name: "Tavancy"
        type: polity

  - category: event
    claim: "Morracan ships were the first to circumnavigate the world, having reached the Great Borunesk Meeting of 1519 via Cappatia."
    entities:
      - name: "Morrack"
        type: polity
      - name: "Great Borunesk Meeting"
        type: event
      - name: "Cappatia"
        type: place
    dates: ["1519 N"]

  - category: event
    claim: "The death of Tavancine Emperor Cariwasari in 1660 is suspected to have been an assassination carried out on Morracan orders."
    entities:
      - name: "Cariwasari"
        type: person
      - name: "Morrack"
        type: polity
      - name: "Tavancy"
        type: polity
    dates: ["1660 N"]

  - category: event
    claim: "The suspected Morracan assassination of Cariwasari was purportedly to allow for more profitable silver trade from Tavancy."
    entities:
      - name: "Cariwasari"
        type: person
      - name: "Morrack"
        type: polity
      - name: "Tavancy"
        type: polity

  - category: event
    claim: "Morrack was embroiled in several conflicts through the mid-eighteenth century, particularly as part of the Democratic Wars."
    entities:
      - name: "Morrack"
        type: polity
      - name: "Democratic Wars"
        type: event
    dates: ["mid-18th century N"]

  - category: event
    claim: "Morrack's attempted war of reconquest against Andalus lasted de jure even into the years of the Long Peace."
    entities:
      - name: "Morrack"
        type: polity
      - name: "Andalus"
        type: polity
      - name: "Long Peace"
        type: period

  - category: culture
    claim: "The Good Game period saw a brief fad for 'Morrack fashion' in countries across Europe and the Novomund, in dress, architecture, and food."
    entities:
      - name: "Morrack"
        type: polity
      - name: "Good Game"
        type: period

  - category: culture
    claim: "During the Morrack fashion fad, there was a trend for exposed stonework draped in tapestry and curtains in contemporary buildings."
    entities:
      - name: "Morrack"
        type: polity

  - category: law
    claim: "In the early twentieth century, Morrack was still in the habit of banning books containing subversive politics or personal immoralities."
    entities:
      - name: "Morrack"
        type: polity
    dates: ["early 20th century N"]

  - category: polity
    claim: "Morrack's restrictive book-banning climate was inherited from its participation in the Modest Arrangement."
    entities:
      - name: "Morrack"
        type: polity
      - name: "Modest Arrangement"
        type: event

  - category: event
    claim: "The Japetos III submarine link between Morrack and Ambrosia was completed in 1950, after delays due to budgetary concerns and the outbreak of war."
    entities:
      - name: "Japetos III"
        type: technology
      - name: "Morrack"
        type: polity
      - name: "Ambrosia"
        type: polity
    dates: ["1950 N"]

  - category: person
    claim: "Munir al-Hamdawi (b. 1429) is remembered for establishing the New World Company and for his lifelong rivalry with King Ambrose III of Vascony."
    entities:
      - name: "Munir al-Hamdawi"
        type: person
      - name: "New World Company"
        type: organisation
      - name: "Ambrose III of Vascony"
        type: person
    dates: ["b. 1429 N"]

  - category: person
    claim: "Zacki al-Hamid (fl. c14) was a mathematician who wrote a treatise on circular functions."
    entities:
      - name: "Zacki al-Hamid"
        type: person
    dates: ["fl. c14 N"]

  - category: person
    claim: "Fredun al-Cazmi (fl. 1516) was the captain of the Cynthia on its great journey westward."
    entities:
      - name: "Fredun al-Cazmi"
        type: person
      - name: "Cynthia"
        type: technology
    dates: ["fl. 1516 N"]
