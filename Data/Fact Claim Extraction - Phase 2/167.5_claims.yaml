entry: 167.5
title: "Chemical Etymology (cont. 3)"
source_work: "Veriloquace Glossary of Alchemy (Rotcham University Primers)"
claims:
  - category: glossary
    claim: "Jast is the Boralverse term for zinc."
    entities:
      - name: jast
        irl: zinc
        type: concept

  - category: glossary
    claim: "Chalk is the Boralverse term for carbonate (in chemistry)."
    entities:
      - name: chalk
        irl: carbonate
        type: concept

  - category: language
    claim: "Calamine was adopted in 1645 from Scholastic Latin calamīna, a sporadic alteration of Classical cadmīa meaning 'calamine; slag', from Ancient Greek Kắdmos, the legendary founder of Thebes."
    entities:
      - name: calamine
        type: concept
    dates: "1645 N"

  - category: glossary
    claim: "Configure is the Boralverse chemical term for stereoisomer."
    entities:
      - name: configure
        irl: stereoisomer
        type: concept

  - category: glossary
    claim: "Od configure is the Boralverse chemical term for diastereoisomer."
    entities:
      - name: od configure
        irl: diastereoisomer
        type: concept

  - category: glossary
    claim: "Even configure is the Boralverse chemical term for enantiomer."
    entities:
      - name: even configure
        irl: enantiomer
        type: concept

  - category: language
    claim: "Od configure was coined in 1922 from od meaning 'unpaired, indivisible by two' and configure meaning 'stereoisomer'; od derives from Early Merch odde from Old Norse oddi 'third; odd'."
    entities:
      - name: od configure
        type: concept
    dates: "1922 N"

  - category: glossary
    claim: "Palaquate is the Boralverse term for oxalic acid."
    entities:
      - name: palaquate
        irl: oxalic acid
        type: concept

  - category: glossary
    claim: "Twice-acid oil is the Boralverse term for dicarboxylic acid."
    entities:
      - name: twice-acid oil
        irl: dicarboxylic acid
        type: concept

  - category: language
    claim: "Palaquate was coined in 1834 from Scholastic Latin palaquātum, from Sanskrit pālaciāvat meaning 'characterised by spinach'; the substance was first extracted from spinach leaves during the Long Peace period."
    entities:
      - name: palaquate
        type: concept
    dates: "1834 N"
