entry: 81.5
title: "Madray"
claims:
  - category: polity
    claim: "Madray is a polity in the southeast of India, governed from the city of the same name."
    entities:
      - name: Madray
        type: polity

  - category: glossary
    claim: "Madray is the Boralverse name for Madurai (city in India)."
    entities:
      - name: Madray
        irl: Madurai
        type: place

  - category: event
    claim: "The British ship Phœbos stopped at the port of Romeswarm in Madray in the early sixteenth century during its geoscopic voyage around Africa and on to Borune."
    entities:
      - name: Phœbos
        type: technology
      - name: Romeswarm
        type: place
      - name: Madray
        type: polity
      - name: Borune
        type: place
    dates: "early 16th c. N"

  - category: glossary
    claim: "Romeswarm is the Boralverse name for Rameswaram (India)."
    entities:
      - name: Romeswarm
        irl: Rameswaram
        type: place

  - category: glossary
    claim: "Borune is the Boralverse name for Borneo."
    entities:
      - name: Borune
        irl: Borneo
        type: place

  - category: event
    claim: "The Phœbos met the Morrack ship Cynthia at Borune, with the Cynthia travelling in the opposite direction."
    entities:
      - name: Phœbos
        type: technology
      - name: Cynthia
        type: technology
      - name: Morrack
        type: polity
      - name: Borune
        type: place
    dates: "early 16th c. N"

  - category: person
    claim: "The death of King Rahulamathavan of Madray in 1735 N is thought to have been due to an early outbreak of pennackit dysentery."
    entities:
      - name: Rahulamathavan
        type: person
      - name: Madray
        type: polity
    dates: "1735 N"

  - category: glossary
    claim: "Pennackit dysentery is the Boralverse term for cholera."
    entities:
      - name: pennackit dysentery
        irl: cholera
        type: concept

  - category: event
    claim: "During the Democratic Wars in the mid-eighteenth century, many states including China and Britain quarrelled for control over parts of India including Madray."
    entities:
      - name: Madray
        type: polity
      - name: China
        type: polity
      - name: Britain
        type: polity
    dates: "mid-18th c. N"

  - category: technology
    claim: "The use of pedal holes in musical instruments was pioneered by the peria nadaswarm, an instrument that influenced instruments like the torriot into their modern forms."
    entities:
      - name: peria nadaswarm
        type: technology
      - name: torriot
        type: technology

  - category: culture
    claim: "The voidtale craze reached Madray; the renowned landscapist Narayanan is especially remembered for his series of works depicting the planets from their surfaces."
    entities:
      - name: Narayanan
        type: person
      - name: Madray
        type: polity
