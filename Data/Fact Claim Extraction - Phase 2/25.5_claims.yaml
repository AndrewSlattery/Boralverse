entry: "25.5"
title: "Borlish borrowings into English"
source_work: "Daughters of the Sea: The Northwestern Isles"
claims:
  - category: work
    claim: "'Daughters of the Sea: The Northwestern Isles' is a historical account of Ireland, Albion and Borland."
    entities:
      - name: "Daughters of the Sea: The Northwestern Isles"
        type: work
      - name: "Ireland"
        type: place
      - name: "Albion"
        type: place
      - name: "Borland"
        type: place

  - category: work
    claim: "'Daughters of the Sea: The Northwestern Isles' examines the bonds of migration, technological transmission and shared cultural heritage over time."
    entities:
      - name: "Daughters of the Sea: The Northwestern Isles"
        type: work

  - category: work
    claim: "'Daughters of the Sea: The Northwestern Isles' was written in 1956 by Merch author Challow Huddresfell."
    entities:
      - name: "Daughters of the Sea: The Northwestern Isles"
        type: work
      - name: "Challow Huddresfell"
        type: person
    dates: ["1956"]
    relationships:
      - subject: "Challow Huddresfell"
        predicate: "wrote"
        object: "Daughters of the Sea: The Northwestern Isles"

  - category: person
    claim: "Challow Huddresfell wrote 'Daughters of the Sea' during his time at the University of Safford's Faculty of Trade."
    entities:
      - name: "Challow Huddresfell"
        type: person
      - name: "University of Safford"
        type: organisation
      - name: "Faculty of Trade"
        type: organisation

  - category: language
    claim: "Borland's neighbours to the east have never matched the globe-spanning workshop and household vanguard of the British."
    entities:
      - name: "Borland"
        type: place

  - category: language
    claim: "The English languages have adopted Borlish terms even from the medieval period by virtue of proximity."
    entities:
      - name: "Borlish"
        type: language
    dates: ["medieval period"]

  - category: event
    claim: "The early centuries of the post-Roman Isles are associated with migration from Albion into Borland."
    entities:
      - name: "Albion"
        type: place
      - name: "Borland"
        type: place

  - category: event
    claim: "Migration from Albion into Borland occurred in particular after the Merch subjugation of East Anglia in the late eighth century."
    entities:
      - name: "Albion"
        type: place
      - name: "Borland"
        type: place
      - name: "Merch"
        type: polity
      - name: "East Anglia"
        type: place
    dates: ["late 8th century"]

  - category: language
    claim: "The word 'danny' meaning 'a nuisance, an irritating person' enters Old English from Old Borlish in the tenth century."
    entities:
      - name: "danny"
        type: concept
      - name: "Old English"
        type: language
      - name: "Old Borlish"
        type: language
    dates: ["10th century"]

  - category: language
    claim: "The word 'bather' meaning 'stringed musical instrument' enters Old English from Old Borlish in the tenth century."
    entities:
      - name: "bather"
        type: concept
      - name: "Old English"
        type: language
      - name: "Old Borlish"
        type: language
    dates: ["10th century"]

  - category: language
    claim: "The word 'parren' meaning 'traveller, newcomer, novice' enters Old English from Old Borlish in the tenth century."
    entities:
      - name: "parren"
        type: concept
      - name: "Old English"
        type: language
      - name: "Old Borlish"
        type: language
    dates: ["10th century"]

  - category: language
    claim: "Words like 'danny', 'bather', and 'parren' are first attested in monastic chronicles in the tenth century."
    entities:
      - name: "danny"
        type: concept
      - name: "bather"
        type: concept
      - name: "parren"
        type: concept
    dates: ["10th century"]

  - category: language
    claim: "In the post-Tetrarchic fractured landscape of the fourteenth and fifteenth centuries, Borland's advantageous position in the European trade mesh gave it the opportunity to introduce words for several goods into the English languages."
    entities:
      - name: "Borland"
        type: place
    dates: ["14th century", "15th century"]

  - category: glossary
    claim: "Nargel is the Boralverse term for coconuts."
    entities:
      - name: "nargel"
        irl: "coconuts"
        type: concept

  - category: glossary
    claim: "Mauser fruit is the Boralverse term for bananas."
    entities:
      - name: "mauser fruit"
        irl: "bananas"
        type: concept

  - category: language
    claim: "The fourteenth and fifteenth centuries gave English the words 'nargel' and 'mauser fruit' from Borlish."
    entities:
      - name: "nargel"
        type: concept
      - name: "mauser fruit"
        type: concept
      - name: "Borlish"
        type: language
    dates: ["14th century", "15th century"]

  - category: language
    claim: "The fourteenth and fifteenth centuries gave English the words 'jackdaw glass' and 'zackit masonry' from Borlish."
    entities:
      - name: "jackdaw glass"
        type: concept
      - name: "zackit masonry"
        type: concept
      - name: "Borlish"
        type: language
    dates: ["14th century", "15th century"]

  - category: terminology
    claim: "The word 'kevler' comes from Borlish."
    entities:
      - name: "kevler"
        type: concept
      - name: "Borlish"
        type: language

  - category: culture
    claim: "Kevler is a staple genre of every top-line performer's more obscure contributions to film."
    entities:
      - name: "kevler"
        type: concept

  - category: culture
    claim: "Kevler romance arose in the Good Game period in the late nineteenth century."
    entities:
      - name: "kevler"
        type: concept
      - name: "Good Game"
        type: period
    dates: ["late 19th century"]

  - category: culture
    claim: "Kevler romance arose as a subgenre of masquira tales."
    entities:
      - name: "kevler"
        type: concept
      - name: "masquira tales"
        type: concept

  - category: work
    claim: "Carvallo's books feature many elaborate robberies of diamonds and other traditional kevler prizes."
    entities:
      - name: "Carvallo"
        type: person
      - name: "kevler"
        type: concept

  - category: culture
    claim: "Works in the kevler genre have focused since its inception on thieving heroes entering high society as outsiders."
    entities:
      - name: "kevler"
        type: concept

  - category: terminology
    claim: "Connit is the Boralverse term for disguise."
    entities:
      - name: "connit"
        irl: "disguise"
        type: concept

  - category: culture
    claim: "Kevler works feature heroes entering high society in connit to make away with the hoarded treasures of the intolerably wealthy."
    entities:
      - name: "kevler"
        type: concept
      - name: "connit"
        type: concept

  - category: terminology
    claim: "Romanç kevlar is the Borlish term for kevler romance."
    entities:
      - name: "romanç kevlar"
        type: concept
      - name: "kevler"
        type: concept

  - category: culture
    claim: "Romanç kevlar has many sensation works in contemporary Borland."
    entities:
      - name: "romanç kevlar"
        type: concept
      - name: "Borland"
        type: place
