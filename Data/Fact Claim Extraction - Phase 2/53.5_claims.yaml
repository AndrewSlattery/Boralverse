entry: 53.5
title: "Brasil"
claims:
  - category: place
    claim: "Brasil is an island in the North Atlantic off the eastern coast of Mendeva."
    entities:
      - name: Brasil
        type: place
      - name: Mendeva
        type: place

  - category: place
    claim: "Brasil was the first location to be temporarily settled by people from the Vetomund in the Novomund."
    entities:
      - name: Brasil
        type: place

  - category: event
    claim: "Sustained Vetomundine contact with the Novomund began with the Landfall of 1471 N."
    entities:
      - name: Brasil
        type: place
    dates: "1471 N"

  - category: place
    claim: "The name Brasil was inspired by the Irish myth of Oil Breasail, a landmass west of Ireland said to be shrouded in mist except for one day every seven years."
    entities:
      - name: Brasil
        type: place

  - category: place
    claim: "Islands labelled Brasil or similar wordforms appear sporadically on late-medieval Atlantic coast maps, usually much smaller and further east than the real island."
    entities:
      - name: Brasil
        type: place

  - category: person
    claim: "Princess Alexandra of Vascony (sister of Ambrose the Ascendant) was the first Vetomundine royal to set foot in the Novomund, landing in Brasil in 1477 N."
    entities:
      - name: Alexandra of Vascony
        type: person
      - name: Ambrose III
        type: person
      - name: Brasil
        type: place
    dates: "1477 N"
    relationships:
      - type: sibling
        from: "Alexandra of Vascony"
        to: "Ambrose III"

  - category: polity
    claim: "By the mid-twentieth century, Brasil had been fully incorporated as a region of Ambrosia."
    entities:
      - name: Brasil
        type: place
      - name: Ambrosia
        type: polity
    dates: "mid-20th c. N"

  - category: event
    claim: "In 1950 N, the Brasil town of Paratzon formed one end of a new Atlantic link between Ambrosia and Morrack."
    entities:
      - name: Paratzon
        type: place
      - name: Ambrosia
        type: polity
      - name: Morrack
        type: polity
    dates: "1950 N"

  - category: place
    claim: "Paratzon is a coastal town in eastern Brasil that is home to an observatory."
    entities:
      - name: Paratzon
        type: place
      - name: Brasil
        type: place

  - category: person
    claim: "Fabian Mostàf (fl. c. 19th c. N) is an astronomer at the Paratzon observatory and grandson of mathematician Raymond al Mustafa."
    entities:
      - name: Fabian Mostàf
        type: person
      - name: Raymond al Mustafa
        type: person
    dates: "fl. c. 19th c. N"
    relationships:
      - type: grandchild
        from: "Fabian Mostàf"
        to: "Raymond al Mustafa"

  - category: work
    claim: "Cristòf Unquenjica (fl. 1971 N) authored the popular history text 'Going to Brasil', an account of the first few Vascon voyages to Mendeva."
    entities:
      - name: Cristòf Unquenjica
        type: person
      - name: "Going to Brasil"
        type: work
    dates: "fl. 1971 N"
