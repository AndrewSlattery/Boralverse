entry: 113.5
title: "Delicious Etymology"
source_work: "Rotcham Veriloquy (etymological dictionary of Merch)"
claims:
  - category: work
    claim: "The Rotcham Veriloquy is the premier etymological dictionary of Merch, published in several editions since the late nineteenth century via the press of the University of Rotcham."
    entities:
      - name: Rotcham Veriloquy
        type: work
      - name: University of Rotcham
        type: organisation
    dates: "late 19th c. N"

  - category: glossary
    claim: "Rotcham is the Merch name for Rochdale."
    entities:
      - name: Rotcham
        irl: Rochdale
        type: place

  - category: glossary
    claim: "Mikecorn is the Merch term for maize."
    entities:
      - name: mikecorn
        irl: maize
        type: concept

  - category: language
    claim: "Mikecorn entered Merch in 1530 as a compound, derived from a Morrove Arabic loan (1502) originally from a language of the Arcabil, possibly Veonic maiki."
    entities:
      - name: mikecorn
        type: concept
    dates: "1530 N"

  - category: glossary
    claim: "Shadome is the Merch term for tomato."
    entities:
      - name: shadome
        irl: tomato
        type: concept

  - category: language
    claim: "Shadome entered Merch in 1570 from Vascon xadoma (1534), itself from Morrove shed'oma (1510), from Normal Nawat shitomatl."
    entities:
      - name: shadome
        type: concept
    dates: "1570 N"

  - category: glossary
    claim: "Shockle is the Merch term for chocolate."
    entities:
      - name: shockle
        irl: chocolate
        type: concept

  - category: language
    claim: "Shockle entered Merch in 1623 by back-formation from shockled, itself derived from Vascon xoc(o)lat (1596)."
    entities:
      - name: shockle
        type: concept
    dates: "1623 N"

  - category: glossary
    claim: "Tartover is the Merch term for potato."
    entities:
      - name: tartover
        irl: potato
        type: concept

  - category: language
    claim: "Tartover entered Merch in 1583 from Vascon tartova (moresca) 'Moorish truffle' (1555), itself from Tuscan tartuvo 'truffle,' from Latin terrae tūber 'tuber of the earth'."
    entities:
      - name: tartover
        type: concept
    dates: "1583 N"

  - category: glossary
    claim: "Tashban is the Merch term for vanilla."
    entities:
      - name: tashban
        irl: vanilla
        type: concept

  - category: language
    claim: "Tashban entered Merch in 1608 from Vascon taxbàn (1567) or French tacheban, from Morrove tashbān (1518), possibly from Nawat or Thebevan tałpán."
    entities:
      - name: tashban
        type: concept
    dates: "1608 N"

  - category: glossary
    claim: "Normal Nawat is the Boralverse name for Classical Nahuatl."
    entities:
      - name: Normal Nawat
        irl: Classical Nahuatl
        type: concept

  - category: glossary
    claim: "Thebevan is the Boralverse name for the Totonac language."
    entities:
      - name: Thebevan
        irl: Totonac
        type: concept
