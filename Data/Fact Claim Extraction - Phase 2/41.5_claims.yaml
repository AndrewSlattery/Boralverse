entry: "41.5"
title: "Gurjat"
claims:
  - category: polity
    claim: "Gurjat is a polity on the western coast of India."
    entities:
      - name: "Gurjat"
        type: polity
      - name: "India"
        type: place

  - category: event
    claim: "The angle addition identities for vatre and arrhumb were first noted by the mathematicians of the city of Ujén in Gurjat."
    entities:
      - name: "Ujén"
        type: place
      - name: "Gurjat"
        type: polity

  - category: glossary
    claim: "Vatre is the Boralverse term for sine."
    entities:
      - name: "vatre"
        irl: "sine"
        type: concept

  - category: glossary
    claim: "Arrhumb is the Boralverse term for cosine."
    entities:
      - name: "arrhumb"
        irl: "cosine"
        type: concept

  - category: event
    claim: "Gurjat was a stopping point for the British ship the Phœbos under Captain mac Kellot during its voyage in the early sixteenth century."
    entities:
      - name: "Gurjat"
        type: polity
      - name: "Phœbos"
        type: technology
      - name: "mac Kellot"
        type: person
    dates: ["early 16th century N"]

  - category: event
    claim: "The Phœbos spent several months at port in Gurjat in 1512, having circumnavigated Africa and before continuing to Madray and thence to the Great Borunesk Meeting of 1516."
    entities:
      - name: "Phœbos"
        type: technology
      - name: "Gurjat"
        type: polity
      - name: "Africa"
        type: place
      - name: "Madray"
        type: place
      - name: "Great Borunesk Meeting"
        type: event
    dates: ["1512 N", "1516 N"]

  - category: glossary
    claim: "Madray is the Boralverse name for Madurai."
    entities:
      - name: "Madray"
        irl: "Madurai"
        type: place

  - category: economics
    claim: "Gurjat enjoyed a significant trade empire in the seventeenth century, spanning from African ports to Cathay."
    entities:
      - name: "Gurjat"
        type: polity
      - name: "Cathay"
        type: place
    dates: ["17th century N"]

  - category: glossary
    claim: "Ungotia is the Boralverse name for Zanzibar."
    entities:
      - name: "Ungotia"
        irl: "Zanzibar"
        type: place

  - category: glossary
    claim: "Sant Adrian is the Boralverse name for Bioko."
    entities:
      - name: "Sant Adrian"
        irl: "Bioko"
        type: place

  - category: event
    claim: "Gurjat traders made up a good fraction of those merchants expelled from Moscat in 1652."
    entities:
      - name: "Gurjat"
        type: polity
      - name: "Moscat"
        type: place
    dates: ["1652 N"]

  - category: event
    claim: "The Ibadine Imamate fell to Hadramot forces shortly after the expulsions from Moscat in 1652."
    entities:
      - name: "Ibadine Imamate"
        type: polity
      - name: "Hadramot"
        type: polity
    dates: ["1652 N"]

  - category: person
    claim: "Manesh Camdar (fl. 1813) was a life theorist whose research on fecundation in marine sponges provided the first proof that fecundation comprises the union of sperm and egg."
    entities:
      - name: "Manesh Camdar"
        type: person
    dates: ["fl. 1813 N"]
