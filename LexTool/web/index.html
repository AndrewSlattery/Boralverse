<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LexTool — Borlish lexicon</title>
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <header id="topbar">
    <h1>Borlish</h1>
    <span id="count" class="muted"></span>
    <div id="alpha" class="alpha"></div>
  </header>
  <main>
    <aside id="sidebar">
      <div class="searchbar">
        <select id="field" title="Search within">
          <option value="lx">Headword</option>
          <option value="ge">Gloss</option>
          <option value="ps">Part of speech</option>
          <option value="et">Etymology</option>
          <option value="xv">Example</option>
          <option value="all">All fields</option>
        </select>
        <input id="search" type="search" placeholder="Search…" autocomplete="off" spellcheck="false">
      </div>
      <div id="results" class="muted"></div>
      <ul id="list"></ul>
    </aside>
    <section id="entry">
      <p class="placeholder muted">Select an entry, or start typing to search.</p>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
