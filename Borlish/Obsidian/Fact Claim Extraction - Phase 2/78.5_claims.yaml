entry: 78.5
title: "The Good Game period"
claims:
  - category: period
    claim: "The Good Game period refers to the final decades of the nineteenth century, following the Global Workshop period and ending with the outbreak of the Millstone War."
    entities:
      - name: Good Game
        type: period
      - name: Millstone War
        type: event
    dates: "late 19th c. N"

  - category: period
    claim: "The Laic Declarations of Belgrade in 1850 N set the stage for the political realignment of the Good Game decades, enabling new alliances between states that could not have countenanced such ties even a generation earlier."
    entities:
      - name: Good Game
        type: period
      - name: Laic Declarations
        type: event
    dates: "1850 N"

  - category: polity
    claim: "The Drengot Collusion was established during the Good Game period, with its expansion concluding in 1894 N with the accession of Borland."
    entities:
      - name: Drengot Collusion
        type: polity
      - name: Borland
        type: polity
    dates: "1894 N"

  - category: event
    claim: "The 1887 N Desarden affair involved a London ambassador and the king of Nackon Day."
    entities:
      - name: Desarden affair
        type: event
      - name: London
        type: place
      - name: Nackon Day
        type: polity
    dates: "1887 N"

  - category: culture
    claim: "The Good Game period has cemented itself as a popular setting for spycraft and masquira stories, despite its popular perception being somewhat exaggerated."
    entities:
      - name: Good Game
        type: period

  - category: culture
    claim: "The kevler romance arose as a distinct subgenre of masquira during the Good Game period, featuring elaborate plans and schemes usually aiming to steal some priceless item."
    entities:
      - name: kevler romance
        type: culture
      - name: masquira
        type: culture
      - name: Good Game
        type: period

  - category: culture
    claim: "The 1880s N saw a brief fad for 'Morrack fashion' across Europe and the Novomund, in areas such as dress, architecture, and food, including a trend of incorporating exposed stonework draped in tapestry and curtains."
    entities:
      - name: Morrack
        type: polity
    dates: "1880s N"

  - category: technology
    claim: "Scientific and technological advances of the Good Game period include discovering other galaxies, determining the normal speed, the first household mesh-linked tachygraphs, and stauron retainers."
    entities:
      - name: Good Game
        type: period
      - name: tachygraph
        type: technology
