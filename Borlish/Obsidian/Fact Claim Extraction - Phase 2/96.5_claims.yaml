entry: 96.5
title: "osceyan"
claims:
  - category: terminology
    claim: "Osceyan is a Borlish word meaning 'birthday,' 'birthday party,' or more generally 'anniversary, a celebration of something lasting a number of years'."
    entities:
      - name: osceyan
        type: concept

  - category: language
    claim: "Osceyan derives from Middle Borlish oscey-an 'birthday celebration,' literally 'marks the year,' from verb osceyar 'to mark, commemorate.'"
    entities:
      - name: osceyan
        type: concept

  - category: culture
    claim: "Revillon is the Borlish term for the eve (and often the entire day) before Christide."
    entities:
      - name: Revillon
        type: concept

  - category: culture
    claim: "Revillon also refers to the cultural practice of the Winter Feast (Borlish: y Fest Reveglon), a celebration held on Revillon in churches across Borland to which everyone in attendance brings food."
    entities:
      - name: Revillon
        type: concept
      - name: Borland
        type: place

  - category: language
    claim: "The Borlish name Reveglon means 'vigil,' borrowed from French reveillon, itself from Latin evigilō."
    entities:
      - name: Revillon
        type: concept

  - category: culture
    claim: "Evidence of winter solstice festivities involving communally-prepared feasts on Borland predates the Roman invasion, making Revillon one of the longest continuously-practised folk traditions in Europe."
    entities:
      - name: Revillon
        type: concept
      - name: Borland
        type: place

  - category: person
    claim: "Third-century Roman historian Ammian Marcellinus provides an early written mention of the Winter Feast under its original name Flidōlus."
    entities:
      - name: Ammian Marcellinus
        type: person
    dates: "3rd c. N"

  - category: event
    claim: "Queen Natalia II of Borland abdicated on Revillon of 1894 as part of the political upheaval surrounding Borland's entry into the Drengot Collusion."
    entities:
      - name: Natalia II
        type: person
      - name: Borland
        type: polity
      - name: Drengot Collusion
        type: organisation
    dates: "1894 N"

  - category: culture
    claim: "The tort dell'ivan is a savoury dish, often of lamb, associated with the Revillon Feast and attested as early as the tenth century."
    entities:
      - name: tort dell'ivan
        type: concept
    dates: "10th c. N"

  - category: culture
    claim: "Jonnovar zucarrað ('candied butterflies') are a sugar-spiced cakebread traditional to Borland, generously spiced with dalassine bark and inchroot and formed into butterfly shapes for Revillon."
    entities:
      - name: jonnovar zucarrað
        type: concept
      - name: Borland
        type: place
