entry: "27.5"
title: "New Provence"
claims:
  - category: polity
    claim: "New Provence was a coastal polity in the east of Mendeva."
    entities:
      - name: "New Provence"
        type: polity
      - name: "Mendeva"
        type: place

  - category: polity
    claim: "New Provence is named for Provence, a small Middlesea state."
    entities:
      - name: "New Provence"
        type: polity
      - name: "Provence"
        type: polity

  - category: event
    claim: "Provence's trading ships first set up trading posts along the coast of Mendeva in the early sixteenth century."
    entities:
      - name: "Provence"
        type: polity
      - name: "Mendeva"
        type: place
    dates: ["early 16th century N"]

  - category: polity
    claim: "New Provence bordered Ambrosia to the north."
    entities:
      - name: "New Provence"
        type: polity
      - name: "Ambrosia"
        type: polity

  - category: polity
    claim: "New Provence bordered the states of Gulf Mendeva to the south."
    entities:
      - name: "New Provence"
        type: polity
      - name: "Gulf Mendeva"
        type: place

  - category: polity
    claim: "New Provence shared a short border with Hasiny to the southwest."
    entities:
      - name: "New Provence"
        type: polity
      - name: "Hasiny"
        type: polity

  - category: place
    claim: "New Provence extends inland as far as the Sturgovan Mountains in places."
    entities:
      - name: "New Provence"
        type: polity
      - name: "Sturgovan Mountains"
        type: place

  - category: economics
    claim: "In the sixteenth and seventeenth centuries, New Provincial trading posts dealt primarily with Mastoiset peoples, exchanging metal tools for beaver pelts."
    entities:
      - name: "New Provence"
        type: polity
      - name: "Mastoiset"
        type: group
    dates: ["16th century N", "17th century N"]

  - category: polity
    claim: "By the twentieth century, New Provence was politically independent from Provence, but cultural ties remained strong."
    entities:
      - name: "New Provence"
        type: polity
      - name: "Provence"
        type: polity
    dates: ["20th century N"]

  - category: culture
    claim: "New Provence and Provence shared newspapers and substantial movement of people in both directions."
    entities:
      - name: "New Provence"
        type: polity
      - name: "Provence"
        type: polity

  - category: law
    claim: "Until at least 1943, New Provence and Provence had more restrictive morality laws than their neighbours."
    entities:
      - name: "New Provence"
        type: polity
      - name: "Provence"
        type: polity
    dates: ["1943 N"]

  - category: polity
    claim: "New Provence and Provence were the strongest remnants of the Modest Arrangement of the previous century."
    entities:
      - name: "New Provence"
        type: polity
      - name: "Provence"
        type: polity
      - name: "Modest Arrangement"
        type: event

  - category: polity
    claim: "New Provence and Provence were notable non-signatories of the 1850 Laic Declarations of Belgrade."
    entities:
      - name: "New Provence"
        type: polity
      - name: "Provence"
        type: polity
      - name: "Laic Declarations of Belgrade"
        type: event
    dates: ["1850 N"]

  - category: place
    claim: "The Becouin River is the northernmost major river in New Provence."
    entities:
      - name: "Becouin River"
        type: place
      - name: "New Provence"
        type: polity

  - category: place
    claim: "Santrafew (Sant-Rafeu) was an early trading post along the New Provincial coast, founded in 1564 at the mouth of the Becouin River."
    entities:
      - name: "Santrafew"
        type: place
      - name: "Becouin River"
        type: place
    dates: ["1564 N"]

  - category: work
    claim: "'Jet White' is a 1951 masquira film adapted from Cadogan Torrior's 1890 trevold 'Men of Jet and Diamond'."
    entities:
      - name: "Jet White"
        type: work
      - name: "Men of Jet and Diamond"
        type: work
      - name: "Cadogan Torrior"
        type: person
    dates: ["1951 N", "1890 N"]

  - category: work
    claim: "The Borlish title of 'Jet White' is 'Blanc Sabaje'."
    entities:
      - name: "Jet White"
        type: work

  - category: person
    claim: "Sauveir d'Orz was mayor of Santrafew from 1620 to 1626."
    entities:
      - name: "Sauveir d'Orz"
        type: person
      - name: "Santrafew"
        type: place
    dates: ["1620 N", "1626 N"]

  - category: person
    claim: "Carol Zancoud (d. 1630) was town reverend of Santrafew, wielding significant political power by virtue of his popularity."
    entities:
      - name: "Carol Zancoud"
        type: person
      - name: "Santrafew"
        type: place
    dates: ["1630 N"]

  - category: person
    claim: "Nadalla fi Carol (fl. 1590) was the daughter of Carol Zancoud."
    entities:
      - name: "Nadalla fi Carol"
        type: person
      - name: "Carol Zancoud"
        type: person
    dates: ["fl. 1590 N"]
    relationships:
      - subject: "Nadalla fi Carol"
        predicate: "was daughter of"
        object: "Carol Zancoud"

  - category: work
    claim: "Nadalla fi Carol is remembered for her preserved diaries illustrating daily life in early Santrafew."
    entities:
      - name: "Nadalla fi Carol"
        type: person
      - name: "Santrafew"
        type: place
