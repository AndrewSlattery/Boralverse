entry: 71.5
title: "Threshold force"
claims:
  - category: glossary
    claim: "Threshold force is the Boralverse term for nuclear fission power."
    entities:
      - name: threshold force
        irl: nuclear fission power
        type: concept

  - category: terminology
    claim: "Threshold force is the force derived from splitting the nuxes of atoms."
    entities:
      - name: threshold force
        type: concept

  - category: terminology
    claim: "The name 'threshold' in threshold force refers to the 'threshold heft' of an unstable substance like killdark, above which one has a self-sustaining detaxion."
    entities:
      - name: threshold force
        type: concept
      - name: killdark
        type: concept

  - category: glossary
    claim: "Nux is the Boralverse term for atomic nucleus."
    entities:
      - name: nux
        irl: atomic nucleus
        type: concept

  - category: glossary
    claim: "Shortform luxes is the Boralverse term for gamma rays."
    entities:
      - name: shortform luxes
        irl: gamma rays
        type: concept

  - category: glossary
    claim: "Astraphor is the Boralverse term for electricity."
    entities:
      - name: astraphor
        irl: electricity
        type: concept

  - category: terminology
    claim: "Detaxion is a generic Boralverse term describing any process involving the change of one thing into another; synthesis, reaction."
    entities:
      - name: detaxion
        type: concept

  - category: terminology
    claim: "A 'substantial theorist' in the Boralverse is a chemist focused on the properties and structures of atoms and single molecules."
    entities:
      - name: substantial theorist
        type: concept

  - category: event
    claim: "The story of threshold force begins in 1902 N with the discovery of the atomic nux at the Nÿstad Atellier in the Cappatian city of Warnøw."
    entities:
      - name: threshold force
        type: concept
      - name: Nÿstad Atellier
        type: organisation
      - name: Warnøw
        type: place
    dates: "1902 N"

  - category: glossary
    claim: "Warnøw is the Boralverse name for a city located where Vitória (Espírito Santo), Brazil is in IRL."
    entities:
      - name: Warnøw
        irl: "Vitória, Brazil"
        type: place

  - category: technology
    claim: "The first threshold mills capable of supplying force for general use were in operation by the 1960s N."
    entities:
      - name: threshold force
        type: concept
    dates: "1960s N"

  - category: technology
    claim: "The corporal killdark was first isolated in the early nineteenth century in the Irish shire of Killdara."
    entities:
      - name: killdark
        type: concept
    dates: "early 19th c. N"

  - category: language
    claim: "The name killdark derives from Welsh kildárc meaning 'from Killdara' (a shire in Ireland)."
    entities:
      - name: killdark
        type: concept
      - name: Killdara
        type: place

  - category: technology
    claim: "Portingale was a pioneer of threshold force in the 1950s N, funding research to reduce dependence on astraphor exported by the Drengot Collusion."
    entities:
      - name: Portingale
        type: polity
      - name: threshold force
        type: concept
      - name: Drengot Collusion
        type: polity
    dates: "1950s N"

  - category: technology
    claim: "Portingale became a net exporter of astraphor in the 1970s N thanks to its threshold force programme."
    entities:
      - name: Portingale
        type: polity
    dates: "1970s N"
