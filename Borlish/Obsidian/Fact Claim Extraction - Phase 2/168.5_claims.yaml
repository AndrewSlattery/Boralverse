entry: 168.5
title: "And Good And Gay"
source_work: "Birds Yet Sing (Ja Cantan Aucèis, 1986)"
claims:
  - category: work
    claim: "'Birds Yet Sing' (1986) by Ivainchuque fi Cap, originally published in Vascon as 'Ja Cantan Aucèis', is a popular account of the history of the Household Renovation in the late nineteenth century."
    entities:
      - name: "Birds Yet Sing"
        type: work
      - name: Ivainchuque fi Cap
        type: person
    dates: "1986 N"

  - category: culture
    claim: "The Household Renovation was a precipitous societal shift in attitudes to marriage, family, and the role of children in the late nineteenth century."
    entities:
      - name: Household Renovation
        type: period

  - category: glossary
    claim: "Tov is the Boralverse term for gay (in the sense of same-sex attraction)."
    entities:
      - name: tov
        irl: gay
        type: concept

  - category: glossary
    claim: "Tovarism is the Boralverse term for homosexuality."
    entities:
      - name: tovarism
        irl: homosexuality
        type: concept

  - category: glossary
    claim: "Pojon is the Boralverse name for Bratislava."
    entities:
      - name: Pojon
        irl: Bratislava
        type: place

  - category: organisation
    claim: "The Riverine Cities was an alliance-federacy of small independent states along the Danube River and its tributaries, linked by treaty and trade in the nineteenth and early twentieth centuries."
    entities:
      - name: Riverine Cities
        type: organisation
    dates: "19th–early 20th c. N"

  - category: language
    claim: "The word tov is first attested from the 1810s in underground tovaric communities of the Riverine Cities; it likely derives from Zahid Russian товариш (továrish) meaning 'friend, companion' or a cognate."
    entities:
      - name: tov
        type: concept
    dates: "first attested 1810s N"

  - category: work
    claim: "Manjurich's 1823 work 'The Vernacular of Boxa' contains an early documented definition of tov."
    entities:
      - name: "The Vernacular of Boxa"
        type: work
      - name: Manjurich
        type: person
    dates: "1823 N"
