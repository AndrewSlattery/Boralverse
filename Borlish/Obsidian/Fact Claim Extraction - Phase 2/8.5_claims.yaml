entry: "8.5"
title: "Vikings in Dumnonia"
source_work: "On the Dane Supremacy in Kernow and the Creation of Normandy"
claims:
  - category: work
    claim: "The reference work 'On the Dane Supremacy in Kernow and the Creation of Normandy' was written by Professor Jockin Abiscander."
    entities:
      - name: "On the Dane Supremacy in Kernow and the Creation of Normandy"
        type: work
      - name: "Jockin Abiscander"
        type: person

  - category: person
    claim: "Professor Jockin Abiscander is a deixist historian at the University of Thelmass."
    entities:
      - name: "Jockin Abiscander"
        type: person
      - name: "University of Thelmass"
        type: organisation

  - category: glossary
    claim: "Thelmass is the Boralverse name for Le Mans."
    entities:
      - name: "Thelmass"
        irl: "Le Mans"
        type: place

  - category: work
    claim: "'On the Dane Supremacy in Kernow and the Creation of Normandy' was published in 1934 by the University of Thelmass's printers."
    entities:
      - name: "On the Dane Supremacy in Kernow and the Creation of Normandy"
        type: work
      - name: "University of Thelmass"
        type: organisation
    dates: ["1934"]

  - category: work
    claim: "The original Norman title of 'On the Dane Supremacy in Kernow and the Creation of Normandy' is 'Soth Prominence Dask en Cornow doth Genese Normande'."
    entities:
      - name: "On the Dane Supremacy in Kernow and the Creation of Normandy"
        type: work

  - category: glossary
    claim: "Kernow is the Boralverse name for Brittany."
    entities:
      - name: "Kernow"
        irl: "Brittany"
        type: place

  - category: person
    claim: "Vigo the Magnificent was Alan III of Dumnonia's thrice great-grandfather."
    entities:
      - name: "Vigo the Magnificent"
        type: person
      - name: "Alan III of Dumnonia"
        type: person
    relationships:
      - subject: "Vigo the Magnificent"
        predicate: "was thrice great-grandfather of"
        object: "Alan III of Dumnonia"

  - category: person
    claim: "Alan III of Dumnonia was crowned in 883."
    entities:
      - name: "Alan III of Dumnonia"
        type: person
    dates: ["883 N"]

  - category: event
    claim: "Alan III of Dumnonia lost the Siege of Avron."
    entities:
      - name: "Alan III of Dumnonia"
        type: person
      - name: "Siege of Avron"
        type: event

  - category: event
    claim: "Alan III of Dumnonia ceded the fort and town of Avron to Duke Fargot."
    entities:
      - name: "Alan III of Dumnonia"
        type: person
      - name: "Avron"
        type: place
      - name: "Duke Fargot"
        type: person
    relationships:
      - subject: "Alan III of Dumnonia"
        predicate: "ceded Avron to"
        object: "Duke Fargot"

  - category: person
    claim: "Duke Fargot was appointed by Rothed the Canny to the march."
    entities:
      - name: "Duke Fargot"
        type: person
      - name: "Rothed the Canny"
        type: person
    relationships:
      - subject: "Rothed the Canny"
        predicate: "appointed"
        object: "Duke Fargot"

  - category: person
    claim: "Gorvan of Kernow was the vassal and nephew of Alan III of Dumnonia."
    entities:
      - name: "Gorvan of Kernow"
        type: person
      - name: "Alan III of Dumnonia"
        type: person
    relationships:
      - subject: "Gorvan of Kernow"
        predicate: "was vassal and nephew of"
        object: "Alan III of Dumnonia"

  - category: person
    claim: "Gorvan of Kernow is also known as Golleck in some accounts."
    entities:
      - name: "Gorvan of Kernow"
        type: person
      - name: "Golleck"
        type: person

  - category: polity
    claim: "Alan III of Dumnonia granted Gorvan of Kernow dominion of Devon."
    entities:
      - name: "Alan III of Dumnonia"
        type: person
      - name: "Gorvan of Kernow"
        type: person
      - name: "Devon"
        type: place
    relationships:
      - subject: "Alan III of Dumnonia"
        predicate: "granted dominion of Devon to"
        object: "Gorvan of Kernow"

  - category: event
    claim: "There was inexorable rise in Viking activity along the coast during Alan III's reign."
    entities:
      - name: "Alan III of Dumnonia"
        type: person

  - category: place
    claim: "The Seine is a river along which Viking raids occurred."
    entities:
      - name: "Seine"
        type: place

  - category: place
    claim: "The Orne is a river along which Viking raids occurred."
    entities:
      - name: "Orne"
        type: place

  - category: event
    claim: "Viking raids along the Seine and the Orne began in earnest some decades before Alan III's reign."
    entities:
      - name: "Seine"
        type: place
      - name: "Orne"
        type: place
      - name: "Alan III of Dumnonia"
        type: person

  - category: event
    claim: "Viking raids spread west from the Seine and Orne during the late ninth century."
    entities:
      - name: "Seine"
        type: place
      - name: "Orne"
        type: place
    dates: ["late 9th century"]

  - category: event
    claim: "The monastery at Landvennick was burned to the ground in 888."
    entities:
      - name: "Landvennick"
        type: place
    dates: ["888 N"]

  - category: event
    claim: "Danes took advantage of political instability to conquer territory and settle on both sides of the Channel."
    entities:
      - name: "Channel"
        type: place

  - category: event
    claim: "The collapse of Wessex occurred during the Viking Age."
    entities:
      - name: "Wessex"
        type: polity

  - category: event
    claim: "The Lombard disputes occurred in the south during the Viking Age."
    entities:
      - name: "Lombard disputes"
        type: event

  - category: event
    claim: "There is evidence of Danish settlement even past the Vire river."
    entities:
      - name: "Vire river"
        type: place

  - category: place
    claim: "The Vire river was part of the Franco-Dumnonian border as agreed in the eighth-century Catumagin Accords."
    entities:
      - name: "Vire river"
        type: place
      - name: "Catumagin Accords"
        type: event
    dates: ["8th century"]

  - category: event
    claim: "The Danish fiefdom past the Vire was officially ceded by the Franks in the tenth century to form Normandy."
    entities:
      - name: "Vire river"
        type: place
      - name: "Normandy"
        type: polity
    dates: ["10th century"]

  - category: place
    claim: "The Vire remained the border when Normandy was formed."
    entities:
      - name: "Vire river"
        type: place
      - name: "Normandy"
        type: polity

  - category: event
    claim: "Later in-migration of the Normans occurred in Thelmass."
    entities:
      - name: "Thelmass"
        irl: "Le Mans"
        type: place
