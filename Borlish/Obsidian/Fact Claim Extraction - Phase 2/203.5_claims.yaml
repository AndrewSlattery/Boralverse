entry: 203.5
title: "Through the Ages 2"
claims:
  - category: person
    claim: "Nadàlla fi Carol was an early figure in Santrafew, active in 1621, and daughter of the reverend Carol Zancoud."
    entities:
      - name: Nadàlla fi Carol
        type: person
      - name: Carol Zancoud
        type: person
    dates:
      - "fl. 1621"

  - category: event
    claim: "The Becouin Treaty of 1621 was co-authored by Nadàlla fi Carol and the Mastòiset people."
    entities:
      - name: Becouin Treaty
        type: event
      - name: Nadàlla fi Carol
        type: person
      - name: Mastòiset
        type: polity
    dates:
      - "1621"

  - category: glossary
    claim: "Mastòiset is the Boralverse name for the Massachusett people."
    entities:
      - name: Mastòiset
        type: polity
        irl: Massachusett

  - category: person
    claim: "Dorothe Shock was a proprietress active in the early 19th century."
    entities:
      - name: Dorothe Shock
        type: person
    dates:
      - "fl. early 19th century"

  - category: organisation
    claim: "De Marnoshring was an emporium in Miszen, founded by Dorothe Shock."
    entities:
      - name: De Marnoshring
        type: organisation
      - name: Dorothe Shock
        type: person
      - name: Miszen
        type: place

  - category: event
    claim: "Dorothe Shock ran De Marnoshring with her younger brother from 1813."
    entities:
      - name: Dorothe Shock
        type: person
      - name: De Marnoshring
        type: organisation
    dates:
      - "from 1813"

  - category: organisation
    claim: "De Marnoshring grew into a quasipolitic guild by 2025."
    entities:
      - name: De Marnoshring
        type: organisation
    dates:
      - "by 2025"

  - category: glossary
    claim: "Miszen is the Boralverse name for Meissen."
    entities:
      - name: Miszen
        type: place
        irl: Meissen

  - category: glossary
    claim: "Quasipolitic guild is the Boralverse term for multinational corporation."
    entities:
      - name: quasipolitic guild
        type: organisation
        irl: multinational corporation

  - category: person
    claim: "Agathe Bisset was a French politician and author, born in Blois, who died in 2025."
    entities:
      - name: Agathe Bisset
        type: person
    dates:
      - "d. 2025"

  - category: work
    claim: "'Hommes en Noir' is a 2003 work by Agathe Bisset that chronicles spycraft."
    entities:
      - name: Hommes en Noir
        type: work
      - name: Agathe Bisset
        type: person
    dates:
      - "2003"
