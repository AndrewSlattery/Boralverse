entry: 91.5
title: "Millstone War"
claims:
  - category: event
    claim: "The Millstone War (1897–1908) was a period of global military conflict often considered the dawn of modern warfare."
    entities:
      - name: Millstone War
        type: event
    dates: "1897–1908 N"

  - category: event
    claim: "The Millstone War was characterised by defensive tactics outstripping offensive technology, resulting in barely-moving trench fortifications worldwide."
    entities:
      - name: Millstone War
        type: event

  - category: period
    claim: "The Millstone War marks the end of the Good Game period."
    entities:
      - name: Millstone War
        type: event
      - name: Good Game
        type: period

  - category: event
    claim: "The last years of the Millstone War saw the first military use of aircraft, including air-bombing of cities such as Marsella in Provence."
    entities:
      - name: Millstone War
        type: event
      - name: Marsella
        type: place
      - name: Provence
        type: polity

  - category: event
    claim: "After the Millstone War, relations between the Drengot Collusion and their southern neighbours of Vascony and Provence quickly soured."
    entities:
      - name: Drengot Collusion
        type: organisation
      - name: Vascony
        type: polity
      - name: Provence
        type: polity

  - category: person
    claim: "Honorine Maignard (fl. 1890–1940) was an author in France active for over fifty years in the early twentieth century."
    entities:
      - name: Honorine Maignard
        type: person
      - name: France
        type: polity
    dates: "fl. 1890–1940 N"

  - category: person
    claim: "Honorine Maignard was the granddaughter of Lombard diplomat Audace Saviano."
    entities:
      - name: Honorine Maignard
        type: person
      - name: Audace Saviano
        type: person
    relationships:
      - type: granddaughter
        from: "Honorine Maignard"
        to: "Audace Saviano"

  - category: person
    claim: "Audace Saviano was, during the Good Game period, instrumental in the formation of the Italian Concert."
    entities:
      - name: Audace Saviano
        type: person
      - name: Italian Concert
        type: organisation

  - category: event
    claim: "During the Millstone War, Honorine Maignard served in the Second Medic Force of Valois for more than six years."
    entities:
      - name: Honorine Maignard
        type: person
      - name: Second Medic Force of Valois
        type: organisation

  - category: person
    claim: "Vincent Margouille (fl. 1960–1990) was a Norman author and professional lineball player."
    entities:
      - name: Vincent Margouille
        type: person
    dates: "fl. 1960–1990 N"

  - category: event
    claim: "In 1965, Vincent Margouille led the Kent team to its only victory in the Lineball Global Tourney."
    entities:
      - name: Vincent Margouille
        type: person
      - name: Lineball Global Tourney
        type: event
    dates: "1965 N"

  - category: person
    claim: "Vincent Margouille is the son of Vréqueu Margouille, who also played for Kent in the 1935 Lineball Global Tourney."
    entities:
      - name: Vincent Margouille
        type: person
      - name: Vréqueu Margouille
        type: person
    relationships:
      - type: parent
        from: "Vréqueu Margouille"
        to: "Vincent Margouille"

  - category: work
    claim: "From 1981, Vincent Margouille authored a best-known series beginning with 'Upstairs, Downstairs', which follows people in a manorhouse during the Good Game period and the Millstone War."
    entities:
      - name: "Upstairs, Downstairs"
        type: work
      - name: Vincent Margouille
        type: person
    dates: "1981 N"
