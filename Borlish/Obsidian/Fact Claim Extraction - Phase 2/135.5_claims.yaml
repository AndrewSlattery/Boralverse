entry: 135.5
title: "Kernow"
claims:
  - category: place
    claim: "Kernow refers to the north-western peninsula of Gaul, known in antiquity as Armorica, Brittania or Dumnonia, and resettled in the early medieval period by Kelt peoples from Albion."
    entities:
      - name: Kernow
        type: place
      - name: Gaul
        type: place

  - category: event
    claim: "At the dawn of the eighth century, the unified Kernovan kingdoms were ruled by widowed Queen Maud of Angeus; her son Vigo ascended to the throne upon her death in 720."
    entities:
      - name: Maud of Angeus
        type: person
      - name: Vigo
        type: person
      - name: Kernow
        type: polity
    dates: "720 N"

  - category: event
    claim: "The Catumagin Accord ended hostilities between Kernow and the Kingdom of the Franks and established an official border."
    entities:
      - name: Kernow
        type: polity
      - name: Franks
        type: polity

  - category: event
    claim: "Vigo of Kernow spearheaded the reconquest of Devon from the kingdom of Wessex, uniting the two peninsulas as the Kingdom of Greater Devon."
    entities:
      - name: Vigo
        type: person
      - name: Devon
        type: place
      - name: Wessex
        type: polity
      - name: Greater Devon
        type: polity

  - category: event
    claim: "The monastery at Landvennick was burned to the ground by Viking raiders in 888 N."
    entities:
      - name: Landvennick
        type: place
    dates: "888 N"

  - category: polity
    claim: "Kernow derived its modern name from the House of Kernow, which in the eleventh century took power via an alliance with Normandy (the Kernovan Conjuring), leading to the First Drengot Empire."
    entities:
      - name: Kernow
        type: polity
      - name: Kernovan Conjuring
        type: event
      - name: First Drengot Empire
        type: polity

  - category: religion
    claim: "The Brethin of Kernow enjoyed significant religious influence during the late medieval period."
    entities:
      - name: Brethin
        type: organisation
      - name: Kernow
        type: place

  - category: event
    claim: "Kernow became part of the Kingdom of Britain in the fifteenth century as Britain incorporated territories further afield from Wales."
    entities:
      - name: Kernow
        type: place
      - name: Britain
        type: polity
    dates: "15th c. N"

  - category: person
    claim: "Catrin of Kernow was the sister of the Devoner king and an influential figure in thirteenth-century Borland."
    entities:
      - name: Catrin of Kernow
        type: person
      - name: Borland
        type: place
    dates: "13th c. N"

  - category: person
    claim: "Pope Damian VI (the Wise) reigned 1199–1208 N and was of Kernovan origin."
    entities:
      - name: Damian VI
        type: person
      - name: Kernow
        type: place
    dates: "1199–1208 N"

  - category: person
    claim: "Saint Victor of Dunkirk died in 1245 N."
    entities:
      - name: Victor of Dunkirk
        type: person
    dates: "d. 1245 N"
