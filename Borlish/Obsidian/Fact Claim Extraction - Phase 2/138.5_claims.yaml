entry: 138.5
title: "Steeplepost Tapestry"
claims:
  - category: technology
    claim: "The Steeplepost Tapestry was a screen of several myriad black or white tiles built in Ambrosia's capital city of Aiga d'Angoixa, completed in 1820 and inspired by the 'latticework' art movement."
    entities:
      - name: Steeplepost Tapestry
        type: technology
      - name: Aiga d'Angoixa
        type: place
      - name: Ambrosia
        type: polity
    dates: "1820 N"

  - category: technology
    claim: "The Steeplepost Tapestry used the flag-lamp steeplemesh infrastructure to display short news pieces or government messages in text and simple symbols."
    entities:
      - name: Steeplepost Tapestry
        type: technology

  - category: technology
    claim: "The Steeplepost Tapestry successfully transmitted journalist's sketches of events several times, but practical limitations prevented this from becoming routine."
    entities:
      - name: Steeplepost Tapestry
        type: technology

  - category: language
    claim: "The word 'diced' (meaning 'blocky, pixellated') dates back to a calque of Provincial icon dau 'die image,' coined in 1821 in disparaging reference to the Steeplepost Tapestry."
    entities:
      - name: Steeplepost Tapestry
        type: technology
    dates: "1821 N"

  - category: event
    claim: "The 'Lies of 1824' were a series of hoax messages that spread via the Ambrosian steeplemesh and appeared on the Tapestry, including a report of the governor's death and an alleged declaration of war from New Provence."
    entities:
      - name: Steeplepost Tapestry
        type: technology
      - name: Ambrosia
        type: polity
      - name: New Provence
        type: polity
    dates: "1824 N"

  - category: event
    claim: "In 2020, a replica of the Steeplepost Tapestry was unveiled in Markland to mark the bicentenary of the original's completion."
    entities:
      - name: Steeplepost Tapestry
        type: technology
      - name: Markland
        type: polity
    dates: "2020 N"
