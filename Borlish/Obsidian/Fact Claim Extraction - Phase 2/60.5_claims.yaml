entry: 60.5
title: "Santrafew"
claims:
  - category: place
    claim: "Santrafew (Merch form; Provincial: Sant Rafeu) is the capital of New Provence."
    entities:
      - name: Santrafew
        type: place
      - name: New Provence
        type: polity

  - category: place
    claim: "Santrafew is located on the Mendevan coast on the banks of the Becouin River."
    entities:
      - name: Santrafew
        type: place
      - name: Becouin River
        type: place
      - name: Mendeva
        type: place

  - category: place
    claim: "Santrafew is one of the oldest European settlements on the Mendevan mainland."
    entities:
      - name: Santrafew
        type: place

  - category: event
    claim: "Santrafew was founded in 1564 N as a trading post for Provincial merchant guilds."
    entities:
      - name: Santrafew
        type: place
      - name: New Provence
        type: polity
    dates: "1564 N"

  - category: place
    claim: "Santrafew was named for the archangel Raphael in his guise as a patron of travellers."
    entities:
      - name: Santrafew
        type: place

  - category: place
    claim: "In its first century, Santrafew developed pocket communities as the fleets of Provence employed mariners from across the Middlesea."
    entities:
      - name: Santrafew
        type: place
      - name: Provence
        type: polity

  - category: economics
    claim: "Early imports into Santrafew included horse stocks and metal tools, traded in exchange for furs and new foodstuffs."
    entities:
      - name: Santrafew
        type: place

  - category: event
    claim: "In 1590 N, Derek Nassow (heir apparent to the Duchy d'Avosche in Willemy) fled overseas to Santrafew, causing an incendiary scandal across Western European courts and especially the court of King David of France."
    entities:
      - name: Derek Nassow
        type: person
      - name: Avosche
        type: polity
      - name: Willemy
        type: polity
      - name: Santrafew
        type: place
      - name: David of France
        type: person
    dates: "1590 N"

  - category: law
    claim: "The 1621 N Becouin Treaty outlined the legal relationship of Santrafew to the Mendevan peoples of the region."
    entities:
      - name: Becouin Treaty
        type: event
      - name: Santrafew
        type: place
    dates: "1621 N"

  - category: event
    claim: "Following the British Sack of Santrafew, in which the Mastoisèt were alleged to have collaborated, Mayor Alexandre fi Marco imposed an embargo and ten-league exile of the Mastoisèt and other Mendevan groups."
    entities:
      - name: Alexandre fi Marco
        type: person
      - name: Santrafew
        type: place
      - name: Mastoisèt
        type: polity

  - category: event
    claim: "Immigration into Santrafew spiked dramatically in the 1820s N, in the aftermath of the Second German War, with newcomers arriving in greatest numbers from Barcelon and Lombardy."
    entities:
      - name: Santrafew
        type: place
      - name: Second German War
        type: event
      - name: Barcelon
        type: polity
      - name: Lombardy
        type: polity
    dates: "1820s N"

  - category: technology
    claim: "By the 1930s N, Santrafew had sufficiently-fast Atlantic communication that papers such as Fiellas Dimenja could be published simultaneously there and in Vascony."
    entities:
      - name: Santrafew
        type: place
    dates: "1930s N"

  - category: person
    claim: "Alexandre fi Marco (fl. late 17th c. N) was the mayor of Santrafew responsible for the exile of Mendevan peoples from the vicinity of the town."
    entities:
      - name: Alexandre fi Marco
        type: person
      - name: Santrafew
        type: place
    dates: "fl. late 17th c. N"

  - category: person
    claim: "Sauveir d'Orz (fl. 1620–26 N) was a town mayor of Santrafew, remembered only for his impotence."
    entities:
      - name: Sauveir d'Orz
        type: person
      - name: Santrafew
        type: place
    dates: "fl. 1620–26 N"

  - category: person
    claim: "Carol Zancoud (d. 1630 N) was a reverend who accrued paramount but unofficial political power over Santrafew."
    entities:
      - name: Carol Zancoud
        type: person
      - name: Santrafew
        type: place
    dates: "d. 1630 N"

  - category: person
    claim: "Nadàlla fi Carol (fl. 1590 N) was the daughter of Carol Zancoud, whose extensive diary has survived to the modern day and is a vital window into early life in Santrafew."
    entities:
      - name: "Nadàlla fi Carol"
        type: person
      - name: Carol Zancoud
        type: person
    dates: "fl. 1590 N"
    relationships:
      - type: parent
        from: "Carol Zancoud"
        to: "Nadàlla fi Carol"

  - category: work
    claim: "'The Making of Mendeva' is a notoriously inaccurate popular history account written by In mac Harlach in 1888 N."
    entities:
      - name: "The Making of Mendeva"
        type: work
      - name: In mac Harlach
        type: person
    dates: "1888 N"

  - category: work
    claim: "'Physician, Heal Thyself: The First Century of Santrafew' (originally in Borlish: 'Medic, Cur Tey : Y Preu Siecr a Santrafeu') focuses mostly on diary extracts from various Santrafew settlers."
    entities:
      - name: "Physician, Heal Thyself: The First Century of Santrafew"
        type: work
