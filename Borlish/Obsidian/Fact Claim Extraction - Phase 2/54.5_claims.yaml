entry: 54.5
title: "Medieval Mathematics"
claims:
  - category: person
    claim: "Nadim of Trapoles (fl. c. 12th c. N) was a mathematician at the Observatory in Trapoles."
    entities:
      - name: Nadim of Trapoles
        type: person
      - name: Trapoles
        type: place
    dates: "fl. c. 12th c. N"

  - category: place
    claim: "Trapoles was a major Middlesea port for the Single Caliphate during the Second Tetrarchy."
    entities:
      - name: Trapoles
        type: place
      - name: Single Caliphate
        type: polity

  - category: person
    claim: "Nadim of Trapoles formulated the Trapolitan identity, which allows one to multiply two quantities using only addition, subtraction, and arrhumb tables."
    entities:
      - name: Nadim of Trapoles
        type: person
      - name: Trapolitan identity
        type: concept

  - category: person
    claim: "Jambor of Hungary (fl. c. 12th c. N) was an early king of Hungary, following Hungary's succession from a principality the century before."
    entities:
      - name: Jambor of Hungary
        type: person
      - name: Hungary
        type: polity
    dates: "fl. c. 12th c. N"

  - category: person
    claim: "Jambor of Hungary oversaw significant expansion of Awrish influence, entering into personal union with eastern principalities such as Halich and Vallack."
    entities:
      - name: Jambor of Hungary
        type: person
      - name: Halich
        type: polity
      - name: Vallack
        type: polity

  - category: person
    claim: "Jambor of Hungary became an ally of the Malchassian Romans to the south."
    entities:
      - name: Jambor of Hungary
        type: person
      - name: Malchassian Romans
        type: polity

  - category: place
    claim: "The great Library of Sobjan was built during the reign of Jambor of Hungary."
    entities:
      - name: Library of Sobjan
        type: place
      - name: Jambor of Hungary
        type: person

  - category: place
    claim: "The Library of Sobjan is an enduring gravatory of contemporary works, including mathematical texts from the Single Caliphate translated into Latin."
    entities:
      - name: Library of Sobjan
        type: place
      - name: Single Caliphate
        type: polity

  - category: place
    claim: "Saint Marinus (Italian: San Marino) is a historical city in the Italian state of Lombardy."
    entities:
      - name: Saint Marinus
        type: place
      - name: Lombardy
        type: polity

  - category: organisation
    claim: "The Autonome University of Saint Marinus was founded in the eleventh century and is one of the oldest still-running educational establishments in the world."
    entities:
      - name: Autonome University
        type: organisation
      - name: Saint Marinus
        type: place
    dates: "11th c. N"

  - category: place
    claim: "The Sovereign Library is in Saint Marinus, on the slopes of Titan."
    entities:
      - name: Sovereign Library
        type: place
      - name: Saint Marinus
        type: place
      - name: Titan
        type: place

  - category: event
    claim: "Scholars of the Autonome University were among the first to translate mathematical texts from Arabic into Latin."
    entities:
      - name: Autonome University
        type: organisation
      - name: Saint Marinus
        type: place

  - category: work
    claim: "In 1216 N, scholars of the Autonome University compiled a liber numerorum containing the earliest-known enumeration of arrhumb values in Europe."
    entities:
      - name: Autonome University
        type: organisation
      - name: Saint Marinus
        type: place
    dates: "1216 N"

  - category: place
    claim: "A copy of the 1216 liber numerorum survives at the Library of Sobjan."
    entities:
      - name: Library of Sobjan
        type: place
      - name: Saint Marinus
        type: place

  - category: person
    claim: "Jovanna Ariperto (fl. 1998 N) is a deixist researcher at the Autonome University of Saint Marinus."
    entities:
      - name: Jovanna Ariperto
        type: person
      - name: Autonome University
        type: organisation
    dates: "fl. 1998 N"

  - category: person
    claim: "Dijaca Rofotto (fl. 1997 N) is a historian of medieval religion for the Sovereign Library."
    entities:
      - name: Dijaca Rofotto
        type: person
      - name: Sovereign Library
        type: place
    dates: "fl. 1997 N"

  - category: person
    claim: "Lluprando da Treviso (fl. 1491 N) was an engineer at the Sovereign Library, remembered for his work on the augrim of mozate forms."
    entities:
      - name: Lluprando da Treviso
        type: person
      - name: Sovereign Library
        type: place
    dates: "fl. 1491 N"
