entry: 46.5
title: "Channels"
claims:
  - category: place
    claim: "The Rustigh Strait (Borlish: Naur Rustig) is the channel of water separating the southern coast of Borland from the northern coasts of Flanders and Willemy."
    entities:
      - name: Rustigh Strait
        type: place
      - name: Borland
        type: place
      - name: Flanders
        type: place
      - name: Willemy
        type: polity

  - category: language
    claim: "The Borlish name for the Rustigh Strait, Naur Rustig, literally means 'calm strait'."
    entities:
      - name: Rustigh Strait
        type: place

  - category: language
    claim: "The Frisian name for the Rustigh Strait is Nao Rustig."
    entities:
      - name: Rustigh Strait
        type: place

  - category: economics
    claim: "Coastal cities on the Rustigh Strait such as Axbane and Amstel were natural stopping points for ships trading between Dane lands and the Welsh and Vascon trade meshes."
    entities:
      - name: Rustigh Strait
        type: place
      - name: Axbane
        type: place
      - name: Amstel
        type: place

  - category: event
    claim: "During and following the Albic Wars of Fealty, British communities of immigrants spread along cities on both sides of the Rustigh Strait, such as Pentrose."
    entities:
      - name: Wars of Fealty
        type: event
      - name: Rustigh Strait
        type: place
      - name: Pentrose
        type: place

  - category: technology
    claim: "In the 1830s N, an air-steeple connection was established across the Rustigh Strait from Nausçod on Borland to Laicouche (now Lagcóch) in French Guillenne."
    entities:
      - name: steeplepost
        type: technology
      - name: Nausçod
        type: place
      - name: Laicouche
        type: place
      - name: Borland
        type: place
    dates: "1830s N"

  - category: technology
    claim: "The Rustigh Strait air-steeple was superseded in 1854 N by an undersea barrick cable."
    entities:
      - name: steeplepost
        type: technology
      - name: Rustigh Strait
        type: place
    dates: "1854 N"

  - category: terminology
    claim: "Methodics is the field of study pertaining to the discovery, development, and improvement of methods."
    entities:
      - name: methodics
        type: concept

  - category: terminology
    claim: "In the context of methodics, a method is any series of instructions that may be unambiguously and repeatably followed to produce some result."
    entities:
      - name: methodics
        type: concept

  - category: culture
    claim: "An early method in the historical record is Euclid's procedure for finding the coarsest scale common to two whole numbers."
    entities:
      - name: Euclid
        type: person

  - category: person
    claim: "Nadim developed a method for multiplication using tables of pre-computed values based on the Trapolitan identity for arrhumb."
    entities:
      - name: Nadim
        type: person

  - category: glossary
    claim: "Arrhumb is the Boralverse term for cosine."
    entities:
      - name: arrhumb
        irl: cosine
        type: concept

  - category: technology
    claim: "By the sixteenth century, the threepoint method for calculating distances was vital in creating accurate maps for the explorations of the Intertwining Century."
    entities:
      - name: Intertwining Century
        type: period
    dates: "16th c. N"

  - category: glossary
    claim: "The threepoint method is the Boralverse term for triangulation."
    entities:
      - name: threepoint method
        irl: triangulation
        type: concept

  - category: work
    claim: "Rachel Desselut's 1743 N work 'Parable of the Mute Bookbinder' was one of the first major results in abstract methodics."
    entities:
      - name: "Parable of the Mute Bookbinder"
        type: work
      - name: Rachel Desselut
        type: person
    dates: "1743 N"

  - category: work
    claim: "'Parable of the Mute Bookbinder' argued that in order for living matter to duplicate, it must contain within itself an explicit method describing its construction."
    entities:
      - name: "Parable of the Mute Bookbinder"
        type: work
      - name: Rachel Desselut
        type: person

  - category: work
    claim: "Although heredian acid would not be discovered for another century, 'Parable of the Mute Bookbinder' accurately predicted the necessary separation of Form and Method that became the bedrock of the study of heredity."
    entities:
      - name: "Parable of the Mute Bookbinder"
        type: work
      - name: Rachel Desselut
        type: person

  - category: glossary
    claim: "Heredian acid is the Boralverse term for DNA."
    entities:
      - name: heredian acid
        irl: DNA
        type: concept

  - category: technology
    claim: "From the eighteenth century onwards, an increasingly important category of method has been procedures for encrypting text, either to conceal it or to convert it into a suitable form for a given steeplepost."
    entities:
      - name: steeplepost
        type: technology

  - category: work
    claim: "'Drawing in the Sand: the History of Calculation' is a collaborative reference book originally published in 1954 N in Napolitan as 'Scheme ne Rene: a Storia d'Amiradanza' by the Agenza Scholaria Fodgesa."
    entities:
      - name: "Drawing in the Sand: the History of Calculation"
        type: work
      - name: Agenza Scholaria Fodgesa
        type: organisation
    dates: "1954 N"
