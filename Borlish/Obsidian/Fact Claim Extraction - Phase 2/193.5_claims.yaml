entry: 193.5
title: "Aqueous Axton"
claims:
  - category: place
    claim: "Axton (Parisian French Grand-Aix; Willem Dutch Aughen) is a major city in Willemy and the municipal centre of the region of Avosche, located on the Worm river."
    entities:
      - name: Axton
        type: place
      - name: Willemy
        type: polity
      - name: Avosche
        type: place

  - category: glossary
    claim: "Axton is the Boralverse name for Aachen."
    entities:
      - name: Axton
        irl: Aachen
        type: place

  - category: glossary
    claim: "Rudder is the Boralverse name for the Rur river."
    entities:
      - name: Rudder
        irl: Rur
        type: place

  - category: glossary
    claim: "Maze is the Boralverse name for the Meuse river."
    entities:
      - name: Maze
        irl: Meuse
        type: place

  - category: language
    claim: "The name Axton derives from post-Classical German *Ākā, from Latin aqua 'water', in reference to local thermal springs; French gained the descriptor grand- to distinguish it from other towns named Aix for bathing waters."
    entities:
      - name: Axton
        type: place

  - category: person
    claim: "Roger Nassow, first duke of Avosche in the early sixteenth century, oversaw construction of the Nassow palace complex in the foothills of the Eiffel range overlooking Axton."
    entities:
      - name: Roger Nassow
        type: person
      - name: Axton
        type: place
    dates: "early 16th c. N"

  - category: event
    claim: "Axton grew dramatically into an industry town around the turn of the nineteenth century and through the Global Workshop period, enabled by the advent of freight transport by convoy since the local rivers are not navigable by large ships."
    entities:
      - name: Axton
        type: place
    dates: "c. 1800 N"

  - category: person
    claim: "Nicolas Defechet (also Niclás de Feght) was a mathematician associated with the Axton Benet School."
    entities:
      - name: Nicolas Defechet
        type: person
      - name: Axton Benet School
        type: organisation
