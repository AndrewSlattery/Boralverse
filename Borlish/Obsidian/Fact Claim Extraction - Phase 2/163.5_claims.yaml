entry: 163.5
title: "Like Oil and Water"
claims:
  - category: glossary
    claim: "Psolic aphlox is the Boralverse term for carbon monoxide."
    entities:
      - name: psolic aphlox
        irl: carbon monoxide
        type: concept

  - category: glossary
    claim: "Aphlox is the Boralverse term for carbon dioxide."
    entities:
      - name: aphlox
        irl: carbon dioxide
        type: concept

  - category: glossary
    claim: "Ignifex is the Boralverse term for oxygen."
    entities:
      - name: ignifex
        irl: oxygen
        type: concept

  - category: glossary
    claim: "Acid oil palacy is the Boralverse term for oxalic acid."
    entities:
      - name: acid oil palacy
        irl: oxalic acid
        type: concept

  - category: language
    claim: "Psolic aphlox's modern name, first used in 1854, comprises psolic meaning 'deoxygenated' from Greek psólos 'soot, smoke', and aphlox meaning 'carbon dioxide' from Greek ăphlóx 'without flame'."
    entities:
      - name: psolic aphlox
        type: concept
    dates: "first used 1854 N"

  - category: event
    claim: "Psolic aphlox was isolated from acid oil palacy during the Long Peace period at the turn of the nineteenth century."
    entities:
      - name: psolic aphlox
        type: concept
    dates: "c. 1800 N"

  - category: glossary
    claim: "The Graven Sea is the Boralverse name for the Baltic Sea."
    entities:
      - name: Graven Sea
        irl: Baltic Sea
        type: place

  - category: language
    claim: "The name Graven Sea derives from Scholastic Latin Gravinia, backformed from gravinicus, itself a minim scribal error from granvicus, a borrowing of Old Norse Gandvik; the archaic synonym Eastmere is a calque from German language names."
    entities:
      - name: Graven Sea
        type: place

  - category: glossary
    claim: "Frise is the Boralverse term for Frisian."
    entities:
      - name: Frise
        irl: Frisian
        type: concept

  - category: work
    claim: "'A Baptism of Fire: Christianity and the Graven' (1988) by Agata Naziunas, published by Leidéiai Givatés, chronicles the Christianisation of the states and peoples on the Graven Sea's coasts, with a focus on Lithow."
    entities:
      - name: "A Baptism of Fire: Christianity and the Graven"
        type: work
      - name: Agata Naziunas
        type: person
      - name: Lithow
        type: place
    dates: "1988 N"
