entry: 106.5
title: "Axbane"
claims:
  - category: place
    claim: "Axbane is a major city on the southwest coast of Borland, located at the narrowest part of the Rustigh Strait, less than twenty leagues from Willemy on mainland Europe."
    entities:
      - name: Axbane
        type: place
      - name: Borland
        type: place
      - name: Rustigh Strait
        type: place
      - name: Willemy
        type: polity

  - category: language
    claim: "Both the Merch name Axbane and the Borlish name Ausbagn descend from the dative case of the Latin name Aquīs Balneīs, meaning 'to the bathing waters'."
    entities:
      - name: Axbane
        type: place

  - category: glossary
    claim: "Aughen is the Boralverse name for Aachen."
    entities:
      - name: Aughen
        irl: Aachen
        type: place

  - category: place
    claim: "As a Roman city, Axbane was home to an extensive bathhouse complex, for which the city is named."
    entities:
      - name: Axbane
        type: place

  - category: event
    claim: "With the German migrations of the early medieval period, Axbane was demoted to a minor port in the Anglian kingdom of Sothbar."
    entities:
      - name: Axbane
        type: place
      - name: Sothbar
        type: polity

  - category: event
    claim: "The Jacobin Fraternity erected the Peninsular Monastery in Axbane after fleeing there in 1067 following a popular uprising against Drengot Emperor Geoffrey II in Flanders."
    entities:
      - name: Jacobin Fraternity
        type: organisation
      - name: Axbane
        type: place
      - name: Geoffrey II
        type: person
    dates: "1067 N"

  - category: place
    claim: "By the late twelfth century Axbane was the de facto seat of the County of Sothbar; by 1190 Count Steven resided year-round in the coastal town."
    entities:
      - name: Axbane
        type: place
      - name: Sothbar
        type: place
      - name: Steven
        type: person
    dates: "1190 N"

  - category: event
    claim: "The Great Flie Flood of 1171 swept away much of Lower Frisland, making Axbane the obvious choice of harbour for traders moving between Danish lands and the Drengot domain and Spain for several decades."
    entities:
      - name: Great Flie Flood
        type: event
      - name: Axbane
        type: place
    dates: "1171 N"

  - category: economics
    claim: "Axbane eventually became one of the star cities of the Corvine Concert, an association of mercantile cities in the region."
    entities:
      - name: Axbane
        type: place
      - name: Corvine Concert
        type: organisation

  - category: economics
    claim: "The throughput of the Axbane port accounted for over a third of European trade outside the Middlesea by 1400 N."
    entities:
      - name: Axbane
        type: place
    dates: "c. 1400 N"

  - category: economics
    claim: "The late fourteenth century saw Axbane develop a particularly close relationship with Bremen."
    entities:
      - name: Axbane
        type: place
      - name: Bremen
        type: place
    dates: "late 14th c. N"

  - category: technology
    claim: "In the 1850s, Axbane was connected to Texel in Willemy by one of the world's first undersea barric steeplepost lines."
    entities:
      - name: Axbane
        type: place
      - name: Willemy
        type: polity
    dates: "1850s N"

  - category: work
    claim: "'The Secret Guide to Axbane' (Borlish: 'Y Gið Scos por Ausbagn', first published 1962) was published on behalf of the Maglen Formeuç Caritativia as part of a series of tourist guidebooks for cities along both coasts of the Rustigh Strait."
    entities:
      - name: "The Secret Guide to Axbane"
        type: work
      - name: Maglen Formeuç Caritativia
        type: organisation
    dates: "1962 N"
