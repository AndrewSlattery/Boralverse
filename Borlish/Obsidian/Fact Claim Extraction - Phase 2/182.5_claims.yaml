entry: 182.5
title: "Writing in the 1880s"
claims:
  - category: work
    claim: "'Pasti Mezziterreni' (1880) is a mealbook by Josforo Sant'Angelo of Tuscany documenting a journey along the Middlesea coast from Tarifa in Andalus to X̀r l Joas in Morrack; a bilingual Kernish-Wessern version was published by Iscombe Editors in 1892."
    entities:
      - name: "Pasti Mezziterreni"
        type: work
      - name: Josforo Sant'Angelo
        type: person
    dates: "1880 N"

  - category: glossary
    claim: "X̀r l Joas is the Boralverse name for Ksar es-Seghir, Morocco."
    entities:
      - name: "X̀r l Joas"
        irl: "Ksar es-Seghir, Morocco"
        type: place

  - category: glossary
    claim: "Andalus is the Boralverse name for Andalusia."
    entities:
      - name: Andalus
        irl: Andalusia
        type: place

  - category: work
    claim: "'Cludor ncar Vantel' ('A Postman in Wrexham') (1882) is a parachthon trevold about a postman trapped in a time loop; it is the origin of the Welsh phrase speid dolenu meaning 'time loop', calqued into Borlish as liesc bouclant."
    entities:
      - name: "Cludor ncar Vantel"
        type: work
    dates: "1882 N"

  - category: work
    claim: "'Dug y Gilfah Dowł' ('The Duke of Dark Corners') (1884) by Taguen ah Owain is a historical parachthon set in the twelfth century, depicting a fictitious tetrad of empires ruled from Damvath, Florence, Tanger, and Kiew."
    entities:
      - name: "Dug y Gilfah Dowł"
        type: work
      - name: Taguen ah Owain
        type: person
    dates: "1884 N"

  - category: glossary
    claim: "Tanger is the Boralverse name for Tangier."
    entities:
      - name: Tanger
        irl: Tangier
        type: place

  - category: work
    claim: "'L'Aragn' ('The Spider') (1887) by Osctra Jeichey is a play about a group of people manipulated by a genius mastermind whose plots collapse dramatically; the 1930 New Provincial version 'La Rogna' is a loose retelling with sex-swapped characters and tovaric subtext."
    entities:
      - name: "L'Aragn"
        type: work
      - name: Osctra Jeichey
        type: person
    dates: "1887 N"

  - category: work
    claim: "'Monstres per Mans' ('Man-Made Monsters') was a serial parachthon and fright work first published in 1888 by Carmel fi Domenc; it ran until 1903 in the Santrafew periodical Arcans Exumaz ('Revealed Mysteries'), co-owned with her brother Jered."
    entities:
      - name: "Monstres per Mans"
        type: work
      - name: Carmel fi Domenc
        type: person
      - name: "Arcans Exumaz"
        type: work
    dates: "1888–1903 N"

  - category: work
    claim: "'Murro Mendeva' ('The Making of Mendeva') (1888) by In mac Harlach is a historical textbook that has been criticised as an inaccurate polemic against integration with the original Mendevan peoples, revealing a resentful bloc in Britain opposed to the rise of Hasiny."
    entities:
      - name: "Murro Mendeva"
        type: work
      - name: In mac Harlach
        type: person
    dates: "1888 N"
