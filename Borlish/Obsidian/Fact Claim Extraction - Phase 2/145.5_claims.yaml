entry: 145.5
title: "Furlain"
claims:
  - category: place
    claim: "Furlain is a polity in northeast Italy whose principal cities are Verona and Odin."
    entities:
      - name: Furlain
        type: polity
      - name: Verona
        type: place
      - name: Odin
        type: place

  - category: glossary
    claim: "Furlain is the Boralverse name for Friuli."
    entities:
      - name: Furlain
        irl: Friuli
        type: polity

  - category: glossary
    claim: "Odin is the Boralverse name for Udine."
    entities:
      - name: Odin
        irl: Udine
        type: place

  - category: place
    claim: "Furlain borders Lombardy, Bavarn, Crain, and Venise."
    entities:
      - name: Furlain
        type: polity
      - name: Lombardy
        type: polity
      - name: Bavarn
        type: polity
      - name: Crain
        type: polity
      - name: Venise
        type: polity

  - category: event
    claim: "During the Second Tetrarchy, the March of Furlain was under the German Empire and later passed to Bavarn."
    entities:
      - name: Furlain
        type: polity
      - name: German Empire
        type: polity
      - name: Bavarn
        type: polity

  - category: event
    claim: "An earthquake in 1348 destroyed the castle and cathedral of Odin; this event provides the first attestation of the Borlish word quagment, meaning earthquake."
    entities:
      - name: Odin
        type: place
      - name: Furlain
        type: polity
    dates: "1348 N"

  - category: language
    claim: "The Borlish word quagment, meaning earthquake, is first attested in a record of the 1348 Odin earthquake."
    entities:
      - name: quagment
        type: concept
    dates: "1348 N"

  - category: culture
    claim: "An armourcloth fashion trend spread during the Long Peace in the late eighteenth century; the associated term is voinacciale."
    entities:
      - name: Furlain
        type: polity
    dates: "late 18th c. N"

  - category: event
    claim: "Furlain fought in the Second German War (1815–23), including the Battle of Hulm in 1821 alongside Borland."
    entities:
      - name: Furlain
        type: polity
      - name: Second German War
        type: event
      - name: Battle of Hulm
        type: event
      - name: Borland
        type: polity
    dates: "1815–1823 N; Battle of Hulm: 1821 N"

  - category: person
    claim: "Chiarina Bruno (fl. 1824) was a composer from Furlain who wrote the opera 'Wings Afire'."
    entities:
      - name: Chiarina Bruno
        type: person
      - name: "Wings Afire"
        type: work
    dates: "fl. 1824 N"

  - category: person
    claim: "Jacomo Bruno (fl. 1821) was a soldier from Furlain and the twin of Chiarina Bruno."
    entities:
      - name: Jacomo Bruno
        type: person
      - name: Chiarina Bruno
        type: person
    relationships:
      - type: twin
        from: "Jacomo Bruno"
        to: "Chiarina Bruno"
    dates: "fl. 1821 N"
