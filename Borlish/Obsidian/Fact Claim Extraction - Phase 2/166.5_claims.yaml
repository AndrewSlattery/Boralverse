entry: 166.5
title: "The North Wind and the Sun"
claims:
  - category: organisation
    claim: "The Borrhatic League is a collection of charitable organisations and political action groups with a focus on laic governance, education, pacifism, and objection; it grew from collaboration between working-class groups of minority faiths across Northern Europe in the early nineteenth century."
    entities:
      - name: Borrhatic League
        type: organisation
    dates: "early 19th c. N"

  - category: language
    claim: "The Borrhatic League takes its name from Attic Greek Borrhâs meaning 'the North Wind'."
    entities:
      - name: Borrhatic League
        type: organisation

  - category: event
    claim: "The Borrhatic League first rose to prominence on the scale of polities during the Second German War of the 1820s and its aftermath; Hilgart and Michael Bervisson were influential in Borland's Borrhatic League at this time, especially regarding calls for religious tolerance."
    entities:
      - name: Borrhatic League
        type: organisation
      - name: Hilgart Bervisson
        type: person
      - name: Michael Bervisson
        type: person
      - name: Second German War
        type: event
    dates: "1820s N"

  - category: event
    claim: "Both the Borrhatic League and the Deviance movement contributed to the 1850 Laic Declarations in Belgrade."
    entities:
      - name: Borrhatic League
        type: organisation
      - name: Deviance
        type: period
    dates: "1850 N"

  - category: organisation
    claim: "In the late nineteenth century the Borrhatic League funded orphanages and schools including the Borrhatic School of History in the south-eastern Borlish city of Combert."
    entities:
      - name: Borrhatic League
        type: organisation
      - name: Borrhatic School of History
        type: organisation
      - name: Combert
        type: place
    dates: "late 19th c. N"

  - category: work
    claim: "'I Macchine di Helio' ('The Machines of Helios') is a marble sculpture created by Lorenzo dell'Acchedia in the 1550s in Rome during the Revitalist period; it depicts the god Helios with the six known planets gyring around him."
    entities:
      - name: "I Macchine di Helio"
        type: work
      - name: Lorenzo dell'Acchedia
        type: person
    dates: "1550s N"

  - category: person
    claim: "Martèl fi Bacchero was a mathematician at the library of Saint Jerome and a close friend of Lorenzo dell'Acchedia who debated the notion of a Sun-centred cosmos in public fora as early as 1552."
    entities:
      - name: Martèl fi Bacchero
        type: person
    dates: "fl. 1552 N"
