entry: "20.5"
title: "A University, and Twins"
claims:
  - category: organisation
    claim: "The New Vithor University is a major academic institution located in the Borlish city of Vithor."
    entities:
      - name: "New Vithor University"
        type: organisation
      - name: "Vithor"
        type: place

  - category: organisation
    claim: "The Borlish name of the New Vithor University is 'Nou Universtaða Viðor'."
    entities:
      - name: "New Vithor University"
        type: organisation

  - category: organisation
    claim: "The Vithor New School had been founded by the fifteenth century."
    entities:
      - name: "Vithor New School"
        type: organisation
    dates: ["by 15th century"]

  - category: organisation
    claim: "By the nineteenth century the Vithor New School was known under the name 'New Vithor University'."
