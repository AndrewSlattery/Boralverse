entry: 104.5
title: "An Authorial Assortment"
claims:
  - category: person
    claim: "Olexi Harchenko (fl. 19th c.) was a Zahid Russian author from the city of Boxa."
    entities:
      - name: Olexi Harchenko
        type: person
      - name: Boxa
        type: place
    dates: "fl. 19th c. N"

  - category: work
    claim: "Olexi Harchenko wrote the widely-translated mystery work Разгадто (Dénouement), whose title was borrowed into Italian as rasgatto 'resolution, unravelling of a mystery'."
    entities:
      - name: "Разгадто"
        type: work
      - name: Olexi Harchenko
        type: person

  - category: culture
    claim: "Zahid Russians are a Slavic ethnic group present in the northern Balkans and descended from westward-migrating immigrant communities."
    entities:
      - name: Zahid Russians
        type: concept

  - category: glossary
    claim: "Boxa is approximately the Boralverse name for Novi Sad, Serbia."
    entities:
      - name: Boxa
        irl: Novi Sad
        type: place

  - category: person
    claim: "Thoffina'h Girmont (fl. 2005) is a British author."
    entities:
      - name: "Thoffina'h Girmont"
        type: person
      - name: Britain
        type: polity
    dates: "fl. 2005 N"

  - category: work
    claim: "Thoffina'h Girmont wrote the Arthurian romance 'Y Ðreic o Redrɯth' (The Dragon of Redrouth), loosely based on tales codified in eleventh-century England and reworked in post-Imperia Wales, but owing much to Long Peace period reimaginings."
    entities:
      - name: "Y Ðreic o Redrɯth"
        type: work
      - name: "Thoffina'h Girmont"
        type: person

  - category: person
    claim: "Heudar Fiðaut (fl. 14th c.) was a Borlish writer who is an important source of vernacular Middle Borlish texts."
    entities:
      - name: Heudar Fiðaut
        type: person
    dates: "fl. 14th c. N"

  - category: work
    claim: "Heudar Fiðaut's most famous work is 'Catreðejnt Lagrem' (Twenty-four Laments); his works together contain many first attestations of Borlish words."
    entities:
      - name: "Catreðejnt Lagrem"
        type: work
      - name: Heudar Fiðaut
        type: person

  - category: person
    claim: "Tanasio Capretti (fl. 1970) was a theologian and humanist at the University of Florence."
    entities:
      - name: Tanasio Capretti
        type: person
      - name: University of Florence
        type: organisation
    dates: "fl. 1970 N"

  - category: work
    claim: "Tanasio Capretti wrote 'L'Inclusion Deviante di Conti Polari' (The Deviance Incorporation of Folk Tales, 1970) to commemorate the 120th anniversary of the 1850 Laic Declarations of Belgrade."
    entities:
      - name: "L'Inclusion Deviante di Conti Polari"
        type: work
      - name: Tanasio Capretti
        type: person
    dates: "1970 N"

  - category: person
    claim: "Yollamaniza Elcabir (fl. 1943) was a Mashick author and one-time spy."
    entities:
      - name: Yollamaniza Elcabir
        type: person
    dates: "fl. 1943 N"

  - category: work
    claim: "Yollamaniza Elcabir wrote the spycraft novel 'La te Hozuho Sineton' (No Slumber Will Seize Him, 1943), partly based on his own experiences in the aftermath of the Lovac Wars and the bombing of his home city of Moshtar."
    entities:
      - name: "La te Hozuho Sineton"
        type: work
      - name: Yollamaniza Elcabir
        type: person
      - name: Moshtar
        type: place
    dates: "1943 N"

  - category: glossary
    claim: "Moshtar is approximately the Boralverse name for San Francisco."
    entities:
      - name: Moshtar
        irl: San Francisco
        type: place

  - category: glossary
    claim: "Gulf Mendeva is approximately the Boralverse term for the Mexico Gulf states."
    entities:
      - name: Gulf Mendeva
        irl: Mexico Gulf states
        type: place
