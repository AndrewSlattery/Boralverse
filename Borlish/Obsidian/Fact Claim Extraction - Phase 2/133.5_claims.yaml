entry: 133.5
title: "Chemical Etymology (cont.)"
source_work: "Veriloquace Glossary of Alchemy (Rotcham University Primers)"
claims:
  - category: glossary
    claim: "Athimar is the Boralverse term for antimony."
    entities:
      - name: athimar
        irl: antimony
        type: concept

  - category: language
    claim: "Athimar was adopted around 1400 from Scholastic Latin athimāris, from Arabic 'ithmid; it was originally used for the mineral ore (coholl/sulphide), and applied to the element itself since the eighteenth century."
    entities:
      - name: athimar
        type: concept
    dates: "c. 1400 N; applied to element: 18th c. N"

  - category: glossary
    claim: "Coholl is the Boralverse term for sulphide."
    entities:
      - name: coholl
        irl: sulphide
        type: concept

  - category: language
    claim: "Coholl was coined in 1610 from Vascon cohol 'coholl of athimar (stibnite),' from Arabic kuḥl 'eye-black'; the term was generalised to all metal sulphide compounds by Zaravcar in the late eighteenth century."
    entities:
      - name: coholl
        type: concept
      - name: Zaravcar
        type: person
    dates: "1610 N; generalized late 18th c. N"

  - category: glossary
    claim: "Machovine is the Boralverse term for strontium."
    entities:
      - name: machovine
        irl: strontium
        type: concept

  - category: language
    claim: "Machovine was coined in 1789 from Scholastic Latin machovīnus, from Machov, the town in Poland where the element was first isolated from nearby mine ore."
    entities:
      - name: machovine
        type: concept
      - name: Machov
        type: place
    dates: "1789 N"

  - category: glossary
    claim: "Maschale is the Boralverse term for propionic acid."
    entities:
      - name: maschale
        irl: propionic acid
        type: concept

  - category: language
    claim: "Maschale was coined in 1850 from Scholastic Latin maschāle, from Greek maskhálē 'armpit,' after the substance's presence in human sweat as produced by skin zoia."
    entities:
      - name: maschale
        type: concept
    dates: "1850 N"

  - category: glossary
    claim: "Acid oil is the Boralverse term for carboxylic acid."
    entities:
      - name: acid oil
        irl: carboxylic acid
        type: concept

  - category: glossary
    claim: "Spine is the Boralverse term for a carbon chain (in chemistry)."
    entities:
      - name: spine
        irl: carbon chain
        type: concept

  - category: glossary
    claim: "Zoia is the Boralverse term for microorganisms."
    entities:
      - name: zoia
        irl: microorganisms
        type: concept

  - category: glossary
    claim: "Ash is the Boralverse term for carbonate (in chemistry)."
    entities:
      - name: ash
        irl: carbonate
        type: concept

  - category: glossary
    claim: "Brimstone is the Boralverse term for sulphur."
    entities:
      - name: brimstone
        irl: sulphur
        type: concept
