entry: 153.5
title: "Maritime Cards"
source_work: "Crossing the Rubicon: a Hidden History of Games (Y Rubicon Trasir: un Stoir Scos de Joy, 1982)"
claims:
  - category: work
    claim: "'Crossing the Rubicon: a Hidden History of Games' (1982) was written by Jonnovar Meyaunot, originally in Borlish as 'Y Rubicon Trasir: un Stoir Scos de Joy'; she later became famous as a humourist and sobot host of documentaries and quiz games."
    entities:
      - name: "Crossing the Rubicon: a Hidden History of Games"
        type: work
      - name: Jonnovar Meyaunot
        type: person
    dates: "1982 N"

  - category: glossary
    claim: "Willemy is the Boralverse name for Lotharingia."
    entities:
      - name: Willemy
        irl: Lotharingia
        type: polity

  - category: terminology
    claim: "The Maritime deck is a set of fifty cards organised into five ensigns (suits) and three colours—gold, bucklers, staves, jewels, and arrows—originating in fifteenth-century Poland."
    entities:
      - name: Maritime deck
        type: concept
    dates: "15th c. N"

  - category: terminology
    claim: "In Maritime card games, ensign is the term for suit; the gold ensign typically trumps the others."
    entities:
      - name: Maritime deck
        type: concept

  - category: culture
    claim: "Many Maritime cards have conventional titles separate to their rank; for example, the deuce of staves is called the Duel and the sept of jewels is known as the Stars."
    entities:
      - name: Maritime deck
        type: concept

  - category: culture
    claim: "The use of the Maritime deck for divination was popularised by Promethean clubs associated with the Deviance movement, specifically the Winchester group, in the early nineteenth century."
    entities:
      - name: Maritime deck
        type: concept
      - name: Deviance
        type: period
    dates: "early 19th c. N"

  - category: event
    claim: "The first description of a specific card game using the Maritime deck appears in 1555 court records regarding the gambling debts of Marc Levosclin."
    entities:
      - name: Maritime deck
        type: concept
      - name: Marc Levosclin
        type: person
    dates: "1555 N"
