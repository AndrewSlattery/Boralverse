entry: 171.5
title: "Novomundine Landfall"
claims:
  - category: event
    claim: "The Novomundine Landfall (Borlish: Abanc Novomondin) occurred in 1471 N when a ship on a New Navarre Enterprise fishing expedition sighted and made landfall on the island of Brasil, marking the start of prolonged contact between the Vetomund and the Novomund."
    entities:
      - name: Novomundine Landfall
        type: event
      - name: New Navarre Enterprise
        type: organisation
    dates: "1471 N"

  - category: glossary
    claim: "Brasil is the Boralverse name for Newfoundland."
    entities:
      - name: Brasil
        irl: Newfoundland
        type: place

  - category: glossary
    claim: "Novomund is the Boralverse term for the Americas."
    entities:
      - name: Novomund
        irl: Americas
        type: place

  - category: period
    claim: "The first century following the Novomundine Landfall is known to historians as the Intertwining Century."
    entities:
      - name: Intertwining Century
        type: period

  - category: language
    claim: "The terms Novomund and Mendeva date to the Landfall voyage of 1471; a surviving map from the voyage is marked terrae mendevalensis after the Vask word mendeval meaning 'west'."
    entities:
      - name: Novomund
        type: place
      - name: Mendeva
        type: place
    dates: "1471 N"

  - category: event
    claim: "Following the Landfall, Munir al-Hamdawi of Morrack redirected his New World Company westward, leading to the discovery of the faster southern route to the Novomund and the islands of the Arcabil."
    entities:
      - name: Munir al-Hamdawi
        type: person
      - name: Morrack New World Company
        type: organisation

  - category: person
    claim: "Princess Alexandra of Vascony, elder sister of King Ambrose III, was the first Vetomundine royal to set foot in the Novomund; she visited the settlement of Paratzon in the 1490s."
    entities:
      - name: Alexandra
        type: person
      - name: Ambrose III
        type: person
      - name: Vascony
        type: polity
    relationships:
      - type: sibling
        from: "Alexandra"
        to: "Ambrose III"
    dates: "1490s N"

  - category: glossary
    claim: "Paratzon is the Boralverse name for St John's, Newfoundland."
    entities:
      - name: Paratzon
        irl: "St John's, NL"
        type: place

  - category: glossary
    claim: "Guy-coney is the Boralverse term for guinea pig."
    entities:
      - name: guy-coney
        irl: guinea pig
        type: concept

  - category: event
    claim: "Princess Alexandra's visit to Paratzon advanced understanding of scurvy; the chemical sandrine is named in her honour."
    entities:
      - name: Alexandra
        type: person
      - name: sandrine
        type: concept
    dates: "1490s N"
