entry: 55.5
title: "Portingale"
claims:
  - category: polity
    claim: "Portingale is a polity in the western part of the Spanish peninsula, bordering Vascony and Andalus."
    entities:
      - name: Portingale
        type: polity
      - name: Vascony
        type: polity
      - name: Andalus
        type: polity

  - category: polity
    claim: "Portingale had been established as an independent Christian kingdom in the eleventh century, having previously been a subordinate county in Leon."
    entities:
      - name: Portingale
        type: polity
      - name: Leon
        type: polity
    dates: "11th c. N"

  - category: event
    claim: "Much of northern Portingale was conquered by Vascony during the Vascon Ascendancy under Ambrose III, as far south as Braga and nominally Calès."
    entities:
      - name: Portingale
        type: polity
      - name: Vascony
        type: polity
      - name: Ambrose III
        type: person
      - name: Braga
        type: place
      - name: Calès
        type: place

  - category: economics
    claim: "The wealth that came to Vascony from the Novomundine Landfall of 1471 N accrued in particular to the coastal towns of conquered Portingale and to Leon."
    entities:
      - name: Portingale
        type: polity
      - name: Vascony
        type: polity
      - name: Leon
        type: polity
    dates: "after 1471 N"

  - category: event
    claim: "The rump Portingale in the south fell to Morrack in 1457 N as part of the expansionist campaigns of King Munir al-Hamdawi."
    entities:
      - name: Portingale
        type: polity
      - name: Morrack
        type: polity
      - name: Munir al-Hamdawi
        type: person
    dates: "1457 N"

  - category: event
    claim: "Portingale was ravaged early by the Second Great Dying in the years following 1519 N, with one fifth of the population dying within the decade."
    entities:
      - name: Portingale
        type: polity
      - name: Second Great Dying
        type: event
    dates: "after 1519 N"

  - category: event
    claim: "After military defeats in the Romantic Wars of the mid-seventeenth century, Vascony was forced to cede Portingale to Andalus."
    entities:
      - name: Portingale
        type: polity
      - name: Vascony
        type: polity
      - name: Andalus
        type: polity
    dates: "mid-17th c. N"

  - category: event
    claim: "Portingale initially attempted to remain neutral during the Democratic Wars of the eighteenth century, and received a large number of war refugees."
    entities:
      - name: Portingale
        type: polity
    dates: "18th c. N"

  - category: event
    claim: "The All-Saints' earthquake of 1755 N severely weakened Portingale's position."
    entities:
      - name: Portingale
        type: polity
    dates: "1755 N"

  - category: event
    claim: "Portingale's warring neighbours invaded it shortly after the All-Saints' earthquake of 1755 N."
    entities:
      - name: Portingale
        type: polity
    dates: "after 1755 N"

  - category: polity
    claim: "The Drengot Collusion eventually counted Portingale within its orbit during the first decades of the twentieth century."
    entities:
      - name: Portingale
        type: polity
      - name: Drengot Collusion
        type: polity
    dates: "early 20th c. N"

  - category: event
    claim: "The Portingale Anarchy of the 1920s and 30s N may have been partly the responsibility of the Drengot Collusion."
    entities:
      - name: Portingale
        type: polity
      - name: Drengot Collusion
        type: polity
    dates: "1920s–1930s N"

  - category: polity
    claim: "Portingale was never a full member of the Drengot Collusion."
    entities:
      - name: Portingale
        type: polity
      - name: Drengot Collusion
        type: polity

  - category: technology
    claim: "Drengot astraphor supplied much of the baric needs of Portingale via undersea powerline, relying on Vascon goodwill not to interfere."
    entities:
      - name: Portingale
        type: polity
      - name: Drengot Collusion
        type: polity
      - name: Vascony
        type: polity

  - category: technology
    claim: "In the 1950s and 60s N, Portingale became a pioneer of threshold force, building enough mills that by 1970 N it was exporting astraphor as far as Lombardy."
    entities:
      - name: Portingale
        type: polity
      - name: Lombardy
        type: polity
    dates: "1950s–1970 N"

  - category: place
    claim: "Braga is a town in Portingale renowned for a continent-leading lineball team and their 82,000-seat stadium."
    entities:
      - name: Braga
        type: place
      - name: Portingale
        type: polity

  - category: place
    claim: "Corunne is Portingale's northernmost city and home to the Roxa Comba, a weekly paper affiliated with the Peujon Rous media guild."
    entities:
      - name: Corunne
        type: place
      - name: Roxa Comba
        type: organisation
      - name: Peujon Rous
        type: organisation

  - category: person
    claim: "Eustace II (fl. c. 12th c. N, crowned 1151 N) was the longest-ruling monarch of Portingale."
    entities:
      - name: Eustace II
        type: person
      - name: Portingale
        type: polity
    dates: "crowned 1151 N"

  - category: person
    claim: "Marcio Dourao (fl. 1930 N) authored the lovetale 'Galatheo', which was banned in both Vascony and Morrack."
    entities:
      - name: Marcio Dourao
        type: person
      - name: Galatheo
        type: work
    dates: "fl. 1930 N"

  - category: person
    claim: "Victor Fidalgo (fl. 1950 N) is a collocker for the Roxa Comba."
    entities:
      - name: Victor Fidalgo
        type: person
      - name: Roxa Comba
        type: organisation
    dates: "fl. 1950 N"

  - category: person
    claim: "Maya Tavares (fl. 1950 N) is a political theorist for the de Sarumptice Diplomatic Edifice."
    entities:
      - name: Maya Tavares
        type: person
      - name: de Sarumptice Diplomatic Edifice
        type: organisation
    dates: "fl. 1950 N"
