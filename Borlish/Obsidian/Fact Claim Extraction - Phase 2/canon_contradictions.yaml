# Canon Contradictions — Boralverse Phase 2 Deduplication
# 23 contradictions requiring authorial resolution

contradictions:
- entity: Borland
  source_file: A_Borland_recs.yaml
  note: Entry 26.5 names the resulting administrative unit 'Diocese of Boral'; entry 195.5 names it 'Diocese of Borland'.
    These may be two different Borlish-language vs. English names for the same body, or one may be an error. Canon needs to
    clarify the correct English-language name.
  claims:
  - entry: '26.5'
    claim: After the Diocletian reforms, Borland's province became the Diocese of Boral.
  - entry: '195.5'
    claim: Diocletian's administrative reforms created the Diocese of Borland from the former Borlish province.
- entity: Borland
  source_file: A_Borland_recs.yaml
  note: Entry 26.5 dates the Hawkirch Surrender to 1632; entry 67.5 dates it to 1623. These cannot both be correct.
  claims:
  - entry: '26.5'
    claim: Borland's involvement in the Romantic Wars culminated in the Hawkirch Surrender of 1632.
  - entry: '67.5'
    claim: Borland's involvement in the Romantic Wars was restricted to a failed invasion culminating in the Hawkirch Surrender
      of 1623 N, along with unstable military aid arrangements with neighbouring polities.
- entity: Elsebeth Sneider
  source_file: B_Portingale_Borlish_ElsebethSneider_recs.yaml
  note: 'Entry 24.5 describes Sneider as "a pioneer of parachthon romance" and additionally "a pioneer of voidtale in particular",
    suggesting voidtale is a sub-genre of parachthon romance. Entry 28.5 likewise names her as pioneer of parachthon romance.
    However, entries 79.5 and 83.5 attribute to her the pioneering of voidtale specifically, with no mention of parachthon
    romance as the parent category, and 83.5 calls her the "originator of the voidtale craze" (a stronger claim than "pioneer").
    The relationship between parachthon romance and voidtale is ambiguous across these entries: is voidtale a variety of parachthon
    romance, or a distinct genre? This should be clarified before deduplication. Additionally, 28.5 and 24.5 agree on parachthon
    romance, while 79.5 and 83.5 focus exclusively on voidtale, creating an apparent inconsistency in which genre is her primary
    pioneering contribution.

    '
  claims:
  - entry: '24.5'
    claim: Elsebeth Sneider was a pioneer of parachthon romance.
  - entry: '24.5'
    claim: Elsebeth Sneider was a pioneer of voidtale in particular.
  - entry: '28.5'
    claim: Elsebeth Sneider (m. 1772, d. c1830) was a pioneer of the genre of parachthon romance.
  - entry: '79.5'
    claim: The voidtale genre was pioneered by Saxon author Elsebeth Sneider with her 1795 N work 'Through a Black Mirror'.
  - entry: '83.5'
    claim: Elsebeth Sneider (married 1772 N, d. ~1830 N) was a Saxon author and originator of the voidtale craze with her
      1795 N work 'Through a Black Mirror'.
- entity: Elsebeth Sneider
  source_file: B_Portingale_Borlish_ElsebethSneider_recs.yaml
  note: 'Entry 24.5 states Sneider wrote against "the Deviance movement." Entry 31.5 says she "despised Anti-Paradism." It
    is unclear whether Anti-Paradism and the Deviance movement are synonymous, overlapping, or distinct. If they are the same,
    the claims are near-duplicates (with 24.5 being more behaviourally specific — "wrote against" — and 31.5 being attitudinal
    — "despised"). If they are distinct concepts, both claims stand independently. This should be clarified. Cross-reference
    with entry 24.5''s claim that "Elsebeth Sneider''s works were popular with adherents of the Deviance movement" — which
    is not contradictory but adds nuance (she opposed it yet her readership included its adherents).

    '
  claims:
  - entry: '24.5'
    claim: Elsebeth Sneider wrote against the nascent Deviance movement.
  - entry: '31.5'
    claim: Elsebeth Sneider herself despised Anti-Paradism.
- entity: Mysarnos Codex
  source_file: C_AmbroseIII_Vascony_MysarnosCodex_recs.yaml
  note: Entry 6.5 states 'at most 200 different glyphs'; entry 62.5 states 'approximately 180 different glyphs'. The ranges
    could be compatible (180 is within 200) but may reflect distinct analyses or source texts. Author should confirm the canonical
    glyph count and reconcile the two entries.
  claims:
  - entry: '6.5'
    claim: At most 200 different glyphs appear throughout the entire Mysarnos Codex.
  - entry: '62.5'
    claim: The text of the Mysarnos Codex consists of approximately 180 different glyphs arranged into words and paragraphs.
- entity: First Drengot Empire
  source_file: D_Brethin_FirstDrengot_Adaille_Burgundy_recs.yaml
  note: 'Entry 64.5 (name claim) presents ''Constant Empire'' as a recognised lesser-used contemporary name, implying it was
    used during or shortly after the empire''s existence. Entry 103.5 states a fourteenth-century historian ''first referred''
    to it by that name, implying it is a retroactive scholarly label coined well after the empire''s collapse in 1191 N. These
    are in tension: either the name was in use contemporaneously or it was coined by a later historian. The three claims should
    be reconciled to clarify whether ''Constant Empire'' is a contemporary or retrospective denomination.'
  claims:
  - entry: '64.5'
    claim: The First Drengot Empire, or Constant Empire, was the westernmost of the four empires comprising the Second Tetrarchy
      (also called the Medieval Imperia).
  - entry: '64.5'
    claim: The lesser-used name 'Constant Empire' claims the prestige of the Classical-era District of Constantius, which
      occupied roughly the same geographical extent.
  - entry: '103.5'
    claim: A fourteenth-century historian first referred to the First Drengot Empire as the 'Constant Empire', linking it
      to the District of Constantius of the fourth-century Diocletian Tetrarchy that ruled Roman Brittania and Gaul.
- entity: Adaillé Nassow
  source_file: D_Brethin_FirstDrengot_Adaille_Burgundy_recs.yaml
  note: The first claim states both elder brothers died 'in infancy', implying death shortly after birth, presumably before
    the Second Great Dying reached them. The second claim states at least one died in the Second Great Dying, which is a specific
    plague event. These are potentially compatible only if the Second Great Dying struck during their infancy, but that requires
    verification of the timing of the Second Great Dying relative to Adaillé's birth year (1524 N). If the Second Great Dying
    predates or overlaps with c. 1524–1530 N, both claims could be consistent; otherwise they contradict each other on the
    cause/timing of the brothers' deaths.
  claims:
  - entry: '16.5'
    claim: Adaillé Nassow's two elder brothers died in infancy.
  - entry: '16.5'
    claim: At least one of Adaillé Nassow's elder brothers died in the Second Great Dying.
- entity: Burgundy
  source_file: D_Brethin_FirstDrengot_Adaille_Burgundy_recs.yaml
  note: 'Entry 15.5 notes that Burgundy suffered fewer casualties ''according to its own records'', and a companion claim
    in 15.5 explicitly states those records ''cannot entirely be trusted''. Entry 75.5, however, presents Burgundy''s comparatively
    good outcome as an established fact explained by its landlocked geography. If the lower casualty figures come from unreliable
    self-reporting (per 15.5), then 75.5''s confident causal explanation may be overstated or unfounded. These claims should
    be reconciled: either the geographic explanation is accepted as independently verified, or 75.5 should be qualified to
    acknowledge the record-reliability caveat.'
  claims:
  - entry: '15.5'
    claim: Burgundy is a notable example of a state which suffered fewer casualties in the Second Great Dying, according to
      its own records.
  - entry: '75.5'
    claim: Burgundy weathered the Second Great Dying comparatively well due to its lack of coastal territory, since the principal
      vector of plague transmission was naval trade.
- entity: Mysarnos
  source_file: E_Mysarnos_steeplepost_DrengotCollusion_Vigo_recs.yaml
  note: 'Both claims identify Mysarnos as the capital of Mystra, but they describe the polity differently. Entry 5.5 calls
    it the "Principality of Mystra", while 62.5 calls it "Mystra, a mordether vassal of the Roman Empire." These framings
    may be compatible (a principality that was also a vassal) but the discrepancy in political characterisation needs authorial
    resolution. Additionally, 5.5 uses "former capital" (implying Mysarnos is no longer the capital), while 62.5 uses simple
    past without that implication.

    '
  claims:
  - entry: '5.5'
    claim: Mysarnos is the former capital of the Principality of Mystra.
  - entry: '62.5'
    claim: Mysarnos was the capital of Mystra, a mordether vassal of the Roman Empire.
- entity: Mysarnos
  source_file: E_Mysarnos_steeplepost_DrengotCollusion_Vigo_recs.yaml
  note: 'Entry 62.5 is a condensed combination of two separate 5.5 claims (population and trade imports), but introduces a
    contradiction: 5.5 says Mysarnos received "the majority of all trade imports in Greece", while 62.5 says it received "half
    of all Greece''s imports." Majority (>50%) and half (exactly 50%) are not equivalent, and "the majority" typically implies
    more than half. The correct figure needs authorial confirmation. If resolved, keep the more specific/authoritative phrasing
    and remove 62.5''s conflated version.

    '
  claims:
  - entry: '5.5'
    claim: At its height in the sixteenth century, Mysarnos had a population of nearly thirty thousand.
  - entry: '5.5'
    claim: Mysarnos received the majority of all trade imports in Greece.
  - entry: '62.5'
    claim: During the sixteenth century Revitalist movement, Mysarnos received half of all Greece's imports and had a population
      of nearly thirty thousand.
- entity: steeplepost
  source_file: E_Mysarnos_steeplepost_DrengotCollusion_Vigo_recs.yaml
  note: 'Both claims place the Rustigh Strait air-steeple in the 1830s and agree on Borland as one terminus, but disagree
    on the other endpoint: 38.5 says it connected to "Willemy", while 46.5 says it connected to "Laicouche (now Lagcóch) in
    French Guillenne." These may be compatible if Laicouche/Lagcóch is a town within Willemy or French Guillenne is part of
    Willemy, but as written they appear to name different polities. Additionally, 38.5 calls this the "first cross-sea steeplepost
    lines" (plural), while 46.5 describes a single line. Authorial clarification is needed on the destination polity.

    '
  claims:
  - entry: '38.5'
    claim: The first cross-sea steeplepost lines were air-steeples in the Rustigh Strait, connecting Borland to Willemy, established
      in the 1830s.
  - entry: '46.5'
    claim: In the 1830s N, an air-steeple connection was established across the Rustigh Strait from Nausçod on Borland to
      Laicouche (now Lagcóch) in French Guillenne.
- entity: steeplepost
  source_file: E_Mysarnos_steeplepost_DrengotCollusion_Vigo_recs.yaml
  note: 'Both claims describe the two-arm steeplepost system''s first deployment/testing, but 38.5 locates it in "Thynen,
    a town in Willemy" while 45.5 says it was "deployed in Willem." It is possible that "Willem" in 45.5 is a variant spelling/abbreviation
    of "Willemy" (the country) rather than a town, but this is ambiguous. More critically, 38.5 says it was "first tested"
    while 45.5 says "first deployed", which may indicate different phases of the same development. Authorial confirmation
    of the location name and whether tested/deployed refers to the same event is needed.

    '
  claims:
  - entry: '38.5'
    claim: The two-arm steeplepost system, allowing up to nine separate states to be transmitted, was first tested in Thynen,
      a town in Willemy.
  - entry: '45.5'
    claim: The two-arm system for sending steeplepost was first deployed in Willem in the early nineteenth century.
- entity: Drengot Collusion
  source_file: E_Mysarnos_steeplepost_DrengotCollusion_Vigo_recs.yaml
  note: 'These three claims all address the founding/active period of the Drengot Collusion but give different framings: 34.5
    says it "grew from treaties in the mid-nineteenth century"; 78.5 says it was "established during the Good Game period"
    and that expansion concluded in 1894 with Borland''s accession; 190.5 says it was "active from the 1800s." These are broadly
    compatible (mid-19th century treaties leading to gradual establishment, with a final expansion in 1894), but they are
    not identical. The relationship between the "Global Workshop period" (34.5, 76.5) when it "arose" and the "Good Game period"
    (78.5) when it was "established" is unclear — these may be different phases. All three agree on collapse/end in 1961.
    Authorial clarification of the founding timeline (when did it officially come into being vs when did it expand) is needed.

    '
  claims:
  - entry: '34.5'
    claim: The Drengot Collusion grew from various treaties in the mid-nineteenth century into the principal power in the
      region until its collapse in 1961.
  - entry: '78.5'
    claim: The Drengot Collusion was established during the Good Game period, with its expansion concluding in 1894 N with
      the accession of Borland.
  - entry: '190.5'
    claim: The Drengot Collusion was an alliance-federacy of northwest Europe active from the 1800s until 1961 whose administration
      comprised twenty-four ministries.
- entity: Provence
  source_file: FG_combined_recs.yaml
  note: Entry 109.5 dates Provence's independence (from Burgundy) to 1497, whereas entry 141.5 states Provence was 'first
    independent in 1499'. Entry 14.5 (War of Provincial Independence 1497-99) suggests the conflict ran across both years,
    but the terminal date of independence differs. Clarify whether independence is dated to the declaration (1497) or the
    end of the war / formal recognition (1499).
  claims:
  - entry: '109.5'
    claim: The 21st of June is to this day a national holiday in Provence, commemorating the declaration of independence from
      Burgundy in 1497.
  - entry: '141.5'
    claim: Provence is a polity in the south of Gaul on the Middlesea coast, first independent in 1499, with its capital city
      at Marsella.
- entity: Axbane
  source_file: FG_combined_recs.yaml
  note: Entry 26.5 describes the Texel–Axbane connection as 'air-steeples', while entries 105.5 and 106.5 both describe it
    as an 'undersea barric steeplepost' line (i.e., a submarine cable). The medium (aerial vs. undersea) is contradictory.
    Entries 105.5 and 106.5 agree with each other and are the more detailed sources; 26.5 may contain an error. Once the contradiction
    is resolved, 105.5 and 106.5 should be treated as near-duplicates and merged, keeping 106.5 (the dedicated Axbane article)
    with the date (1850s N) and the 'one of the world's first' characterisation from 106.5 augmented by the parallel Kent
    line context from 105.5.
  claims:
  - entry: '26.5'
    claim: Axbane was connected to the continent at Texel in Willemy via air-steeples.
  - entry: '105.5'
    claim: The first undersea barric steeplepost lines were laid in the 1850s in Kent (Dover to Cales) and from Texel in Willemy
      to Axbane in Borland.
  - entry: '106.5'
    claim: In the 1850s, Axbane was connected to Texel in Willemy by one of the world's first undersea barric steeplepost
      lines.
- entity: Axbane
  source_file: FG_combined_recs.yaml
  note: Entry 26.5 places Axbane on the 'south coast' of Borland, while entry 106.5 places it on the 'southwest coast'. These
    are geographically distinct descriptions. The dedicated Axbane article (106.5) is likely more precise; 26.5 may be using
    'south' loosely. Recommend standardising to 'southwest coast' per 106.5 once confirmed.
  claims:
  - entry: '26.5'
    claim: Axbane (Ausbagn) is an old Roman town on the south coast of Borland with a surviving historical baths.
  - entry: '106.5'
    claim: Axbane is a major city on the southwest coast of Borland, located at the narrowest part of the Rustigh Strait,
      less than twenty leagues from Willemy on mainland Europe.
- entity: Damvath
  source_file: FG_combined_recs.yaml
  note: 'Entry 26.5 describes Damvath as ''a port city on the east coast of Borland'', implying it sits directly on the coast.
    Entry 57.5 states it is ''some leagues inland from the coast'' (as a river city on the Dam). These are in tension: a city
    on a river can have port facilities yet still be inland, but the phrasing ''on the east coast'' in 26.5 implies coastal
    rather than riverine location. Clarify whether Damvath is coastal or inland-riverine, and whether ''port city on the east
    coast'' in 26.5 is imprecise shorthand for its river-port access to the eastern coast.'
  claims:
  - entry: '26.5'
    claim: Damvath is a port city on the east coast of Borland.
  - entry: '57.5'
    claim: Damvath is the capital city of Borland, located on the River Dam some leagues inland from the coast.
- entity: Hasiny
  source_file: HI_combined_recs.yaml
  note: 'Both claims purport to explain the name ''Hasiny''. 118.5 says it derives from a confederation that spanned Hasiny
    and Taisha. 136.5 says it derives from the Ractish word Hasíne meaning ''our people'' for one of the founding nations.
    These are not necessarily mutually exclusive (the confederation could have been named Hasíne), but they describe different
    derivation mechanisms and entities. The two accounts need to be reconciled: did the name come from a confederation named
    after a Ractish word, or are these two separate derivation stories?'
  claims:
  - entry: '118.5'
    claim: The name Hasiny derives from a confederation of the same name, which extended across lands now part of Hasiny and
      Taisha.
  - entry: '136.5'
    claim: Hasiny takes its name from the Ractish name Hasíne 'our people' for one of the nations the modern polity is descended
      from.
- entity: Jothey of Borland
  source_file: HI_combined_recs.yaml
  note: 'The floruit date for Jothey differs between entries: 26.5 gives fl. 920 N while 32.5 gives fl. 898 N. The fall of
    the First Kingdom is consistently dated to 898 in both files, so fl. 898 in 32.5 is internally consistent. The fl. 920
    in 26.5 may reflect a later period of Jothey''s life in exile (he continued as monarch-in-exile for ''several more decades''
    per 32.5), but the two fl. dates are potentially confusing and need editorial clarification as to which event each floruit
    anchors.'
  claims:
  - entry: '26.5'
    claim: Jothey of Borland (fl. 920) fled into exile following the Dane invasion of Borland.
  - entry: '32.5'
    claim: Jothey, King of Borland (fl. 898), was the last ruler of the First Kingdom of Borland before it fell to the Danes
      in 898.
- entity: Munir al-Hamdawi
  source_file: JK_combined_recs.yaml
  note: Entry 18.5 names the organisation 'New World Company'; entry 171.5 calls it 'Morrack New World Company'. These may
    be the same body referred to by a longer and shorter form of its name, or they may be distinct. The discrepancy should
    be resolved in the source material before either entry is finalised.
  claims:
  - entry: '18.5'
    claim: In 1463 Munir al-Hamdawi established the New World Company as a rival marine enterprise to Ambrose III's New Navarre
      Enterprise.
  - entry: '171.5'
    claim: Following the Landfall, Munir al-Hamdawi of Morrack redirected his New World Company westward, leading to the discovery
      of the faster southern route to the Novomund and the islands of the Arcabil.
- entity: Avosche
  source_file: JK_combined_recs.yaml
  note: Entry 16.5 calls Avosche simply 'a duchy', as does 45.5 (referring to the Revitalist Period). However, 69.5 states
    that Avosche was a county before being elevated to a duchy in the early sixteenth century, and separately that it has
    been a county, duchy, and march at various points. The characterisation in 16.5 and 45.5 of Avosche as 'the duchy' without
    temporal qualification is consistent with its status after the early sixteenth century but may be anachronistic or imprecise
    depending on the period being described. Additionally, 45.5 calls Avosche 'unusually stable' while 69.5 notes 'continual
    territorial instability' and five changes of hands in the seventeenth century alone. These two characterisations are potentially
    contradictory and should be checked against the source material.
  claims:
  - entry: '16.5'
    claim: Avosche is a duchy in southern Willemy.
  - entry: '45.5'
    claim: The duchy of Avosche in Willemy was unusually stable and held by France for over a century during the Revitalist
      Period.
  - entry: '69.5'
    claim: The county of Avosche was elevated to a duchy in the early sixteenth century, with Roger d'Avosche becoming the
      first duke.
  - entry: '69.5'
    claim: Avosche has at various points been a county, a duchy, and a march, and has seen both continual territorial instability
      and major urban development into the modern period.
- entity: Deviance movement
  source_file: JK_combined_recs.yaml
  note: Entry 31.5 states that the early Deviance movement was blamed for causing the Modest Arrangement to resurge (i.e.,
    grow stronger), while 103.5 states the Deviance movement contributed to the Modest Arrangement's decline. These are directly
    opposite effects. It is possible that the early movement (31.5) initially provoked a reactionary resurgence of the Modest
    Arrangement, while the later movement (103.5, first half of the nineteenth century) ultimately contributed to its decline;
    the temporal framing differs slightly. However, this cannot be confirmed from the claim texts alone. The source material
    should be checked to determine whether these describe different phases or whether one claim is in error.
  claims:
  - entry: '31.5'
    claim: The early Deviance movement was blamed for the resurgence of the Modest Arrangement in Spain and Gaul.
  - entry: '103.5'
    claim: The Deviance movement has been credited with contributing to the decline of the Modest Arrangement through the
      first half of the nineteenth century, particularly in Gaul and Spain.
- entity: dime measures
  source_file: JK_combined_recs.yaml
  note: Entry 132.5 lists three length bases (inch, foot, league) with no intermediate 'chain' unit, and gives the league
    as 10⁴ feet. Entry 183.5 lists four units (inch, foot, chain, league) where the chain is 100 feet and the league is 100
    chains (= 10,000 feet = 10⁴ feet, so the final league size is arithmetically consistent). The contradiction is the presence
    or absence of the 'chain' as a named base unit and the number of bases (three vs four). The source material should be
    checked to determine whether the chain was added to the system later, or whether one entry has an error or is describing
    a different subset of the unit system.
  claims:
  - entry: '132.5'
    claim: The three dime bases for length are the inch, the foot (10 inches), and the league (10⁴ feet).
  - entry: '183.5'
    claim: 'The dime length units are: inch, foot (10 inches), chain (100 feet), and league (100 chains); units of area and
      volume are defined by squares and cubes of base lengths.'
