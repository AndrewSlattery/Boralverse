entry: 149.5
title: "27th Lexember - demastr"
claims:
  - category: language
    claim: "The Borlish word demastr means judgemental, moralising, opinionated, hypocritical, or sanctimonious."
    entities:
      - name: demastr
        type: concept

  - category: language
    claim: "Demastr derives from demar meaning 'to opine' with the pejorative suffix -astr; it is first attested in the eighteenth century as a character name in one of Tamottan's satirical dramas."
    entities:
      - name: demastr
        type: concept
      - name: Tamottan
        type: person
    dates: "first attested 18th c. N"

  - category: language
    claim: "The Borlish verb demar meaning 'to opine' was borrowed in the tenth century from Old English dēman 'judge, decide'."
    entities:
      - name: demar
        type: concept
    dates: "10th c. N"

  - category: work
    claim: "'Theoretical Uncoverings in the History of Languages' is a scientific journal published through the University of Lester."
    entities:
      - name: "Theoretical Uncoverings in the History of Languages"
        type: work
      - name: University of Lester
        type: organisation

  - category: glossary
    claim: "Lester is the Boralverse name for Leicester."
    entities:
      - name: Lester
        irl: Leicester
        type: place

  - category: language
    claim: "The modern Borlish first-conjugation third-person plural preterite ending -aurn descends from either the Latin pluperfect -āvĕrant or the syncopated Latin perfect -ārunt."
    entities:
      - name: Borlish
        type: concept

  - category: language
    claim: "The Latin occupational suffix -ātor became -our in Borlish; the suffix is native to Borlish, appearing productively as early as the eighth-century Halvuy chronicle."
    entities:
      - name: Borlish
        type: concept
    dates: "8th c. N"

  - category: work
    claim: "The Halvuy chronicle is an eighth-century Borlish document."
    entities:
      - name: Halvuy chronicle
        type: work
    dates: "8th c. N"
