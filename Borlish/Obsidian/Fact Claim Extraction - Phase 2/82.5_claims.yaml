entry: 82.5
title: "London"
claims:
  - category: place
    claim: "London (Borlish: /ˈlɔn.dr̩/) is a city and polity on the island of Albion, located downstream on the River Tames."
    entities:
      - name: London
        type: polity
      - name: Albion
        type: polity
      - name: River Tames
        type: place

  - category: place
    claim: "The polity of London comprises much of the Tames' watershed and is bordered to the north by Markland, the south by Kent, and the west by Britain."
    entities:
      - name: London
        type: polity
      - name: Markland
        type: polity
      - name: Kent
        type: polity
      - name: Britain
        type: polity

  - category: event
    claim: "London was established by the Romans shortly after their invasion around 50 N, named from a Kelt placename referring to the local floodplain."
    entities:
      - name: London
        type: place
    dates: "c. 50 N"

  - category: event
    claim: "London became the imperial capital of the region during the Second Tetrarchy as part of the First Drengot Empire."
    entities:
      - name: London
        type: place
      - name: First Drengot Empire
        type: polity
      - name: Second Tetrarchy
        type: period

  - category: event
    claim: "The First Burning of London took place in 1290 N; at least 400 people were killed in the ensuing week-long disaster."
    entities:
      - name: First Burning of London
        type: event
      - name: London
        type: place
    dates: "1290 N"

  - category: event
    claim: "The Democratic Wars saw London gain lasting independence from its neighbours in 1748 N under Queen Margaret."
    entities:
      - name: London
        type: polity
      - name: Margaret
        type: person
    dates: "1748 N"

  - category: person
    claim: "Queen Margaret (fl. 1748 N), first ruler of an independent London, could trace her ancestry to the royal families of both Markland and Kent."
    entities:
      - name: Margaret
        type: person
      - name: London
        type: polity
      - name: Markland
        type: polity
      - name: Kent
        type: polity
    dates: "fl. 1748 N"

  - category: organisation
    claim: "The New Lyceum is a preeminent research university in London, established in the late eighteenth century."
    entities:
      - name: New Lyceum
        type: organisation
      - name: London
        type: place
    dates: "late 18th c. N"

  - category: event
    claim: "Seventy-fifth anniversary celebrations in 1823 N saw significant infrastructural investments in London, including a great deal of building along the south bank of the Tames."
    entities:
      - name: London
        type: place
    dates: "1823 N"

  - category: polity
    claim: "London became a lead member of the New Urban Mesh during the Global Workshop period, then spearheaded the Mesh's takeover of (or submission into) the larger Drengot Collusion."
    entities:
      - name: London
        type: polity
      - name: Drengot Collusion
        type: polity

  - category: organisation
    claim: "The Roun Red House is the intelligence centre for the Drengot Collusion."
    entities:
      - name: Roun Red House
        type: organisation
      - name: Drengot Collusion
        type: polity

  - category: event
    claim: "Many Londoners in the Roun Red House were implicated in the Furore of 1961 N."
    entities:
      - name: London
        type: polity
      - name: Roun Red House
        type: organisation
      - name: Furore of 1961
        type: event
    dates: "1961 N"

  - category: person
    claim: "Matthew Drengot (fl. 1120 N) was the younger brother of Drengot Emperor Roger II and ruled the northern half of the Empire in his brother's name."
    entities:
      - name: Matthew Drengot
        type: person
      - name: Roger II
        type: person
    dates: "fl. 1120 N"
    relationships:
      - type: sibling
        from: "Matthew Drengot"
        to: "Roger II"

  - category: person
    claim: "Clarissa Bellamy (fl. 1920 N) is a London author of many lovetales and the parachthon work 'A Door, Once Opened'."
    entities:
      - name: Clarissa Bellamy
        type: person
      - name: "A Door, Once Opened"
        type: work
    dates: "fl. 1920 N"

  - category: person
    claim: "Heleth Bellamy (fl. 1920 N) is a researcher at the New Lyceum specialising in the Democratic Wars."
    entities:
      - name: Heleth Bellamy
        type: person
      - name: New Lyceum
        type: organisation
    dates: "fl. 1920 N"

  - category: person
    claim: "Gunna Despath (fl. 1920 N) is a translator who was born Gonnilt Dispað in Borland."
    entities:
      - name: Gunna Despath
        type: person
      - name: Borland
        type: polity
    dates: "fl. 1920 N"
