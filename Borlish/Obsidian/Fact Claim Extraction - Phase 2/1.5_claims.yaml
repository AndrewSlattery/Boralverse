entry: "1.5"
title: "Children's Curriculum"
source_work: "Report towards a Normal Teaching for Children at Mantelschool"
claims:
  - category: work
    claim: "The 'Report towards a Normal Teaching for Children at Mantelschool' was published in 1981 by the Borland anthracite administration's Ministry for Schools."
    entities:
      - name: "Report towards a Normal Teaching for Children at Mantelschool"
        type: work
      - name: "Ministry for Schools"
        type: organisation
      - name: "Borland"
        type: polity
    dates: ["1981"]
    relationships:
      - subject: "Ministry for Schools"
        predicate: "published"
        object: "Report towards a Normal Teaching for Children at Mantelschool"

  - category: work
    claim: "The Borlish title of the report is 'Contris vars Aðelenç Normal por Ivan a Schol Lajarn'."
    entities:
      - name: "Report towards a Normal Teaching for Children at Mantelschool"
        type: work

  - category: work
    claim: "The report was intended to standardise the education of children up to the age of twelve."
    entities:
      - name: "Report towards a Normal Teaching for Children at Mantelschool"
        type: work

  - category: terminology
    claim: "Mantelschool is the Boralverse term for the school attended by children up to age twelve."
    entities:
      - name: "Mantelschool"
        type: concept

  - category: terminology
    claim: "The Boralverse term 'mozate' means high-level."
    entities:
      - name: "mozate"
        type: concept

  - category: terminology
    claim: "The Boralverse term 'vicine' means local."
    entities:
      - name: "vicine"
        type: concept

  - category: glossary
    claim: "Scarreth is the Boralverse name for Skara Brae."
    entities:
      - name: "Scarreth"
        irl: "Skara Brae"
        type: place

  - category: event
    claim: "Waves of migration into Borland culminated in the arrival of the Albic Kelts."
    entities:
      - name: "Borland"
        type: place
      - name: "Albic Kelts"
        type: event

  - category: place
    claim: "The Revel mounds on Borland contain stoneware from the early farming period."
    entities:
      - name: "Revel mounds"
        type: place
      - name: "Borland"
        type: place

  - category: place
    claim: "The Revel mounds are compared to the Orkney site at Scarreth as a comparable early settlement."
    entities:
      - name: "Revel mounds"
        type: place
      - name: "Scarreth"
        irl: "Skara Brae"
        type: place

  - category: place
    claim: "The Çadrosc labyrinth is a prehistoric monument on Borland, constructed during the Bronze Age."
    entities:
      - name: "Çadrosc labyrinth"
        type: place
      - name: "Borland"
        type: place

  - category: culture
    claim: "An intertribal system of hill forts existed in pre-Classical Borland, with a culture around authority evidenced by extant art, sculpture, and jewellery."
    entities:
      - name: "Borland"
        type: place

  - category: event
    claim: "Julius Caesar conducted expeditions to Albion in 55 aN."
    entities:
      - name: "Julius Caesar"
        type: person
      - name: "Albion"
        type: place
    dates: ["55 aN"]
    relationships:
      - subject: "Julius Caesar"
        predicate: "conducted expeditions to"
        object: "Albion"

  - category: event
    claim: "The Roman invasion of the Northern Isles began in 42 N."
    entities:
      - name: "Northern Isles"
        type: place
    dates: ["42 N"]

  - category: event
    claim: "Kelt kingdoms remained on the Northern Isles and resisted Roman rule through the first century."
    entities:
      - name: "Northern Isles"
        type: place
    dates: ["1st century"]

  - category: person
    claim: "Buthick of the Iceni is a historical figure who resisted Roman rule, used by curriculum writers as a model for later Borlish resisters."
    entities:
      - name: "Buthick"
        type: person
      - name: "Iceni"
        type: polity

  - category: event
    claim: "Emperor Hadrian established a separate Borlish province on the island of Borland."
    entities:
      - name: "Hadrian"
        type: person
      - name: "Borland"
        type: place
    relationships:
      - subject: "Hadrian"
        predicate: "established a separate province on"
        object: "Borland"

  - category: polity
    claim: "After the Diocletian reforms, the Borlish province became the Boral diocese."
    entities:
      - name: "Boral diocese"
        type: polity
      - name: "Borland"
        type: place

  - category: place
    claim: "Roman baths survive in Axbane as an example of Roman architecture on Borland."
    entities:
      - name: "Axbane"
        type: place

  - category: event
    claim: "The south and east coasts of Borland were urbanised under Roman rule."
    entities:
      - name: "Borland"
        type: place

  - category: religion
    claim: "Roman Christianity arrived on Borland and led to the destruction or repurposing of pagan sites, both Kelt and pantheic."
    entities:
      - name: "Borland"
        type: place

  - category: terminology
    claim: "The term 'pantheic' is used in the Boralverse for polytheist/Roman pagan traditions, as distinct from Kelt traditions."
    entities:
      - name: "pantheic"
        type: concept

  - category: event
    claim: "Romans from Germania Inferior, Belgica, and Brittania migrated to Borland during the decline of Roman control."
    entities:
      - name: "Borland"
        type: place
      - name: "Germania Inferior"
        type: place
      - name: "Belgica"
        type: place
      - name: "Brittania"
        type: place
