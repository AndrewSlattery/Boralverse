entry: 93.5
title: "Lexember 2023 – 1: ceu"
claims:
  - category: terminology
    claim: "Ceu is a Borlish discourse particle meaning 'basically, essentially, pretty much' and in negative sentences 'hardly, barely, only just'."
    entities:
      - name: ceu
        type: concept

  - category: language
    claim: "Ceu originated in Middle Borlish as a legal term of art borrowed from Latin ceu 'just like, just as if'."
    entities:
      - name: ceu
        type: concept

  - category: language
    claim: "By the eighteenth century, ceu had moved into general use in Borlish, along with the innovated negative sense."
    entities:
      - name: ceu
        type: concept
    dates: "18th c. N"

  - category: place
    claim: "Sodrick is a region of the Northwestern Isles comprising many small islands north of Wales and west of Scotland."
    entities:
      - name: Sodrick
        type: place
      - name: Wales
        type: polity

  - category: language
    claim: "The name Sodrick was originally a demonym for the people of Soder (Old English Sodor), descending from Old Norse suðreyjar 'southern islands'."
    entities:
      - name: Sodrick
        type: place

  - category: event
    claim: "Sodrick was settled during the Norse ascendancy of the eighth and ninth centuries, at the same time as Danes arrived on the shores of Albion and Ireland."
    entities:
      - name: Sodrick
        type: place
    dates: "8th–9th c. N"

  - category: person
    claim: "Harald the Blue of Sodrick contributed to the establishment of the Kingdom of Scotland in the ninth century."
    entities:
      - name: Harald the Blue
        type: person
      - name: Sodrick
        type: place
    dates: "9th c. N"

  - category: event
    claim: "During the tenth century, the kingdom of Dunclothe under Roderick invaded and conquered many isles of Sodrick from the Danes, including Arran in 934 and the isle of Man in 942."
    entities:
      - name: Dunclothe
        type: polity
      - name: Roderick
        type: person
      - name: Sodrick
        type: place
    dates: "934 N; 942 N"

  - category: culture
    claim: "Among the Danes expelled from Sodrick as Dunclothe took control, records include the first unambiguous mention of identical triplets in European history (Danes born on the isle of Mull around 915)."
    entities:
      - name: Sodrick
        type: place
      - name: Dunclothe
        type: polity
    dates: "c. 915 N"

  - category: place
    claim: "By the fifteenth century, Sodrick was subordinate to Wales and was incorporated as an outlying tallath of the Kingdom of Britain when it was formed."
    entities:
      - name: Sodrick
        type: place
      - name: Wales
        type: polity
      - name: Britain
        type: polity
    dates: "15th c. N"
