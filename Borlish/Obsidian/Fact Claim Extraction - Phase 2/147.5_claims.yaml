entry: 147.5
title: "13th Lexember - zizania"
claims:
  - category: language
    claim: "The Borlish word zizania, meaning discord, disharmony, inner conflict, or temptation, derives from Lombard zizania meaning 'ryegrass; discord', from late Latin zizanium meaning 'cockle; vice'."
    entities:
      - name: zizania
        type: concept

  - category: person
    claim: "Vigo VII (fl. 1121) was king of Greater Devon and invaded south Wales in 1121 without the Emperor's support."
    entities:
      - name: Vigo VII
        type: person
      - name: Greater Devon
        type: polity
    dates: "fl. 1121 N"

  - category: language
    claim: "Zahid Russian is a Slavone language spoken in Crovatia and Servia, closely related to Kievan, spoken by westward migrants from the late medieval period and named for záhid meaning 'west'."
    entities:
      - name: Zahid Russian
        type: concept
      - name: Crovatia
        type: place
      - name: Servia
        type: place

  - category: glossary
    claim: "Kievan is the Boralverse term for the Ukrainian language."
    entities:
      - name: Kievan
        irl: Ukrainian
        type: concept

  - category: language
    claim: "The word rasgatto in several languages derives from Zahid Russian, entering via Venisian from Olexi Harchenko's novel Разгадто."
    entities:
      - name: rasgatto
        type: concept
      - name: Zahid Russian
        type: concept
      - name: Olexi Harchenko
        type: person

  - category: person
    claim: "Margaret of Iscombe (fl. 1435) was the wife of Mark of Tolose and had four surviving children: Alexandra, Ambrose, Victor (Duke of Astorga), and Natalia."
    entities:
      - name: Margaret of Iscombe
        type: person
      - name: Mark of Tolose
        type: person
      - name: Alexandra
        type: person
      - name: Ambrose III
        type: person
      - name: Victor of Astorga
        type: person
      - name: Natalia
        type: person
    relationships:
      - type: spouse
        from: "Margaret of Iscombe"
        to: "Mark of Tolose"
    dates: "fl. 1435 N"
