entry: 105.5
title: "Astraphor"
claims:
  - category: terminology
    claim: "Astraphor (also called barric force) is the set of phenomena associated with the presence and movement of plentiful substances, or the thrift that can be harnessed from such movement."
    entities:
      - name: astraphor
        type: concept

  - category: language
    claim: "The word 'astraphor' was coined in the seventeenth century to describe the theoretical source of sparks produced by rubbing certain substances such as amber or fur."
    entities:
      - name: astraphor
        type: concept
    dates: "17th c. N"

  - category: language
    claim: "The modifying form 'barric' originates in Arabic barq 'lightning,' and was developed through parallel work on the same phenomena."
    entities:
      - name: astraphor
        type: concept

  - category: work
    claim: "'Astraphor and Light' by Merch theorist Wexter Hathwall fully characterised the mechanics of astraphor in a single equation, in the mid-nineteenth century."
    entities:
      - name: "Astraphor and Light"
        type: work
      - name: Wexter Hathwall
        type: person
    dates: "mid-19th c. N"

  - category: person
    claim: "Wexter Hathwall was a Merch theorist who wrote 'Astraphor and Light'."
    entities:
      - name: Wexter Hathwall
        type: person

  - category: technology
    claim: "In the mid-nineteenth century, the earlier flag-lamp steeplemesh was being displaced by barric meshes."
    dates: "mid-19th c. N"

  - category: technology
    claim: "By 1870, the world's longest wired post line on land spanned the length of Lower Mendeva."
    entities:
      - name: Lower Mendeva
        type: place
    dates: "1870 N"

  - category: technology
    claim: "The first undersea barric steeplepost lines were laid in the 1850s in Kent (Dover to Cales) and from Texel in Willemy to Axbane in Borland."
    entities:
      - name: Axbane
        type: place
      - name: Borland
        type: place
      - name: Willemy
        type: polity
    dates: "1850s N"

  - category: event
    claim: "In the 1950s, the Mortar coalition in Portingale funded research into using threshold force to produce astraphor, to reduce dependence on imports from the Drengot Collusion."
    entities:
      - name: Portingale
        type: polity
      - name: Drengot Collusion
        type: organisation
    dates: "1950s N"

  - category: event
    claim: "By the 1960s, Portingale was a world pioneer in constructing threshold mills, becoming a net exporter of astraphor in 1971."
    entities:
      - name: Portingale
        type: polity
    dates: "1960s N; 1971 N"
