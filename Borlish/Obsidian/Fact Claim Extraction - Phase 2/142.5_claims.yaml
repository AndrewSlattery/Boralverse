entry: 142.5
title: "Tremonnow"
claims:
  - category: place
    claim: "Tremonnow is a town in SE Wales that serves as the administrative centre of the district of Ux."
    entities:
      - name: Tremonnow
        type: place

  - category: glossary
    claim: "Tremonnow is the Boralverse name for Monmouth."
    entities:
      - name: Tremonnow
        irl: Monmouth
        type: place

  - category: organisation
    claim: "The Brethin was founded at Tremonnow before 800 N under the patronage of Vigo's daughter Iseld."
    entities:
      - name: Brethin
        type: organisation
      - name: Tremonnow
        type: place
      - name: Iseld
        type: person
    dates: "before 800 N"

  - category: organisation
    claim: "The Tremonnow Gravatory preserves invaluable early medieval sources including the Chronicle of Carlile."
    entities:
      - name: Tremonnow Gravatory
        type: organisation
      - name: Chronicle of Carlile
        type: work

  - category: organisation
    claim: "The Tremonnow Open School, formerly the Brethin Mesh Institute, provides distance learning."
    entities:
      - name: Tremonnow Open School
        type: organisation
      - name: Brethin Mesh Institute
        type: organisation

  - category: person
    claim: "Dewock Barclythe (1452–1539) was a Friar of Tremonnow who served as prime Factor of Records at Brethin House."
    entities:
      - name: Dewock Barclythe
        type: person
      - name: Tremonnow
        type: place
      - name: Brethin House
        type: organisation
    dates: "1452–1539 N"
