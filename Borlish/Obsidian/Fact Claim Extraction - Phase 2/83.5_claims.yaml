entry: 83.5
title: "Loveless Lepzi"
claims:
  - category: place
    claim: "Lepzi is the capital city of Saxony, located on the Bleak Alstre."
    entities:
      - name: Lepzi
        type: place
      - name: Saxony
        type: polity

  - category: event
    claim: "Lepzi first acted as political centre for the First Kingdom of Saxony just prior to its collapse at the close of the thirteenth century."
    entities:
      - name: Lepzi
        type: place
      - name: Saxony
        type: polity
    dates: "late 13th c. N"

  - category: event
    claim: "The Houghbrocken dynasty ruled from Lepzi before being removed to Magdeburg when the house was reduced to the four-year-old Marksman Baldur."
    entities:
      - name: Houghbrocken
        type: organisation
      - name: Lepzi
        type: place
      - name: Magdeburg
        type: place
      - name: Baldur
        type: person

  - category: event
    claim: "With the conclusion of the First German War in 1770 N, Saxony was ascendant and controlled more territory than at any point in its history."
    entities:
      - name: Saxony
        type: polity
      - name: First German War
        type: event
    dates: "1770 N"

  - category: place
    claim: "Lepzi trebled in population in just fifty years following Saxony's ascendancy after 1770 N."
    entities:
      - name: Lepzi
        type: place
    dates: "1770–1820 N"

  - category: economics
    claim: "Lepzi was one of the vanguards of the Global Workshop period, exploiting vast amounts of locally-mined coal power."
    entities:
      - name: Lepzi
        type: place
      - name: Workshop period
        type: period

  - category: organisation
    claim: "The Blue Marian Society, which agitated for inheritance and suffrage law reforms, was founded in the nineteenth century in Lepzi."
    entities:
      - name: Blue Marian Society
        type: organisation
      - name: Lepzi
        type: place
    dates: "19th c. N"

  - category: person
    claim: "Albert Siegert (fl. 1744 N) was the owner of a leatherworking and cobbling industry based in Lepzi."
    entities:
      - name: Albert Siegert
        type: person
      - name: Lepzi
        type: place
    dates: "fl. 1744 N"

  - category: person
    claim: "Elsebeth Sneider (married 1772 N, d. ~1830 N) was a Saxon author and originator of the voidtale craze with her 1795 N work 'Through a Black Mirror'."
    entities:
      - name: Elsebeth Sneider
        type: person
      - name: "Through a Black Mirror"
        type: work
    dates: "m. 1772 N, d. ~1830 N"

  - category: person
    claim: "Otto Sneider (married 1772 N) was a scholar at the Lepzi Sterncundhaus and husband of Elsebeth Sneider."
    entities:
      - name: Otto Sneider
        type: person
      - name: Elsebeth Sneider
        type: person
      - name: Lepzi Sterncundhaus
        type: organisation
    dates: "m. 1772 N"
    relationships:
      - type: spouse
        from: "Otto Sneider"
        to: "Elsebeth Sneider"

  - category: person
    claim: "Rachel Desselut (fl. 1743 N) was a French philosopher best remembered for her 1743 N work 'The Parable of the Mute Bookbinder', which discusses problems of infinite regression and of identity."
    entities:
      - name: Rachel Desselut
        type: person
      - name: "The Parable of the Mute Bookbinder"
        type: work
    dates: "fl. 1743 N"

  - category: person
    claim: "Rachel Desselut was born to Maurice Desselut, eighth Lord Bouvoin, a writer and explorer."
    entities:
      - name: Rachel Desselut
        type: person
      - name: Maurice Desselut
        type: person
    relationships:
      - type: parent
        from: "Maurice Desselut"
        to: "Rachel Desselut"

  - category: person
    claim: "The house name Desselut derives from an Old French word meaning 'dissolute, philandering'."
    entities:
      - name: Rachel Desselut
        type: person

  - category: person
    claim: "Rachel Desselut was the first to lay out in modern terms the philosophical distinction between Form and Method, allowing an entity to self-replicate."
    entities:
      - name: Rachel Desselut
        type: person

  - category: person
    claim: "The Form/Method concepts from Desselut's work were vital in the study of methodics and in general augrimmer practice."
    entities:
      - name: Rachel Desselut
        type: person
      - name: methodics
        type: concept

  - category: person
    claim: "Desselut inferred from her work the existence of a vital language now known to be composed of heredian acid."
    entities:
      - name: Rachel Desselut
        type: person
      - name: heredian acid
        type: concept
