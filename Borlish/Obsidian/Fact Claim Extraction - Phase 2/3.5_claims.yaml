entry: "3.5"
title: "Dane Settlements in the Isles"
source_work: "844–900: Early Dane Kingdom-Building across the Northwestern Isles"
claims:
  - category: organisation
    claim: "The Tremonnow Open School was formerly known as the Brethin Mesh Institute."
    entities:
      - name: "Tremonnow Open School"
        type: organisation
      - name: "Brethin Mesh Institute"
        type: organisation

  - category: work
    claim: "The course '844–900: Early Dane Kingdom-Building across the Northwestern Isles' is taught at the Tremonnow Open School and covers the transition from viking raids to the establishment of permanent Norse communities in the Northwestern Isles."
    entities:
      - name: "844–900: Early Dane Kingdom-Building across the Northwestern Isles"
        type: work
      - name: "Tremonnow Open School"
        type: organisation
      - name: "Northwestern Isles"
        type: place

  - category: work
    claim: "The scitation for the course '844–900: Early Dane Kingdom-Building across the Northwestern Isles' was issued in January 2014."
    entities:
      - name: "844–900: Early Dane Kingdom-Building across the Northwestern Isles"
        type: work
    dates: ["January 2014 N"]

  - category: glossary
    claim: "Guile is the Boralverse name for the Gaels."
    entities:
      - name: "Guile"
        irl: "Gael"
        type: concept

  - category: glossary
    claim: "Mondwell is the Boralverse name for Anglesey."
    entities:
      - name: "Mondwell"
        irl: "Anglesey"
        type: place

  - category: glossary
    claim: "Kilcoughbert is the Boralverse name for Kirkcudbright, Galloway."
    entities:
      - name: "Kilcoughbert"
        irl: "Kirkcudbright, Galloway"
        type: place

  - category: event
    claim: "Dane wayports and settlements were established between Dublin and Yorwick."
    entities:
      - name: "Dublin"
        type: place
      - name: "Yorwick"
        type: place
    dates: ["844–900 N"]

  - category: polity
    claim: "Wynneth was a principality in the Northwestern Isles."
    entities:
      - name: "Wynneth"
        type: polity

  - category: polity
    claim: "Powes was a polity in the Northwestern Isles."
    entities:
      - name: "Powes"
        type: polity

  - category: event
    claim: "The principality of Wynneth consolidated primacy over Powes, aided in part by Dane wayports and settlements between Dublin and Yorwick."
    entities:
      - name: "Wynneth"
        type: polity
      - name: "Powes"
        type: polity
      - name: "Dublin"
        type: place
      - name: "Yorwick"
        type: place
    relationships:
      - subject: "Wynneth"
        predicate: "consolidated primacy over"
        object: "Powes"

  - category: event
    claim: "The partition of Mondwell was agreed between Wynneth and Sodrick."
    entities:
      - name: "Mondwell"
        irl: "Anglesey"
        type: place
      - name: "Wynneth"
        type: polity
      - name: "Sodrick"
        type: polity
    relationships:
      - subject: "Wynneth and Sodrick"
        predicate: "agreed the partition of"
        object: "Mondwell"

  - category: work
    claim: "The partition of Mondwell is mentioned in both the Ulstre and Carlile chronicles."
    entities:
      - name: "Mondwell"
        irl: "Anglesey"
        type: place
      - name: "Ulstre chronicle"
        type: work
      - name: "Carlile chronicle"
        type: work

  - category: person
    claim: "Owain ap Blethyn was a Welsh-born figure active during the Dane settlement period, rendered in legend as Owen of Jolliad."
    entities:
      - name: "Owain ap Blethyn"
        type: person
      - name: "Owen of Jolliad"
        type: person

  - category: person
    claim: "Owen of Jolliad (Owain ap Blethyn) was sometimes a friend and sometimes a foe of the Arthurians."
    entities:
      - name: "Owen of Jolliad"
        type: person
      - name: "Arthurians"
        type: organisation

  - category: event
    claim: "Welsh-born men participated in viking raids as the Dane settlements became more enmeshed with local communities."
    entities:
      - name: "British Danelands"
        type: place

  - category: language
    claim: "Norse names persisted in the Guile and British Danelands long after those populations had otherwise adopted local languages."
    entities:
      - name: "Guile"
        irl: "Gael"
        type: place
      - name: "British Danelands"
        type: place

  - category: event
    claim: "The Reconquest of Legaster took place in 887 N."
    entities:
      - name: "Reconquest of Legaster"
        type: event
      - name: "Legaster"
        type: place
    dates: ["887 N"]

  - category: event
    claim: "The Reconquest of Legaster involved idiosyncratic alliances on both sides."
    entities:
      - name: "Reconquest of Legaster"
        type: event

  - category: place
    claim: "Recent excavation work near Kilcoughbert has uncovered new evidence of early Dane settlement activity."
    entities:
      - name: "Kilcoughbert"
        irl: "Kirkcudbright, Galloway"
        type: place
