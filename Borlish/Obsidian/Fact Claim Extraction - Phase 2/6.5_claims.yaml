entry: "6.5"
title: "The Mysarnos Codex, cont."
source_work: "The Mysarnos Problem: the Enigma of an Inconvenient Codex"
claims:
  - category: event
    claim: "The Great Fracture severely hobbled the Roman Papacy."
    entities:
      - name: "Great Fracture"
        type: event
      - name: "Roman Papacy"
        type: organisation

  - category: place
    claim: "The region north of Mysarnos led to a theological flourishing both before and after the Great Fracture."
    entities:
      - name: "Mysarnos"
        type: place
      - name: "Great Fracture"
        type: event

  - category: terminology
    claim: "The name 'Mysarnos' is usually held to refer to venerable maple trees for which the region has been known since Classical times."
    entities:
      - name: "Mysarnos"
        type: place

  - category: terminology
    claim: "Modern Welsh 'mysarn' means 'maple wood' and is suggestive of the etymology of Mysarnos."
    entities:
      - name: "Mysarnos"
        type: place

  - category: terminology
    claim: "Kentish 'mazre' is comparable to the etymology of Mysarnos."
    entities:
      - name: "Mysarnos"
        type: place

  - category: terminology
    claim: "Vascon 'mausòn' means 'maple' and is comparable to the etymology of Mysarnos."
    entities:
      - name: "Mysarnos"
        type: place

  - category: work
    claim: "The author of the Mysarnos Codex has never been conclusively identified."
    entities:
      - name: "Mysarnos Codex"
        type: work

  - category: organisation
    claim: "The Library of Saint George the Martyr was one of the largest buildings within the church complex north of Mysarnos."
    entities:
      - name: "Library of Saint George the Martyr"
        type: organisation
      - name: "Mysarnos"
        type: place

  - category: work
    claim: "The Mysarnos Codex was composed or at least first stored at the Library of Saint George the Martyr."
    entities:
      - name: "Mysarnos Codex"
        type: work
      - name: "Library of Saint George the Martyr"
        type: organisation
    relationships:
      - subject: "Mysarnos Codex"
        predicate: "was stored at"
        object: "Library of Saint George the Martyr"

  - category: organisation
    claim: "Extant and complete membership records for the various monasteries and other institutions in the area around Mysarnos exist for almost the entire sixteenth century."
    entities:
      - name: "Mysarnos"
        type: place
    dates: ["16th century"]

  - category: work
    claim: "No mention is made by any surviving chronicles of the production of the Mysarnos Codex."
    entities:
      - name: "Mysarnos Codex"
        type: work

  - category: work
    claim: "The Mysarnos Codex originally comprised over two hundred illustrated vellum folios."
    entities:
      - name: "Mysarnos Codex"
        type: work

  - category: work
    claim: "The Mysarnos Codex is lined with incomprehensible but clearly meaningful symbols."
    entities:
      - name: "Mysarnos Codex"
        type: work

  - category: work
    claim: "At most 200 different glyphs appear throughout the entire Mysarnos Codex."
    entities:
      - name: "Mysarnos Codex"
        type: work

  - category: work
    claim: "The text of the Mysarnos Codex has baffled historians and linguists for centuries."
    entities:
      - name: "Mysarnos Codex"
        type: work

  - category: work
    claim: "The illustrations in the Mysarnos Codex range from the utterly mundane to the fantastical."
    entities:
      - name: "Mysarnos Codex"
        type: work

  - category: work
    claim: "The Mysarnos Codex contains illustrations including fields of poppies and armoured men on the backs of four-winged dragons."
    entities:
      - name: "Mysarnos Codex"
        type: work
