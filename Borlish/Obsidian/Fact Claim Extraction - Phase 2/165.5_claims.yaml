entry: 165.5
title: "The 1910s"
claims:
  - category: person
    claim: "Loðaç Berxon (b. 1865) led the Borland chapters of the Outland Arcabil Association from 1913 to 1918; she had emigrated from the Arcabil to Damvath a decade earlier due to the Millstone War."
    entities:
      - name: Loðaç Berxon
        type: person
      - name: Outland Arcabil Association
        type: organisation
      - name: Damvath
        type: place
    dates: "b. 1865 N; led chapters 1913–1918 N"

  - category: work
    claim: "'L'Askouð Pyrrhaz' ('The Firekeeper's Stronghold') (1910) was Loðaç Berxon's first and best-known work."
    entities:
      - name: "L'Askouð Pyrrhaz"
        type: work
      - name: Loðaç Berxon
        type: person
    dates: "1910 N"

  - category: organisation
    claim: "The Outland Arcabil Association was a collection of societies working for the benefit of the Arcabil diaspora across the globe."
    entities:
      - name: Outland Arcabil Association
        type: organisation

  - category: glossary
    claim: "House of odyssey is the Boralverse term for cinema."
    entities:
      - name: house of odyssey
        irl: cinema
        type: concept

  - category: event
    claim: "The first house of odyssey to sell tickets to the public on a regular basis was established in Boxa in 1912; one of its first great successes was a recording of a ballet concert accompanied by the St Hurroco Youth Orchestra of Furlain."
    entities:
      - name: Boxa
        type: place
    dates: "1912 N"

  - category: work
    claim: "'Un Seir Deura Soffire' ('One Evening Will Have to be Enough') (1913) by Josephene Foilliers was a masquira genre work and the first book to sell more than a million copies in a single year."
    entities:
      - name: "Un Seir Deura Soffire"
        type: work
      - name: Josephene Foilliers
        type: person
    dates: "1913 N"

  - category: culture
    claim: "The literary genre of social comedy has its origins in the late 1910s, developed by authors like Dorotha Quistack and Judeta Barracin from prior genres like lovetales and adolescences; it is characterised by low-stakes plots, personal friendships, and rural or low-class urban settings."
    entities:
      - name: social comedy
        type: concept
    dates: "late 1910s N"
