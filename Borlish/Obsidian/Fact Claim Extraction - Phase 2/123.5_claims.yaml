entry: 123.5
title: "Dart Geometry"
source_work: "Drawing in the Sand: the History of Calculation (Agenza Scholaria Fodgesa, 1954)"
claims:
  - category: person
    claim: "Ferenc's 1819 work 'Geometriæ Inquadrabiles' is a pioneering work introducing new instantiations of geometry."
    entities:
      - name: Ferenc
        type: person
      - name: "Geometriæ Inquadrabiles"
        type: work
    dates: "1819 N"

  - category: culture
    claim: "In the late fifteenth century, scholars Barclythe and da Treviso began assigning directions to lines, which is considered the origin of the 'dart method' as an extension of Euclidean geometry."
    entities:
      - name: Barclythe
        type: person
      - name: da Treviso
        type: person
    dates: "late 15th c. N"

  - category: culture
    claim: "The Hicma Academy in Baghdad made parallel developments in directed geometry around the same time as Barclythe and da Treviso, though whether by direct communication or independent invention is unclear."
    entities:
      - name: Hicma Academy
        type: organisation

  - category: glossary
    claim: "Ablate is the Boralverse term for negative (as a mathematical quantity)."
    entities:
      - name: ablate
        irl: negative
        type: concept

  - category: glossary
    claim: "Mozate is the Boralverse term for two-dimensional."
    entities:
      - name: mozate
        irl: two-dimensional
        type: concept

  - category: culture
    claim: "Assigning directions to lines (the dart method) brought ablate quantities into respectability in European mathematics and allowed stronger ties between geometry and algebra."
    entities:
      - name: ablate
        type: concept
