entry: "35.5"
title: "Verona & War"
claims:
  - category: place
    claim: "Verona is a city in the north-east of the Italian peninsula."
    entities:
      - name: "Verona"
        type: place

  - category: event
    claim: "During the tenth century and into the time of the Second Tetrarchy, Verona and its province were contested between the Kingdom of the Lombards and the German Empire."
    entities:
      - name: "Verona"
        type: place
      - name: "Lombardy"
        type: polity
      - name: "German Empire"
        type: polity
      - name: "Second Tetrarchy"
        type: period
    dates: ["10th century N"]

  - category: polity
    claim: "The Verona branch of the Adelchian dynasty ruled Lombardy during the eleventh century."
    entities:
      - name: "Adelchian dynasty"
        type: group
      - name: "Lombardy"
        type: polity
    dates: ["11th century N"]

  - category: polity
    claim: "In the late twelfth and early thirteenth centuries, Verona was part of the duchy of Furlain and its most prosperous city."
    entities:
      - name: "Verona"
        type: place
      - name: "Furlain"
        type: polity
    dates: ["late 12th century N", "early 13th century N"]

  - category: event
    claim: "Verona was badly affected by the Second German War of the early nineteenth century."
    entities:
      - name: "Verona"
        type: place
      - name: "Second German War"
        type: event
    dates: ["early 19th century N"]

  - category: place
    claim: "The arena in Verona is a classical amphitheatre that was reopened for performances shortly after the end of the Second German War."
    entities:
      - name: "Verona"
        type: place
      - name: "Second German War"
        type: event

  - category: person
    claim: "Jacob III (1087–1130) was king of Lombardy and the last of the Verona branch of the Adelchians to grow up in Verona."
    entities:
      - name: "Jacob III"
        type: person
      - name: "Lombardy"
        type: polity
      - name: "Verona"
        type: place
      - name: "Adelchian dynasty"
        type: group
    dates: ["1087 N", "1130 N"]

  - category: event
    claim: "The Second German War (1815–23) was a conflict centred on German lands but involving almost all the polities of Europe."
    entities:
      - name: "Second German War"
        type: event
    dates: ["1815 N", "1823 N"]

  - category: period
    claim: "The Second German War marks the conventional end of the Long Peace."
    entities:
      - name: "Second German War"
        type: event
      - name: "Long Peace"
        type: period

  - category: event
    claim: "The Second German War is considered part of the global phenomenon of Reaction War."
    entities:
      - name: "Second German War"
        type: event
      - name: "Reaction War"
        type: period

  - category: event
    claim: "Vascony's king Hernand IV eventually declared against the Northern Concert and in favour of the Convoy once Vascon interests in Mendeva and the East were threatened."
    entities:
      - name: "Hernand IV"
        type: person
      - name: "Vascony"
        type: polity
      - name: "Northern Concert"
        type: polity
      - name: "Convoy"
        type: polity

  - category: event
    claim: "Borland participated in the Second German War, with Borlish soldiers present alongside Bavarn and Furlaine fighters at the Battle of Hulm in 1821."
    entities:
      - name: "Borland"
        type: polity
      - name: "Battle of Hulm"
        type: event
      - name: "Bavarn"
        type: polity
      - name: "Furlain"
        type: polity
    dates: ["1821 N"]

  - category: event
    claim: "Borland was allied with the Northern Concert in the Second German War, which sparked many mozard protests in cities across the country."
    entities:
      - name: "Borland"
        type: polity
      - name: "Northern Concert"
        type: polity

  - category: event
    claim: "The Kingdom of France was seen to have profited unjustly from the Second German War, gaining significant territory."
    entities:
      - name: "France"
        type: polity
      - name: "Second German War"
        type: event

  - category: event
    claim: "In the 1820s and 1830s, immigration to the Novomund, especially to New Provence, spiked from countries most devastated by the Second German War."
    entities:
      - name: "Novomund"
        type: place
      - name: "New Provence"
        type: polity
    dates: ["1820s", "1830s"]
