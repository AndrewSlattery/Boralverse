entry: 174.5
title: "False Friends (cont.)"
source_work: "Concise Onomatory o'Merch (fifth edition, Utcheter Lexical Association, 1961)"
claims:
  - category: language
    claim: "The Merch word cockapple means apricot; it is a late seventeenth-century variant of apricock, itself from French abricoc, ultimately from Latin (mālum) praecoquum meaning 'early-ripening apple'."
    entities:
      - name: cockapple
        type: concept

  - category: language
    claim: "The Merch word handiwork means surgery (in the medical sense); it derives in the sixteenth century from Old English handȝeweorc meaning 'manual labour'."
    entities:
      - name: handiwork
        type: concept

  - category: language
    claim: "The Merch word ough means bad, of low quality, or unwell; it descends from Old English wōh meaning 'crooked, bent; wrong'."
    entities:
      - name: ough
        type: concept

  - category: glossary
    claim: "Ferent is the Boralverse term for mammal."
    entities:
      - name: ferent
        irl: mammal
        type: concept

  - category: language
    claim: "The Merch word penguin means pangolin (a scaly mammal) or a card game from Bengal; it derives via various European languages from Bāsan penguwing meaning 'one who rolls'."
    entities:
      - name: penguin
        type: concept

  - category: glossary
    claim: "Bāsan is the Boralverse term for the Malay language."
    entities:
      - name: Bāsan
        irl: Malay
        type: concept
