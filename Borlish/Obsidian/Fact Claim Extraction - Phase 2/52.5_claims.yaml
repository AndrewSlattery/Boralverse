entry: 52.5
title: "30th Lexember"
claims:
  - category: language
    claim: "The Borlish word çarvinot means 'raspberry': the plant Rubus idaeus or the red fruit thereof."
    entities:
      - name: çarvinot
        type: concept

  - category: glossary
    claim: "Çarvinot is the Boralverse term for raspberry."
    entities:
      - name: çarvinot
        irl: raspberry
        type: concept

  - category: language
    claim: "Çarvinot also means 'purple-red': the colour of the ripe raspberry fruit."
    entities:
      - name: çarvinot
        type: concept

  - category: language
    claim: "Çarvinot is a further diminutive of obsolete Borlish çarvin (cervin), itself abbreviated from Old Boral baȝ cervin ('raspberry', literally 'fawn berry')."
    entities:
      - name: çarvinot
        type: concept

  - category: work
    claim: "'Lux Æterna: The First Century of Threshold Force' was written in 2002 N by Cawen ba Dirxen at the Varonøw Higher Edifice."
    entities:
      - name: "Lux Æterna: The First Century of Threshold Force"
        type: work
      - name: Cawen ba Dirxen
        type: person
      - name: Varonøw Higher Edifice
        type: organisation
    dates: "2002 N"

  - category: work
    claim: "The Dutch title of 'Lux Æterna: The First Century of Threshold Force' is 'Onslackbar Vláy: Drampelstøweth tÿdes har Rést Éw' ('Unquenchable Fire: Threshold Force in its First Century')."
    entities:
      - name: "Lux Æterna: The First Century of Threshold Force"
        type: work

  - category: work
    claim: "'Lux Æterna' was commissioned to commemorate the centenary of the discovery of the atomic nux in the city's Nÿstad Atellier."
    entities:
      - name: "Lux Æterna: The First Century of Threshold Force"
        type: work
      - name: Nÿstad Atellier
        type: organisation

  - category: glossary
    claim: "Atomic nux is the Boralverse term for atomic nucleus."
    entities:
      - name: atomic nux
        irl: atomic nucleus
        type: concept

  - category: event
    claim: "The atomic nux was discovered around 1902 N at the Nÿstad Atellier."
    entities:
      - name: Nÿstad Atellier
        type: organisation
    dates: "c. 1902 N"

  - category: person
    claim: "Lohic Courvoisier de Nÿstad was a substantial theorist who privately owned and ran the Nÿstad Atellier at the time of the atomic nux discovery."
    entities:
      - name: Lohic Courvoisier de Nÿstad
        type: person
      - name: Nÿstad Atellier
        type: organisation

  - category: glossary
    claim: "Killdark is the Boralverse term for uranium."
    entities:
      - name: killdark
        irl: uranium
        type: concept

  - category: glossary
    claim: "Tarmarette is the Boralverse term for yellowcake (processed uranium oxide)."
    entities:
      - name: tarmarette
        irl: yellowcake
        type: concept

  - category: glossary
    claim: "Corporal enumerations is the Boralverse term for periodic tables."
    entities:
      - name: corporal enumerations
        irl: periodic tables
        type: concept

  - category: event
    claim: "The first corporal enumerations appeared in the 1840s N, at which point it was realised that ordering corporals by weight alone led to inelegant groupings."
    entities:
      - name: corporal enumerations
        type: concept
    dates: "1840s N"

  - category: person
    claim: "In 1881 N, Kievan theorist Nike Sarantylack proposed the 'mulberry' model of atomic structure, which supposed each atom to comprise a number of each of two different sub-particles."
    entities:
      - name: Nike Sarantylack
        type: person
    dates: "1881 N"

  - category: person
    claim: "Nike Sarantylack proposed her model a dozen years before a device capable of testing it existed."
    entities:
      - name: Nike Sarantylack
        type: person
    dates: "1881 N"

  - category: terminology
    claim: "The Atomicity Rift was a scientific debate between atomicists (who held the intrinsic Leucippic model) and those who regarded the atomic scheme as a merely useful fiction."
    entities:
      - name: Atomicity Rift
        type: event
