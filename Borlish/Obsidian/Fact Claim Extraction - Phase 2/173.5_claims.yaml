entry: 173.5
title: "American Toponymy"
source_work: "Veriloquace Glossary o'Mendevan Placenames (Rotcham University Primers)"
claims:
  - category: place
    claim: "Ax is a peninsular polity in northwestern Mendeva along with the surrounding mainland and an extended chain of islands leading west into the northern Lovaqua."
    entities:
      - name: Ax
        type: polity
      - name: Mendeva
        type: place

  - category: language
    claim: "The name Ax derives from early eighteenth-century Arabic al-Aqśá meaning 'the Furthest', via folk etymology from Oranger alaxsxaq meaning 'mainland'."
    entities:
      - name: Ax
        type: polity

  - category: glossary
    claim: "Oranger is the Boralverse term for the Aleut language and people."
    entities:
      - name: Oranger
        irl: Aleut
        type: concept

  - category: glossary
    claim: "Gulf of the Arcabil is the Boralverse name for the Gulf of Mexico."
    entities:
      - name: Gulf of the Arcabil
        irl: Gulf of Mexico
        type: place

  - category: language
    claim: "The name Bahassassin derives from Carovacian báhassássin meaning 'mother of rivers', entering Boralverse usage via mid-seventeenth-century Welsh and first recorded in 1704."
    entities:
      - name: Bahassassin
        type: place
    dates: "1704 N"

  - category: place
    claim: "Cocain is the largest of the islands of the Arcabil, or the polity occupying this island and part of mainland Mendeva."
    entities:
      - name: Cocain
        type: polity

  - category: language
    claim: "The name Cocain was adopted in 1530, repurposing a word meaning 'an imaginary land of folklore with an abundance of food and pleasure', dating to the late fourteenth century from French Cocagne."
    entities:
      - name: Cocain
        type: polity
    dates: "1530 N; earlier sense: late 14th c. N"
