entry: "36.5"
title: "Wars and Rumours of Wars"
claims:
  - category: event
    claim: "The First German War ended in 1770 and was a conflict in eighteenth-century Europe."
    entities:
      - name: "First German War"
        type: event
    dates: ["1770 N"]

  - category: period
    claim: "The conclusion of the First German War is usually taken as the start of the Long Peace."
    entities:
      - name: "First German War"
        type: event
      - name: "Long Peace"
        type: period

  - category: event
    claim: "Saxony was ascendant immediately following the First German War, controlling more territory than at any point in its history."
    entities:
      - name: "Saxony"
        type: polity
      - name: "First German War"
        type: event

  - category: economics
    claim: "Saxony's post-First German War territorial gains stood it in good stead for early industrialisation, especially in its capital Lepzi."
    entities:
      - name: "Saxony"
        type: polity
      - name: "Lepzi"
        type: place

  - category: event
    claim: "The Democratic Wars were a collection of international and civil wars which took place in the mid-eighteenth century."
    entities:
      - name: "Democratic Wars"
        type: event
    dates: ["mid-18th century N"]

  - category: technology
    claim: "The earliest incarnations of steeplepost technology were seen during the Democratic Wars."
    entities:
      - name: "steeplepost"
        type: technology
      - name: "Democratic Wars"
        type: event

  - category: technology
    claim: "One advanced and permanent steeplepost system was used to connect Cordova to Malaga in Andalus during their conflict with Morrack."
    entities:
      - name: "steeplepost"
        type: technology
      - name: "Cordova"
        type: place
      - name: "Malaga"
        type: place
      - name: "Andalus"
        type: polity
      - name: "Morrack"
        type: polity

  - category: event
    claim: "After the Democratic Wars, the city of London found itself newly independent for one final, lasting time."
    entities:
      - name: "London"
        type: place
      - name: "Democratic Wars"
        type: event

  - category: event
    claim: "The end of the Democratic Wars and the concomitant massive migrations are suspected to have contributed to the global spread of pennackit dystentery beginning in 1753."
    entities:
      - name: "Democratic Wars"
        type: event
      - name: "pennackit dystentery"
        type: concept
    dates: ["1753 N"]
