- entry: 117.5
  title: Sound Changes from Vulgar Latin to Borlish
  category: language
  claim: The Insular variety of Vulgar Latin comprised Borlish Latin and British Latin, and was not overly divergent from
    continental Latin of the third to fifth centuries.
  entities:
  - name: Borlish
    type: concept
- entry: 117.5
  title: Sound Changes from Vulgar Latin to Borlish
  category: language
  claim: By the Old Borlish period, all number and case distinctions in Borlish nouns had been lost.
  entities:
  - name: Borlish
    type: concept
- entry: 117.5
  title: Sound Changes from Vulgar Latin to Borlish
  category: language
  claim: Late Old Borlish is the stage of Borlish around the turn of the thirteenth century.
  entities:
  - name: Borlish
    type: concept
  dates: c. 1200 N
- entry: 117.5
  title: Sound Changes from Vulgar Latin to Borlish
  category: language
  claim: The Borlish word sour 'sister' is the only counterexample where the nominative singular survived over the oblique
    form in late Old Borlish levelling.
  entities:
  - name: Borlish
    type: concept
- entry: 117.5
  title: Sound Changes from Vulgar Latin to Borlish
  category: language
  claim: The Borlish words oc 'singular' and ec 'plural' derive from the Latin demonstrative hic 'this', with neuter forms
    hoc and haec respectively.
  entities:
  - name: Borlish
    type: concept
- entry: 117.5
  title: Sound Changes from Vulgar Latin to Borlish
  category: language
  claim: Modern Borlish stoir 'story' reflects Latin historia, via Old Borlish istoir, through aphæresis of the initial vowel
    cluster.
  entities:
  - name: Borlish
    type: concept
- entry: 121.5
  title: Pluralisation
  category: language
  claim: Final /-s/ is lost very early in the development of Borlish, by around 500 AD, which is one of the first sound changes
    distinguishing Borlish from mainland Romance languages.
  entities:
  - name: Borlish
    type: concept
  dates: c. 500 N
- entry: 121.5
  title: Pluralisation
  category: language
  claim: By the late Old Borlish period, the noun paradigm for regular Borlish nouns had completely collapsed due to loss
    of final vowels and case distinctions.
  entities:
  - name: Borlish
    type: concept
- entry: 121.5
  title: Pluralisation
  category: language
  claim: Borlish uses oc 'singular' and ec 'plural' derived from the neuter forms hoc and haec of the Latin demonstrative
    hic 'this'.
  entities:
  - name: Borlish
    type: concept
- entry: 121.5
  title: Pluralisation
  category: language
  claim: The Borlish word sour 'sister' is the only surviving example where the nominative singular form was retained over
    the oblique form during noun paradigm levelling.
  entities:
  - name: Borlish
    type: concept
- entry: 121.5
  title: Pluralisation
  category: language
  claim: The male Borlish name Ivocq is thought to reflect Borland Celtic *iwok- 'like a yew tree'.
  entities:
  - name: Borlish
    type: concept
- entry: 121.5
  title: Pluralisation
  category: language
  claim: The female Borlish name Jonnovar entered the language during the medieval period, is cognate with Guinevere and Jennifer,
    and is also used as a common noun meaning 'butterfly'.
  entities:
  - name: Borlish
    type: concept
- entry: 149.5
  title: 27th Lexember - demastr
  category: language
  claim: The modern Borlish first-conjugation third-person plural preterite ending -aurn descends from either the Latin pluperfect
    -āvĕrant or the syncopated Latin perfect -ārunt.
  entities:
  - name: Borlish
    type: concept
- entry: 149.5
  title: 27th Lexember - demastr
  category: language
  claim: The Latin occupational suffix -ātor became -our in Borlish; the suffix is native to Borlish, appearing productively
    as early as the eighth-century Halvuy chronicle.
  entities:
  - name: Borlish
    type: concept
  dates: 8th c. N
- entry: 172.5
  title: How to spell Borlish
  category: language
  claim: The standard Borlish alphabet has twenty-seven letters.
  entities:
  - name: Borlish
    type: concept
- entry: 172.5
  title: How to spell Borlish
  category: language
  claim: The Borlish letter w is called vescon meaning 'second-vee' and is pronounced like v; it is used in foreign words
    and some names.
  entities:
  - name: Borlish
    type: concept
- entry: 172.5
  title: How to spell Borlish
  category: language
  claim: The Borlish ligatures æ and œ are called æsc and œthel respectively and are pronounced like e; they are primarily
    used in Classical loanwords.
  entities:
  - name: Borlish
    type: concept
- entry: 172.5
  title: How to spell Borlish
  category: language
  claim: The Borlish character ï is called i jammel meaning 'twin i' and is pronounced like yi.
  entities:
  - name: Borlish
    type: concept
- entry: 172.5
  title: How to spell Borlish
  category: language
  claim: In Borlish orthography, the letter ð is pronounced /θ/ word-finally and /ð/ otherwise; x denotes the sequence /ks/.
  entities:
  - name: Borlish
    type: concept
- entry: 172.5
  title: How to spell Borlish
  category: language
  claim: In Borlish, the letter c is pronounced /ts/ before e, i, y and /k/ otherwise; g may be pronounced as either /g/ or
    /ʒ/ before e, i, y and is pronounced /g/ otherwise.
  entities:
  - name: Borlish
    type: concept
- entry: 172.5
  title: How to spell Borlish
  category: language
  claim: In Borlish, the consonant digraphs sc, ch, th denote /x/, /k/, /θ/ respectively; sch is read /sk/ and cq is pronounced
    /k/.
  entities:
  - name: Borlish
    type: concept
- entry: 192.5
  title: Borlish Adjectives
  category: language
  claim: 'Borlish adjectives have two forms: a base form and a comparative form; the regular comparative suffix is -essem,
    which replaces or follows the final segment of the adjective and attracts penultimate stress.'
  entities:
  - name: Borlish
    type: concept
- entry: 192.5
  title: Borlish Adjectives
  category: language
  claim: 'Several Borlish adjectives have suppletive comparative forms: bon (''good'') → ottem (''better''); mal (''bad'')
    → pessem (''worse''); gran (''big'') → maissem (''bigger'').'
  entities:
  - name: Borlish
    type: concept
- entry: 192.5
  title: Borlish Adjectives
  category: language
  claim: Most Borlish adjectives ending in syllabic -r form the comparative with the suffix -errem, which replaces the final
    syllabic consonant and is stressed penultimately.
  entities:
  - name: Borlish
    type: concept
