- entry: 164.5
  title: Kelt Borland
  category: language
  claim: The name Borland is thought to descend from the Kelt enis borag meaning 'island of the dawn' and bora ale meaning
    'the other Easterners', originally an exonym used by Brythonic speakers on Albion; the Romans were also influenced by
    its similarity to Latin boreālis meaning 'northern'.
