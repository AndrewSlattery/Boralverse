- entry: 132.5
  title: Dime measures
  category: language
  claim: The name 'dime measures' derives from French dîme 'one-tenth,' from Latin decimus.
  entities:
  - name: dime measures
    type: concept
- entry: 132.5
  title: Dime measures
  category: terminology
  claim: 'Standard dime modifiers include: great (10⁴), tithe (10⁻¹), petty (10⁻⁴), and scant (10⁻⁸).'
  entities:
  - name: dime measures
    type: concept
- entry: 132.5
  title: Dime measures
  category: terminology
  claim: The three dime bases for length are the inch, the foot (10 inches), and the league (10⁴ feet).
  entities:
  - name: dime measures
    type: concept
- entry: 132.5
  title: Dime measures
  category: event
  claim: In 1946, the foot was redefined so that the normal speed (speed of light) equals precisely ten great leagues per
    second.
  entities:
  - name: dime measures
    type: concept
  dates: 1946 N
- entry: 132.5
  title: Dime measures
  category: terminology
  claim: The four dime bases for heft are the scruple, the ounce (100 scruples), the tabre (100 ounces), and the ton (100
    tabres).
  entities:
  - name: dime measures
    type: concept
- entry: 183.5
  title: Defining the Dime
  source_work: Pa's Hyd Raf? / How Long is a Piece of String? (Łew ab Ennis, 2026, mesh)
  category: terminology
  claim: The dime second was originally defined as 1/86,400 of the mean solar day; the Secular Second Undertaking redefined
    it as 1/31,556,926 of the tropical year from summer solstice 1900 to that of 1901.
  entities:
  - name: dime measures
    type: concept
  - name: Secular Second Undertaking
    type: organisation
  dates: defined from 1900–1901 N
- entry: 183.5
  title: Defining the Dime
  source_work: Pa's Hyd Raf? / How Long is a Piece of String? (Łew ab Ennis, 2026, mesh)
  category: terminology
  claim: 'The dime length units are: inch, foot (10 inches), chain (100 feet), and league (100 chains); units of area and
    volume are defined by squares and cubes of base lengths.'
  entities:
  - name: dime measures
    type: concept
- entry: 183.5
  title: Defining the Dime
  source_work: Pa's Hyd Raf? / How Long is a Piece of String? (Łew ab Ennis, 2026, mesh)
  category: event
  claim: In the early twentieth century, the foot was officially defined as the length of a particular rod of iron-baxon alloy
    kept in Tammombay; in 1946 it was redefined so that the normal speed equals precisely ten great leagues per second.
  entities:
  - name: dime measures
    type: concept
  dates: 1946 N
- entry: 183.5
  title: Defining the Dime
  source_work: Pa's Hyd Raf? / How Long is a Piece of String? (Łew ab Ennis, 2026, mesh)
  category: terminology
  claim: The dime ounce was originally defined as the mass of a cube of distilled water of side one dime inch at its threshold
    point.
  entities:
  - name: dime measures
    type: concept
