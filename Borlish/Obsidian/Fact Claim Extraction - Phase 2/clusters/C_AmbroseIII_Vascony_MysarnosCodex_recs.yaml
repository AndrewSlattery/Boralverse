# Recommendations for cluster C_AmbroseIII_Vascony_MysarnosCodex
entity_reviews:

  - entity: "Ambrose III"
    near_duplicate_groups:

      - claims_in_group:
          - entry: "14.5"
            claim: "Ambrose III lived from 17 March 1435 to 28 February 1518."
          - entry: "56.5"
            claim: "Ambrose III 'The Ascendant' (17 March 1435–28 February 1518 N) presided over the Vascon Ascendancy."
        action: merge
        reason: "Both state identical birth and death dates. The 56.5 claim conflates dates with the epithet and the Vascon Ascendancy, making it harder to cite atomically. The 14.5 claim is the clean, standalone date claim; the epithet and Ascendancy association are captured elsewhere."
        merged_claim:
          category: person
          claim: "Ambrose III lived from 17 March 1435 to 28 February 1518 N and presided over the Vascon Ascendancy."
          entities:
            - name: Ambrose III
              type: person
            - name: Vascony
              type: polity
          dates:
            - 17 March 1435 N
            - 28 February 1518 N

      - claims_in_group:
          - entry: "14.5"
            claim: "Ambrose III is also called Ambrose the Ascendant."
          - entry: "56.5"
            claim: "Ambrose III 'The Ascendant' (17 March 1435–28 February 1518 N) presided over the Vascon Ascendancy."
        action: remove_duplicates
        keep_entry: "14.5"
        reason: "Both establish that Ambrose III bore the epithet 'the Ascendant'. The 14.5 claim handles this atomically; the epithet component in 56.5 is redundant once that entry is merged with the dates claim above."

      - claims_in_group:
          - entry: "14.5"
            claim: "Ambrose III ascended to the throne upon the death of his grandfather Ambrose II, three years after his father's death."
          - entry: "122.5"
            claim: "Ambrose III 'the Ascendant' succeeded his grandfather Ambrose II in 1456."
        action: merge
        reason: "Both record that Ambrose III succeeded his grandfather Ambrose II in 1456. The 14.5 version adds the three-years-after-father's-death detail; the 122.5 version adds the explicit date 1456. Neither is fully complete alone."
        merged_claim:
          category: person
          claim: "Ambrose III ascended to the throne upon the death of his grandfather Ambrose II in 1456, three years after his father's death."
          entities:
            - name: Ambrose III
              type: person
            - name: Ambrose II
              type: person
          dates:
            - 1456 N

      - claims_in_group:
          - entry: "14.5"
            claim: "Ambrose III ruled the Vascon Kingdom of Navar and Aquitain (Vascony) from 1456 until his death."
          - entry: "14.5"
            claim: "Ambrose III ascended to the throne upon the death of his grandfather Ambrose II, three years after his father's death."
          - entry: "122.5"
            claim: "Ambrose III 'the Ascendant' succeeded his grandfather Ambrose II in 1456."
        action: remove_duplicates
        keep_entry: "14.5"
        reason: "The claim that Ambrose III 'ruled from 1456 until his death' and the claim that he 'ascended in 1456' (entry 14.5) and 122.5 all assert the same accession year. After the merge recommended in the group above (ascension + date), the bare 'ruled from 1456' claim in 14.5 remains the canonical reign-span claim and 122.5 is subsumed."

      - claims_in_group:
          - entry: "14.5"
            claim: "Ambrose III had a long and acrimonious relationship with Munir al-Hamdawi."
          - entry: "14.5"
            claim: "Ambrose III's relationship with Munir al-Hamdawi grew from a childhood enmity to a bitter naval and martial feud."
        action: merge
        reason: "The first claim states the relationship was long and acrimonious; the second elaborates its arc (childhood enmity to naval/martial feud). Together they form one complete characterisation; neither is independently sufficient."
        merged_claim:
          category: person
          claim: "Ambrose III had a long and acrimonious relationship with Munir al-Hamdawi, which grew from a childhood enmity into a bitter naval and martial feud."
          entities:
            - name: Ambrose III
              type: person
            - name: Munir al-Hamdawi
              type: person

      - claims_in_group:
          - entry: "56.5"
            claim: "In 1458 N, Ambrose III established by royal decree the New Navarre Enterprise, whose primary aim was to solidify Vascon supremacy in the trade of North Atlantic fish through the Middlesea."
          - entry: "122.5"
            claim: "Ambrose III established the New Navarre Enterprise in 1458, an expanded merchant fleet aimed at monopolising North Atlantic fish trade and creating trade ports along the west African coast."
        action: merge
        reason: "Both record the founding of the New Navarre Enterprise in 1458 and its North Atlantic fish-trade focus. Each version adds distinct detail (56.5: royal decree, Middlesea; 122.5: expanded merchant fleet, west African coast ports). A merged claim preserves all unique details."
        merged_claim:
          category: event
          claim: "In 1458 N, Ambrose III established by royal decree the New Navarre Enterprise — an expanded merchant fleet whose primary aims were to monopolise the trade of North Atlantic fish through the Middlesea and to create trade ports along the west African coast."
          entities:
            - name: Ambrose III
              type: person
            - name: New Navarre Enterprise
              type: organisation
            - name: Vascony
              type: polity
          dates:
            - 1458 N

    assessment: "Found 5 near-duplicate groups. Groups 1–2 concern the birth/death dates and epithet duplicated across entries 14.5 and 56.5. Group 3–4 concern the 1456 accession duplicated across entries 14.5 and 122.5. Group 5 merges two within-entry claims about Munir al-Hamdawi. Group 6 merges the New Navarre Enterprise founding across entries 56.5 and 122.5. No outright contradictions identified; the sibling claims (Princess Alexandra in 14.5 vs. two younger siblings Prince Victor and Princess Natalia in 14.5) are separate atomic facts, not duplicates."

  - entity: "Vascony"
    near_duplicate_groups:

      - claims_in_group:
          - entry: "15.5"
            claim: "Vascony lost over a fifth of its population in the Second Great Dying."
          - entry: "56.5"
            claim: "Vascony lost over a fifth of its population to the Second Great Dying in the years after the plague's arrival in Europe in 1519 N."
        action: remove_duplicates
        keep_entry: "56.5"
        reason: "Identical core fact (over a fifth of population lost to the Second Great Dying). Entry 56.5 adds the date anchor (after 1519 N) and is the more complete version."

      - claims_in_group:
          - entry: "14.5"
            claim: "A decade after 1494, the remainder of Vascony's Middlesea coast was taken by Barcelon."
          - entry: "56.5"
            claim: "About a decade after losing Provence, Vascony's Middlesea coast (primarily the region of Tolose) was taken by Barcelon."
        action: merge
        reason: "Both place the Barcelon takeover of Vascony's Middlesea coast at approximately c. 1504. Entry 14.5 anchors the date explicitly (decade after 1494); entry 56.5 names the specific region (Tolose) and gives the contextual trigger (after losing Provence). A merged claim preserves all detail."
        merged_claim:
          category: event
          claim: "About a decade after 1494, following the loss of Provence, Vascony's Middlesea coast (primarily the region of Tolose) was taken by Barcelon."
          entities:
            - name: Vascony
              type: polity
            - name: Barcelon
              type: polity
            - name: Tolose
              type: place
          dates:
            - c. 1504 N

      - claims_in_group:
          - entry: "39.5"
            claim: "Vascony was forced to cede Portingale to Andalus after a series of military successes by Andalus in the Romantic Wars of the mid-seventeenth century."
          - entry: "56.5"
            claim: "During the Romantic Wars of the mid-seventeenth century, Vascony fought primarily with Morrack to the south, and was forced to cede Portingale to Andalus after military defeats."
          - entry: "67.5"
            claim: "During the Romantic Wars, Vascony was forced to cede its economic heart in Portingale to Andalus, which at the time was controlled by Morrack."
        action: merge
        reason: "All three record the same core event: Vascony ceding Portingale to Andalus during the Romantic Wars. Entry 56.5 adds that Vascony fought primarily with Morrack; entry 67.5 adds that Andalus was at the time controlled by Morrack and characterises Portingale as Vascony's economic heart; entry 39.5 specifies a series of military successes. These details are complementary and reconcilable (Morrack controlling Andalus explains why the military threat came from the south). Entry 56.5 is the most complete standalone version."
        merged_claim:
          category: event
          claim: "During the Romantic Wars of the mid-seventeenth century, Vascony fought primarily with Morrack to the south and was forced to cede Portingale — its economic heart — to Andalus (then controlled by Morrack) after a series of military defeats."
          entities:
            - name: Vascony
              type: polity
            - name: Portingale
              type: polity
            - name: Andalus
              type: polity
            - name: Morrack
              type: polity
            - name: Romantic Wars
              type: event
          dates:
            - mid-17th c. N

      - claims_in_group:
          - entry: "22.5"
            claim: "The kingdom of Vascony was the heart of the Modest Arrangement during the Long Peace."
          - entry: "22.5"
            claim: "Vascony was especially the heart of the Modest Arrangement in the Long Peace's later years under the Vallabrì administration and King Hernand."
        action: remove_duplicates
        keep_entry: "22.5"
        reason: "The second 22.5 claim is a temporal refinement of the first (specifically the Long Peace's later years), not a fully independent fact. However, the first claim establishes the broader truth across the whole Long Peace, while the second adds specific actors. These are related but the second is strictly more specific. Recommend keeping both but flagging as a near-duplicate pair for potential consolidation; the second subsumes but does not replace the first since the broader claim may be independently useful."

    assessment: "Found 4 near-duplicate groups. Group 1 concerns the Second Great Dying population loss duplicated across entries 15.5 and 56.5. Group 2 merges the Barcelon takeover of the Middlesea coast across entries 14.5 and 56.5. Group 3 merges three overlapping claims about the Romantic Wars Portingale cession across entries 39.5, 56.5, and 67.5. Group 4 flags a within-entry near-duplicate pair about Vascony's role in the Modest Arrangement. No outright contradictions; the Romantic Wars entries are fully reconcilable via the Morrack-controls-Andalus relationship stated in 67.5."

  - entity: "Mysarnos Codex"
    near_duplicate_groups:

      - claims_in_group:
          - entry: "6.5"
            claim: "The author of the Mysarnos Codex has never been conclusively identified."
          - entry: "62.5"
            claim: "The author of the Mysarnos Codex has never been conclusively identified, despite extant and complete membership records for the area's monasteries."
        action: remove_duplicates
        keep_entry: "62.5"
        reason: "Identical core claim; entry 62.5 adds the evidential detail about monastery membership records and is the more complete version."

      - claims_in_group:
          - entry: "6.5"
            claim: "The Mysarnos Codex was composed or at least first stored at the Library of Saint George the Martyr."
          - entry: "62.5"
            claim: "The Mysarnos Codex was composed in the sixteenth century and first stored at the Library of Saint George the Martyr, north of the city of Mysarnos."
        action: remove_duplicates
        keep_entry: "62.5"
        reason: "Same claim about composition/storage at the Library of Saint George the Martyr. Entry 62.5 adds the sixteenth-century date and the geographic detail (north of the city of Mysarnos). The hedged phrasing 'composed or at least first stored' in 6.5 is noteworthy but 62.5's more confident statement 'composed in the sixteenth century and first stored' is the canonical version from the dedicated Mysarnos Codex article."

      - claims_in_group:
          - entry: "6.5"
            claim: "The Mysarnos Codex originally comprised over two hundred illustrated vellum folios."
          - entry: "62.5"
            claim: "The Mysarnos Codex is thought to have originally comprised over two hundred vellum illustrated folios, with illustrations including both mundane scenes and fantastical vistas."
        action: remove_duplicates
        keep_entry: "62.5"
        reason: "Same core claim about the original folio count. Entry 62.5 adds epistemic hedging ('is thought to have') and a brief description of the illustration range, making it the more complete version."

      - claims_in_group:
          - entry: "6.5"
            claim: "The Mysarnos Codex is lined with incomprehensible but clearly meaningful symbols."
          - entry: "62.5"
            claim: "The Mysarnos Codex is an illustrated manuscript written entirely in an unfamiliar script which eluded decipherment for centuries."
        action: merge
        reason: "Both describe the Codex's undeciphered script. Entry 6.5 emphasises that the symbols are 'clearly meaningful'; entry 62.5 specifies the script eluded decipherment for centuries. These are complementary characterisations of the same physical fact."
        merged_claim:
          category: work
          claim: "The Mysarnos Codex is an illustrated manuscript written entirely in an unfamiliar script — comprehensible in structure but eluding decipherment for centuries."
          entities:
            - name: Mysarnos Codex
              type: work

      - claims_in_group:
          - entry: "6.5"
            claim: "At most 200 different glyphs appear throughout the entire Mysarnos Codex."
          - entry: "62.5"
            claim: "The text of the Mysarnos Codex consists of approximately 180 different glyphs arranged into words and paragraphs."
        action: flag_contradiction
        reason: "'At most 200' and 'approximately 180' are not strictly contradictory ranges, but they imply different precision and may derive from different analyses or different surviving portions of the Codex. Flagged for author review to determine which count is canonical."
        contradiction_note: "Entry 6.5 states 'at most 200 different glyphs'; entry 62.5 states 'approximately 180 different glyphs'. The ranges could be compatible (180 is within 200) but may reflect distinct analyses or source texts. Author should confirm the canonical glyph count and reconcile the two entries."

      - claims_in_group:
          - entry: "6.5"
            claim: "The text of the Mysarnos Codex has baffled historians and linguists for centuries."
          - entry: "62.5"
            claim: "The Mysarnos Codex is an illustrated manuscript written entirely in an unfamiliar script which eluded decipherment for centuries."
        action: remove_duplicates
        keep_entry: "62.5"
        reason: "Both convey that the Codex resisted understanding for centuries. Entry 62.5 folds this idea into its broader description of the script and is the preferred form; entry 6.5's standalone 'baffled historians and linguists' claim is subsumed."

      - claims_in_group:
          - entry: "6.5"
            claim: "The illustrations in the Mysarnos Codex range from the utterly mundane to the fantastical."
          - entry: "62.5"
            claim: "The Mysarnos Codex is thought to have originally comprised over two hundred vellum illustrated folios, with illustrations including both mundane scenes and fantastical vistas."
        action: remove_duplicates
        keep_entry: "62.5"
        reason: "The 6.5 claim about illustration range (mundane to fantastical) is incorporated within the 62.5 folios claim. The specific example claim in 6.5 ('fields of poppies and armoured men on the backs of four-winged dragons') is unique and should be retained as a separate entry."

      - claims_in_group:
          - entry: "5.5"
            claim: "Pages from the Mysarnos Codex were rediscovered in the Library of Sobjan."
          - entry: "62.5"
            claim: "The revelation that the Mysarnos glyphs were being used to write a form of Greek came in 1939 N, with the unearthing of the lost First Folio at the Library of Sobjan."
        action: merge
        reason: "Both record the rediscovery of key Codex material at the Library of Sobjan. Entry 5.5 is vague ('pages'); entry 62.5 specifies the 'lost First Folio', the date 1939 N, and the linguistic revelation. Entry 62.5 is the more complete account; 5.5 is superseded."
        merged_claim:
          category: event
          claim: "In 1939 N, the lost First Folio of the Mysarnos Codex was unearthed at the Library of Sobjan, revealing that the Mysarnos glyphs were being used to write a form of Greek."
          entities:
            - name: Mysarnos Codex
              type: work
            - name: Library of Sobjan
              type: organisation
          dates:
            - 1939 N

      - claims_in_group:
          - entry: "5.5"
            claim: "The rediscovered pages from the Library of Sobjan contained the same text written in both Greek and the codex's own script, constituting a key to decipherment."
          - entry: "5.5"
            claim: "The bilingual text in the rediscovered pages is a fictionalised biography of the author of the Mysarnos Codex."
          - entry: "62.5"
            claim: "The lost First Folio (found at the Library of Sobjan) began with a fictionalised biography of the author written both in contemporary Greek and in the codex's script, allowing for direct comparison and full decipherment."
        action: remove_duplicates
        keep_entry: "62.5"
        reason: "All three claims describe the same bilingual first folio: it contains text in both Greek and the Codex script, is a fictionalised biography of the author, and enabled decipherment. Entry 62.5 combines all three details ('fictionalised biography of the author written both in contemporary Greek and in the codex's script, allowing for direct comparison and full decipherment') and is the most complete and atomic single claim."

    assessment: "Found 9 near-duplicate groups. Groups 1–3 are straightforward cases where a claim in entry 6.5 is restated more completely in entry 62.5. Group 4 merges two complementary script descriptions. Group 5 is a genuine potential contradiction (glyph count: 'at most 200' vs 'approximately 180') flagged for author review. Groups 6–7 are additional 6.5 claims subsumed by 62.5. Groups 8–9 merge the Sobjan rediscovery accounts across entries 5.5 and 62.5. One contradiction flagged (glyph count). The specific illustration example in 6.5 ('fields of poppies and armoured men on the backs of four-winged dragons') has no duplicate and should be retained independently."
