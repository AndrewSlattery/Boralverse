# Recommendations for clusters H and I

entity_reviews:

  - entity: "Markland"
    near_duplicate_groups:

      - claims_in_group:
          - entry: "33.5"
            claim: "Almost twice as many deaths per capita are recorded in Markland and English Kent from the Second Great Dying compared with Norman Kent or Willemy."
          - entry: "72.5"
            claim: "Poor economic conditions and population displacement in Markland following the Wars of Fealty led it to suffer almost twice as many deaths per capita from the Second Great Dying compared to polities like Willemy."
        action: merge
        keep_entry: "72.5"
        merged_claim: "Poor economic conditions and population displacement in Markland (and English Kent) following the Wars of Fealty led them to suffer almost twice as many deaths per capita from the Second Great Dying compared to polities like Norman Kent or Willemy."
        reason: "Both claims assert the same ~2x per capita death toll for Markland in the Second Great Dying relative to Willemy. 72.5 is richer (adds causal context: post-Wars of Fealty conditions) and is from the dedicated Markland article. 33.5 adds the Kent comparison and source context (Wars of Fealty article); the merged claim preserves both details."

      - claims_in_group:
          - entry: "40.5"
            claim: "Markland withstood the Danes, though much of its eastern territory was settled by them."
          - entry: "72.5"
            claim: "Markland weathered the Viking Age more successfully than neighbouring Northumber, though much of its eastern coast was settled by Danes; the city of Lincon served as the de facto border of Danish rule for several decades."
        action: remove_duplicates
        keep_entry: "72.5"
        reason: "Both claims state that Markland resisted Danish conquest but had its eastern territory settled by Danes. 72.5 is substantially more detailed (adds the Northumber comparison, the specific city of Lincon as a de facto border, and the 'several decades' qualifier) and comes from the dedicated Markland article. 40.5 is a compressed restatement."

    assessment: "Found 2 near-duplicate groups. No outright contradictions detected."

  - entity: "Revillon"
    near_duplicate_groups:

      - claims_in_group:
          - entry: "19.5"
            claim: "Revillon is the Borlish term for the eve before Christide."
          - entry: "19.5"
            claim: "Revillon often refers to the entire day before Christide."
          - entry: "96.5"
            claim: "Revillon is the Borlish term for the eve (and often the entire day) before Christide."
        action: remove_duplicates
        keep_entry: "96.5"
        reason: "The two 19.5 claims together convey exactly the same content as the single 96.5 claim, which combines both nuances ('eve' and 'often the entire day') into one well-formed sentence. 96.5 is the most concise and complete single statement."

      - claims_in_group:
          - entry: "19.5"
            claim: "Revillon refers to the specific cultural practice on Borland of the Winter Feast."
          - entry: "96.5"
            claim: "Revillon also refers to the cultural practice of the Winter Feast (Borlish: y Fest Reveglon), a celebration held on Revillon in churches across Borland to which everyone in attendance brings food."
        action: remove_duplicates
        keep_entry: "96.5"
        reason: "96.5 subsumes the 19.5 claim entirely and adds the Borlish name, the church setting, and the potluck character of the feast. 19.5 is a stripped-down version of the same assertion."

      - claims_in_group:
          - entry: "19.5"
            claim: "Revillon is one of the longest continuously-practised folk traditions in Europe."
          - entry: "96.5"
            claim: "Evidence of winter solstice festivities involving communally-prepared feasts on Borland predates the Roman invasion, making Revillon one of the longest continuously-practised folk traditions in Europe."
        action: remove_duplicates
        keep_entry: "96.5"
        reason: "Both claims make the identical assertion about Revillon's longevity. 96.5 provides the evidentiary basis (pre-Roman solstice feasts) that supports the conclusion stated in 19.5 without it."

    assessment: "Found 3 near-duplicate groups. No contradictions detected. Note: 26.5 ('dating back to the time of the Insular Kelts') and 164.5 ('traces its origins to a Kelt winter feast called the Flidōlus, recorded by the third-century Roman historian Ammian') are compatible and complementary, not duplicates."

  - entity: "Southbar"
    near_duplicate_groups:

      - claims_in_group:
          - entry: "2.5"
            claim: "The Germanic migrations to Borland led to the formation of the petty kingdoms of Southbar and Angland."
          - entry: "26.5"
            claim: "By the end of the sixth century, Angles and Saxons had formed the Borlish petty kingdoms of Southbar and Angland."
        action: remove_duplicates
        keep_entry: "26.5"
        reason: "Both claims state that Germanic migration produced the petty kingdoms of Southbar and Angland. 26.5 is more precise: it gives a terminal date (end of sixth century) and specifies the ethnic groups (Angles and Saxons). 2.5 is a vague summary from the children's curriculum."

      - claims_in_group:
          - entry: "2.5"
            claim: "Following the Battle of Fendal, Southbar swore fealty to the unified kingdom."
          - entry: "26.5"
            claim: "Southbar pledged fealty after the circa-810 Battle of Fendal."
          - entry: "94.5"
            claim: "After the Battle of Fendal in 810, Southbar was forced to swear fealty as a subordinate kingdom to the First Kingdom of Borland."
          - entry: "175.5"
            claim: "Approximately seven years after the unification of Borland and Angland, Southbar was forced to pledge fealty to the new unified kingdom after the Battle of Fendal."
        action: remove_duplicates
        keep_entry: "94.5"
        reason: "All four claims assert the same event: Southbar pledged fealty after the Battle of Fendal (ca. 810). 94.5 is the most precise, giving the exact year 810, naming Southbar's subordinate status, and identifying the suzerain as the First Kingdom of Borland. 175.5 adds contextual timing ('~7 years after unification') which is complementary detail worth preserving in an annotation but does not constitute a separate fact claim."

      - claims_in_group:
          - entry: "26.5"
            claim: "Southbar is a county in the southwest of Borland which was once an independent kingdom."
          - entry: "94.5"
            claim: "Southbar is a region of Borland in the southwest of the island, with its largest population centre being the city of Axbane."
        action: merge
        keep_entry: "94.5"
        merged_claim: "Southbar is a county/region in the southwest of Borland which was once an independent kingdom, with its largest population centre being the city of Axbane."
        reason: "Both claims locate Southbar in the southwest of Borland. 26.5 specifies its current status as a county and its former status as a kingdom; 94.5 specifies its largest city (Axbane). Neither claim alone is complete; a merge preserves all information."

    assessment: "Found 3 near-duplicate groups. No contradictions detected."

  - entity: "Devon"
    near_duplicate_groups:

      - claims_in_group:
          - entry: "18.5"
            claim: "Devon had been de jure under Wessaxon authority since the final defeat of the West Albic Britons at Gaulford in 656."
          - entry: "63.5"
            claim: "Devon was conquered piecemeal by the Saxons, with the Battle of Gaulford in 656 N putting the area under the sole authority of the Kingdom of Wessex."
        action: merge
        keep_entry: "63.5"
        merged_claim: "Devon was conquered piecemeal by the Saxons; the final defeat of the West Albic Britons at the Battle of Gaulford in 656 N put the area under the sole (de jure) authority of the Kingdom of Wessex."
        reason: "Both claims describe Gaulford 656 as the moment Devon came under Saxon authority. 18.5 adds 'de jure' and names the defeated party (West Albic Britons); 63.5 adds 'piecemeal conquest' context. The polity name differs slightly ('Wessaxon' in 18.5 vs 'Wessex' in 63.5); this appears to be a terminological variant rather than a contradiction, but the merge normalises to the more commonly used 'Wessex' used in 63.5 while preserving the 'de jure' qualifier from 18.5."

    assessment: "Found 1 near-duplicate group. Note: the polity name 'Wessaxon' (18.5) vs 'Wessex' (63.5) for the same entity may warrant a terminology check, but both appear to refer to the same polity in context and are not treated as a contradiction here."

  - entity: "Kent"
    near_duplicate_groups:

      - claims_in_group:
          - entry: "21.5"
            claim: "Kent was a political centre of the Drengot Collusion of the late nineteenth and twentieth centuries."
          - entry: "34.5"
            claim: "Alongside the cities of London and Paris, Kent was the political centre of the Drengot Collusion."
        action: remove_duplicates
        keep_entry: "34.5"
        reason: "Both claims assert Kent's role as political centre of the Drengot Collusion. 34.5 is more informative, naming the co-centres (London and Paris), and comes from the dedicated Drengot Collusion article. The date qualifier in 21.5 ('late nineteenth and twentieth centuries') is not replicated in 34.5; it may be worth retaining as a note, but as a standalone claim 34.5 is the keeper."

    assessment: "Found 1 near-duplicate group. No contradictions detected."

  - entity: "Saxony"
    near_duplicate_groups:

      - claims_in_group:
          - entry: "28.5"
            claim: "Saxony is considered to have profited most from the First German War, after which it controlled more territory than at any point in its history."
          - entry: "36.5"
            claim: "Saxony was ascendant immediately following the First German War, controlling more territory than at any point in its history."
          - entry: "83.5"
            claim: "With the conclusion of the First German War in 1770 N, Saxony was ascendant and controlled more territory than at any point in its history."
        action: remove_duplicates
        keep_entry: "83.5"
        reason: "All three claims state that Saxony reached its greatest territorial extent after/with the conclusion of the First German War. 83.5 is the most specific, providing the conclusive date of the First German War (1770 N). 28.5 adds the framing 'considered to have profited most', which is a useful nuance; consider retaining that phrasing as an annotation. 36.5 is entirely subsumed by 83.5."

      - claims_in_group:
          - entry: "22.5"
            claim: "The kingdom of Saxony reached its territorial peak during the Long Peace."
          - entry: "83.5"
            claim: "With the conclusion of the First German War in 1770 N, Saxony was ascendant and controlled more territory than at any point in its history."
        action: merge
        keep_entry: "83.5"
        merged_claim: "With the conclusion of the First German War in 1770 N, Saxony reached its territorial peak; this ascendancy carried through into the Long Peace."
        reason: "22.5 frames the same territorial maximum as occurring 'during the Long Peace', which is consistent with 83.5 (the First German War ended in 1770 N, which is also the start of the Long Peace per cluster I data). The two claims are complementary rather than contradictory, but they describe the same underlying fact from different temporal vantage points and benefit from being merged."

    assessment: "Found 2 near-duplicate groups. No contradictions detected."

  - entity: "Hasiny"
    near_duplicate_groups:

      - claims_in_group:
          - entry: "118.5"
            claim: "The name Hasiny derives from a confederation of the same name, which extended across lands now part of Hasiny and Taisha."
          - entry: "136.5"
            claim: "Hasiny takes its name from the Ractish name Hasíne 'our people' for one of the nations the modern polity is descended from."
        action: flag_contradiction
        contradiction_note: "Both claims purport to explain the name 'Hasiny'. 118.5 says it derives from a confederation that spanned Hasiny and Taisha. 136.5 says it derives from the Ractish word Hasíne meaning 'our people' for one of the founding nations. These are not necessarily mutually exclusive (the confederation could have been named Hasíne), but they describe different derivation mechanisms and entities. The two accounts need to be reconciled: did the name come from a confederation named after a Ractish word, or are these two separate derivation stories?"

    assessment: "Found 1 potential contradiction group. All other Hasiny claims appear to be unique facts with no near-duplicates."

  - entity: "Jothey of Borland"
    near_duplicate_groups:

      - claims_in_group:
          - entry: "26.5"
            claim: "After the fall of the First Kingdom in 898, King Jothey went into exile with Queen Brenna of Barrow to Sothbar."
          - entry: "32.5"
            claim: "Jothey and Brenna fled to Sothbar, where they had several children, remaining at court there for over twenty years."
          - entry: "139.5"
            claim: "Jothey was married to Brenna of Barrow, cousin of King Roderick of Dunclothe; they fled to Southbar and then to Kent after the Danish conquest."
        action: merge
        keep_entry: "32.5"
        merged_claim: "After the fall of the First Kingdom in 898, King Jothey went into exile with Queen Brenna of Barrow (cousin of King Roderick of Dunclothe) to Sothbar, where they had several children, remaining at court there for over twenty years, before subsequently fleeing to Kent."
        reason: "All three claims describe the same Sothbar exile of Jothey and Brenna. 32.5 adds the duration ('over twenty years') and the children; 26.5 anchors the event to 898; 139.5 adds Brenna's family connection to Roderick of Dunclothe and confirms the onward flight to Kent. A merged claim preserves all unique details."

      - claims_in_group:
          - entry: "26.5"
            claim: "Jothey and Brenna were subsequently forced to flee to Kent as Dane Borland conquered the remainder of the island."
          - entry: "32.5"
            claim: "Fearful of imprisonment or execution, Jothey fled with his wife and children to Kent."
        action: merge
        keep_entry: "32.5"
        merged_claim: "Fearful of imprisonment or execution as Dane Borland conquered the remainder of the island, Jothey fled with his wife and children to Kent."
        reason: "Both claims describe the same flight to Kent. 26.5 provides the political context (Dane Borland's conquest of the island); 32.5 provides the personal motivation (fear of imprisonment or execution). Neither is fully complete without the other."

      - claims_in_group:
          - entry: "26.5"
            claim: "Jothey of Borland (fl. 920) fled into exile following the Dane invasion of Borland."
          - entry: "32.5"
            claim: "Jothey, King of Borland (fl. 898), was the last ruler of the First Kingdom of Borland before it fell to the Danes in 898."
        action: flag_contradiction
        contradiction_note: "The floruit date for Jothey differs between entries: 26.5 gives fl. 920 N while 32.5 gives fl. 898 N. The fall of the First Kingdom is consistently dated to 898 in both files, so fl. 898 in 32.5 is internally consistent. The fl. 920 in 26.5 may reflect a later period of Jothey's life in exile (he continued as monarch-in-exile for 'several more decades' per 32.5), but the two fl. dates are potentially confusing and need editorial clarification as to which event each floruit anchors."

    assessment: "Found 2 near-duplicate groups and 1 contradiction group (conflicting floruit dates). The contradiction is likely an authorial ambiguity about which moment in Jothey's life the fl. date refers to, rather than a genuine factual inconsistency."

  - entity: "Long Peace"
    near_duplicate_groups:

      - claims_in_group:
          - entry: "22.5"
            claim: "The Long Peace refers to the decades surrounding the turn of the nineteenth century."
          - entry: "22.5"
            claim: "The Long Peace extends from 1770 until 1815."
          - entry: "103.5"
            claim: "The 'Long Peace' period is defined in Boralverse historiography as lasting from 1770 until 1815."
          - entry: "115.5"
            claim: "The Long Peace period lasted approximately from 1770 to 1815."
        action: remove_duplicates
        keep_entry: "103.5"
        reason: "All four claims define the Long Peace as the period 1770–1815 N (or describe it in those terms). 103.5 is the most authoritative, citing a named in-world historiographical source (Making History, 2021 edition, Tremonnow Open School). The first 22.5 claim ('decades surrounding the turn of the nineteenth century') is a vague paraphrase of the same date range and is subsumed. 115.5 ('approximately') and the second 22.5 ('extends from 1770 until 1815') are exact restatements."

      - claims_in_group:
          - entry: "22.5"
            claim: "The Long Peace extends from the end of the First German War to the outbreak of the Second German War."
          - entry: "103.5"
            claim: "The 'Long Peace' period is defined in Boralverse historiography as lasting from 1770 until 1815."
        action: merge
        keep_entry: "103.5"
        merged_claim: "The Long Peace is defined in Boralverse historiography as lasting from 1770 (the end of the First German War) until 1815 (the outbreak of the Second German War)."
        reason: "The 22.5 claim provides the event-based definition (First German War end to Second German War outbreak) while 103.5 provides the year-based definition (1770–1815). These are equivalent and mutually clarifying. A merge linking the years to the bracketing events is more informative than either claim alone."

    assessment: "Found 2 near-duplicate groups. No contradictions detected. The remaining Long Peace claims (characterised by absence of prolonged conflict, preceded the Reaction War, advancements in life theory, alchemical discoveries, case kernel discovery, inception of Deviance Movement) are all unique and distinct."
