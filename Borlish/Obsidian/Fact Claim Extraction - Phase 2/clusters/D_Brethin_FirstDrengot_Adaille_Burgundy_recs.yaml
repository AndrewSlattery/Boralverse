# Recommendations for cluster D_Brethin_FirstDrengot_Adaille_Burgundy

entity_reviews:

  - entity: "Brethin"
    near_duplicate_groups:

      - claims_in_group:
          - entry: "23.5"
            claim: "The Brethin order was founded in eighth-century Tremonnow."
          - entry: "40.5"
            claim: "The Brethin religious order, founded in the eighth century, originally existed to chronicle the Christianisation of Albion and Ireland."
          - entry: "63.5"
            claim: "The Brethin religious order was founded in eighth-century Tremonnow, at that time in Devon (now in Glousing)."
          - entry: "142.5"
            claim: "The Brethin was founded at Tremonnow before 800 N under the patronage of Vigo's daughter Iseld."
        action: merge
        merged_claim: "The Brethin was founded at Tremonnow (at that time in Devon, now in Glousing) before 800 N, under the patronage of Vigo's daughter Iseld."
        reason: "All four claims assert an eighth-century founding at Tremonnow. Entry 63.5 adds the Devon/Glousing geographic clarification; entry 142.5 adds the 'before 800 N' precision and the patronage detail (Iseld). Entry 40.5's founding clause is fully subsumed by the others. The merged claim consolidates all non-redundant details."

      - claims_in_group:
          - entry: "23.5"
            claim: "The original mandate of the Brethin was to preserve the history of the Christianisation of Albion and Ireland."
          - entry: "40.5"
            claim: "The Brethin religious order, founded in the eighth century, originally existed to chronicle the Christianisation of Albion and Ireland."
        action: remove_duplicates
        keep_entry: "23.5"
        reason: "Both claims state the same original mandate (preserve/chronicle the Christianisation of Albion and Ireland). Entry 23.5 is the more focused standalone claim. The founding clause in 40.5 is handled by the founding-claim group above."

      - claims_in_group:
          - entry: "23.5"
            claim: "In later centuries the Brethin made inroads into France, Burgundy and as far afield as Andalus."
          - entry: "39.5"
            claim: "The Brethin religious order spread into the Christian-majority areas of Andalus from the north during the eleventh and twelfth centuries."
        action: merge
        merged_claim: "In later centuries the Brethin made inroads into France, Burgundy and as far afield as Andalus, spreading into Andalus's Christian-majority areas from the north during the eleventh and twelfth centuries."
        reason: "Entry 39.5 is a more specific elaboration of the Andalus portion of entry 23.5. Merging preserves both the broader geographic spread and the specific timing and direction of the Andalus expansion."

    assessment: "Found 3 near-duplicate groups. No contradictions detected within the Brethin entity. Note that entries 23.5, 63.5, and 142.5 all carry entry ID '23.5' or close variants from the same source article; the founding group in particular pulls together four overlapping claims that should be consolidated into one."


  - entity: "First Drengot Empire"
    near_duplicate_groups:

      - claims_in_group:
          - entry: "64.5"
            claim: "The First Drengot Empire began with the Kernovan Conjuring, through which House Drengot in Normandy invaded and conquered Kent with the support of Greater Devon's House of Kernow."
          - entry: "89.5"
            claim: "The First Drengot Empire began with the Kernovan Conjuring of 1028, when Normandy conquered Kent with the support of Greater Devon."
        action: merge
        merged_claim: "The First Drengot Empire began with the Kernovan Conjuring of 1028 N, through which House Drengot in Normandy invaded and conquered Kent with the support of Greater Devon's House of Kernow."
        reason: "Both claims describe the same founding event. Entry 89.5 supplies the date (1028 N); entry 64.5 names House Drengot and the House of Kernow explicitly. The merged claim combines all non-redundant details."

      - claims_in_group:
          - entry: "64.5"
            claim: "The First Drengot Empire formally ceased to exist in 1191 N upon the death of Daniel IV, whose demesne was divided between his immediate family and allies."
          - entry: "89.5"
            claim: "The First Drengot Empire was formally dissolved in 1191 and divided among the heirs and allies of Daniel IV."
        action: remove_duplicates
        keep_entry: "64.5"
        reason: "Both claims convey the same fact: formal end in 1191 N on Daniel IV's death, with demesne divided among family/heirs and allies. Entry 64.5 is marginally more precise ('upon the death of Daniel IV' vs the dissolution being the event itself) and uses the N-date notation consistently."

      - claims_in_group:
          - entry: "64.5"
            claim: "The First Drengot Empire, or Constant Empire, was the westernmost of the four empires comprising the Second Tetrarchy (also called the Medieval Imperia)."
          - entry: "64.5"
            claim: "The lesser-used name 'Constant Empire' claims the prestige of the Classical-era District of Constantius, which occupied roughly the same geographical extent."
          - entry: "103.5"
            claim: "A fourteenth-century historian first referred to the First Drengot Empire as the 'Constant Empire', linking it to the District of Constantius of the fourth-century Diocletian Tetrarchy that ruled Roman Brittania and Gaul."
        action: flag_contradiction
        contradiction_note: "Entry 64.5 (name claim) presents 'Constant Empire' as a recognised lesser-used contemporary name, implying it was used during or shortly after the empire's existence. Entry 103.5 states a fourteenth-century historian 'first referred' to it by that name, implying it is a retroactive scholarly label coined well after the empire's collapse in 1191 N. These are in tension: either the name was in use contemporaneously or it was coined by a later historian. The three claims should be reconciled to clarify whether 'Constant Empire' is a contemporary or retrospective denomination."

    assessment: "Found 2 near-duplicate groups and 1 contradiction. The contradiction concerns the origin of the 'Constant Empire' alternative name — one claim treats it as a contemporary usage, the other as a fourteenth-century historiographical coinage."


  - entity: "Adaillé Nassow"
    near_duplicate_groups:

      - claims_in_group:
          - entry: "16.5"
            claim: "Adaillé Nassow lived from 1524 to 1608."
          - entry: "16.5"
            claim: "Adaillé Nassow was duchess of Avosche for much of the sixteenth century and the start of the seventeenth."
          - entry: "45.5"
            claim: "Adaillé Nassow, Duchess d'Avosche (1524–1608 N), was infamous during her life for her influence at the court of David of France."
        action: remove_duplicates
        keep_entry: "16.5"
        reason: "The lifespan 1524–1608 appears in the standalone entry 16.5 and is embedded in the summary entry 45.5. Entry 16.5 ('lived from 1524 to 1608') is the canonical isolated claim. The date range embedded in 45.5 is redundant with it; 45.5's other content (influence at court) is covered separately. The 'duchess for much of the sixteenth century and start of the seventeenth' claim in 16.5 is also derivable from the lifespan and her succession claim (entry 69.5), but it is not strictly identical, so it may be kept for clarity."

      - claims_in_group:
          - entry: "16.5"
            claim: "Adaillé Nassow was Duchess d'Avosche."
          - entry: "69.5"
            claim: "Adaillé Nassow succeeded Roger d'Avosche as duchess and ruled for many decades until her death in 1608 N."
        action: merge
        merged_claim: "Adaillé Nassow succeeded Roger d'Avosche as Duchess d'Avosche and ruled for many decades until her death in 1608 N."
        reason: "Entry 16.5 states the title alone; entry 69.5 states she succeeded her father and ruled until 1608. The merged claim is fully informative and makes the bare 16.5 title claim redundant."

      - claims_in_group:
          - entry: "16.5"
            claim: "Adaillé Nassow was infamous during her later life for her great influence in the court of David of France."
          - entry: "45.5"
            claim: "Adaillé Nassow, Duchess d'Avosche (1524–1608 N), was infamous during her life for her influence at the court of David of France."
          - entry: "69.5"
            claim: "During her reign, Adaillé Nassow accrued significant influence over her liege David of France."
        action: remove_duplicates
        keep_entry: "16.5"
        reason: "All three claims assert that Adaillé Nassow held notable influence over David of France. Entry 16.5 is the most specific standalone claim ('infamous', 'great influence', 'court'). Entry 45.5 is a biographical summary sentence that duplicates it. Entry 69.5 rephrases the same fact in a reign context ('accrued significant influence over her liege'). Keep 16.5 as the canonical claim; 69.5's 'liege' relationship detail may be worth preserving as a relationship tag rather than a separate claim."

      - claims_in_group:
          - entry: "16.5"
            claim: "Adaillé Nassow's two elder brothers died in infancy."
          - entry: "16.5"
            claim: "At least one of Adaillé Nassow's elder brothers died in the Second Great Dying."
        action: flag_contradiction
        contradiction_note: "The first claim states both elder brothers died 'in infancy', implying death shortly after birth, presumably before the Second Great Dying reached them. The second claim states at least one died in the Second Great Dying, which is a specific plague event. These are potentially compatible only if the Second Great Dying struck during their infancy, but that requires verification of the timing of the Second Great Dying relative to Adaillé's birth year (1524 N). If the Second Great Dying predates or overlaps with c. 1524–1530 N, both claims could be consistent; otherwise they contradict each other on the cause/timing of the brothers' deaths."

    assessment: "Found 3 near-duplicate groups and 1 potential contradiction. The contradiction concerns whether the elder brothers died 'in infancy' (natural early death) or specifically in the Second Great Dying (plague event) — these may be reconcilable depending on the dating of the Second Great Dying relative to Adaillé's birth."


  - entity: "Burgundy"
    near_duplicate_groups:

      - claims_in_group:
          - entry: "56.5"
            claim: "The Kingdom of Burgundy retook Provence from Vascony in 1494 N, sparking the 1497–99 War of Provincial Independence."
          - entry: "75.5"
            claim: "Burgundy wrested the territory of Provence back from Vascony in 1494 N."
          - entry: "75.5"
            claim: "Provence seceded from Burgundy via the 1497–99 N War of Provincial Independence, ending in Burgundy's defeat at the Battle of Margès."
          - entry: "92.5"
            claim: "Burgundy's reconquest of Provence in 1494 caused so much instability that the region rose up in revolt, sparking the 1497–99 War of Provincial Independence."
        action: merge
        merged_claim: "Burgundy wrested the territory of Provence back from Vascony in 1494 N; however, this reconquest caused so much instability that the region rose up in revolt, resulting in the 1497–99 War of Provincial Independence, which ended in Burgundy's defeat at the Battle of Margès."
        reason: "All four claims describe the same sequence of events (Burgundy retaking Provence in 1494 N, followed by the 1497–99 War of Provincial Independence). Entry 75.5 (second claim) adds the outcome — Burgundy's defeat at the Battle of Margès. Entry 92.5 adds the causal mechanism (instability leading to revolt). Entry 56.5 is fully subsumed. The merged claim integrates all non-redundant details."

      - claims_in_group:
          - entry: "64.5"
            claim: "In 1170 N, the Kingdom of Burgundy ceased to be a vassal of the First Drengot Empire due to the political turmoil of the Emergency at Dijon."
          - entry: "75.5"
            claim: "Following the Emergency at Dijon in 1170 N, which presaged the collapse of the First Drengot Empire, Burgundy became a de facto autonomous kingdom."
        action: merge
        merged_claim: "In 1170 N, due to the political turmoil of the Emergency at Dijon, the Kingdom of Burgundy ceased to be a vassal of the First Drengot Empire and became a de facto autonomous kingdom."
        reason: "Both claims describe Burgundy's break from the First Drengot Empire in 1170 N via the Emergency at Dijon. Entry 64.5 frames it as cessation of vassal status; entry 75.5 adds that Burgundy became de facto autonomous and that this event presaged the empire's collapse. The merged claim combines both framings."

      - claims_in_group:
          - entry: "15.5"
            claim: "Burgundy is a notable example of a state which suffered fewer casualties in the Second Great Dying, according to its own records."
          - entry: "75.5"
            claim: "Burgundy weathered the Second Great Dying comparatively well due to its lack of coastal territory, since the principal vector of plague transmission was naval trade."
        action: flag_contradiction
        contradiction_note: "Entry 15.5 notes that Burgundy suffered fewer casualties 'according to its own records', and a companion claim in 15.5 explicitly states those records 'cannot entirely be trusted'. Entry 75.5, however, presents Burgundy's comparatively good outcome as an established fact explained by its landlocked geography. If the lower casualty figures come from unreliable self-reporting (per 15.5), then 75.5's confident causal explanation may be overstated or unfounded. These claims should be reconciled: either the geographic explanation is accepted as independently verified, or 75.5 should be qualified to acknowledge the record-reliability caveat."

    assessment: "Found 2 near-duplicate groups and 1 potential contradiction. The contradiction concerns the reliability of Burgundy's Second Great Dying casualty records versus the confident causal explanation offered for its comparatively light losses."
