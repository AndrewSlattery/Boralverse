  - entity: "Damvath"
    near_duplicate_groups:
      - claims_in_group:
          - entry: "2.5"
            claim: "Damvath was established as the capital of Dane-ruled Borland."
          - entry: "57.5"
            claim: "Damvath was first established as the capital of Dane-ruled Borland after the exile of King Jothey to Sothbar in the last years of the ninth century."
        action: remove_duplicates
        keep_entry: "57.5"
        reason: "Entry 57.5 is a strict superset of 2.5, adding the causal context (exile of King Jothey) and the date (late 9th century). Entry 2.5 is fully subsumed."

      - claims_in_group:
          - entry: "26.5"
            claim: "Damvath (Damvað) is the capital city of Borland, located on the river Dam."
          - entry: "57.5"
            claim: "Damvath is the capital city of Borland, located on the River Dam some leagues inland from the coast."
        action: merge
        keep_entry: "57.5"
        merged_claim: "Damvath (Damvað) is the capital city of Borland, located on the River Dam some leagues inland from the coast."
        reason: "Both claims state that Damvath is the capital of Borland on the River Dam. Entry 57.5 adds that it is 'some leagues inland from the coast', which is additional geographical precision. Entry 26.5 supplies the Borlish spelling Damvað, which should be retained in the merged form."

      - claims_in_group:
          - entry: "26.5"
            claim: "Damvath is a port city on the east coast of Borland."
          - entry: "57.5"
            claim: "Damvath is the capital city of Borland, located on the River Dam some leagues inland from the coast."
        action: flag_contradiction
        contradiction_note: "Entry 26.5 describes Damvath as 'a port city on the east coast of Borland', implying it sits directly on the coast. Entry 57.5 states it is 'some leagues inland from the coast' (as a river city on the Dam). These are in tension: a city on a river can have port facilities yet still be inland, but the phrasing 'on the east coast' in 26.5 implies coastal rather than riverine location. Clarify whether Damvath is coastal or inland-riverine, and whether 'port city on the east coast' in 26.5 is imprecise shorthand for its river-port access to the eastern coast."
    assessment: "Found 3 groups: (1) near-duplicate on Damvath's establishment as capital (2.5 subsumed by 57.5); (2) near-duplicate on capital location on the River Dam (26.5 and 57.5, merged); (3) potential contradiction between 'port city on the east coast' (26.5) and 'some leagues inland from the coast' (57.5)."

