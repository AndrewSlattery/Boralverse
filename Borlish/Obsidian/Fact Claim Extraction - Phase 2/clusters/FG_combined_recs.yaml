  - entity: "Provence"
    near_duplicate_groups:
      - claims_in_group:
          - entry: "109.5"
            claim: "The 21st of June is to this day a national holiday in Provence, commemorating the declaration of independence from Burgundy in 1497."
          - entry: "141.5"
            claim: "Provence is a polity in the south of Gaul on the Middlesea coast, first independent in 1499, with its capital city at Marsella."
        action: flag_contradiction
        contradiction_note: "Entry 109.5 dates Provence's independence (from Burgundy) to 1497, whereas entry 141.5 states Provence was 'first independent in 1499'. Entry 14.5 (War of Provincial Independence 1497-99) suggests the conflict ran across both years, but the terminal date of independence differs. Clarify whether independence is dated to the declaration (1497) or the end of the war / formal recognition (1499)."
    assessment: "Found 1 contradiction group regarding the date of Provencal independence (1497 vs 1499)."

  - entity: "Axbane"
    near_duplicate_groups:
      - claims_in_group:
          - entry: "1.5"
            claim: "Roman baths survive in Axbane as an example of Roman architecture on Borland."
          - entry: "26.5"
            claim: "Axbane (Ausbagn) is an old Roman town on the south coast of Borland with a surviving historical baths."
          - entry: "106.5"
            claim: "As a Roman city, Axbane was home to an extensive bathhouse complex, for which the city is named."
        action: merge
        keep_entry: "106.5"
        merged_claim: "As a Roman city, Axbane was home to an extensive bathhouse complex, for which the city is named; the baths survive to the present day as an example of Roman architecture on Borland."
        reason: "All three claims express the same core fact—Axbane's Roman baths exist and are the city's defining Roman heritage. Entry 106.5 is the most complete source article; incorporating the survival detail from 1.5 rounds it out. Entry 26.5 merely restates both facets in passing."

      - claims_in_group:
          - entry: "26.5"
            claim: "Axbane was connected to the continent at Texel in Willemy via air-steeples."
          - entry: "105.5"
            claim: "The first undersea barric steeplepost lines were laid in the 1850s in Kent (Dover to Cales) and from Texel in Willemy to Axbane in Borland."
          - entry: "106.5"
            claim: "In the 1850s, Axbane was connected to Texel in Willemy by one of the world's first undersea barric steeplepost lines."
        action: flag_contradiction
        contradiction_note: "Entry 26.5 describes the Texel–Axbane connection as 'air-steeples', while entries 105.5 and 106.5 both describe it as an 'undersea barric steeplepost' line (i.e., a submarine cable). The medium (aerial vs. undersea) is contradictory. Entries 105.5 and 106.5 agree with each other and are the more detailed sources; 26.5 may contain an error. Once the contradiction is resolved, 105.5 and 106.5 should be treated as near-duplicates and merged, keeping 106.5 (the dedicated Axbane article) with the date (1850s N) and the 'one of the world's first' characterisation from 106.5 augmented by the parallel Kent line context from 105.5."

      - claims_in_group:
          - entry: "26.5"
            claim: "Axbane (Ausbagn) is an old Roman town on the south coast of Borland with a surviving historical baths."
          - entry: "106.5"
            claim: "Axbane is a major city on the southwest coast of Borland, located at the narrowest part of the Rustigh Strait, less than twenty leagues from Willemy on mainland Europe."
        action: flag_contradiction
        contradiction_note: "Entry 26.5 places Axbane on the 'south coast' of Borland, while entry 106.5 places it on the 'southwest coast'. These are geographically distinct descriptions. The dedicated Axbane article (106.5) is likely more precise; 26.5 may be using 'south' loosely. Recommend standardising to 'southwest coast' per 106.5 once confirmed."
    assessment: "Found 3 near-duplicate/contradiction groups: (1) Roman baths near-duplicates across three entries; (2) Texel–Axbane steeplepost near-duplicates with an air vs. undersea contradiction; (3) south vs. southwest coast contradiction."

