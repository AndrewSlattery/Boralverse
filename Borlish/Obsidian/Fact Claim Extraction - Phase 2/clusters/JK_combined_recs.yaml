# Recommendations for clusters J and K

entity_reviews:

  - entity: "Munir al-Hamdawi"
    near_duplicate_groups:

      - claims_in_group:
          - entry: "14.5"
            claim: "Munir al-Hamdawi was King of Morrack."
          - entry: "18.5"
            claim: "Munir al-Hamdawi was the ruler of Morrack during the latter half of the fifteenth century."
        action: merge
        merged_claim: "Munir al-Hamdawi was King of Morrack during the latter half of the fifteenth century."
        reason: "Both claims assert the same role and polity; 18.5 adds the temporal context that 14.5 lacks. Merging preserves all information."

      - claims_in_group:
          - entry: "14.5"
            claim: "Munir al-Hamdawi was born in 1429."
          - entry: "29.5"
            claim: "Munir al-Hamdawi (b. 1429) is remembered for establishing the New World Company and for his lifelong rivalry with King Ambrose III of Vascony."
        action: remove_duplicates
        keep_entry: "14.5"
        reason: "The birth year 1429 is the shared fact. Entry 29.5 is a summary that embeds this date alongside other claims already covered by dedicated entries (18.5 for New World Company and rivalry). The birth-year sub-claim in 29.5 is redundant with 14.5; the remainder of 29.5 is covered by other entries."

      - claims_in_group:
          - entry: "18.5"
            claim: "In 1463 Munir al-Hamdawi established the New World Company as a rival marine enterprise to Ambrose III's New Navarre Enterprise."
          - entry: "29.5"
            claim: "Munir al-Hamdawi (b. 1429) is remembered for establishing the New World Company and for his lifelong rivalry with King Ambrose III of Vascony."
        action: remove_duplicates
        keep_entry: "18.5"
        reason: "18.5 gives the precise founding date (1463) and the rival enterprise name; 29.5's reference to the New World Company is a vaguer summary that adds no new information beyond what 18.5 already states."

      - claims_in_group:
          - entry: "18.5"
            claim: "In 1463 Munir al-Hamdawi established the New World Company as a rival marine enterprise to Ambrose III's New Navarre Enterprise."
          - entry: "171.5"
            claim: "Following the Landfall, Munir al-Hamdawi of Morrack redirected his New World Company westward, leading to the discovery of the faster southern route to the Novomund and the islands of the Arcabil."
        action: flag_contradiction
        contradiction_note: "Entry 18.5 names the organisation 'New World Company'; entry 171.5 calls it 'Morrack New World Company'. These may be the same body referred to by a longer and shorter form of its name, or they may be distinct. The discrepancy should be resolved in the source material before either entry is finalised."

    assessment: "Found 3 near-duplicate groups and 1 name-discrepancy flag. Entry 29.5 is largely a redundant summary and its substantive sub-claims are all covered by more detailed dedicated entries; it can be removed after confirming no unique information is lost."

  - entity: "Second Great Dying"
    near_duplicate_groups:

      - claims_in_group:
          - entry: "15.5"
            claim: "The first victim in Borland of the Second Great Dying was in Damvath during the 'green snowfall' of 1519."
          - entry: "26.5"
            claim: "The first recorded death of the Second Great Dying in Borland was in Damvath during the year's green snowfall."
        action: merge
        merged_claim: "The first recorded death of the Second Great Dying in Borland was in Damvath during the 'green snowfall' of 1519."
        reason: "Both claims describe the same event (first Borland fatality, location Damvath, green snowfall, 1519). Entry 26.5 uses the more precise phrase 'first recorded death'; 15.5 supplies the explicit year. The merged claim combines both refinements."

      - claims_in_group:
          - entry: "15.5"
            claim: "There is a common misconception that people blamed cats and dogs for spreading the plague during the Second Great Dying."
          - entry: "15.5"
            claim: "The idea that people blamed cats and dogs for spreading the plague is only attested in connection with the Second Great Dying several decades after the event."
        action: merge
        merged_claim: "The common idea that people blamed cats and dogs for spreading the plague during the Second Great Dying is a misconception, attested only in sources written several decades after the event."
        reason: "Both claims are from the same entry and together constitute a single two-part point (the misconception exists; it is post-hoc). They should be kept as a single merged claim rather than two separate entries to avoid the false impression of two independent facts."

    assessment: "Found 2 near-duplicate groups, both merges. All other Second Great Dying claims are distinct in scope or content."

  - entity: "Absolon Mortenszen"
    near_duplicate_groups:

      - claims_in_group:
          - entry: "15.5"
            claim: "Absolon Mortenszen is a Dane playwright."
          - entry: "16.5"
            claim: "Absolon Mortenszen was a playwright and commentator in the Dane Concert of the sixteenth century."
          - entry: "125.5"
            claim: "Absolon Mortenszen (fl. 1560) was a Danish playwright and commentator who lived in Alburgh and is remembered for his play 'High Society'."
        action: merge
        merged_claim: "Absolon Mortenszen (fl. 1560) was a playwright and commentator in the Dane Concert during the sixteenth century, who lived in Alburg(h) and is remembered for his play 'High Society'."
        keep_entry: "16.5"
        reason: "All three entries state that Mortenszen was a Danish playwright. Entry 16.5 adds 'commentator' and the Dane Concert context; 125.5 adds the floruit date, the residence, and the remembered work. A single merged claim covers all unique elements. Note that 16.5 spells the city 'Alburg' while 125.5 spells it 'Alburgh'; the spelling should be standardised in the source."

      - claims_in_group:
          - entry: "15.5"
            claim: "The wife and brothers of the grandfather of Absolon Mortenszen died in the Second Great Dying."
          - entry: "16.5"
            claim: "Absolon Mortenszen's grandfather is thought to have lost his wife and at least two brothers in the Second Great Dying."
        action: merge
        merged_claim: "Absolon Mortenszen's grandfather is thought to have lost his wife and at least two brothers in the Second Great Dying."
        keep_entry: "16.5"
        reason: "Both claims describe the same family loss. Entry 16.5 is more precise: it qualifies the claim with 'thought to have' and specifies 'at least two brothers' rather than just 'brothers'. Keep 16.5's phrasing."

    assessment: "Found 2 near-duplicate groups. The spelling discrepancy 'Alburg' (16.5) vs 'Alburgh' (125.5) should be resolved in the source. Entry 125.5 is a summary that is subsumed by 16.5 claims once merged."

  - entity: "Joseph III"
    near_duplicate_groups:

      - claims_in_group:
          - entry: "15.5"
            claim: "Joseph III ruled Borland at the time of the Second Great Dying."
          - entry: "17.5"
            claim: "Joseph III was king of Borland."
          - entry: "17.5"
            claim: "Joseph III is remembered for ruling the kingdom through the ravages of the Second Great Dying."
          - entry: "26.5"
            claim: "Joseph III (d. 1534) ruled through the ravages of the Second Great Dying."
          - entry: "139.5"
            claim: "Joseph III (d. 1534) was king of Borland who ruled through the ravages of the Second Great Dying; he was succeeded by his nephew Brandon II as he produced no natural-born heir."
        action: merge
        merged_claim: "Joseph III (d. 1534) was king of Borland who is remembered for ruling the kingdom through the ravages of the Second Great Dying; he was succeeded by his nephew Brandon II as he produced no natural-born heir."
        keep_entry: "139.5"
        reason: "All five claims assert that Joseph III was king of Borland and ruled during the Second Great Dying. Entry 139.5 is the most complete, adding the succession by Brandon II and the death date. The merged form of 139.5 absorbs 15.5, both 17.5 sub-claims, and 26.5 entirely."

      - claims_in_group:
          - entry: "7.5"
            claim: "Joseph III never succeeded in producing a natural-born heir, despite several illegitimate children by his various mistresses."
          - entry: "17.5"
            claim: "Joseph III never succeeded in producing a natural-born heir, despite several recognised yet illegitimate children by his various mistresses."
        action: remove_duplicates
        keep_entry: "17.5"
        reason: "Both claims state the same fact about Joseph III's lack of a legitimate heir. Entry 17.5 adds the qualifier 'recognised yet', which provides additional nuance (the illegitimate children were officially acknowledged). Keep 17.5."

      - claims_in_group:
          - entry: "7.5"
            claim: "Joseph III died in 1534."
          - entry: "26.5"
            claim: "Joseph III (d. 1534) ruled through the ravages of the Second Great Dying."
          - entry: "139.5"
            claim: "Joseph III (d. 1534) was king of Borland who ruled through the ravages of the Second Great Dying; he was succeeded by his nephew Brandon II as he produced no natural-born heir."
        action: remove_duplicates
        keep_entry: "139.5"
        reason: "The death date 1534 appears in all three entries. It is subsumed into the merged 139.5 entry recommended above. Entry 7.5 as a standalone death-date claim is redundant once 139.5 is used."

    assessment: "Found 3 near-duplicate groups. Entry 139.5 is the most information-rich entry and should serve as the canonical summary for Joseph III's kingship, the Second Great Dying connection, the death date, and the succession. The remaining unique claim from 7.5 (accusations of unnatural demise) is not duplicated elsewhere and should be kept."

  - entity: "Avosche"
    near_duplicate_groups:

      - claims_in_group:
          - entry: "16.5"
            claim: "Avosche is a duchy in southern Willemy."
          - entry: "69.5"
            claim: "Avosche is a political subregion of Willemy centred on the city of Axton (Grand-Aix in Paris French; Aughen in Willem Dutch), with a strong regional identity."
        action: remove_duplicates
        keep_entry: "69.5"
        reason: "Both claims identify Avosche as a subregion of Willemy. Entry 69.5 gives substantially more detail (capital city, multilingual names, regional identity) and supersedes the brief 16.5 description."

      - claims_in_group:
          - entry: "16.5"
            claim: "Avosche is a duchy in southern Willemy."
          - entry: "45.5"
            claim: "The duchy of Avosche in Willemy was unusually stable and held by France for over a century during the Revitalist Period."
          - entry: "69.5"
            claim: "The county of Avosche was elevated to a duchy in the early sixteenth century, with Roger d'Avosche becoming the first duke."
          - entry: "69.5"
            claim: "Avosche has at various points been a county, a duchy, and a march, and has seen both continual territorial instability and major urban development into the modern period."
        action: flag_contradiction
        contradiction_note: "Entry 16.5 calls Avosche simply 'a duchy', as does 45.5 (referring to the Revitalist Period). However, 69.5 states that Avosche was a county before being elevated to a duchy in the early sixteenth century, and separately that it has been a county, duchy, and march at various points. The characterisation in 16.5 and 45.5 of Avosche as 'the duchy' without temporal qualification is consistent with its status after the early sixteenth century but may be anachronistic or imprecise depending on the period being described. Additionally, 45.5 calls Avosche 'unusually stable' while 69.5 notes 'continual territorial instability' and five changes of hands in the seventeenth century alone. These two characterisations are potentially contradictory and should be checked against the source material."

    assessment: "Found 1 near-duplicate group (supersession) and 1 multi-claim contradiction flag. The contradiction between 'unusually stable' (45.5) and 'continual territorial instability' (69.5) is the most significant issue in this entity group and requires source-level resolution."

  - entity: "Deviance movement"
    near_duplicate_groups:

      - claims_in_group:
          - entry: "31.5"
            claim: "The early Deviance movement was blamed for the resurgence of the Modest Arrangement in Spain and Gaul."
          - entry: "103.5"
            claim: "The Deviance movement has been credited with contributing to the decline of the Modest Arrangement through the first half of the nineteenth century, particularly in Gaul and Spain."
        action: flag_contradiction
        contradiction_note: "Entry 31.5 states that the early Deviance movement was blamed for causing the Modest Arrangement to resurge (i.e., grow stronger), while 103.5 states the Deviance movement contributed to the Modest Arrangement's decline. These are directly opposite effects. It is possible that the early movement (31.5) initially provoked a reactionary resurgence of the Modest Arrangement, while the later movement (103.5, first half of the nineteenth century) ultimately contributed to its decline; the temporal framing differs slightly. However, this cannot be confirmed from the claim texts alone. The source material should be checked to determine whether these describe different phases or whether one claim is in error."

      - claims_in_group:
          - entry: "31.5"
            claim: "The Deviance movement arose in the late eighteenth century during the Long Peace."
          - entry: "40.5"
            claim: "During the Long Peace, the Deviance movement took root across Albion via the mesh of Promethean clubs."
        action: remove_duplicates
        keep_entry: "31.5"
        reason: "Both claims place the Deviance movement's emergence during the Long Peace. Entry 31.5 establishes the period and is the primary claim; 40.5 adds the specific mechanism in Albion (Promethean clubs) and the geographic scope. Because 40.5 contains unique information (Albion, Promethean clubs) it should not be deleted entirely, but the Long Peace temporal overlap with 31.5 is redundant. Keep both entries but note the temporal sub-claim in 40.5 is covered by 31.5."

    assessment: "Found 1 near-duplicate group (partial) and 1 significant contradiction. The contradiction between the Deviance movement causing the Modest Arrangement to resurge (31.5) versus contributing to its decline (103.5) is the most critical issue and must be resolved in the source."

  - entity: "dime measures"
    near_duplicate_groups:

      - claims_in_group:
          - entry: "132.5"
            claim: "The three dime bases for length are the inch, the foot (10 inches), and the league (10⁴ feet)."
          - entry: "183.5"
            claim: "The dime length units are: inch, foot (10 inches), chain (100 feet), and league (100 chains); units of area and volume are defined by squares and cubes of base lengths."
        action: flag_contradiction
        contradiction_note: "Entry 132.5 lists three length bases (inch, foot, league) with no intermediate 'chain' unit, and gives the league as 10⁴ feet. Entry 183.5 lists four units (inch, foot, chain, league) where the chain is 100 feet and the league is 100 chains (= 10,000 feet = 10⁴ feet, so the final league size is arithmetically consistent). The contradiction is the presence or absence of the 'chain' as a named base unit and the number of bases (three vs four). The source material should be checked to determine whether the chain was added to the system later, or whether one entry has an error or is describing a different subset of the unit system."

      - claims_in_group:
          - entry: "132.5"
            claim: "In 1946, the foot was redefined so that the normal speed (speed of light) equals precisely ten great leagues per second."
          - entry: "183.5"
            claim: "In the early twentieth century, the foot was officially defined as the length of a particular rod of iron-baxon alloy kept in Tammombay; in 1946 it was redefined so that the normal speed equals precisely ten great leagues per second."
        action: remove_duplicates
        keep_entry: "183.5"
        reason: "Both entries describe the 1946 redefinition in identical terms. Entry 183.5 is the more complete account, adding the prior early-twentieth-century definition by physical artefact (iron-baxon rod in Tammombay). Keep 183.5; the 1946 sub-claim in 132.5 is fully subsumed."

    assessment: "Found 1 near-duplicate group and 1 contradiction flag. The chain unit discrepancy between 132.5 and 183.5 is the most important issue and requires source resolution. The 1946 redefinition claim in 132.5 is subsumed by the fuller account in 183.5."

  - entity: "Fiellas Dimenja"
    near_duplicate_groups:

      - claims_in_group:
          - entry: "34.5"
            claim: "The Fiellas Dimenja newspaper, headquartered in Marsella, enjoyed considerable readership across the Drengot Collusion."
          - entry: "58.5"
            claim: "Fiellas Dimenja (English: 'Sunday Sheets') is a weekly newspaper published from Marsella."
        action: remove_duplicates
        keep_entry: "58.5"
        reason: "Both entries establish that Fiellas Dimenja is a newspaper based in Marsella. Entry 58.5 is from the dedicated Fiellas Dimenja article and is the fuller definition, adding the English translation and the weekly publication frequency. Entry 34.5 is from an external article (The Drengot Collusion) and its Marsella-based identification is subsumed by 58.5. The readership claim specific to the Drengot Collusion context is unique to 34.5 and should be retained as a separate claim."

      - claims_in_group:
          - entry: "58.5"
            claim: "Fiellas Dimenja has been almost continuously published since its incorporation in 1871 N."
          - entry: "58.5"
            claim: "Fiellas Dimenja was established in 1871 N by Corsican businessman Toscobardo Matutte in concert with the Guiraud Colloquium."
        action: merge
        merged_claim: "Fiellas Dimenja was established in 1871 N by Corsican businessman Toscobardo Matutte in concert with the Guiraud Colloquium, and has been almost continuously published since."
        reason: "Both claims are from the same entry and both concern the founding date of 1871. They are complementary rather than contradictory, but combining them avoids the redundancy of restating the date and produces a single clear founding statement."

    assessment: "Found 2 near-duplicate groups. No contradictions detected within this entity. The Drengot Collusion readership detail in 34.5 is contextually unique and should be preserved as a separate claim even after the Marsella location sub-claim is resolved."
