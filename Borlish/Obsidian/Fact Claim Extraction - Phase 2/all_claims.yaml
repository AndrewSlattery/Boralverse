- entry: 67.5
  title: Romantic Wars
  category: event
  claim: The Romantic Wars were a loosely-circumscribed collection of wars, uprisings and other conflicts across Europe which
    took place through the middle of the seventeenth century.
  entities:
  - name: Romantic Wars
    type: event
  dates: mid-17th c. N
- entry: 67.5
  title: Romantic Wars
  category: event
  claim: The Romantic Wars are sometimes considered the last truly localised conflicts, before wars of similar scale began
    to involve the Novomund and feature intercontinental alliances.
  entities:
  - name: Romantic Wars
    type: event
- entry: 67.5
  title: Romantic Wars
  category: event
  claim: The years 1640 to 1670 N cover the 'central' conflicts of the Romantic Wars, although some peripheral fights may
    spill earlier or later.
  entities:
  - name: Romantic Wars
    type: event
  dates: 1640–1670 N
- entry: 67.5
  title: Romantic Wars
  category: culture
  claim: The Romantic period was characterised by great corrogation (canal) projects; for example, the Bordew-Audaz canal
    was completed in 1679 N.
  entities:
  - name: Romantic Wars
    type: event
  dates: 1679 N
- entry: 67.5
  title: Romantic Wars
  category: event
  claim: During the Romantic Wars, Vascony was forced to cede its economic heart in Portingale to Andalus, which at the time
    was controlled by Morrack.
  entities:
  - name: Vascony
    type: polity
  - name: Portingale
    type: polity
  - name: Andalus
    type: polity
  - name: Morrack
    type: polity
  - name: Romantic Wars
    type: event
- entry: 67.5
  title: Romantic Wars
  category: event
  claim: The Principality of Mystra in Greece, which had been a vassal of the Second Roman Empire since the eleventh century,
    was formally dissolved in the aftermath of the Romantic Wars.
  entities:
  - name: Mystra
    type: polity
  - name: Second Roman Empire
    type: polity
  - name: Romantic Wars
    type: event
- entry: 67.5
  title: Romantic Wars
  category: event
  claim: The Blue Trans-Willem War (part of the Romantic Wars) was centred on Willemy and indirectly led to the dissolution
    of the Kingdom of Burgundy and the creation of the Duchy of Far Suebia in Bavarn.
  entities:
  - name: Blue Trans-Willem War
    type: event
  - name: Willemy
    type: polity
  - name: Burgundy
    type: polity
  - name: Duchy of Far Suebia
    type: polity
  - name: Romantic Wars
    type: event
- entry: 67.5
  title: Romantic Wars
  category: event
  claim: Borland's involvement in the Romantic Wars was restricted to a failed invasion culminating in the Hawkirch Surrender
    of 1623 N, along with unstable military aid arrangements with neighbouring polities.
  entities:
  - name: Borland
    type: polity
  - name: Romantic Wars
    type: event
  - name: Hawkirch Surrender
    type: event
  dates: 1623 N
- entry: 67.5
  title: Romantic Wars
  category: event
  claim: The Roman conflict in Armenia of the 1640s N is contemporaneous with the Romantic Wars but its inclusion within them
    is a matter of scholarly dispute.
  entities:
  - name: Second Roman Empire
    type: polity
  - name: Romantic Wars
    type: event
  dates: 1640s N
- entry: 68.5
  title: The German Secession
  category: event
  claim: The German Secession was a schism in Christendom which took place in the first half of the thirteenth century.
  entities:
  - name: German Secession
    type: event
  dates: first half 13th c. N
- entry: 68.5
  title: The German Secession
  category: event
  claim: The German Secession led to the permanent formalisation of the Augsburg See as independent from Rome, with its separate
    papal line beginning with Paul I/XI.
  entities:
  - name: German Secession
    type: event
  - name: Augsburg See
    type: organisation
  - name: Paul I/XI
    type: person
- entry: 68.5
  title: The German Secession
  category: event
  claim: The German Secession generally refers to the period from Paul I/XI's Denunciations and declaration of the sedes sanctissima
    in Augsburg in 1225 N to the capitulation of Rome in 1251 N.
  entities:
  - name: German Secession
    type: event
  - name: Paul I/XI
    type: person
  - name: Augsburg
    type: place
  dates: 1225–1251 N
- entry: 68.5
  title: The German Secession
  category: event
  claim: The 1210 N declaration of a renewed crusade for Jerusalem by Pope Just, and the military catastrophes that followed,
    were a major source of discontentment fuelling the German Secession.
  entities:
  - name: German Secession
    type: event
  - name: Just
    type: person
  dates: 1210 N
- entry: 68.5
  title: The German Secession
  category: event
  claim: Europe was in the throes of the First Great Dying during the German Secession—a plague that would be surpassed in
    severity only by the Second Great Dying of the early sixteenth century.
  entities:
  - name: First Great Dying
    type: event
  - name: Second Great Dying
    type: event
  - name: German Secession
    type: event
- entry: 68.5
  title: The German Secession
  category: event
  claim: The First Great Dying is thought to have arrived in Europe carried by returning crusaders.
  entities:
  - name: First Great Dying
    type: event
- entry: 68.5
  title: The German Secession
  category: event
  claim: The decades after the Pauline Denunciations saw each individual duchy (and in some cases each county) declare for
    either Rome or Augsburg, ultimately leading to the collapse of the German Empire.
  entities:
  - name: German Secession
    type: event
  - name: German Empire
    type: polity
- entry: 68.5
  title: The German Secession
  category: event
  claim: The ongoing Baptism of the North was inflamed by the German Secession, with fears that Augsburg might spread heresy
    faster than Rome could reach the northeasternmost part of Europe.
  entities:
  - name: Baptism of the North
    type: event
  - name: German Secession
    type: event
- entry: 68.5
  title: The German Secession
  category: person
  claim: Pope Hermeneus II was a new, more totalist Roman Pope active during the German Secession period.
  entities:
  - name: Hermeneus II
    type: person
- entry: 68.5
  title: The German Secession
  category: work
  claim: The German Secession has been dramatised many times, most famously in the 1961 N historical epic 'With the North
    Star to Guide Us'.
  entities:
  - name: With the North Star to Guide Us
    type: work
  dates: 1961 N
- entry: 68.5
  title: The German Secession
  category: work
  claim: '''A Mapbook Compendium of Europe, from the Division of Rome until the German Secession (450 - 1250 N)'' was published
