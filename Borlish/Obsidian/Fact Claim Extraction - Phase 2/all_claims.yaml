  - name: Burgundy
    type: polity
- entry: 64.5
  title: First Drengot Empire
  category: polity
  claim: The First Drengot Empire is named for its ruling family, House Drengot, formerly rulers of Normandy alone.
  entities:
  - name: First Drengot Empire
    type: polity
  - name: House Drengot
    type: organisation
  - name: Normandy
    type: polity
- entry: 64.5
  title: First Drengot Empire
  category: polity
