  entities:
  - name: Hawkirch
    type: place
  - name: Hawkirch Surrender
    type: event
  dates: 1632 N
- entry: 130.5
  title: Angland
  category: place
  claim: Vithor is the regional capital of Angland on the west coast, known for the New Vithor University, a major research
    institution.
  entities:
  - name: Vithor
    type: place
  - name: New Vithor University
    type: organisation
- entry: 131.5
  title: Jeans
  category: place
  claim: Jeans is an Italian polity comprising the northwest Middlesea coastline of Italy bordering Provence, as well as the
    island of Corse.
  entities:
  - name: Jeans
    type: polity
  - name: Provence
    type: polity
- entry: 131.5
  title: Jeans
  category: language
  claim: The Merch name Jeans was borrowed from Old French Jannes, originally from Latin Genua, probably from the local word
    for 'knee' in reference to the shape of the coastline.
  entities:
  - name: Jeans
    type: polity
- entry: 131.5
  title: Jeans
  category: polity
  claim: Jeans is the oldest of the Latin Republics, having come into existence in the tenth century.
  entities:
  - name: Jeans
    type: polity
  dates: 10th c. N
- entry: 131.5
  title: Jeans
  category: polity
  claim: Along with Venise, Jeans serves as a counterpoint to the notion that the Second Tetrarchy period was solely comprised
    of great centralised empires.
  entities:
  - name: Jeans
    type: polity
  - name: Venise
    type: polity
- entry: 131.5
  title: Jeans
  category: polity
  claim: The leader of Jeans, known as the console, was elected from among the merchant nobility.
  entities:
  - name: Jeans
    type: polity
- entry: 131.5
  title: Jeans
  category: event
  claim: In 1207 N, Jeans invaded the Tyrrhene Isles of Corse and Sardine, wresting them from Roman control; only Corse would
    remain in the Jean orbit more permanently.
  entities:
  - name: Jeans
    type: polity
  dates: 1207 N
- entry: 131.5
  title: Jeans
  category: person
  claim: Franco Cicala (r. 1119–1122/4) was the first console of Jeans from the Cicale family.
  entities:
  - name: Franco Cicala
    type: person
  - name: Jeans
    type: polity
  dates: r. 1119–1124 N
- entry: 131.5
  title: Jeans
