  title: Novomundine Landfall
  category: glossary
  claim: Paratzon is the Boralverse name for St John's, Newfoundland.
  entities:
  - name: Paratzon
    irl: St John's, NL
    type: place
- entry: 171.5
  title: Novomundine Landfall
  category: glossary
  claim: Guy-coney is the Boralverse term for guinea pig.
  entities:
  - name: guy-coney
    irl: guinea pig
    type: concept
- entry: 171.5
  title: Novomundine Landfall
  category: event
  claim: Princess Alexandra's visit to Paratzon advanced understanding of scurvy; the chemical sandrine is named in her honour.
  entities:
  - name: Alexandra
    type: person
  - name: sandrine
    type: concept
  dates: 1490s N
- entry: 172.5
  title: How to spell Borlish
  category: language
  claim: The standard Borlish alphabet has twenty-seven letters.
  entities:
  - name: Borlish
    type: concept
- entry: 172.5
  title: How to spell Borlish
  category: language
  claim: The Borlish letter w is called vescon meaning 'second-vee' and is pronounced like v; it is used in foreign words
    and some names.
  entities:
  - name: Borlish
    type: concept
- entry: 172.5
  title: How to spell Borlish
  category: language
  claim: The Borlish ligatures æ and œ are called æsc and œthel respectively and are pronounced like e; they are primarily
    used in Classical loanwords.
  entities:
  - name: Borlish
    type: concept
- entry: 172.5
  title: How to spell Borlish
  category: language
  claim: The Borlish character ï is called i jammel meaning 'twin i' and is pronounced like yi.
  entities:
  - name: Borlish
    type: concept
- entry: 172.5
  title: How to spell Borlish
  category: language
  claim: In Borlish orthography, the letter ð is pronounced /θ/ word-finally and /ð/ otherwise; x denotes the sequence /ks/.
  entities:
  - name: Borlish
    type: concept
- entry: 172.5
  title: How to spell Borlish
  category: language
  claim: In Borlish, the letter c is pronounced /ts/ before e, i, y and /k/ otherwise; g may be pronounced as either /g/ or
    /ʒ/ before e, i, y and is pronounced /g/ otherwise.
  entities:
  - name: Borlish
    type: concept
- entry: 172.5
  title: How to spell Borlish
  category: language
  claim: In Borlish, the consonant digraphs sc, ch, th denote /x/, /k/, /θ/ respectively; sch is read /sk/ and cq is pronounced
    /k/.
  entities:
  - name: Borlish
    type: concept
