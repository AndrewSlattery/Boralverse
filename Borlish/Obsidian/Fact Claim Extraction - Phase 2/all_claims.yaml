    roughly the same geographical extent.
  entities:
  - name: First Drengot Empire
    type: polity
  - name: District of Constantius
    type: polity
- entry: 64.5
  title: First Drengot Empire
  category: polity
  claim: The structure of the First Drengot Empire was quite decentralised; for example, the vassal Tolose kept a standing
    army for its perennial skirmishes with neighbouring Barcelon.
  entities:
  - name: First Drengot Empire
    type: polity
  - name: Tolose
    type: polity
  - name: Barcelon
    type: polity
- entry: 64.5
  title: First Drengot Empire
  category: polity
