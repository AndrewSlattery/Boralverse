- entry: 72.5
  title: Markland
  category: polity
  claim: Markland is a polity of Albion, situated east of Wales, north of London and Kent, and south of Northumber and Sodrick.
  entities:
  - name: Markland
    type: polity
  - name: Albion
    type: polity
- entry: 72.5
  title: Markland
  category: place
  claim: Markland originates with Saxon settlements in sub-Roman Britannia, forming what would go on to be named mearce land
    ('borderland').
  entities:
  - name: Markland
    type: polity
- entry: 72.5
  title: Markland
  category: language
  claim: The demonym Mierce means 'people of the border', whence the Latin name Mercia and native Merchman ('man from Markland').
  entities:
  - name: Markland
    type: polity
- entry: 72.5
  title: Markland
  category: event
  claim: The petty kingdom of Anglia was annexed by Markland with the Treaty of Oxford in the late eighth century, establishing
    the persevering border between the mouths of the Severn and the Tames.
  entities:
  - name: Markland
    type: polity
  - name: Anglia
    type: polity
  dates: late 8th c. N
- entry: 72.5
  title: Markland
  category: event
  claim: Markland weathered the Viking Age more successfully than neighbouring Northumber, though much of its eastern coast
    was settled by Danes; the city of Lincon served as the de facto border of Danish rule for several decades.
  entities:
  - name: Markland
    type: polity
  - name: Northumber
    type: polity
  - name: Lincon
    type: place
- entry: 72.5
  title: Markland
  category: event
  claim: The tenth-century Elved Marriage (held near modern Leeds) ended hostilities between Markland and Dane forces in the
    east for almost a century.
  entities:
  - name: Elved Marriage
    type: event
  - name: Markland
    type: polity
  dates: 10th c. N
- entry: 72.5
  title: Markland
  category: culture
  claim: The Elved Marriage was solemnised over a sandstone block later inlaid into the Redstone Chair, a low-backed wooden
    throne on which many subsequent Markland monarchs were crowned.
  entities:
  - name: Elved Marriage
    type: event
  - name: Redstone Chair
    type: culture
- entry: 72.5
  title: Markland
  category: event
  claim: Around the turn of the second millennium, Markland was conquering territory from the northern reaches of Wales, incidentally
    leading to Pope Agatho's canonisation of Welsh St David.
  entities:
  - name: Markland
    type: polity
  - name: Agatho
    type: person
  dates: c. 1000 N
- entry: 72.5
  title: Markland
  category: event
  claim: The perennial conflicts between Markland and Wales were collectively referred to as the Mallor Wars.
  entities:
  - name: Mallor Wars
    type: event
  - name: Markland
    type: polity
- entry: 72.5
  title: Markland
  category: event
  claim: The First Drengot Empire counted Markland as a major vassal, conquered from the south following the subjugation of
    Kent by Normandy and Greater Devon in 1029 N.
  entities:
  - name: First Drengot Empire
    type: polity
  - name: Markland
    type: polity
  dates: 1029 N
- entry: 72.5
  title: Markland
  category: event
  claim: The Mallor Wars were reignited by the martial-minded King Andrew II with the Sack of Rexam in 1301 N, during which
    the original St Brigid's Abbey burned to the ground.
  entities:
  - name: Andrew II
    type: person
  - name: Mallor Wars
    type: event
  - name: Rexam
    type: place
  dates: 1301 N
- entry: 72.5
  title: Markland
  category: event
  claim: In the 1483 N Battle of Rexam (during the Wars of Fealty), the Kingdom of Britain expanded its borders in the north
    and the last Duke of Chestre was killed.
  entities:
  - name: Markland
    type: polity
  - name: Wars of Fealty
    type: event
  - name: Rexam
    type: place
  dates: 1483 N
- entry: 72.5
  title: Markland
  category: technology
  claim: In the final years of the Wars of Fealty, King Andrew III employed a code known as Thieves' Script, apparently adapted
    from systems used by gangs of housebreakers in Nottingham.
  entities:
