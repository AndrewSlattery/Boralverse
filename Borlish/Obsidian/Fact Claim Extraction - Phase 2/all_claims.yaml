- entry: 64.5
  title: First Drengot Empire
  category: polity
  claim: The First Drengot Empire, or Constant Empire, was the westernmost of the four empires comprising the Second Tetrarchy
    (also called the Medieval Imperia).
  entities:
  - name: First Drengot Empire
    type: polity
  - name: Second Tetrarchy
    type: period
- entry: 64.5
  title: First Drengot Empire
  category: polity
  claim: At its greatest extent, the First Drengot Empire claimed control over much of Albion and most of Gaul.
  entities:
  - name: First Drengot Empire
    type: polity
  - name: Albion
    type: polity
  - name: Gaul
    type: polity
- entry: 64.5
  title: First Drengot Empire
  category: polity
  claim: The major vassals of the First Drengot Empire were the kingdoms of Northumber, Markland, Kent, Greater Devon, France,
    and Burgundy, along with several lower-ranking demesnes.
  entities:
  - name: First Drengot Empire
    type: polity
  - name: Northumber
    type: polity
  - name: Markland
    type: polity
  - name: Kent
