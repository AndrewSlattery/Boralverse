    War of Provincial Independence lasted two years until Burgundy's defeat at the Battle of Margès.
  entities:
  - name: Daniel Menton
    type: person
  - name: Burgundy
    type: polity
  - name: Provence
    type: polity
  dates: 21 June 1497 N; 1499 N
- entry: 141.5
  title: Provence
  category: person
