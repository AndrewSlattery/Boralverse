  title: Time for T
  category: event
  claim: Tolose was conquered by Vascony from the west in the fifteenth century; Prince Mark of Tolose, heir to the Vascon
    throne, predeceased his father in 1453.
  entities:
  - name: Tolose
    type: place
  - name: Vascony
    type: polity
  - name: Mark of Tolose
    type: person
  dates: 15th c. N; 1453 N
- entry: 169.5
  title: Time for T
  category: event
  claim: In the first decade of the sixteenth century, Barcelon conquered Tolose from Vascony, and Tolose has been Barcelon
    territory since.
  entities:
  - name: Tolose
    type: place
  - name: Barcelon
    type: polity
  - name: Vascony
    type: polity
  dates: early 16th c. N
