  title: Parachthony
  category: terminology
  claim: Parachthon art refers to works depicting a world different from the real world, encompassing everything from divergent
    histories to entirely invented settings.
  entities:
  - name: parachthon
    type: concept
- entry: 61.5
  title: Parachthony
  category: terminology
  claim: The word parachthon was coined in the mid-nineteenth century, derived from Ancient Greek παρα- ('beside, contrary
    to') and χθών ('ground, soil, earth, world').
  entities:
  - name: parachthon
    type: concept
  dates: mid-19th c. N
- entry: 61.5
  title: Parachthony
  category: work
  claim: 'Elsebeth Sneider''s 1795 N trevold ''Through a Black Mirror'' (Saxon Dutch: ''Durgh''nen Shorzen Shouer'') is a
    seminal work of modern parachthon literature and arguably the first true voidtale work.'
  entities:
  - name: Through a Black Mirror
    type: work
  - name: Elsebeth Sneider
    type: person
  dates: 1795 N
- entry: 61.5
  title: Parachthony
  category: culture
  claim: The publication of 'Through a Black Mirror' sparked the 'voidtale craze' of grand voyages through the void visiting
    colourful, bustling xenic worlds.
  entities:
  - name: Through a Black Mirror
    type: work
  - name: Elsebeth Sneider
    type: person
- entry: 61.5
  title: Parachthony
  category: period
  claim: The voidtale craze persisted until the 1820s N, at which point its optimistic and exploratory character dropped out
    of fashion faced with the horrors of the Second German War.
  entities:
  - name: Second German War
    type: event
  dates: until 1820s N
- entry: 61.5
  title: Parachthony
  category: culture
  claim: The voidtale craze spread as far as Madray and China before declining.
  entities:
  - name: Madray
    type: place
- entry: 61.5
  title: Parachthony
  category: person
  claim: The renowned landscapist Narayanan was commissioned to paint vistas of the seven other planets then known during
    the height of the voidtale craze.
  entities:
  - name: Narayanan
    type: person
- entry: 61.5
  title: Parachthony
  category: culture
  claim: The mid-nineteenth century was something of a low point (nazir) for parachthon art, as romance moved to masquira
    and herdtale settings and historical revivals dominated stages.
  entities:
  - name: parachthon
    type: concept
  dates: mid-19th c. N
- entry: 61.5
  title: Parachthony
  category: culture
  claim: The maturation of genres in the twentieth century brought parachthony back into popular art, with purposeful melding
    of parachthon elements in lovetales and ænigmata, and incorporation of related movements like Futurism.
