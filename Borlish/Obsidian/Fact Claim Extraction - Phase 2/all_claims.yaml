- entry: 74.5
  title: The Pistol Mesh
  category: technology
  claim: 'The pistol mesh (Borlish: sar pistol), also referred to simply as ''the mesh'', is the global system of long-distance
    communication which employs a single normalised method for transmitting messages from one endpoint augrimmer to another.'
  entities:
  - name: pistol mesh
    type: technology
- entry: 74.5
  title: The Pistol Mesh
  category: terminology
  claim: The phrase 'pistol mesh' was first used by writer Ashford Pasquier in his 1968 N parachthon work 'Starsail', describing
    technology that could transmit written messages, sounds, and moving images between people in different star systems.
  entities:
  - name: pistol mesh
    type: technology
  - name: Starsail
    type: work
  - name: Ashford Pasquier
    type: person
  dates: 1968 N
- entry: 74.5
  title: The Pistol Mesh
  category: language
  claim: The word 'pistol' in pistol mesh reflects post-Classical Latin pistola ('epistle, written decree'), an aphæretic
    form of epistola.
  entities:
  - name: pistol mesh
    type: technology
- entry: 74.5
  title: The Pistol Mesh
  category: language
  claim: The word 'mesh' in pistol mesh descends from Old English masc meaning 'net'.
  entities:
  - name: pistol mesh
    type: technology
- entry: 74.5
  title: The Pistol Mesh
  category: technology
  claim: The pistol mesh grew out of earlier technologies, beginning with the first flag-lamp steeplepost lines in the eighteenth
    century.
  entities:
  - name: pistol mesh
    type: technology
  - name: steeplepost
    type: technology
- entry: 74.5
  title: The Pistol Mesh
  category: technology
  claim: Tachygraphs emerged a century after the first steeplepost lines, allowing one to type text directly onto the barrick
    steeplepost from home.
  entities:
  - name: tachygraph
    type: technology
  - name: steeplepost
    type: technology
- entry: 74.5
  title: The Pistol Mesh
  category: technology
  claim: It was only with the rise of general augrimmers in the twentieth century that the modern pistol mesh began to take
    shape.
  entities:
  - name: pistol mesh
    type: technology
  - name: augrimmer
    type: technology
  dates: 20th c. N
- entry: 74.5
  title: The Pistol Mesh
  category: organisation
  claim: The Tremonnow Open School (formerly the Brethin Mesh Institute) offered history courses across Albion entirely via
    the pistol mesh by the late twentieth century.
  entities:
  - name: Tremonnow Open School
    type: organisation
  - name: Brethin
    type: organisation
  - name: pistol mesh
    type: technology
- entry: 74.5
  title: The Pistol Mesh
  category: technology
  claim: '''Distributed bookhouses'' are repositories for free-to-access information on the pistol mesh, to which anyone could
    contribute.'
  entities:
  - name: distributed bookhouses
    type: technology
  - name: pistol mesh
    type: technology
