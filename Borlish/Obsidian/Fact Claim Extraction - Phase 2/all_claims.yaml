  relationships:
  - type: grandchild
    from: Déricque
    to: Adaillé Nassow
- entry: 69.5
  title: Avosche
  category: event
  claim: The seventeenth century was particularly eventful for Avosche, with the region changing hands as a result of wars
    and peacetime treaties on five separate occasions.
  entities:
  - name: Avosche
    type: place
  dates: 17th c. N
