  claim: Angland is a region in the west of Borland, with its largest population centre being the city of Vithor.
  entities:
  - name: Angland
    type: place
  - name: Borland
    type: place
  - name: Vithor
    type: place
- entry: 130.5
  title: Angland
  category: polity
