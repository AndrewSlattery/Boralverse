    type: polity
  - name: Paris
    type: place
  - name: Roun
    type: place
  dates: 11th c. N
- entry: 64.5
  title: First Drengot Empire
  category: event
  claim: The First Drengot Empire began with the Kernovan Conjuring, through which House Drengot in Normandy invaded and conquered
    Kent with the support of Greater Devon's House of Kernow.
  entities:
  - name: First Drengot Empire
    type: polity
  - name: House Drengot
    type: organisation
  - name: Kent
    type: polity
  - name: Devon
    type: polity
- entry: 64.5
  title: First Drengot Empire
  category: event
  claim: As recompense for their support in the Kernovan Conjuring, the Drengots helped install the House of Kernow on the
    Devoner throne.
  entities:
  - name: House Drengot
    type: organisation
  - name: Devon
    type: polity
- entry: 64.5
  title: First Drengot Empire
  category: event
  claim: The Kernovan Conjuring was triggered by the death of the elderly patriarch Rodulf of Kent, who had ruled since childhood
    for nearly eight decades.
  entities:
  - name: Rodulf of Kent
    type: person
  - name: Kent
    type: polity
- entry: 64.5
  title: First Drengot Empire
  category: polity
  claim: The First Drengot Empire was most stable in the decades around the turn of the twelfth century, having reached its
    greatest territorial extent.
  entities:
  - name: First Drengot Empire
    type: polity
  dates: c. 1100 N
- entry: 64.5
  title: First Drengot Empire
  category: event
  claim: By 1120 N, much of the First Drengot Empire's treasury had been spent on defending the long eastern border with Willemy,
    including the completion of a new Great Castle at Vésonçon.
  entities:
  - name: First Drengot Empire
    type: polity
  - name: Willemy
    type: polity
  - name: Vésonçon
    type: place
  dates: 1120 N
- entry: 64.5
  title: First Drengot Empire
  category: event
