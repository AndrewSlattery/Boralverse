- entry: 195.5
  title: Borland in the First Millennium
  category: event
  claim: Roman emperors Claudius and Hadrian personally visited Borland; Claudius orchestrated the conquests of Britain and
    Borland, while Hadrian's tour led to the creation of a Borlish province (Īnsula Borālum or Borālia) separate from Britain.
  entities:
  - name: Borland
    type: place
