  - name: Borlish
    type: concept
- entry: 192.5
  title: Borlish Adjectives
  category: language
  claim: 'Several Borlish adjectives have suppletive comparative forms: bon (''good'') → ottem (''better''); mal (''bad'')
    → pessem (''worse''); gran (''big'') → maissem (''bigger'').'
  entities:
  - name: Borlish
    type: concept
- entry: 192.5
  title: Borlish Adjectives
  category: language
  claim: Most Borlish adjectives ending in syllabic -r form the comparative with the suffix -errem, which replaces the final
    syllabic consonant and is stressed penultimately.
