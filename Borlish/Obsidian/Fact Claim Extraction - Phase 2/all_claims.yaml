- entry: 169.5
  title: Time for T
  category: person
  claim: Tewis Camigner (fl. 16th century) was a botanist from Willemy during the Revitalist period, sometimes called the
    father of farm theory; his writings include the first reference to the high sugar content of beet syrup.
  entities:
  - name: Tewis Camigner
    type: person
  - name: Willemy
    type: polity
  dates: fl. 16th c. N
- entry: 169.5
  title: Time for T
  category: event
  claim: Camigner's work on beet syrup inspired the 1730s Pentrose survey, a search for a domestic alternative to sugarcane,
    which resulted in the braxoch, a hybrid of Silesian and Cassuvian beets with a characteristic gold colour and ancestor
    of almost all modern sugar beets.
  entities:
  - name: Tewis Camigner
    type: person
  dates: 1730s N
- entry: 169.5
  title: Time for T
  category: work
  claim: '''Tightrope Walking: a Linguistic History of Borland'' (1991, Ghendaline Cecchino, Edizore Università Napule; originally
    in Napolitan as ''Funamblisme: n''Istorio Lingual d''e Isule Bural'') chronicles the Borlish language from the Roman period
    to the modern day.'
  entities:
  - name: 'Tightrope Walking: a Linguistic History of Borland'
    type: work
  - name: Ghendaline Cecchino
    type: person
  dates: 1991 N
- entry: 169.5
  title: Time for T
  category: place
  claim: Tolose is a city and region in the south of Gaul, formerly an independent polity that was a march and then a duchy,
