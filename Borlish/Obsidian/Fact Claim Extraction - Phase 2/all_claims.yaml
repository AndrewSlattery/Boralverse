    irl: Americas
    type: place
- entry: 171.5
  title: Novomundine Landfall
  category: period
  claim: The first century following the Novomundine Landfall is known to historians as the Intertwining Century.
  entities:
  - name: Intertwining Century
    type: period
- entry: 171.5
  title: Novomundine Landfall
  category: language
  claim: The terms Novomund and Mendeva date to the Landfall voyage of 1471; a surviving map from the voyage is marked terrae
    mendevalensis after the Vask word mendeval meaning 'west'.
  entities:
  - name: Novomund
    type: place
  - name: Mendeva
    type: place
  dates: 1471 N
- entry: 171.5
  title: Novomundine Landfall
  category: event
  claim: Following the Landfall, Munir al-Hamdawi of Morrack redirected his New World Company westward, leading to the discovery
    of the faster southern route to the Novomund and the islands of the Arcabil.
  entities:
  - name: Munir al-Hamdawi
    type: person
  - name: Morrack New World Company
    type: organisation
- entry: 171.5
  title: Novomundine Landfall
  category: person
  claim: Princess Alexandra of Vascony, elder sister of King Ambrose III, was the first Vetomundine royal to set foot in the
    Novomund; she visited the settlement of Paratzon in the 1490s.
  entities:
  - name: Alexandra
    type: person
  - name: Ambrose III
    type: person
  - name: Vascony
    type: polity
  relationships:
  - type: sibling
    from: Alexandra
    to: Ambrose III
  dates: 1490s N
