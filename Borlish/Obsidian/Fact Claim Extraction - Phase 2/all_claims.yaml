  title: Decim(alis)ation
  source_work: Scavlour (Reflecter), 1 July 1975 (Borland workdaily paper)
  category: person
  claim: Sarzan Dawkinholm, one-time Outland Minister in Markland, coined the term 'decimation' for currency reform as a cod-Latin
