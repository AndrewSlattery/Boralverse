  - name: Avosche
    type: place
  - name: Axton
    type: place
  - name: Willemy
    type: polity
- entry: 69.5
  title: Avosche
  category: place
  claim: Avosche has at various points been a county, a duchy, and a march, and has seen both continual territorial instability
    and major urban development into the modern period.
  entities:
  - name: Avosche
    type: place
- entry: 69.5
  title: Avosche
  category: place
  claim: 'Avosche is named for its first ruling house, which in turn takes its title from its founder Cuonrat Aihuosc (Latin:
