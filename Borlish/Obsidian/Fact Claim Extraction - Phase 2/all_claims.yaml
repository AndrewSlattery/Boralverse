- entry: 164.5
  title: Kelt Borland
  category: period
  claim: The Iron Age began on Borland in approximately the ninth century aN, at about the same time as on the other Northwestern
    Isles.
  entities:
  - name: Borland
    type: place
  dates: 9th c. aN
- entry: 164.5
  title: Kelt Borland
  category: event
  claim: The last significant wave of Kelt migration to Borland was of early Brythonic speakers from Albion settling in the
    fourth century aN, the ancestors of the small hill-fort kingdoms present at the time of the Roman invasion.
  entities:
  - name: Borland
    type: place
  dates: 4th c. aN
- entry: 164.5
  title: Kelt Borland
  category: place
  claim: There are archaeological structures on Borland that predate the Kelt migrations, the most famous of which is a 'labyrinth'
    located on Çadrosc Heath in the northwest of the island, which the Kelts repurposed for ritual use.
  entities:
  - name: Çadrosc Heath
    type: place
  - name: Borland
    type: place
- entry: 164.5
  title: Kelt Borland
  category: language
  claim: Ancient cairns on Borland are now called sarzin stones, from a late medieval use of sarzin meaning 'pagan', itself
    deriving from Latin Saracēnus meaning 'Muslim'.
  entities:
  - name: sarzin
    type: concept
- entry: 164.5
  title: Kelt Borland
  category: language
  claim: The name Borland is thought to descend from the Kelt enis borag meaning 'island of the dawn' and bora ale meaning
    'the other Easterners', originally an exonym used by Brythonic speakers on Albion; the Romans were also influenced by
    its similarity to Latin boreālis meaning 'northern'.
  entities:
  - name: Borland
    type: place
- entry: 164.5
  title: Kelt Borland
  category: culture
  claim: The Borland tradition of Revillon traces its origins to a Kelt winter feast called the Flidōlus, recorded by the
    third-century Roman historian Ammian.
  entities:
  - name: Revillon
    type: culture
  dates: 3rd c. N (recorded)
