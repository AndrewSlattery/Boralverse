  title: Decim(alis)ation
  source_work: Scavlour (Reflecter), 1 July 1975 (Borland workdaily paper)
  category: event
  claim: 'In 1975, the Borlish Ministry for Wealth announced a ''decimation'': the gemma was to be supplemented and eventually
    replaced by a new coin worth 10 gemma, with new currency entering circulation on David''s Day 1977.'
  entities:
  - name: Borland
    type: polity
  dates: '1975 N; new currency: 1977 N'
