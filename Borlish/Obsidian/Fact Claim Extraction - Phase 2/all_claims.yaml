  - name: Adaillé Nassow
    type: person
  - name: David of France
    type: person
- entry: 69.5
  title: Avosche
  category: event
  claim: Adaillé Nassow's influence was punctured by the scandal of her grandson and heir apparent Déricque fleeing to New
