  title: Decim(alis)ation
  source_work: Scavlour (Reflecter), 1 July 1975 (Borland workdaily paper)
  category: event
  claim: Borland adopted a decimal coinage system upon its incorporation into the Drengot Collusion in 1894; the gemma replaced
