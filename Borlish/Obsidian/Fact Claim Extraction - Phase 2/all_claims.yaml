  title: Borland before Borlish
  source_work: Borland before Borlish (Istr Boral pre Borallesc), New Vithor University, 1983
  category: language
  claim: Bora Ale is reconstructed as meaning 'people of the East,' with bora 'East, sunrise' corresponding to Welsh bore
    'morning' and Irish márah 'tomorrow'.
