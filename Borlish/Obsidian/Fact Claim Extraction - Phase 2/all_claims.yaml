- entry: 138.5
  title: Steeplepost Tapestry
  category: technology
  claim: The Steeplepost Tapestry was a screen of several myriad black or white tiles built in Ambrosia's capital city of
    Aiga d'Angoixa, completed in 1820 and inspired by the 'latticework' art movement.
  entities:
  - name: Steeplepost Tapestry
    type: technology
  - name: Aiga d'Angoixa
    type: place
  - name: Ambrosia
    type: polity
