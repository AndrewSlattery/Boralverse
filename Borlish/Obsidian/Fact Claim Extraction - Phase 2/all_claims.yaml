- entry: 77.5
  title: Continents and Conjugality
  category: culture
  claim: The Household Renovation of the late nineteenth century was an attitudinal shift towards non-traditional familial
    structures, the institution of marriage, and the social role of children.
  entities:
  - name: Household Renovation
    type: culture
  dates: late 19th c. N
- entry: 77.5
  title: Continents and Conjugality
  category: culture
