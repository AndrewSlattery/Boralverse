- entry: 171.5
  title: Novomundine Landfall
  category: event
  claim: 'The Novomundine Landfall (Borlish: Abanc Novomondin) occurred in 1471 N when a ship on a New Navarre Enterprise
    fishing expedition sighted and made landfall on the island of Brasil, marking the start of prolonged contact between the
    Vetomund and the Novomund.'
  entities:
  - name: Novomundine Landfall
    type: event
  - name: New Navarre Enterprise
    type: organisation
  dates: 1471 N
