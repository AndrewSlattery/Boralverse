    type: person
  - name: Thieves' Script
    type: technology
  - name: Nottingham
    type: place
- entry: 72.5
  title: Markland
  category: technology
  claim: Thieves' Script is remembered as a very early precursor of codes like steeplescript or modern one-zeffre encoding.
  entities:
  - name: Thieves' Script
    type: technology
- entry: 72.5
  title: Markland
  category: event
  claim: Poor economic conditions and population displacement in Markland following the Wars of Fealty led it to suffer almost
    twice as many deaths per capita from the Second Great Dying compared to polities like Willemy.
