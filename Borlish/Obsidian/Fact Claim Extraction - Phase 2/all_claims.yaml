  - name: social comedy
    type: concept
  dates: late 1910s N
- entry: 166.5
  title: The North Wind and the Sun
  category: organisation
  claim: The Borrhatic League is a collection of charitable organisations and political action groups with a focus on laic
    governance, education, pacifism, and objection; it grew from collaboration between working-class groups of minority faiths
    across Northern Europe in the early nineteenth century.
  entities:
  - name: Borrhatic League
    type: organisation
  dates: early 19th c. N
- entry: 166.5
  title: The North Wind and the Sun
  category: language
  claim: The Borrhatic League takes its name from Attic Greek Borrhâs meaning 'the North Wind'.
  entities:
  - name: Borrhatic League
    type: organisation
- entry: 166.5
  title: The North Wind and the Sun
  category: event
  claim: The Borrhatic League first rose to prominence on the scale of polities during the Second German War of the 1820s
    and its aftermath; Hilgart and Michael Bervisson were influential in Borland's Borrhatic League at this time, especially
    regarding calls for religious tolerance.
