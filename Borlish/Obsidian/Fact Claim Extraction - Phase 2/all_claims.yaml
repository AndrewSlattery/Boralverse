- entry: 138.5
  title: Steeplepost Tapestry
  category: technology
  claim: The Steeplepost Tapestry used the flag-lamp steeplemesh infrastructure to display short news pieces or government
    messages in text and simple symbols.
  entities:
  - name: Steeplepost Tapestry
    type: technology
- entry: 138.5
  title: Steeplepost Tapestry
  category: technology
  claim: The Steeplepost Tapestry successfully transmitted journalist's sketches of events several times, but practical limitations
    prevented this from becoming routine.
  entities:
  - name: Steeplepost Tapestry
    type: technology
- entry: 138.5
  title: Steeplepost Tapestry
  category: language
  claim: The word 'diced' (meaning 'blocky, pixellated') dates back to a calque of Provincial icon dau 'die image,' coined
    in 1821 in disparaging reference to the Steeplepost Tapestry.
  entities:
  - name: Steeplepost Tapestry
    type: technology
  dates: 1821 N
- entry: 138.5
  title: Steeplepost Tapestry
  category: event
  claim: The 'Lies of 1824' were a series of hoax messages that spread via the Ambrosian steeplemesh and appeared on the Tapestry,
    including a report of the governor's death and an alleged declaration of war from New Provence.
  entities:
  - name: Steeplepost Tapestry
    type: technology
  - name: Ambrosia
    type: polity
  - name: New Provence
    type: polity
  dates: 1824 N
