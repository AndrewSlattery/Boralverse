entry: 181.5
title: "Chronicles of Kilshaw"
claims:
  - category: organisation
    claim: "The Kilshaw writers' collective was a group of Merch authors who lived in or around Kilshaw, active through the middle decades of the twentieth century and remembered mainly for long-running series of children's books."
    entities:
      - name: Kilshaw collective
        type: organisation
      - name: Kilshaw
        type: place

  - category: glossary
    claim: "Kilshaw is the Boralverse name for Culcheth."
    entities:
      - name: Kilshaw
        irl: Culcheth
        type: place

  - category: glossary
    claim: "Phasm is the Boralverse term for television."
    entities:
      - name: phasm
        irl: television
        type: concept

  - category: person
    claim: "Kenna and Holcroft Strong were a brother and sister pair who began collaborating on stories in the early 1930s and went on to co-found the Kilshaw collective."
    entities:
      - name: Kenna Strong
        type: person
      - name: Holcroft Strong
        type: person
    relationships:
      - type: sibling
        from: "Kenna Strong"
        to: "Holcroft Strong"
    dates: "early 1930s N"

  - category: glossary
    claim: "Makerfell is the Boralverse name for Makerfield."
    entities:
      - name: Makerfell
        irl: Makerfield
        type: place

  - category: glossary
    claim: "Safford is the Boralverse name for Salford."
    entities:
      - name: Safford
        irl: Salford
        type: place

  - category: culture
    claim: "Kilshaw children's fiction made an industry of adapting adult literary genres like masquira, social comedy, and voidtale for child protagonists; later works explored more realistic consequences of their premises."
    entities:
      - name: Kilshaw collective
        type: organisation
