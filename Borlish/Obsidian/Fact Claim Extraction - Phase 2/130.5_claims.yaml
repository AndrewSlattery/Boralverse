entry: 130.5
title: "Angland"
claims:
  - category: place
    claim: "Angland is a region in the west of Borland, with its largest population centre being the city of Vithor."
    entities:
      - name: Angland
        type: place
      - name: Borland
        type: place
      - name: Vithor
        type: place

  - category: polity
    claim: "The petty kingdom of Angland was founded by Angle immigrants in the fifth century, along with Southbar and several more minor settlements."
    entities:
      - name: Angland
        type: polity
    dates: "5th c. N"

  - category: event
    claim: "The marriage of Roman king Stiglan's son Marc to the only daughter of Alfegh of Angland unified the kingdoms of Roman Borland and Angland."
    entities:
      - name: Stiglan
        type: person
      - name: Marc
        type: person
      - name: Alfegh of Angland
        type: person
    relationships:
      - type: parent
        from: "Stiglan"
        to: "Marc"

  - category: event
    claim: "The Battle of Fendal in 810 forced Southbar to swear fealty as a subordinate kingdom, shortly after the unification of Angland and Roman Borland."
    entities:
      - name: Battle of Fendal
        type: event
      - name: Southbar
        type: polity
    dates: "810 N"

  - category: language
    claim: "The Borland varieties of Old English survived longest in Angland, with records suggesting an English language descending from the original settlers was spoken in rural parts of the region until as late as the seventeenth century."
    entities:
      - name: Angland
        type: place
    dates: "17th c. N"

  - category: place
    claim: "Çadrosc is an area of moorland in the northwest of Angland which features a labyrinth built in Kelt times."
    entities:
      - name: Çadrosc
        type: place
      - name: Angland
        type: place

  - category: place
    claim: "Gambrig is a village and nearby monastery in Angland, noteworthy for its medieval chronicle in a variety of Old English."
    entities:
      - name: Gambrig
        type: place
      - name: Angland
        type: place

  - category: place
    claim: "Hawkirch is a site in Angland and was the location of the Hawkirch Surrender of 1632."
    entities:
      - name: Hawkirch
        type: place
      - name: Hawkirch Surrender
        type: event
    dates: "1632 N"

  - category: place
    claim: "Vithor is the regional capital of Angland on the west coast, known for the New Vithor University, a major research institution."
    entities:
      - name: Vithor
        type: place
      - name: New Vithor University
        type: organisation
