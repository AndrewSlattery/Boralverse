entry: 45.5
title: "Willemy"
claims:
  - category: polity
    claim: "Willemy is a polity in northern Europe, situated east of Norman Kent and France."
    entities:
      - name: Willemy
        type: polity
      - name: Kent
        type: polity
      - name: France
        type: polity

  - category: polity
    claim: "The Duchy of Willemy was a minor polity within the German Empire during the Second Tetrarchy of the eleventh and twelfth centuries."
    entities:
      - name: Duchy of Willemy
        type: polity
      - name: German Empire
        type: polity
    dates: "11th–12th c. N"

  - category: polity
    claim: "Willemy formed much of the German Empire's border with the First Drengot Empire to the west."
    entities:
      - name: Willemy
        type: polity
      - name: German Empire
        type: polity
      - name: First Drengot Empire
        type: polity

  - category: event
    claim: "Defence against the marksmen of Willemy led Drengot Emperor Roger II to spend greatly on castle fortifications from Flanders to the Alps."
    entities:
      - name: Roger II
        type: person
      - name: First Drengot Empire
        type: polity
      - name: Willemy
        type: polity

  - category: event
    claim: "The Great Flie Flood of 1171 N swept away much of Lower Frisia in Willemy, creating several new islands in the Rustigh Strait including Texel."
    entities:
      - name: Great Flie Flood
        type: event
      - name: Lower Frisia
        type: place
      - name: Willemy
        type: polity
      - name: Rustigh Strait
        type: place
      - name: Texel
        type: place
    dates: "1171 N"

  - category: event
    claim: "The Great Flie Flood of 1171 N killed then-ruler Lovis the Tall, who was in Amstel at the time."
    entities:
      - name: Great Flie Flood
        type: event
      - name: Lovis the Tall
        type: person
      - name: Amstel
        type: place
    dates: "1171 N"

  - category: event
    claim: "The devastation of the Great Flie Flood is thought to have allowed Borlish Axbane to flourish as a trading post in the following century."
    entities:
      - name: Great Flie Flood
        type: event
      - name: Axbane
        type: place
    dates: "12th c. N"

  - category: polity
    claim: "In the Revitalist Period and for some time afterwards, Willemy was split between neighbouring powers with portions of its territory changing hands regularly."
    entities:
      - name: Willemy
        type: polity

  - category: polity
    claim: "The duchy of Avosche in Willemy was unusually stable and held by France for over a century during the Revitalist Period."
    entities:
      - name: Avosche
        type: polity
      - name: France
        type: polity
      - name: Willemy
        type: polity

  - category: economics
    claim: "Trading operations from Willem and its Stadbund cities (the Bróderrat) contributed to staddomains in Atlantic Cappatia."
    entities:
      - name: Willem
        type: place
      - name: Bróderrat
        type: organisation
      - name: Cappatia
        type: place

  - category: polity
    claim: "The most notable Bróderrat domain in Atlantic Cappatia was Neuwillem."
    entities:
      - name: Neuwillem
        type: polity
      - name: Bróderrat
        type: organisation
      - name: Cappatia
        type: place

  - category: work
    claim: "The Bróderratcronike of Neuwillem comprises a record of its activities from 1561 to 1597 N."
    entities:
      - name: Bróderratcronike
        type: work
      - name: Neuwillem
        type: polity
    dates: "1561–1597 N"

  - category: work
    claim: "The Bróderratcronike is an important first-hand account of conditions in Atlantic Cappatia at the time."
    entities:
      - name: Bróderratcronike
        type: work
      - name: Cappatia
        type: place

  - category: event
    claim: "Willem was the focal point of the seventeenth-century Blue Trans-Willem War, usually numbered among the Romantic Wars."
    entities:
      - name: Blue Trans-Willem War
        type: event
      - name: Willem
        type: place
    dates: "17th c. N"

  - category: event
    claim: "The Blue Trans-Willem War led to the dissolution of the Kingdom of Burgundy."
    entities:
      - name: Blue Trans-Willem War
        type: event
      - name: Kingdom of Burgundy
        type: polity

  - category: event
    claim: "The Blue Trans-Willem War led to the creation of the Duchy of Far Suebia in Bavaria."
    entities:
      - name: Blue Trans-Willem War
        type: event
      - name: Duchy of Far Suebia
        type: polity
      - name: Bavaria
        type: place

  - category: technology
    claim: "The two-arm system for sending steeplepost was first deployed in Willem in the early nineteenth century."
    entities:
      - name: steeplepost
        type: technology
      - name: Willem
        type: place
    dates: "early 19th c. N"

  - category: event
    claim: "The first steeplepost message sent the first lines of the Pater Noster from the church in the town of Thynen to neighbouring Bost."
    entities:
      - name: steeplepost
        type: technology
      - name: Thynen
        type: place
      - name: Bost
        type: place

  - category: terminology
    claim: "The name 'steeplepost' for the communication technology likely derives from the first deployment at a church steeple in Thynen, Willem."
    entities:
      - name: steeplepost
        type: technology
      - name: Thynen
        type: place

  - category: person
    claim: "Duke Lovis the Tall (d. 1171 N) was a ruler of Willemy who perished in the Great Flie Flood."
    entities:
      - name: Lovis the Tall
        type: person
      - name: Willemy
        type: polity
    dates: "d. 1171 N"

  - category: person
    claim: "Adaillé Nassow, Duchess d'Avosche (1524–1608 N), was infamous during her life for her influence at the court of David of France."
    entities:
      - name: "Adaillé Nassow"
        type: person
      - name: Avosche
        type: polity
      - name: David of France
        type: person
    dates: "1524–1608 N"

  - category: person
    claim: "Carlyn van Stede (fl. 1965 N) is the author of the parachthon giftale 'While Gold Yet Runs in My Veins' (Willemish: 'Zolang Gout dór myn Ádren Noh Vlóye')."
    entities:
      - name: Carlyn van Stede
        type: person
      - name: "While Gold Yet Runs in My Veins"
        type: work
    dates: "fl. 1965 N"

  - category: person
    claim: "Dr Mickel Cráyenschot (fl. c. 19th c. N) was a noted early supporter of the Deviance movement."
    entities:
      - name: Mickel Cráyenschot
        type: person
    dates: "fl. c. 19th c. N"

  - category: person
    claim: "Mickel Cráyenschot was publicly tovarick even as France embraced the Modest Arrangement."
    entities:
      - name: Mickel Cráyenschot
        type: person
      - name: France
        type: polity

  - category: person
    claim: "Niklás der Fecht (fl. 1828 N) was a mathematician based in Willemy."
    entities:
      - name: Niklás der Fecht
        type: person
    dates: "fl. 1828 N"

  - category: person
    claim: "Tewis Camigner (fl. c. 16th c. N) was a theorist who noted the high sugar content of beet syrup."
    entities:
      - name: Tewis Camigner
        type: person
    dates: "fl. c. 16th c. N"

  - category: economics
    claim: "Although Tewis Camigner noted the high sugar content of beet syrup in the sixteenth century, betraver sugar would not be produced commercially for another two centuries."
    entities:
      - name: Tewis Camigner
        type: person
    dates: "fl. c. 16th c. N"
