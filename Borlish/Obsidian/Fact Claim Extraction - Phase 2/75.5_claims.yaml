entry: 75.5
title: "Burgundy"
claims:
  - category: polity
    claim: "Burgundy (Burgund French: Borgogne) is a polity in Gaul, situated south of France, west of Bavarn, north of Provence and east of Vascony."
    entities:
      - name: Burgundy
        type: polity
      - name: France
        type: polity
      - name: Bavarn
        type: polity
      - name: Provence
        type: polity
      - name: Vascony
        type: polity

  - category: polity
    claim: "Burgundy has for most of its history been ruled from the city of Geneva."
    entities:
      - name: Burgundy
        type: polity
      - name: Geneva
        type: place

  - category: polity
    claim: "During the Second Tetrarchy (eleventh and twelfth centuries), Burgundy was a major vassal of the First Drengot Empire."
    entities:
      - name: Burgundy
        type: polity
      - name: First Drengot Empire
        type: polity
    dates: "11th–12th c. N"

  - category: event
    claim: "Following the Emergency at Dijon in 1170 N, which presaged the collapse of the First Drengot Empire, Burgundy became a de facto autonomous kingdom."
    entities:
      - name: Burgundy
        type: polity
      - name: First Drengot Empire
        type: polity
    dates: "1170 N"

  - category: event
    claim: "In the early fifteenth century during the Vascon Ascendancy, Burgundy lost its Middlesea coast to Vascony."
    entities:
      - name: Burgundy
        type: polity
      - name: Vascony
        type: polity
    dates: "early 15th c. N"

  - category: event
    claim: "Burgundy wrested the territory of Provence back from Vascony in 1494 N."
    entities:
      - name: Burgundy
        type: polity
      - name: Vascony
        type: polity
      - name: Provence
        type: polity
    dates: "1494 N"

  - category: event
    claim: "Provence seceded from Burgundy via the 1497–99 N War of Provincial Independence, ending in Burgundy's defeat at the Battle of Margès."
    entities:
      - name: Burgundy
        type: polity
      - name: Provence
        type: polity
      - name: War of Provincial Independence
        type: event
    dates: "1497–1499 N"

  - category: event
    claim: "Burgundy weathered the Second Great Dying comparatively well due to its lack of coastal territory, since the principal vector of plague transmission was naval trade."
    entities:
      - name: Burgundy
        type: polity
      - name: Second Great Dying
        type: event
    dates: "after 1519 N"

  - category: polity
    claim: "Burgundy retained the feudal system unusually late for the region, until the dawn of the seventeenth century."
    entities:
      - name: Burgundy
        type: polity
    dates: "early 17th c. N"

  - category: event
    claim: "The title of King of Burgundy was dissolved after severe losses to neighbouring Bavarn in the Blue Trans-Willem War of the late seventeenth century."
    entities:
      - name: Burgundy
        type: polity
      - name: Bavarn
        type: polity
      - name: Blue Trans-Willem War
        type: event
    dates: "late 17th c. N"

  - category: event
    claim: "After the dissolution of the Burgundian monarchy, the former capital Geneva became a subordinate city in the Duchy of Far Suebia."
    entities:
      - name: Geneva
        type: place
      - name: Duchy of Far Suebia
        type: polity

  - category: polity
    claim: "A polity named Burgundy was formed once more in the nineteenth century (now without a monarch) as part of the diplomatic process leading to the formation of the Drengot Collusion."
    entities:
      - name: Burgundy
        type: polity
      - name: Drengot Collusion
        type: polity
    dates: "19th c. N"
