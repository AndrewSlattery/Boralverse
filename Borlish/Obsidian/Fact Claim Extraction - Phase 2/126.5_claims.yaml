entry: 126.5
title: "Chemical Etymology"
source_work: "Veriloquace Glossary of Alchemy (Rotcham University Primers)"
claims:
  - category: work
    claim: "The Veriloquace Glossary of Alchemy is a reference quire compiled by Rotcham University Primers."
    entities:
      - name: Veriloquace Glossary of Alchemy
        type: work
      - name: Rotcham University Primers
        type: organisation

  - category: glossary
    claim: "Moron is the Boralverse term for proton."
    entities:
      - name: moron
        irl: proton
        type: concept

  - category: language
    claim: "The word moron entered scientific usage in 1888, derived from Kiew Russian mora (1882), itself from Greek móron 'mulberry,' in reference to Nike Sarantylack's 'mulberry model' of the atom."
    entities:
      - name: moron
        type: concept
    dates: "1888 N"

  - category: glossary
    claim: "Kiew is the Boralverse name for Kyiv."
    entities:
      - name: Kiew
        irl: Kyiv
        type: place

  - category: glossary
    claim: "Lucifer is the Boralverse term for radioactive (or a radioactive substance)."
    entities:
      - name: lucifer
        irl: radioactive
        type: concept

  - category: language
    claim: "The scientific term lucifer was coined in 1894 from Vascon lucifer, from Latin lūcifer 'light-bringing'."
    entities:
      - name: lucifer
        type: concept
    dates: "1894 N"

  - category: glossary
    claim: "Killdark is the Boralverse term for uranium."
    entities:
      - name: killdark
        irl: uranium
        type: concept

  - category: language
    claim: "The word killdark entered usage in 1810, derived from Welsh kildárc (1805) from the Irish shire of Killdara, where the element was first isolated."
    entities:
      - name: killdark
        type: concept
    dates: "1810 N; isolated 1805 N"

  - category: glossary
    claim: "Lix is the Boralverse term for potassium."
    entities:
      - name: lix
        irl: potassium
        type: concept

  - category: language
    claim: "The word lix was coined in 1797 from Latin lixa 'lye,' which is the caustic of lix (potassium hydroxide)."
    entities:
      - name: lix
        type: concept
    dates: "1797 N"

  - category: glossary
    claim: "Janthine is the Boralverse term for iodine."
    entities:
      - name: janthine
        irl: iodine
        type: concept

  - category: language
    claim: "The word janthine was coined in 1791 from Scholastic Latin janthīnus, from Greek ἰάνθῐνος 'violet-coloured'."
    entities:
      - name: janthine
        type: concept
    dates: "1791 N"

  - category: glossary
    claim: "Tesquo is the Boralverse term for 'in nature' (as in naturally occurring)."
    entities:
      - name: tesquo
        irl: in nature
        type: concept
