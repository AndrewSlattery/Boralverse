entry: "18.5"
title: "Significant Figures, cont."
claims:
  - category: person
    claim: "Munir al-Hamdawi was born in 1429."
    entities:
      - name: "Munir al-Hamdawi"
        type: person
    dates: ["1429"]

  - category: person
    claim: "Munir al-Hamdawi was the ruler of Morrack during the latter half of the fifteenth century."
    entities:
      - name: "Munir al-Hamdawi"
        type: person
      - name: "Morrack"
        type: polity
    dates: ["latter half of 15th century"]

  - category: person
    claim: "Munir al-Hamdawi had a long-standing rivalry with Ambrose III of Vascony."
    entities:
      - name: "Munir al-Hamdawi"
        type: person
      - name: "Ambrose III"
        type: person

  - category: person
    claim: "Munir al-Hamdawi's rivalry with Ambrose III grew from a childhood enmity to a bitter naval and martial feud."
    entities:
      - name: "Munir al-Hamdawi"
        type: person
      - name: "Ambrose III"
        type: person

  - category: event
    claim: "Munir al-Hamdawi's reign included the conquest of the southern parts of Portingale in 1457."
    entities:
      - name: "Munir al-Hamdawi"
        type: person
      - name: "Portingale"
        type: polity
    dates: ["1457 N"]
    relationships:
      - subject: "Munir al-Hamdawi"
        predicate: "conquered"
        object: "southern parts of Portingale"

  - category: polity
    claim: "Southern parts of Portingale had previously enjoyed a level of autonomy under Vascon stewardship."
    entities:
      - name: "Portingale"
        type: polity
      - name: "Vascony"
        type: polity

  - category: organisation
    claim: "In 1463 Munir al-Hamdawi established the New World Company as a rival marine enterprise to Ambrose III's New Navarre Enterprise."
    entities:
      - name: "Munir al-Hamdawi"
        type: person
      - name: "New World Company"
        type: organisation
      - name: "New Navarre Enterprise"
        type: organisation
      - name: "Ambrose III"
        type: person
    dates: ["1463"]

  - category: organisation
    claim: "The Arabic name of the New World Company is 'شركة العالم الجديد'."
    entities:
      - name: "New World Company"
        type: organisation

  - category: event
    claim: "Five years after 1463, the ship Orion of the New World Company circumnavigated Africa."
    entities:
      - name: "Orion"
        type: technology
      - name: "New World Company"
        type: organisation
      - name: "Africa"
        type: place
    dates: ["1468"]

  - category: technology
    claim: "The Arabic name of the ship Orion is 'الجَبَار'."
    entities:
      - name: "Orion"
        type: technology

  - category: person
    claim: "Vigo the Magnificent died in 761."
    entities:
      - name: "Vigo the Magnificent"
        type: person
    dates: ["761"]

  - category: person
    claim: "Vigo the Magnificent was king of the Britons in Gaul from 720 until his death."
    entities:
      - name: "Vigo the Magnificent"
        type: person
    dates: ["720 N", "761"]

  - category: person
    claim: "Vigo the Magnificent was later king of Greater Devon."
    entities:
      - name: "Vigo the Magnificent"
        type: person
      - name: "Greater Devon"
        type: polity

  - category: person
    claim: "Vigo the Magnificent ascended to the position upon the death of his mother Queen Maud of Angeus."
    entities:
      - name: "Vigo the Magnificent"
        type: person
      - name: "Queen Maud of Angeus"
        type: person
    relationships:
      - subject: "Vigo the Magnificent"
        predicate: "was son of"
        object: "Queen Maud of Angeus"

  - category: person
    claim: "Queen Maud of Angeus was a widow who had unified the Kernish kingdoms."
    entities:
      - name: "Queen Maud of Angeus"
        type: person

  - category: person
    claim: "Vigo the Magnificent's accession was in 720, shortly after the Catumagin Accords."
    entities:
      - name: "Vigo the Magnificent"
        type: person
      - name: "Catumagin Accords"
        type: event
    dates: ["720"]

  - category: event
    claim: "The Catumagin Accords were with the Kingdom of the Franks to the east."
    entities:
      - name: "Catumagin Accords"
        type: event
      - name: "Kingdom of the Franks"
        type: polity

  - category: event
    claim: "The Catumagin Accords ended hostilities and established an official border between the kingdoms."
    entities:
      - name: "Catumagin Accords"
        type: event

  - category: person
    claim: "King Vigo the Magnificent is remembered primarily for leading the reconquest of Devon."
    entities:
      - name: "Vigo the Magnificent"
        type: person
      - name: "Devon"
        type: place

  - category: event
    claim: "Devon had been de jure under Wessaxon authority since the final defeat of the West Albic Britons at Gaulford in 656."
    entities:
      - name: "Devon"
        type: place
      - name: "Wessaxon"
        type: polity
      - name: "West Albic Britons"
        type: group
      - name: "Gaulford"
        type: place
    dates: ["656 N"]

  - category: event
    claim: "The more remote parts of Devon are thought never to have entirely submitted to Wessaxon authority."
    entities:
      - name: "Devon"
        type: place
      - name: "Wessaxon"
        type: polity

  - category: event
    claim: "The reconquest of Devon spanned over two decades of intermittent fighting with Wessex."
    entities:
      - name: "Devon"
        type: place
      - name: "Wessex"
        type: polity

  - category: event
    claim: "The reconquest of Devon concluded with the victory at Petherton in 749."
    entities:
      - name: "Devon"
        type: place
      - name: "Petherton"
        type: place
    dates: ["749 N"]

  - category: person
    claim: "With the victory at Petherton, Vigo the Magnificent was crowned rex Magnæ Dumnoniæ 'King of Greater Devon'."
    entities:
      - name: "Vigo the Magnificent"
        type: person
      - name: "Greater Devon"
        type: polity
    dates: ["749 N"]

  - category: event
    claim: "Vigo the Magnificent unified Devon with Kernow."
    entities:
      - name: "Vigo the Magnificent"
        type: person
      - name: "Devon"
        type: place
      - name: "Kernow"
        type: place

  - category: person
    claim: "Vigo the Magnificent married Guinnumar, daughter to King David I of Wynneth, in approximately 725."
    entities:
      - name: "Vigo the Magnificent"
        type: person
      - name: "Guinnumar"
        type: person
      - name: "David I of Wynneth"
        type: person
    dates: ["ca. 725 N"]
    relationships:
      - subject: "Guinnumar"
        predicate: "was daughter of"
        object: "David I of Wynneth"

  - category: event
    claim: "Vigo the Magnificent's marriage to Guinnumar is likely what allowed him to secure Welsh assistance with the invasion."
    entities:
      - name: "Vigo the Magnificent"
        type: person
      - name: "Guinnumar"
        type: person

  - category: person
    claim: "Vigo the Magnificent had at least three children with Guinnumar."
    entities:
      - name: "Vigo the Magnificent"
        type: person
      - name: "Guinnumar"
        type: person

  - category: person
    claim: "Cadern the Doubter was the son of Vigo the Magnificent and Guinnumar."
    entities:
      - name: "Cadern the Doubter"
        type: person
      - name: "Vigo the Magnificent"
        type: person
      - name: "Guinnumar"
        type: person
    relationships:
      - subject: "Cadern the Doubter"
        predicate: "was son of"
        object: "Vigo the Magnificent"

  - category: person
    claim: "Cadern the Doubter became king upon Vigo the Magnificent's death in 761."
    entities:
      - name: "Cadern the Doubter"
        type: person
      - name: "Vigo the Magnificent"
        type: person
    dates: ["761"]

  - category: person
    claim: "Iseld of Devon was the daughter of Vigo the Magnificent and Guinnumar."
    entities:
      - name: "Iseld of Devon"
        type: person
      - name: "Vigo the Magnificent"
        type: person
      - name: "Guinnumar"
        type: person
    relationships:
      - subject: "Iseld of Devon"
        predicate: "was daughter of"
        object: "Vigo the Magnificent"

  - category: person
    claim: "Iseld of Devon later became the first patron of the Brethin of Tremonnow."
    entities:
      - name: "Iseld of Devon"
        type: person
      - name: "Brethin of Tremonnow"
        type: organisation

  - category: person
    claim: "Vigo the Magnificent's prominence in the genesis of the kingdom led to many of his royal descendants taking his name."
    entities:
      - name: "Vigo the Magnificent"
        type: person

  - category: person
    claim: "Vigo IV was crowned in 940."
    entities:
      - name: "Vigo IV"
        type: person
    dates: ["940"]

  - category: person
    claim: "Vigo IV conquered east to Angeus."
    entities:
      - name: "Vigo IV"
        type: person
      - name: "Angeus"
        type: place

  - category: person
    claim: "Vigo VII was active around 1121."
    entities:
      - name: "Vigo VII"
        type: person
    dates: ["fl. 1121"]
