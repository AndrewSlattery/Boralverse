entry: 77.5
title: "Continents and Conjugality"
claims:
  - category: place
    claim: "The Novomund (also called the New World) refers to the lands to the west of the Atlantic Ocean, inhabited for over a myriad years."
    entities:
      - name: Novomund
        type: place

  - category: place
    claim: "The Novomund is composed of the two great landmasses of Mendeva and Cappatia, along with over a dozen major islands such as Brasil and Cocain and innumerable lesser ones."
    entities:
      - name: Novomund
        type: place
      - name: Mendeva
        type: place
      - name: Cappatia
        type: place
      - name: Brasil
        type: place
      - name: Cocain
        type: place

  - category: glossary
    claim: "Brasil is the Boralverse name for Newfoundland."
    entities:
      - name: Brasil
        irl: Newfoundland
        type: place

  - category: glossary
    claim: "Cocain is the Boralverse name for Cuba."
    entities:
      - name: Cocain
        irl: Cuba
        type: place

  - category: glossary
    claim: "Shadome fruit is the Boralverse term for tomatoes."
    entities:
      - name: shadome fruit
        irl: tomatoes
        type: concept

  - category: glossary
    claim: "Tartover is the Boralverse term for potatoes."
    entities:
      - name: tartover
        irl: potatoes
        type: concept

  - category: glossary
    claim: "Shockle is the Boralverse term for chocolate."
    entities:
      - name: shockle
        irl: chocolate
        type: concept

  - category: glossary
    claim: "Mikecorn is the Boralverse term for maize."
    entities:
      - name: mikecorn
        irl: maize
        type: concept

  - category: glossary
    claim: "Coshow is the Boralverse term for rubber."
    entities:
      - name: coshow
        irl: rubber
        type: concept

  - category: glossary
    claim: "Kistmaw is the Boralverse term for tobacco."
    entities:
      - name: kistmaw
        irl: tobacco
        type: concept

  - category: culture
    claim: "The Household Renovation of the late nineteenth century was an attitudinal shift towards non-traditional familial structures, the institution of marriage, and the social role of children."
    entities:
      - name: Household Renovation
        type: culture
    dates: "late 19th c. N"

  - category: culture
    claim: "The Household Renovation was prefigured by the deemphasis of religion in government following the 1850 N Laic Declarations of Belgrade."
    entities:
      - name: Household Renovation
        type: culture
      - name: Laic Declarations
        type: event
    dates: "after 1850 N"

  - category: culture
    claim: "The Household Renovation was also prefigured by contraceptive medical innovations including coshow bed-sleeves and stauron retainers."
    entities:
      - name: Household Renovation
        type: culture

  - category: glossary
    claim: "Coshow bed-sleeves is the Boralverse term for latex condoms."
    entities:
      - name: coshow bed-sleeves
        irl: latex condoms
        type: concept

  - category: glossary
    claim: "Stauron retainers is the Boralverse term for IUDs."
    entities:
      - name: stauron retainers
        irl: IUDs
        type: concept

  - category: culture
    claim: "The popularity of the masquira literary genre came hand in hand with the Household Renovation, and masquira was especially popular in tovarick circles."
    entities:
      - name: masquira
        type: culture
      - name: Household Renovation
        type: culture

  - category: glossary
    claim: "Tovarick is the Boralverse term for queer."
    entities:
      - name: tovarick
        irl: queer
        type: concept

  - category: culture
    claim: "Early embracers of the Household Renovation included Britain, the Riverine Cities, and New Leudong."
    entities:
      - name: Household Renovation
        type: culture
      - name: Britain
        type: polity
      - name: Riverine Cities
        type: polity
      - name: New Leudong
        type: polity

  - category: place
    claim: "New Leudong is a polity in south-eastern Chrysia."
    entities:
      - name: New Leudong
        type: polity
      - name: Chrysia
        type: place
