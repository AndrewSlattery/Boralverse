entry: 61.5
title: "Parachthony"
claims:
  - category: terminology
    claim: "Parachthon art refers to works depicting a world different from the real world, encompassing everything from divergent histories to entirely invented settings."
    entities:
      - name: parachthon
        type: concept

  - category: terminology
    claim: "The word parachthon was coined in the mid-nineteenth century, derived from Ancient Greek παρα- ('beside, contrary to') and χθών ('ground, soil, earth, world')."
    entities:
      - name: parachthon
        type: concept
    dates: "mid-19th c. N"

  - category: work
    claim: "Elsebeth Sneider's 1795 N trevold 'Through a Black Mirror' (Saxon Dutch: 'Durgh'nen Shorzen Shouer') is a seminal work of modern parachthon literature and arguably the first true voidtale work."
    entities:
      - name: "Through a Black Mirror"
        type: work
      - name: Elsebeth Sneider
        type: person
    dates: "1795 N"

  - category: culture
    claim: "The publication of 'Through a Black Mirror' sparked the 'voidtale craze' of grand voyages through the void visiting colourful, bustling xenic worlds."
    entities:
      - name: "Through a Black Mirror"
        type: work
      - name: Elsebeth Sneider
        type: person

  - category: period
    claim: "The voidtale craze persisted until the 1820s N, at which point its optimistic and exploratory character dropped out of fashion faced with the horrors of the Second German War."
    entities:
      - name: Second German War
        type: event
    dates: "until 1820s N"

  - category: culture
    claim: "The voidtale craze spread as far as Madray and China before declining."
    entities:
      - name: Madray
        type: place

  - category: person
    claim: "The renowned landscapist Narayanan was commissioned to paint vistas of the seven other planets then known during the height of the voidtale craze."
    entities:
      - name: Narayanan
        type: person

  - category: culture
    claim: "The mid-nineteenth century was something of a low point (nazir) for parachthon art, as romance moved to masquira and herdtale settings and historical revivals dominated stages."
    entities:
      - name: parachthon
        type: concept
    dates: "mid-19th c. N"

  - category: culture
    claim: "The maturation of genres in the twentieth century brought parachthony back into popular art, with purposeful melding of parachthon elements in lovetales and ænigmata, and incorporation of related movements like Futurism."
    entities:
      - name: parachthon
        type: concept
    dates: "20th c. N"

  - category: terminology
    claim: "The term 'stafemesh' (now usually just 'mesh') for a modern communication network was coined in Ashford Pasquier's 1968 N trevold 'Starsail'."
    entities:
      - name: stafemesh
        type: technology
      - name: Starsail
        type: work
      - name: Ashford Pasquier
        type: person
    dates: "1968 N"

  - category: terminology
    claim: "The use of 'slate' for a flat surface displaying information can be traced back to Hadasse Docquerl's 1872 N work 'Dealsome Onomatory of the New London' (Borlish: 'Un Onomatoir Partial dy Novel Londr')."
    entities:
      - name: slate
        type: technology
      - name: "Dealsome Onomatory of the New London"
        type: work
      - name: Hadasse Docquerl
        type: person
    dates: "1872 N"

  - category: work
    claim: "'New Skies, Old Stories' by Simon d'Estiala was published by Prindor Marsillès in 1980 N."
    entities:
      - name: "New Skies, Old Stories"
        type: work
      - name: Simon d'Estiala
        type: person
      - name: Prindor Marsillès
        type: organisation
    dates: "1980 N"
