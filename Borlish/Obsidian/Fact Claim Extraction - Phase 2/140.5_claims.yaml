entry: 140.5
title: "Chemical Etymology (cont. 2)"
source_work: "Veriloquace Glossary of Alchemy (Rotcham University Primers)"
claims:
  - category: glossary
    claim: "Corporal is the Boralverse term for chemical element."
    entities:
      - name: corporal
        irl: chemical element
        type: concept

  - category: language
    claim: "Corporal was coined in 1766 from Scholastic Latin corporālis 'material, concrete, physical,' from corpus 'body, substance.'"
    entities:
      - name: corporal
        type: concept
    dates: "1766 N"

  - category: glossary
    claim: "Corporal muster is the Boralverse term for periodic table."
    entities:
      - name: corporal muster
        irl: periodic table
        type: concept

  - category: glossary
    claim: "Moronic count is the Boralverse term for atomic number."
    entities:
      - name: moronic count
        irl: atomic number
        type: concept

  - category: glossary
    claim: "Murine is the Boralverse term for chlorine."
    entities:
      - name: murine
        irl: chlorine
        type: concept

  - category: language
    claim: "Murine was coined in 1805 from Scholastic Latin murīnus 'briny,' from muria 'brine,' from Greek halmūrís 'saltiness.'"
    entities:
      - name: murine
        type: concept
    dates: "1805 N"

  - category: glossary
    claim: "Surfeited is the Boralverse term for negatively charged."
    entities:
      - name: surfeited
        irl: negatively charged
        type: concept

  - category: language
    claim: "Surfeited was coined in 1891 from the verb surfeit 'oversupply,' from Drengot French surfeire 'exceed,' from Latin super 'over' and faciō 'I make.'"
    entities:
      - name: surfeited
        type: concept
    dates: "1891 N"

  - category: glossary
    claim: "Tagline is the Boralverse term for fluorine."
    entities:
      - name: tagline
        irl: fluorine
        type: concept

  - category: language
    claim: "Tagline was coined in 1808 from Scholastic Latin taglīnus, originally from Napolitan taglino (1643) 'fondant/flux,' from Arabic talyīn 'softening; fondant.'"
    entities:
      - name: tagline
        type: concept
    dates: "1808 N"
