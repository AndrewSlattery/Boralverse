entry: 128.5
title: "Mathematical Etymology"
source_work: "Veriloquace Glossary of Mathematics (Rotcham University Primers)"
claims:
  - category: work
    claim: "The Veriloquace Glossary of Mathematics is a reference quire compiled by Rotcham University Primers."
    entities:
      - name: Veriloquace Glossary of Mathematics
        type: work
      - name: Rotcham University Primers
        type: organisation

  - category: glossary
    claim: "Zeffer is the Boralverse term for zero."
    entities:
      - name: zeffer
        irl: zero
        type: concept

  - category: language
    claim: "Zeffer derives from Scholastic Latin zefer/zefrum, from Arabic ṣifr 'empty, void,' from Sanskrit śūnyá 'empty, void,' and was in use before 1350."
    entities:
      - name: zeffer
        type: concept
    dates: "before 1350 N"

  - category: glossary
    claim: "Ablate is the Boralverse term for negative (as a mathematical quantity)."
    entities:
      - name: ablate
        irl: negative
        type: concept

  - category: language
    claim: "Ablate was coined in 1481 from Lombard ablad, from Scholastic Latin ablātus 'taken away, withdrawn,' first used in financial accounts before being taken up by mathematicians."
    entities:
      - name: ablate
        type: concept
    dates: "1481 N"

  - category: glossary
    claim: "Dart is approximately the Boralverse term for vector (a directed line segment)."
    entities:
      - name: dart
        irl: vector
        type: concept

  - category: language
    claim: "Dart in its mathematical sense was coined around 1470, extended from Merch dart 'throwing spear, dart,' by the pictorial analogy of drawing arrowheads on line segments."
    entities:
      - name: dart
        type: concept
    dates: "c. 1470 N"

  - category: glossary
    claim: "Augrim is approximately the Boralverse term for arithmetic (or computation with numbers more generally)."
    entities:
      - name: augrim
        irl: arithmetic
        type: concept

  - category: language
    claim: "Augrim was coined around 1220 from Old French algorisme, from Scholastic Latin algorismus, reflecting the name of Persian polymath al-Khwarismi whose works introduced Arabic numerals to Europe."
    entities:
      - name: augrim
        type: concept
    dates: "c. 1220 N"

  - category: glossary
    claim: "Arrhumb is the Boralverse term for cosine."
    entities:
      - name: arrhumb
        irl: cosine
        type: concept

  - category: language
    claim: "Arrhumb in Early Merch was arrum/arrom, from Arabic ar-rumḥ 'spear, shaft,' and the modern spelling is influenced by unrelated rhumb 'compass bearing'."
    entities:
      - name: arrhumb
        type: concept
