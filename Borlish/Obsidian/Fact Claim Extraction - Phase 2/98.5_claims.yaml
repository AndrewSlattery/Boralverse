entry: 98.5
title: "Tachygraph"
claims:
  - category: technology
    claim: "A tachygraph is a device with a keyboard for typing text onto paper, or more recently directly onto a slate."
    entities:
      - name: tachygraph
        type: technology

  - category: language
    claim: "The word 'tachygraph' originated in the mid-nineteenth century as a brand name, derived from Greek takhús 'quick, fast' and gráphō 'draw, write'."
    entities:
      - name: tachygraph
        type: technology
    dates: "mid-19th c. N"

  - category: technology
    claim: "Early tachygraphs in the 1830s and 1840s were extremely cumbersome, with most models only capable of setting type at a fraction of the speed of practised handwriting."
    entities:
      - name: tachygraph
        type: technology
    dates: "1830s–1840s N"

  - category: technology
    claim: "The Armanburg Tachygraph (Tachygrafia Armangrod) was commercially available in Poland from 1842 and was lampooned in the bit-sheets as the Bradygrafia ('slow-writer')."
    entities:
      - name: Armanburg Tachygraph
        type: technology
    dates: "1842 N"

  - category: technology
    claim: "The Vilmanas Teleclavia, designed in Lithow by Tomas Vilmanas in 1859, was the first tachygraph specifically able to send messages on the steeplemesh."
    entities:
      - name: Vilmanas Teleclavia
        type: technology
      - name: Tomas Vilmanas
        type: person
      - name: Lithow
        type: place
    dates: "1859 N"

  - category: event
    claim: "The first message sent via the Vilmanas Teleclavia was transmitted on Michaelmas 1859 by Tomas Vilmanas to his friend Margreta Legaite in Tvaniste."
    entities:
      - name: Tomas Vilmanas
        type: person
      - name: Margreta Legaite
        type: person
      - name: Tvaniste
        type: place
    dates: "Michaelmas 1859 N"

  - category: event
    claim: "The first tachymesh message was sent less than a month after the 1859 Auroric Anomaly."
    entities:
      - name: Tomas Vilmanas
        type: person
    dates: "1859 N"

  - category: technology
    claim: "In the late nineteenth century, the Faxim brand of tachygraph was sold across Borland."
    entities:
      - name: Faxim
        type: technology
      - name: Borland
        type: place
    dates: "late 19th c. N"
