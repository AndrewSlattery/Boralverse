entry: 67.5
title: "Romantic Wars"
claims:
  - category: event
    claim: "The Romantic Wars were a loosely-circumscribed collection of wars, uprisings and other conflicts across Europe which took place through the middle of the seventeenth century."
    entities:
      - name: Romantic Wars
        type: event
    dates: "mid-17th c. N"

  - category: event
    claim: "The Romantic Wars are sometimes considered the last truly localised conflicts, before wars of similar scale began to involve the Novomund and feature intercontinental alliances."
    entities:
      - name: Romantic Wars
        type: event

  - category: event
    claim: "The years 1640 to 1670 N cover the 'central' conflicts of the Romantic Wars, although some peripheral fights may spill earlier or later."
    entities:
      - name: Romantic Wars
        type: event
    dates: "1640–1670 N"

  - category: culture
    claim: "The Romantic period was characterised by great corrogation (canal) projects; for example, the Bordew-Audaz canal was completed in 1679 N."
    entities:
      - name: Romantic Wars
        type: event
    dates: "1679 N"

  - category: event
    claim: "During the Romantic Wars, Vascony was forced to cede its economic heart in Portingale to Andalus, which at the time was controlled by Morrack."
    entities:
      - name: Vascony
        type: polity
      - name: Portingale
        type: polity
      - name: Andalus
        type: polity
      - name: Morrack
        type: polity
      - name: Romantic Wars
        type: event

  - category: event
    claim: "The Principality of Mystra in Greece, which had been a vassal of the Second Roman Empire since the eleventh century, was formally dissolved in the aftermath of the Romantic Wars."
    entities:
      - name: Mystra
        type: polity
      - name: Second Roman Empire
        type: polity
      - name: Romantic Wars
        type: event

  - category: event
    claim: "The Blue Trans-Willem War (part of the Romantic Wars) was centred on Willemy and indirectly led to the dissolution of the Kingdom of Burgundy and the creation of the Duchy of Far Suebia in Bavarn."
    entities:
      - name: Blue Trans-Willem War
        type: event
      - name: Willemy
        type: polity
      - name: Burgundy
        type: polity
      - name: Duchy of Far Suebia
        type: polity
      - name: Romantic Wars
        type: event

  - category: event
    claim: "Borland's involvement in the Romantic Wars was restricted to a failed invasion culminating in the Hawkirch Surrender of 1623 N, along with unstable military aid arrangements with neighbouring polities."
    entities:
      - name: Borland
        type: polity
      - name: Romantic Wars
        type: event
      - name: Hawkirch Surrender
        type: event
    dates: "1623 N"

  - category: event
    claim: "The Roman conflict in Armenia of the 1640s N is contemporaneous with the Romantic Wars but its inclusion within them is a matter of scholarly dispute."
    entities:
      - name: Second Roman Empire
        type: polity
      - name: Romantic Wars
        type: event
    dates: "1640s N"
