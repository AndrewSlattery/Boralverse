entry: 200.5
title: "Lexember 2025 - 19: quaglar"
claims:
  - category: terminology
    claim: "Quaglar means curdle, clot, or set."
    entities:
      - name: quaglar
        type: culture

  - category: polity
    claim: "Ruritania is a minor polity located east of Bavarn, south of Bohamy, and north of Crain, with its capital Strelsau on the Danaw."
    entities:
      - name: Ruritania
        type: polity
      - name: Bavarn
        type: polity
      - name: Bohamy
        type: polity
      - name: Crain
        type: polity
      - name: Strelsau
        type: place
      - name: Danaw
        type: place

  - category: place
    claim: "Ruritania is known in Borlish as Rurtagn, in Bavarn as Rürzen, and in Boham as Ruravsko."
    entities:
      - name: Ruritania
        type: polity

  - category: glossary
    claim: "Bohamy is the Boralverse name for Bohemia."
    entities:
      - name: Bohamy
        type: polity
        irl: Bohemia
